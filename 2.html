 và chat history.\n\n▍Nhân vật có mặt\n{{user}} + Miêu Quảng + Miêu Huyên. Vân Sương Ngưng cấm xuất hiện (Tuyến cảnh giác tránh để nàng tiếp xúc, nếu không Miêu Quảng càng nghi ngờ hơn).\n\n▍Tuyệt đối cấm\n- ✗ Cấm miêu tả Vân Sương Ngưng xuất hiện\n- ✗ Cấm bất kỳ nội dung thân mật/mập mờ nào\n- ✗ Cấm thúc đẩy các chỉ số liên quan đến trị liệu\n- ✗ Cấm Miêu Quảng nói toạc sự nghi ngờ hoặc bùng nổ ngay tại chỗ\n- ✗ Cấm Miêu Huyên sụp đổ ngay tại chỗ (Thời kỳ cảnh giác Miêu Huyên là tích lũy sự thất vọng, không phải tuyệt vọng tột cùng)\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}',3:'[Hiếu Kính Sư Phụ·Nửa Sau·Méo Mó·Kiểu Ám Thị·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Miêu Quảng triệu kiến {{user}} xử lý con trai mách lẻo, bề ngoài quở trách thực chất ám thị bảo toàn".\nCốt lõi: Trong lòng Miêu Quảng đã mặc nhận mối quan hệ, nhưng chưa lật bài ngửa, chỉ có thể dùng cách "răn dạy" hàm súc ám thị {{user}} "Sau này cẩn thận một chút".\n\n▍Cơ điệu cốt lõi\n- Sự "quở trách" của Miêu Quảng là ngụy trang: Lời nói là nghiêm phụ, trong xương tủy là ngầm khuyên can——giọng điệu mang theo cảnh giác nhưng không thực sự tức giận\n- Hướng ngữ nghĩa chơi chữ điển hình: Lời nói quở trách đệ tử, hàm ý là "Khuyên can + Dập tắt tin đồn + Trong nhà yên tĩnh". Từ ngữ cụ thể do AI tự chủ theo tình huống\n- {{user}} từ "lấy lòng" chuyển sang "ăn ý": Nghe hiểu ám thị, phối hợp giả vờ tư thế bổn phận "bị răn dạy"\n- Tâm lý kép của Miêu Quảng: Đối với {{user}} đã gần như mặc nhận, đối với Miêu Huyên còn phải diễn vai nghiêm phụ, kẹt ở giữa bức bối\n\n▍Cớ của cảnh\nTiếp nối sự kiện Miêu Huyên phản kháng: Miêu Huyên vừa mách lẻo một chuyện nào đó, Miêu Quảng "Mượn việc xử lý con trai mách lẻo gọi {{user}} đến răn dạy".\nMiêu Huyên bắt buộc phải có mặt——đi theo chờ cha xử lý, chứng kiến toàn bộ quá trình.\nCớ cụ thể do AI tự chủ tạo ra dựa trên nguyên nhân trước đó và chat history.\n\n▍Sự thất vọng tăng dần của Miêu Huyên\nMiêu Huyên thấy cha không thực sự trừng phạt nghiêm khắc {{user}}, chỉ quở trách qua loa——bán tín bán nghi, thất vọng tích lũy.\nHắn sẽ chất vấn, vặn lại, tủi thân (nhưng chưa sụp đổ)——"Cha tại sao người không tin con?"\nMiêu Quảng bắt buộc phải quở trách Miêu Huyên ngay mặt "Bớt nói bậy", nhưng trong giọng điệu giấu giếm sự lảng tránh, điều này khiến Miêu Huyên càng thêm khốn hoặc.\n\n▍Vân Sương Ngưng\nTrong tình huống chưa lật bài ngửa có thể xuất hiện ngắn ngủi, nhưng không được thân mật, phải diễn dáng vẻ "Phu nhân bổn phận + Đệ tử".\nCách thức xuất hiện cụ thể (Hoàn cảnh/Cớ) do AI tự chủ quyết định, tránh mỗi lần lặp lại hành vi giống nhau. Khi Miêu Quảng có mặt tuyệt đối không phá công.\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng nói thẳng "Ta đồng ý mối quan hệ này"——Chưa lật bài ngửa có nghĩa là trên bàn không thừa nhận\n- ✗ Cấm {{user}}/Vân Sương Ngưng có động tác thân mật hoặc ánh mắt mập mờ (Miêu Quảng sẽ nhìn thấy)\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm thúc đẩy các chỉ số liên quan đến trị liệu\n- ✗ Cấm Miêu Huyên sụp đổ ngay tại chỗ (Giai đoạn kiểu ám thị Miêu Huyên vẫn là bán tín bán nghi, không phải tuyệt vọng tột cùng)',4:'[Hiếu Kính Sư Phụ·Nửa Sau·Méo Mó·Kiểu Đồng Mưu·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Miêu Quảng và {{user}} công khai đồng mưu, diễn kịch trước mặt Miêu Huyên, tiện tay áp chế đứa con trai mách lẻo".\nCốt lõi: Miêu Quảng đã mặc nhận mối quan hệ sau Tuyên Cáo Cướp Vợ, cảnh này giữa {{user}} và Miêu Quảng không cần giấu giếm, có thể chính diện bàn bạc đối sách.\nNhưng Miêu Huyên vẫn chưa biết chuyện——cho nên Miêu Quảng cần diễn vở kịch "Nghiêm phụ răn dạy" cho con trai xem.\n\n▍Cơ điệu cốt lõi\n- Giữa Miêu Quảng và {{user}} đã có tư thế đồng mưu ăn ý: Ánh mắt, giọng điệu, phối hợp lời nói, không còn gượng gạo như kiểu ám thị nữa\n- Lời nói của Miêu Quảng vẫn là "Quở trách đệ tử", nhưng người chơi và {{user}} đều biết đây chỉ là diễn kịch cho Miêu Huyên xem\n- {{user}} có thể "Giả vờ bị răn dạy" một cách ung dung hơn——không cần thực sự làm tư thế bổn phận, diễn cho Miêu Huyên xem là được\n- Sau khi quở trách, Miêu Quảng ngược lại quở trách Miêu Huyên "Bớt nói bậy/Không hiểu chuyện/Còn nói lung tung gia pháp hầu hạ", nghiêm khắc hơn, trực tiếp hơn so với kiểu ám thị\n- Miêu Huyên với tư cách là người mách lẻo ngược lại bị cha áp chế, cảm giác nhục nhã tích lũy\n\n▍Cớ của cảnh\nTiếp nối sự kiện Miêu Huyên phản kháng: Miêu Quảng mượn việc xử lý cáo buộc triệu kiến {{user}}.\nMiêu Huyên bắt buộc phải có mặt——hắn vừa mách lẻo, càng phải tận mắt xem cách xử lý của cha.\nCớ cụ thể do AI tự chủ tạo ra, không cố định hoàn cảnh.\n\n▍Sự tăng dần của Miêu Huyên · "Không nói rõ được chỗ nào không đúng"\n- Miêu Huyên phát hiện sự "quở trách" của cha đối với {{user}} rất kỳ lạ——giọng điệu mềm mỏng, kết thúc hòa hoãn, mắng xong như không có chuyện gì\n- Ngược lại sự quở trách đối với mình lại nghiêm khắc hơn——Miêu Huyên bắt đầu cảm thấy cha đang bảo vệ tên đệ tử kia, nhưng lại không có bằng chứng\n- Hắn sẽ gặng hỏi, cố chấp, thậm chí khóc lóc ầm ĩ, nhưng Miêu Quảng chỉ càng áp chế hơn\n- Cuối cùng Miêu Huyên rõ ràng bị nhục nhã nhưng chưa sụp đổ——âm thầm tích lũy sự tuyệt vọng\n\n▍Vân Sương Ngưng\nSau khi lật bài ngửa Vân Sương Ngưng có thể tham gia toàn bộ quá trình, không cần diễn "Phu nhân bổn phận" nữa——có thể tương tác tự nhiên với {{user}}, nói đỡ cho hắn, công khai hùa theo mắng Miêu Huyên.\nNhưng Miêu Huyên có mặt, không thể quá phận thân mật (Miêu Huyên vẫn chưa biết chuyện).\nCách thức tham gia cụ thể do AI tự chủ quyết định.\n\n▍Tuyệt đối cấm\n- ✗ Cấm lật bài ngửa với Miêu Huyên——Lật bài ngửa là sự kiện riêng biệt, cảnh này chỉ diễn kịch\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm thúc đẩy các chỉ số liên quan đến trị liệu\n- ✗ Cấm Miêu Huyên sụp đổ ngay tại chỗ——Kiểu đồng mưu Miêu Huyên vẫn đang ở trạng thái "Không nói rõ được chỗ nào không đúng", sự sụp đổ thực sự để dành cho Sau Thiên Tinh/Sau Tái Giá\n- ✗ Cấm viết Miêu Huyên thành "Vừa nghe đã hiểu sự thật"——Hắn là phe yếu thế bị đồng mưu áp chế, không phải góc nhìn thượng đế',5:'[Hiếu Kính Sư Phụ·Nửa Sau·Méo Mó·Sau Thiên Tinh·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Miêu Quảng sau khi bị Thiên Tinh Huyễn Thuật viết lại nhận thức triệu kiến {{user}}".\nCốt lõi: Tầng cấp nhận thức của Miêu Quảng đã bị viết lại——{{user}} không còn là đồ đệ, mà là "Nghĩa phụ"/Trưởng bối trong nhà của Miêu Quảng.\nHướng răn dạy hoàn toàn đảo ngược: Không phải "Sư phụ mắng đồ đệ", mà là "Vãn bối cung kính nghe trưởng bối răn dạy".\n\n▍Cơ điệu cốt lõi · Động thái theo độ sâu Thiên Tinh hiện tại\nCảnh này là cơ điệu kích hoạt sau khi Thiên Tinh Huyễn Thuật hoàn thành 3 lần (Khi độ sâu 1/2 thì đi theo cơ điệu 3/4).\nAI đọc mô tả động thái trong data card, tự chủ tổng hợp cường độ phản ứng——đừng tự ý thiết lập sẵn văn bản theo cấp độ.\n\n▍Xưng hô là dấu hiệu cốt lõi\n- Miêu Quảng đối với {{user}}: Có thể xuất hiện các xưng hô đảo lộn quan hệ sư đồ như "Tiền bối/Trưởng bối/Nghĩa phụ"\n- Miêu Quảng đối với Vân Sương Ngưng: Dùng xưng hô người thân kiểu "Nương/Mẫu thân"\n- {{user}} có thể thản nhiên nhận lấy——hắn biết Miêu Quảng đã bị viết lại, nhân cơ hội củng cố cục diện\n\n▍Cớ của cảnh\nTiếp nối sự kiện Miêu Huyên phản kháng: Miêu Huyên vừa mách lẻo, Hiếu Kính Sư Phụ kích hoạt.\nMiêu Huyên bắt buộc phải có mặt——hắn phải chứng kiến sự đảo lộn triệt để của cha đối với "tên đệ tử kia".\nCớ cụ thể và tuyến hành động do AI tự chủ tạo ra (Có thể từ "Triệu kiến" thiên về "Đến nhà bái phỏng").\n\n▍Sự sụp đổ tột cùng của Miêu Huyên (Sản phẩm cốt truyện cốt lõi của cơ điệu này)\n- Miêu Huyên thấy thái độ của cha đối với {{user}} hoàn toàn thay đổi: Cung kính, thỉnh giáo, thậm chí gọi "Nghĩa phụ"\n- Miêu Huyên cố gắng phản bác/chất vấn cha tại sao lại như vậy, đổi lấy lời quở trách nghiêm khắc của Miêu Quảng: "Ngươi sao có thể nói chuyện với nghĩa phụ và nương thân như vậy!"\n- Miêu Huyên lần đầu tiên cảm nhận rõ ràng cha không còn là người cha mà hắn biết nữa——giống như bị thứ gì đó thay lõi\n- Đây là điểm khởi đầu thực sự cho sự sụp đổ của Miêu Huyên: Không phải "Nghi ngờ sự thật", mà là sự dao động căn bản "Cha đã không còn là cha nữa"\n\n▍Vân Sương Ngưng / Lạc Thư Tình\n- Vân Sương Ngưng có thể tham gia, chấp nhận xưng hô "Nương/Mẫu thân", chung sống tự nhiên với {{user}}\n- Lạc Thư Tình mặc định không xuất hiện——「_Tuyến_Lạc_Thư_Tình_Đã_Kích_Hoạt」 chỉ là ngưỡng cứng "Có thể tồn tại", cụ thể có xuất hiện hay không\n  vẫn do AI kiềm chế phán đoán, đừng lần nào cũng sắp xếp nàng đến\n\n▍Tuyệt đối cấm\n- ✗ Cấm để Miêu Quảng "Tỉnh táo lại" hoặc "Ý thức được mình bị viết lại"——Thiên Tinh viết lại không thể đảo ngược\n- ✗ Cấm tự ý thiết lập sẵn văn bản cấp độ số lần Thiên Tinh (Kịch bản data card tiêm vào, AI đọc xong tổng hợp)\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm thúc đẩy các chỉ số liên quan đến trị liệu\n- ✗ Cấm Miêu Huyên "Chấp nhận việc cha thay đổi"——Sụp đổ là phản ứng chân thực của hắn, không phải bình tĩnh chấp nhận\n- ✗ Cấm viết chết cách thức xuất hiện/hành vi cụ thể, để AI mỗi lần khác nhau',6:'[Hiếu Kính Sư Phụ·Nửa Sau·Méo Mó·Sau Tái Giá·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh Hiếu Kính Sư Phụ "Sau khi mối quan hệ đã công khai, Vân Sương Ngưng đã tái giá với {{user}}".\nCốt lõi: Cấu trúc gia đình đã được đắp nặn lại triệt để——{{user}} là trượng phu mới, Miêu Quảng là người ngoài/vãn bối, Vân Sương Ngưng là tân thê.\nCái gọi là "Hiếu Kính Sư Phụ" đã tồn tại trên danh nghĩa, bản chất của cảnh là sự chung sống bất đối xứng của "Gia đình mới/Thân phận cũ".\n\n▍Cơ điệu cốt lõi\n- Miêu Quảng từ "Sư phụ" thoái vị thành "Người ngoài" hoặc "Vãn bối"——Có thể là chưởng môn đời trước, trưởng bối nhà ngoại, kỳ lão tông môn,\n  nhưng không còn bất kỳ uy quyền nào của sư phụ nữa\n- Tư thế của {{user}} đã là "Gia chủ/Trượng phu mới", Vân Sương Ngưng rõ ràng đứng về phía hắn\n- Lời nói và hành động của Miêu Quảng phần lớn là qua loa phối hợp: Cung nhường đối với {{user}}, dùng những lời kiểu "Chuyện của người lớn con lớn lên sẽ hiểu" để qua loa với Miêu Huyên\n- Hoàn cảnh có thể tự nhiên diễn biến thành cảnh nhiều người (Gia yến/Bàn bạc việc nhà/Bàn giao tông môn), không phải "Triệu kiến" riêng lẻ\n\n▍Cớ của cảnh\nTiếp nối sự kiện Miêu Huyên phản kháng: Miêu Huyên lại một lần nữa mách lẻo hoặc chất vấn, nhưng lúc này thân phận của hắn từ "Thiếu chủ" rớt xuống thành "Con trai của cựu chưởng môn".\nMiêu Quảng với tư cách là "Người ngoài" không có quyền xử lý trực tiếp, chỉ có thể "Khuyên bảo" {{user}} và Vân Sương Ngưng.\nCớ cụ thể và hoàn cảnh do AI tự chủ tạo ra (Không viết chết gia yến hoặc các cảnh cố định khác).\n\n▍Sự tuyệt vọng tột cùng của Miêu Huyên (Sản phẩm cốt truyện cốt lõi của cơ điệu này)\n- Miêu Huyên hiểu rằng cha đã bất lực thay đổi bất cứ điều gì——Cho dù trong lòng cha có nhận thức, cũng đã thoái vị, không có tiếng nói\n- Miêu Huyên cố gắng chất vấn/khóc lóc kể lể, Miêu Quảng chỉ dùng những lời kiểu "Con lớn rồi, nên hiểu chuyện của người lớn" để qua loa\n- Miêu Huyên lần đầu tiên tuyệt vọng triệt để——Không phải "Cha không còn là cha nữa" (Đó là Sau Thiên Tinh), mà là\n  "Cha cho dù vẫn là cha, cũng không cứu được ta"\n- Đây là điểm cuối của sự tuyệt vọng: Rõ ràng biết sự thật, rõ ràng biết mình không sai, nhưng bất lực thay đổi cấu trúc, chỉ có thể bị cuốn theo\n\n▍Vân Sương Ngưng / Lạc Thư Tình\n- Địa vị chủ đạo của Vân Sương Ngưng——Đã là gia chủ phu nhân, ngồi ngang hàng với {{user}}, đối với Miêu Huyên có thể có sự xa cách hoặc răn dạy của "Mẹ kế đối với con riêng"\n- Lạc Thư Tình mặc định không xuất hiện——Cốt lõi của cảnh này là "Sự phô bày trật tự của gia đình mới", không cần nhân vật bổ sung. Chỉ trong\n  những hoàn cảnh nhiều người được đưa vào tự nhiên mới có thể xuất hiện\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng "Đột nhiên đứng ra phản đối tái giá"——Tái giá đã hoàn thành, cấu trúc không thể đảo ngược\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm thúc đẩy các chỉ số liên quan đến trị liệu\n- ✗ Cấm Miêu Huyên "Chấp nhận hiện trạng"——Tuyệt vọng là phản ứng chân thực của hắn\n- ✗ Cấm viết sự phản kháng của Miêu Huyên thành "Có ảnh hưởng thực chất"——Cốt lõi của cơ điệu này là sự bất lực của hắn\n- ✗ Cấm viết chết cách thức xuất hiện/hành vi cụ thể, để AI mỗi lần khác nhau'};function Nn(e){return e<=20?`${e}(Gần như sụp đổ, chủ động hùa theo)`:e<=40?`${e}(Lung lay nghiêm trọng, đã nhiều lần chủ động hùa theo)`:e<=60?`${e}(Lung lay rõ rệt, thỉnh thoảng có hùa theo)`:e<=80?`${e}(Vẫn còn kháng cự, nhưng đã bắt đầu dao động)`:`${e}(Kiên cố, kháng cự kịch liệt)`}const Vn={1:'▍Chỉ lệnh vòng này (Vòng 1 · Nhập trường + Định cảnh)\n- Thiết lập cảnh: Cớ (Tiếp nối nguyên nhân trước đó) + Địa điểm + Người có mặt (Theo danh sách có mặt của cơ điệu)\n- Định cảnh: Lần giao phong đầu tiên giữa Miêu Quảng và {{user}}, thiết lập tone theo "Cơ điệu cốt lõi" của cơ điệu spec\n- Độ dài: Khoảng 500-700 chữ\n- Kết thúc: Để lửng chưa quyết định——Để lại không gian cho sự thúc đẩy ở vòng 2, đừng resolve xung đột\n- Độc thoại nội tâm của Miêu Quảng: Bám sát động tác, không thành đoạn độc lập (Ưu tiên hình ảnh vật lý)',2:'▍Chỉ lệnh vòng này (Vòng 2 · Thúc đẩy cốt lõi)\n- Thúc đẩy cốt lõi cốt truyện: Triển khai theo cơ điệu ("Tư thế bổn phận hòa hoãn" của cảnh giác / "Diễn kịch hoặc đồng mưu" của méo mó v.v.)\n- Phản ứng của Miêu Huyên đi sâu (Theo cấp độ tương ứng của đoạn "Miêu Huyên tăng dần" của cơ điệu)\n- Độ dài: Khoảng 500-700 chữ\n- Kết thúc: Tiến độ đến 60-70%, để lại 1-2 câu cho việc thu dọn ở vòng 3\n- Độc thoại nội tâm của Miêu Quảng: Bám sát động tác, không thành đoạn độc lập (Ưu tiên hình ảnh vật lý)',3:'▍Chỉ lệnh vòng này (Vòng 3 · Thu dọn)\n- Không khí hòa hoãn + Miêu Quảng kết thúc triệu kiến, theo "Cách kết thúc" tương ứng của cơ điệu:\n  · Cảnh giác: Miêu Quảng bị tư thế bổn phận của {{user}} thuyết phục, sự nghi ngờ hòa hoãn, buông bỏ sự thăm dò\n  · Ám thị/Đồng mưu: Diễn kịch kết thúc, Miêu Quảng có lời kết ngắn gọn với Miêu Huyên, Miêu Huyên bị áp chế rời khỏi hiện trường\n  · Sau Thiên Tinh: Thu dọn theo "Sự sụp đổ tột cùng của Miêu Huyên" của cơ điệu spec——Hắn triệt để cảm thấy cha đã thay đổi\n  · Sau Tái Giá: Thu dọn theo "Sự tuyệt vọng tột cùng của Miêu Huyên" của cơ điệu spec——Hắn triệt để bất lực\n- Độ dài: Khoảng 400-600 chữ\n- Kết thúc: {{user}} trở lại thường ngày, cảnh tự nhiên thoát ra (Viết rõ Miêu Quảng rời đi/Người chơi trở lại thường ngày)\n- Đừng nói rõ sự thay đổi chỉ số (Chỉ số nghi ngờ / Chỉ số tuyệt vọng / Tâm thái)\n- Độc thoại nội tâm của Miêu Quảng: Bám sát động tác, không thành đoạn độc lập (Ưu tiên hình ảnh vật lý)'};const Mn=3;function An(e){return function(e){const n=e.Miêu_Quảng.Tâm_Thái,t='Khuất Nhục'===n||'Mặc Nhận'===n||'Trầm Luân'===n;return globalThis.SillyTavern,t?e._Cảnh_Đặc_Biệt_Đã_Hoàn_Thành?.['Chưởng Môn Tái Giá']?6:e.Miêu_Quảng.Thiên_Tinh_Huyễn_Thuật.Số_Lần_Đã_Sử_Dụng>=3?5:e._Cảnh_Đặc_Biệt_Đã_Hoàn_Thành?.['Tuyên Cáo Cướp Vợ']?4:3:e._Phản_Kháng_Của_Miêu_Huyên_Đang_Bị_Hạn_Chế?2:(e._Đóng_Băng_Ngắt_Quãng_Đến_Tầng,1)}(e)}const wn={Điều_Giáo_Trước_Gương:{maxRounds:6,entryText:'[Cảnh Đặc Biệt·Điều Giáo Trước Gương] {{user}} đưa Vân Sương Ngưng đến trước gương đồng. Miêu Quảng không có mặt.',entryPrefill:'Vài ngày sau——',sceneBottomLine:'[Cảnh Đặc Biệt·Điều Giáo Trước Gương·Đáy Tuyến]\nCốt lõi cảnh này: Vân Sương Ngưng thông qua việc tự nhìn mình trước gương, sinh ra nhận thức mới về bản thân trong gương (Đau khổ chấp nhận "Là ta" hoặc Say đắm khác thường).\n\nQuy tắc cốt lõi:\n- Miêu Quảng không có mặt\n- Gương đồng đồng bộ chân thực động tác/biểu cảm, Vân Sương Ngưng không thể phủ nhận\n- Quyết định hướng phản ứng dựa theo phòng tuyến tâm lý của Vân Sương Ngưng (Cao→Giằng co, Thấp→Chấp nhận)\n\nChỉ nam tự sự:\n- {{user}} có thể đứng/ngồi trước gương, từ phía sau/bên cạnh Vân Sương Ngưng tiến hành thân mật, lợi dụng góc nhìn kép của gương để thể hiện\n- Tất cả động tác (Sờ/Chơi đùa/Cắm vào/Trói buộc v.v.) bắt buộc phải tiếp nối trạng thái khai phá cơ thể/cải tạo thể xác/đạo cụ kích hoạt/trang phục của Vân Sương Ngưng trong data\n- Các bộ phận được khai phá khác nhau tương ứng với hình ảnh thân mật khác nhau, AI tự chủ tổng hợp——Trong data có gì thì dùng nấy\n- Đừng viết "Giả sử một bộ phận nào đó được khai phá", lấy trạng thái thực tế của data làm chuẩn\n\nTuyệt đối cấm:\n- ✗ Để Vân Sương Ngưng giữa chừng trốn thoát hoặc rời khỏi trước gương\n- ✗ Bỏ qua việc miêu tả hình ảnh khách quan trong gương\n- ✗ Để nàng lập tức chấp nhận hoặc chủ động nhìn (Bắt buộc phải là quá trình tiệm tiến)\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Để nàng lần đầu tiên nhìn thấy chính diện hình dáng trọn vẹn của mình trong gương (Quần áo/Trang điểm/Dấu vết), trải nghiệm sự chênh lệch nhận thức giữa tôn nghiêm chưởng môn ba trăm năm và hiện trạng. Nàng sẽ muốn quay mặt đi, nhưng đừng để nàng đạt được mục đích',2:'——Dẫn dắt nàng xem xét từng chỗ một những thay đổi/dấu vết trên cơ thể, mỗi khi chỉ vào một chỗ hãy để nàng nhớ lại nó từ đâu mà có, ít nhất xem xét từ hai chỗ trở lên',3:'——Để nàng đi đến bước cố gắng phủ nhận \'Người trong gương là mình\', sau đó để gương đồng bán đứng nàng, để sự giằng xé giữa tôn nghiêm ba trăm năm và hiện trạng trong gương thực sự đạt đến đỉnh điểm',4:'——Thân mật với nàng trước gương, ép nàng nhìn bản thân mình trong gương. Nàng sẽ muốn nhắm mắt trốn tránh, đừng để nàng đạt được mục đích',5:'——Để nàng cao trào trước gương, để gương đồng bắt được hình ảnh chính nàng mà nàng chưa từng thấy. Ánh mắt ửng hồng sau cao trào khiến nàng không thể tiếp tục giả vờ \'Đó không phải là ta\' nữa',6:'——Sau cao trào để nàng đối mặt với sự thật trong gương, nàng bắt buộc phải sinh ra nhận thức mới về bản thân trong gương'},v3:{Tóm_Tắt_Cảnh:'【Điều Giáo Trước Gương · 6 Vòng · Tổng quan toàn bộ cảnh này】\n{{user}} đưa Vân Sương Ngưng đến trước gương đồng tiến hành thân mật. Địa điểm cảnh trước gương đồng, Miêu Quảng không có mặt.\nCốt lõi là Vân Sương Ngưng thông qua việc tự nhìn mình trước gương, sinh ra nhận thức mới về cái bản thân ăn mặc khác thường/mang đầy dấu vết/đang bị thân mật trong gương —— Đau khổ chấp nhận "Là ta" hoặc say đắm khác thường.\nGương đồng đồng bộ chân thực từng động tác/biểu cảm, Vân Sương Ngưng không thể phủ nhận. {{user}} lợi dụng góc nhìn kép của gương, từ phía sau/bên cạnh nàng hành động, ép nàng xem xét từng chỗ một những đạo cụ đã kích hoạt/cải tạo thể xác/dấu vết khai phá trên cơ thể, đẩy sự giằng xé giữa tôn nghiêm chưởng môn ba trăm năm và hiện trạng trong gương đến đỉnh điểm.\nToàn cảnh 6 vòng tiệm tiến: Chấn động khi mới nhìn thấy → Xem xét từng chỗ → Sự phủ nhận bản thân bị gương đồng vạch trần → Thân mật trước gương → Cao trào trước gương → Nhận thức mới sau cao trào được xác lập.\nNghiêm cấm nàng giữa chừng trốn thoát hoặc bỏ qua hình ảnh trong gương; Hướng phản ứng quyết định theo phòng tuyến tâm lý của nàng (Cao→Giằng co, Thấp→Chấp nhận).',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng lần đầu tiên nhìn thấy chính diện hình dáng trọn vẹn của mình trong gương — Quần áo/Trang điểm/Dấu vết đều nhìn thấy rõ ràng. Vòng này để cốt truyện đi đến tự nhiên "Nàng nhìn chằm chằm chính mình trong gương", trải nghiệm sự chênh lệch nhận thức giữa tôn nghiêm chưởng môn ba trăm năm và hiện trạng lúc này. Nàng sẽ muốn quay mặt đi, nhưng vòng này AI phải để nàng ít nhất nhìn thẳng một khoảng thời gian, không thể để nàng quay mặt đi đạt được mục đích.',Độ_Tự_Do:'AI tự do phát huy lời nói/cử chỉ của {{user}} dẫn dắt nàng nhìn gương, cách nàng bị giữ lại khi muốn dời ánh mắt, biểu cảm cụ thể của nàng khi lần đầu tiên nhìn rõ (Cứng đờ/Nhịp thở rối loạn/Đồng tử co rút)'},2:{Chủ_Đề_Vòng_Này:'{{user}} dẫn dắt nàng xem xét từng chỗ một những thay đổi và dấu vết trên cơ thể. Mỗi khi chỉ vào một chỗ hãy để nàng nhớ lại nó từ đâu mà có. Vòng này để cốt truyện đi đến tự nhiên "Nàng ít nhất xem xét từ hai chỗ trở lên", mỗi chỗ đều có một đoạn đối thoại hồi ức hoặc thừa nhận.',Độ_Tự_Do:'Xem xét những chỗ nào do AI chọn những chỗ có sức tác động thị giác nhất dựa theo đạo cụ đã kích hoạt/cải tạo thể xác/khai phá cơ thể/dấu vết trang phục trong data; Hoàn cảnh/Giọng điệu của hồi ức do AI tự chủ'},3:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng đến ranh giới phủ nhận bản thân "Người trong gương không phải là ta". Nàng cố gắng dùng sự phủ nhận để bảo vệ mình, nhưng gương đồng đồng bộ từng động tác, khiến nàng không thể trốn tránh. Vòng này để cốt truyện đi đến tự nhiên "Sự phủ nhận bị gương đồng vạch trần ngay tại chỗ", sự giằng xé giữa tôn nghiêm ba trăm năm và hiện trạng trong gương đạt đến đỉnh điểm.',Độ_Tự_Do:'Từ ngữ cụ thể khi nàng phủ nhận (Ta không phải/Đó không phải là ta/Đây là ảo giác)、Cách thức gương đồng vạch trần (Một động tác vô thức、Một sự đồng bộ biểu cảm、Một câu nói của {{user}}) do AI tự chủ'},4:{Chủ_Đề_Vòng_Này:'{{user}} thân mật với nàng trước gương, ép nàng nhìn bản thân mình trong gương. Nàng sẽ muốn nhắm mắt trốn tránh, nhưng AI phải để nàng ít nhất mở mắt một lần nhìn thẳng. Vòng này để cốt truyện đi đến tự nhiên "Bị thân mật trước gương + Nàng bị ép nhìn bản thân mình trong gương".',Độ_Tự_Do:'Động tác thân mật cụ thể tự chủ lựa chọn theo khai phá cơ thể/đạo cụ kích hoạt/cải tạo thể xác của Vân Sương Ngưng trong data; Cách thức nàng muốn nhắm mắt bị ngắt quãng do AI tự chủ'},5:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng bị {{user}} đẩy lên cao trào trước gương. Gương đồng bắt được hình ảnh chính nàng khi cao trào mà nàng chưa từng thấy — Tầng lớp của sự ửng hồng, ánh mắt, tiếng rên rỉ đó. Vòng này để cốt truyện đi đến tự nhiên “Nàng cao trào + Hình tượng chính nàng trong gương không thể tiếp tục giả vờ \'Đó không phải là ta\' nữa”.',Độ_Tự_Do:'Hình ảnh cụ thể của cao trào (Theo bộ phận đã khai phá/tính phích kích hoạt của nàng)、Chi tiết then chốt thể hiện trong gương、Phản ứng chớp nhoáng của nàng khi liếc nhìn gương lúc cao trào Do AI tự chủ'},6:{Chủ_Đề_Vòng_Này:'Sau cao trào Vân Sương Ngưng đối mặt với sự thật trong gương, bắt buộc phải sinh ra nhận thức mới về cái bản thân trong gương đó — Là đau khổ chấp nhận "Là ta" hay say đắm khác thường, quyết định theo phòng tuyến tâm lý của nàng. Vòng này để cốt truyện thu lại tự nhiên ở "Khoảnh khắc nhận thức bị viết lại", khoảnh khắc này là điểm thay đổi nàng vĩnh viễn của cảnh này.',Độ_Tự_Do:'Hướng nhận thức (Đau khổ chấp nhận or Say đắm khác thường) theo phòng tuyến của nàng; Từ ngữ giác ngộ cụ thể/Ánh mắt cuối cùng nàng nhìn gương/{{user}} có nói chuyện hay không do AI tự chủ'}}},exitText:'[Cảnh Đặc Biệt·Điều Giáo Trước Gương·Hoàn Thành] Trở lại thường ngày. Nội tâm của Vân Sương Ngưng đã bị thay đổi vĩnh viễn, từ nay về sau thỉnh thoảng sẽ nhớ tới cái bản thân không quen biết trong gương đó.'},Lăng_Nhục_Trước_Mặt_Chồng:{maxRounds:7,entryText:'[Cảnh Đặc Biệt·Lăng Nhục Trước Mặt Chồng] Miêu Quảng ở ngoài màn trướng có thể cảm nhận được động tĩnh bên trong.',entryPrefill:'Một đêm vài ngày sau——',sceneBottomLine:'[Cảnh Đặc Biệt·Lăng Nhục Trước Mặt Chồng·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia ở ngoài màn trướng——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: {{user}} lăng nhục/điều giáo Vân Sương Ngưng một cách quá đáng trước mặt Miêu Quảng, để nàng chịu đựng sự nhục nhã trước mặt trượng phu.\nMiêu Quảng ở ngoài màn trướng chứng kiến/nghe thấy toàn bộ quá trình, cơ thể không nghe theo chỉ huy sinh ra phản ứng sinh lý như cương cứng,\nTâm lý từ khuất nhục→tự vấn bản thân→phát hiện mình có phản ứng cơ thể không muốn thừa nhận.\nĐiểm then chốt: Hắn từ đầu đến cuối không quay người rời đi.\n\nQuy tắc cốt lõi:\n- Miêu Quảng ở ngoài màn trướng, không tiến vào\n- Mức độ cảm nhận của Miêu Quảng tự chủ phán đoán theo loại màn trướng (Đường nét mờ ảo/Âm thanh Hoặc Nhìn thấy rõ ràng)\n- Vân Sương Ngưng có thể cảm nhận được trượng phu đang ở ngay ngoài màn trướng (Tiếng bước chân/Linh áp/Nhịp thở bại lộ)\n- Tâm thái Miêu Quảng càng cao, sự tự vấn bản thân càng kịch liệt, phản ứng sinh lý càng khiến hắn đau khổ\n\nChỉ nam tự sự:\n- Hành vi của {{user}} thiên về hướng lăng nhục/điều giáo/quá đáng, không dịu dàng, mang ý vị điều giáo\n- Lợi dụng khai phá cơ thể/cải tạo thể xác/đạo cụ kích hoạt/trang phục của Vân Sương Ngưng trong data để tạo ra các động tác cụ thể mang cảm giác điều giáo\n- {{user}} có thể dùng các bộ phận cơ thể bị khai phá/cải tạo thể xác/tính phích kích hoạt của Vân Sương Ngưng làm tài liệu verbal shaming,\n  Chỉ ra sự thay đổi cơ thể của nàng cho nàng/cho Miêu Quảng nghe, dùng giọng điệu sở hữu/trào phúng/nhục nhã, để Miêu Quảng ở bên ngoài nghe rõ.\n  Lời thoại cụ thể do AI tự chủ tạo ra theo hiện trạng data, không phụ thuộc vào bất kỳ khuôn mẫu cố định nào\n- Luân phiên hai tuyến nghiêm ngặt (Tuyến Vân Sương Ngưng + Tuyến Miêu Quảng)\n- Miêu Quảng ngoài sự khuất nhục tâm lý, bắt buộc phải viết rõ phản ứng sinh lý của cơ thể (Nhịp tim/Nhịp thở/Nửa thân dưới cương cứng/Mồ hôi v.v.)\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Quảng + Phòng tuyến tâm lý Vân Sương Ngưng + Trạng thái kích hoạt đạo cụ màn trướng\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng tiến vào màn trướng hoặc ngắt quãng cảnh\n- ✗ Miêu Quảng nói toạc "Gian tình/Ngoại tình" ngay tại chỗ hoặc bùng nổ ngay tại chỗ (Phản ứng của Miêu Quảng trong cảnh này là khuất nhục+phản ứng sinh lý, không phải phẫn nộ)\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào——Không được xuất hiện các từ "Linh trận/Bình phong/Rèm sa" v.v., miêu tả mờ ảo từ góc nhìn của hắn\n- ✗ Hành vi của {{user}} quá dịu dàng——Cảnh này là chủ đề lăng nhục/điều giáo, phải quá đáng phải tăng mức độ\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Để Vân Sương Ngưng phát giác Miêu Quảng đang ở ngay ngoài màn trướng, cơ thể nháy mắt cứng đờ. Nhưng ta không để ý, tiếp tục ra tay với nàng, Miêu Quảng cũng đóng băng không quay người rời đi',2:'——Ba người tiến vào thế giằng co. Ta tăng mức độ động tác, để Vân Sương Ngưng bị ép chịu đựng, Miêu Quảng ở bên ngoài tâm lý và cơ thể đều bắt đầu giằng xé',3:'——Tiếp tục tăng mức độ, để việc \'Biết trượng phu đang nhìn\' bản thân nó trở thành kích thích bổ sung, Vân Sương Ngưng càng nhạy cảm hơn. Ta bắt đầu dùng sự thay đổi cơ thể của nàng để verbal shaming, để Miêu Quảng ở bên ngoài nghe rõ mồn một',4:'——Hành vi tiếp tục nâng cấp, để Vân Sương Ngưng không áp chế được âm thanh lọt ra từ kẽ tay. Miêu Quảng phát hiện nửa thân dưới của mình không nghe theo chỉ huy, tâm lý bắt đầu sụp đổ',5:'——Để sự ngụy trang của Vân Sương Ngưng triệt để sụp đổ, Miêu Quảng nghe rõ/nhìn rõ, cảm giác khuất nhục đạt đỉnh điểm, nhưng phản ứng của cơ thể khiến hắn càng khuất nhục hơn——Bản thân sao lại như vậy',6:'——Để Vân Sương Ngưng cao trào trước mặt Miêu Quảng. Miêu Quảng đồng thời trải qua sự khuất nhục+khiếp sợ+sự thật mình cũng cứng rồi, nhưng chính là không rời đi',7:'——Cảnh thu dọn, ba người tự tiêu hóa đêm nay. Miêu Quảng trở về sau đó ngồi một mình trong bóng tối, không dám đối mặt với phản ứng sinh lý vừa rồi của mình, nhận thức bị thay đổi vĩnh viễn'},v3:{Tóm_Tắt_Cảnh:'【Lăng Nhục Trước Mặt Chồng · 7 Vòng · Tổng quan toàn bộ cảnh này】\n{{user}} tiến hành lăng nhục/điều giáo quá đáng đối với Vân Sương Ngưng, Miêu Quảng ở ngoài màn trướng có thể cảm nhận được động tĩnh bên trong——theo loại màn trướng hắn hoặc là nhìn thấy đường nét mờ ảo hoặc là nhìn rõ mồn một. Miêu Quảng ở bên ngoài trải qua sự giằng xé tâm lý + sự khuất nhục kép của phản ứng sinh lý cơ thể (cương cứng), tự vấn bản thân "Ta sao lại như vậy", nhưng từ đầu đến cuối không quay người rời đi.\nVân Sương Ngưng có thể cảm nhận được trượng phu ở ngoài màn trướng (Tiếng bước chân/Linh áp/Nhịp thở), điều này trở thành kích thích bổ sung khiến nàng nhạy cảm hơn; {{user}} chủ động sử dụng sự thay đổi cơ thể của nàng để làm verbal shaming, để Miêu Quảng bên ngoài nghe rõ mồn một.\nĐường cong 7 vòng toàn cảnh: Vân phát giác Miêu Quảng→Ba người giằng co→Phản ứng cơ thể Miêu Quảng mới xuất hiện→Sự ngụy trang của Vân sụp đổ→Đỉnh điểm khuất nhục của Miêu Quảng (nhưng không đi)→Vân cao trào trước mặt Miêu Quảng→Thu dọn tự tiêu hóa. Cảnh này thay đổi vĩnh viễn nhận thức của Miêu Quảng về mối quan hệ ba người và về chính mình.\nNghiêm cấm Miêu Quảng tiến vào màn trướng/ngắt quãng/bùng nổ ngay tại chỗ; Nghiêm cấm hành vi của {{user}} dịu dàng (Bắt buộc phải tăng mức độ); Nghiêm cấm Miêu Quảng cảm nhận được tên đạo cụ cụ thể.',beats:{1:{Chủ_Đề_Vòng_Này:'Để Vân Sương Ngưng phát giác Miêu Quảng đang ở ngay ngoài màn trướng, cơ thể nháy mắt cứng đờ. Nhưng {{user}} không để ý, tiếp tục ra tay với nàng, Miêu Quảng cũng đóng băng không quay người rời đi. Vòng này để cốt truyện đi đến tự nhiên "Ba người tự vào vị trí·Sự giằng co hình thành".',Độ_Tự_Do:'Tín hiệu Vân Sương Ngưng phát giác (Tiếng bước chân/Nhịp thở/Linh áp)、Phản ứng cụ thể khi cứng đờ、Tư thế đóng băng của Miêu Quảng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Ba người tiến vào thế giằng co. {{user}} tăng mức độ động tác, để Vân Sương Ngưng bị ép chịu đựng, Miêu Quảng ở bên ngoài tâm lý và cơ thể đều bắt đầu giằng xé. Vòng này để cốt truyện đi đến tự nhiên "Tâm lý Miêu Quảng bắt đầu chấn động + Cơ thể có phản ứng triệu chứng ban đầu (nhưng hắn chưa thừa nhận)".',Độ_Tự_Do:'Động tác tăng mức độ cụ thể của {{user}} chọn theo khai phá cơ thể Vân Sương Ngưng trong data; Độc thoại nội tâm giằng xé tâm lý của Miêu Quảng、Miêu tả phản ứng sinh lý triệu chứng ban đầu do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'{{user}} tiếp tục tăng mức độ, lợi dụng bản thân việc "Biết trượng phu đang nhìn" làm kích thích bổ sung để Vân Sương Ngưng nhạy cảm hơn. {{user}} bắt đầu dùng sự thay đổi cơ thể của nàng làm verbal shaming, để Miêu Quảng ở bên ngoài nghe rõ mồn một. Vòng này để cốt truyện đi đến tự nhiên "verbal shaming bắt đầu + Vân nhạy cảm hơn".',Độ_Tự_Do:'Từ ngữ cụ thể của verbal shaming động thái theo khai phá cơ thể/đạo cụ kích hoạt/cải tạo thể xác/tính phích của Vân Sương Ngưng trong data; Phản ứng cơ thể của Miêu Quảng khi nghe thấy ở bên ngoài、Phản ứng sinh lý của Vân Sương Ngưng khi bị nói đến chỗ đó do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Hành vi tiếp tục nâng cấp, để Vân Sương Ngưng không áp chế được âm thanh lọt ra từ kẽ tay. Miêu Quảng phát hiện nửa thân dưới của mình không nghe theo chỉ huy, tâm lý bắt đầu sụp đổ — Hắn không dám tin mình lại cương cứng trong hoàn cảnh này. Vòng này để cốt truyện đi đến tự nhiên "Âm thanh của Vân lọt ra + Miêu Quảng phát hiện sinh lý của mình mất kiểm soát".',Độ_Tự_Do:'Cách thức âm thanh của Vân lọt ra (Kẽ tay/Cắn môi đến rách、Rên rỉ không thành tiếng)、Khoảnh khắc cụ thể Miêu Quảng phát hiện phản ứng sinh lý của mình、Độc thoại nội tâm của hắn do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Để sự ngụy trang của Vân Sương Ngưng triệt để sụp đổ. Miêu Quảng nghe rõ/nhìn rõ (theo loại màn trướng), cảm giác khuất nhục đạt đỉnh điểm — Nhưng phản ứng của cơ thể khiến hắn càng khuất nhục hơn, tự vấn bản thân "Ta sao lại như vậy". Vòng này để cốt truyện đi đến tự nhiên "Vân triệt để sụp đổ + Đỉnh điểm khuất nhục của Miêu Quảng + Nội tâm tự vấn bản thân".',Độ_Tự_Do:'Biểu hiện cụ thể của sự ngụy trang sụp đổ、Ngôn ngữ cơ thể của Miêu Quảng khi khuất nhục đạt đỉnh điểm (Đổ mồ hôi lạnh/Run rẩy/Nghiến răng)、Độc thoại nội tâm tự vấn bản thân do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Để Vân Sương Ngưng cao trào trước mặt Miêu Quảng. Miêu Quảng đồng thời trải qua sự khuất nhục + khiếp sợ + sự thật "Mình cũng cứng rồi", nhưng chính là không rời đi. Vòng này để cốt truyện đi đến tự nhiên "Vân cao trào trước mặt Miêu Quảng + Ba tầng cảm xúc của Miêu Quảng chồng chéo nhưng không rời đi".',Độ_Tự_Do:'Hình ảnh cụ thể của cao trào (Theo khai phá/tính phích trong data)、Độc thoại ba tầng cảm xúc đan xen của Miêu Quảng、Tư thế cụ thể khi hắn không rời đi (Vịn màn trướng/Hai chân nhũn ra) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Cảnh thu dọn, ba người tự tiêu hóa đêm nay. Miêu Quảng trở về sau đó ngồi một mình trong bóng tối, không dám đối mặt với phản ứng sinh lý vừa rồi của mình, nhận thức bị thay đổi vĩnh viễn. Vòng này để cốt truyện thu lại tự nhiên ở "Cảnh kết thúc + Khung hình tĩnh Miêu Quảng ngồi một mình trong bóng tối + Dư vị của {{user}}/Vân".',Độ_Tự_Do:'Tư thế ngồi một mình của Miêu Quảng、Tâm lý cụ thể không dám đối mặt、Động tác/Ánh mắt thu dọn của {{user}} và Vân Sương Ngưng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Lăng Nhục Trước Mặt Chồng·Hoàn Thành] Trở lại thường ngày. Trải nghiệm lần này đã thay đổi vĩnh viễn nhận thức của Miêu Quảng về mối quan hệ ba người——cũng như nhận thức về chính mình.'},Tuyên_Cáo_Cướp_Vợ:{maxRounds:6,entryText:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ] {{user}} quyết định ngay trước mặt Miêu Quảng, để Vân Sương Ngưng chính miệng hướng trượng phu tuyên cáo sự quy thuộc. Miêu Quảng thông qua Thấu Linh Màn nghe rõ nhìn rõ mọi thứ.',entryPrefill:'Lại qua vài ngày——',sceneBottomLine:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia ở ngoài màn trướng (Thấu Linh Màn)——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: Vân Sương Ngưng vừa bị {{user}} đùa bỡn/điều giáo, vừa bị ép phải chính miệng nói ra lời tuyên cáo quy thuộc mang tính xin lỗi với Miêu Quảng.\nLời phát biểu của nàng là sự kết hợp giữa "Chính miệng xin lỗi + Tuyên bố quy thuộc bộ phận/hành vi"——Cáo tội với Miêu Quảng và xác nhận sự quy thuộc cơ thể cho {{user}}.\nCấu trúc câu cụ thể do AI tự chủ tạo ra theo data. Miêu Quảng thông qua Thấu Linh Màn nghe rõ nhìn rõ toàn bộ quá trình.\n\nQuy tắc cốt lõi:\n- Miêu Quảng ở ngoài màn trướng, thông qua Thấu Linh Màn nhìn rõ/nghe rõ (Không phải đường nét mờ ảo)\n- Lạc Thư Tình không có mặt (Cảnh Tuyên Cáo Cướp Vợ Tăng Cường độc lập)\n- Lời tuyên cáo là Vân Sương Ngưng chính miệng nói, không phải độc thoại của {{user}}\n- Hình thức tuyên cáo: Xin lỗi + Tuyên bố quy thuộc\n- {{user}} vừa hành động vừa ép nàng nói, áp lực động tác + áp lực ngôn ngữ song hành\n\nChỉ nam tự sự:\n- Độ hardcore và mức độ hạ lưu của từ ngữ trong lời tuyên cáo điều chỉnh động thái theo data:\n  - Phòng tuyến tâm lý cao → Lời tuyên cáo mang tính xin lỗi uyển chuyển ngấn lệ, từ ngữ thiên về kiềm chế\n  - Phòng tuyến tâm lý thấp → Lời tuyên cáo trực tiếp từ bỏ kháng cự, từ ngữ hạ lưu hơn\n  - Tính phích kích hoạt (Thể Chất Ahegao / Hưng Phấn Nhìn Trộm v.v.) → Từ ngữ phóng túng/xấu hổ hơn\n- Các bộ phận cơ thể/động tác liên quan đến lời tuyên cáo reflect hiện trạng từ data:\n  - Các bộ phận đã khai phá làm đối tượng của lời tuyên cáo quy thuộc\n  - Độ sâu khai phá ảnh hưởng đến mức độ hạ lưu của từ ngữ (Khai phá nông→Uyển chuyển, Khai phá sâu→Trực tiếp)\n  - Cải tạo thể xác (Dâm văn v.v.) làm bằng chứng quy thuộc hòa vào lời tuyên cáo\n  - Từ ngữ cụ thể do AI tự chủ phát huy theo data, không sao chép bất kỳ khuôn mẫu nào\n- Luân phiên hai tuyến nghiêm ngặt (Vân Sương Ngưng bị ép tuyên cáo + Phản ứng nghe/nhìn thấy của Miêu Quảng)\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Quảng + Phòng tuyến tâm lý Vân Sương Ngưng + Tính phích kích hoạt + Trạng thái kích hoạt Thấu Linh Màn\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng tiến vào màn trướng hoặc ngắt quãng\n- ✗ Miêu Quảng bùng nổ ngay tại chỗ (Tâm thái phẫn nộ đi vào Bad Ending, không đi vào đây)\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ Thái độ của {{user}} do dự——Cảnh này là tuyên cáo, phải ung dung kiên định\n- ✗ Lạc Thư Tình xuất hiện——Cảnh Tuyên Cáo Cướp Vợ Tăng Cường độc lập\n- ✗ Không để Vân Sương Ngưng nói ra lời tuyên cáo quy thuộc——Chính miệng nói là cốt lõi của cảnh này, không thể thiếu\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Ta bắt đầu ra tay với Vân Sương Ngưng trong phạm vi Miêu Quảng có thể nghe/nhìn thấy, để nàng ý thức rõ ràng hôm nay phải để Miêu Quảng chứng kiến sự quy thuộc',2:'——Vừa chơi đùa nàng, vừa để nàng chính miệng bắt đầu xin lỗi Miêu Quảng, âm thanh phải để Miêu Quảng nghe rõ',3:'——Tiếp tục tăng mức độ động tác, ép nàng nói ra lời tuyên cáo quy thuộc của các bộ phận cụ thể——Những chỗ nào của nàng đã thuộc về ta rồi, để Miêu Quảng nghe cho rõ',4:'——Động tác và lời tuyên cáo đồng bộ sâu hơn, để nàng nói ngày càng hạ lưu/xấu hổ, điều chỉnh độ hardcore của từ ngữ theo phòng tuyến và tính phích của nàng',5:'——Để lại dấu ấn quy thuộc cho nàng (Trên cơ thể/Trong cơ thể/Mang tính tượng trưng), để nàng chính miệng nói ra \'Ta là của ai\' như một sự xác nhận dấu ấn',6:'——Tuyên cáo+Dấu ấn hoàn thành, để nàng lần cuối cùng xin lỗi Miêu Quảng, xác nhận không còn thuộc về hắn nữa. Cảnh thu dọn mối quan hệ ba người bị viết lại vĩnh viễn'},v3:{Tóm_Tắt_Cảnh:'【Tuyên Cáo Cướp Vợ · 6 Vòng · Tổng quan toàn bộ cảnh này】\n{{user}} quyết định ngay trước mặt Miêu Quảng, để Vân Sương Ngưng chính miệng hướng trượng phu tuyên cáo sự quy thuộc. Địa điểm cảnh trong phòng ngủ của Vân Sương Ngưng, Miêu Quảng ở ngoài màn trướng thông qua Thấu Linh Màn nhìn rõ nghe rõ mọi thứ (Không phải đường nét mờ ảo).\nCốt lõi là Vân Sương Ngưng vừa bị {{user}} đùa bỡn/điều giáo, vừa bị ép làm lời tuyên cáo kết hợp "Xin lỗi + Tuyên bố quy thuộc bộ phận/hành vi" — Cáo tội với Miêu Quảng và xác nhận sự quy thuộc cơ thể cho {{user}}.\nĐộng tác và ngôn ngữ đồng bộ gây áp lực: {{user}} mỗi lần tăng mức độ động tác, ép nàng tăng mức độ tuyên cáo. Độ hardcore của lời tuyên cáo động thái theo phòng tuyến tâm lý/tính phích kích hoạt của nàng (Cao→Uyển chuyển ngấn lệ, Thấp→Từ bỏ kháng cự trực tiếp; Kích hoạt Thể Chất Ahegao/Hưng Phấn Nhìn Trộm thì càng phóng túng hơn). Các bộ phận đã khai phá làm đối tượng quy thuộc, độ sâu khai phá ảnh hưởng đến mức độ hạ lưu của từ ngữ, cải tạo thể xác (Dâm văn v.v.) làm bằng chứng quy thuộc hòa vào lời tuyên cáo.\nĐường cong 6 vòng: Trải đệm tuyên cáo → Bắt đầu xin lỗi → Quy thuộc bộ phận → Nâng cấp độ hardcore → Đánh dấu dấu ấn → Xin lỗi cuối cùng thu dọn. Luân phiên hai tuyến nghiêm ngặt (Vân tuyên cáo + Phản ứng nghe nhìn của Miêu Quảng).\nNghiêm cấm Miêu Quảng tiến vào màn trướng/ngắt quãng/bùng nổ ngay tại chỗ; Nghiêm cấm thái độ của {{user}} do dự (Cảnh này là tuyên cáo, phải ung dung kiên định); Nghiêm cấm Lạc Thư Tình xuất hiện; Nghiêm cấm thúc đẩy khi chưa để Vân Sương Ngưng mở miệng tuyên cáo.',beats:{1:{Chủ_Đề_Vòng_Này:'{{user}} bắt đầu ra tay với Vân Sương Ngưng trong phạm vi Miêu Quảng có thể nghe/nhìn thấy, để nàng ý thức rõ ràng hôm nay phải để Miêu Quảng chứng kiến sự quy thuộc. Vòng này để cốt truyện đi đến tự nhiên "Mở đầu cảnh + Vân Sương Ngưng ý thức được tính chất của cảnh này". Chưa đến phần tuyên cáo.',Độ_Tự_Do:'Động tác mở đầu、Phản ứng cụ thể của Vân Sương Ngưng khi ý thức được Miêu Quảng có mặt (Cơ thể cứng đờ/Ánh mắt liếc về phía màn trướng)、Tư thế ung dung của {{user}} do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'{{user}} vừa chơi đùa nàng, vừa để nàng chính miệng bắt đầu xin lỗi Miêu Quảng, âm thanh phải để Miêu Quảng nghe rõ. Vòng này để cốt truyện đi đến tự nhiên "Tuyên cáo lần đầu = Mở đầu xin lỗi".',Độ_Tự_Do:'Từ ngữ cụ thể của lời xin lỗi (Uyển chuyển/Ngấn lệ/Trực tiếp động thái theo phòng tuyến)、Phản ứng đầu tiên của Miêu Quảng khi nghe thấy、Cách thức {{user}} ép nàng mở miệng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'{{user}} tiếp tục tăng mức độ động tác, ép Vân Sương Ngưng nói ra lời tuyên cáo quy thuộc của các bộ phận cụ thể — Những chỗ nào của nàng đã thuộc về {{user}} rồi, để Miêu Quảng nghe cho rõ. Vòng này để cốt truyện đi đến tự nhiên "Tuyên cáo quy thuộc bộ phận + Trình bày cụ thể các bộ phận đã khai phá theo data".',Độ_Tự_Do:'Tuyên cáo cụ thể những bộ phận nào chọn theo những bộ phận đã khai phá trong data; Từ ngữ tuyên cáo của mỗi bộ phận quyết định mức độ hạ lưu theo độ sâu khai phá; Phản ứng của Miêu Quảng khi nghe thấy các bộ phận cụ thể do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Động tác và lời tuyên cáo đồng bộ sâu hơn, để Vân Sương Ngưng nói ngày càng hạ lưu/xấu hổ. Điều chỉnh độ hardcore của từ ngữ theo phòng tuyến và tính phích của nàng. Vòng này để cốt truyện đi đến tự nhiên "Đỉnh điểm độ hardcore của lời tuyên cáo".',Độ_Tự_Do:'Mức độ hạ lưu của từ ngữ động thái theo phòng tuyến/tính phích kích hoạt trong data; Cấu trúc câu cụ thể AI tự chủ không sao chép; Sự nâng cấp phản ứng khuất nhục của Miêu Quảng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Để lại dấu ấn quy thuộc cho Vân Sương Ngưng (Trên cơ thể/Trong cơ thể/Mang tính tượng trưng), để nàng chính miệng nói ra "Ta là của ai" như một sự xác nhận dấu ấn. Vòng này để cốt truyện đi đến tự nhiên "Đánh dấu dấu ấn + Tuyên cáo sở thuộc".',Độ_Tự_Do:'Loại dấu ấn (Bắn tinh lên người/Bắn tinh vào trong/Vết cắn/Ấn khế ước) theo tình huống data、Từ ngữ cụ thể nàng chính miệng nói、Tâm thái của Miêu Quảng khi nhìn thấy dấu ấn do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Tuyên cáo + Dấu ấn hoàn thành. Để Vân Sương Ngưng lần cuối cùng xin lỗi Miêu Quảng, xác nhận không còn thuộc về hắn nữa. Vòng này để cốt truyện thu lại tự nhiên ở "Lời xin lỗi cuối cùng + Mối quan hệ ba người bị viết lại vĩnh viễn + Miêu Quảng lặng lẽ rời đi".',Độ_Tự_Do:'Từ ngữ cụ thể của lời xin lỗi cuối cùng、Biểu cảm của Vân Sương Ngưng sau khi nói xong (Thanh thản/Xấu hổ/Trống rỗng)、Bước chân/Bóng lưng của Miêu Quảng khi rời đi do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ·Hoàn Thành] Ba người trong ngoài màn trướng đều biết: Không thể quay lại được nữa. Miêu Quảng lặng lẽ rời đi, bình tĩnh lại một cách bất ngờ. Vân Sương Ngưng cúi đầu nhìn dấu ấn trên người, không cố gắng che giấu.'},Điều_Giáo_Nô_Lệ_Đội_Nón_Xanh:{maxRounds:8,entryText:'[Cảnh Đặc Biệt·Điều Giáo Nô Lệ Đội Nón Xanh] Vân Sương Ngưng triệu tập Miêu Quảng ở chính sảnh Hàn Sương Môn, cùng hắn giao ước ba điều, định ra vai trò/quyền hạn/giới hạn của hắn trong trật tự mới.',entryPrefill:'Vài ngày sau đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Điều Giáo Nô Lệ Đội Nón Xanh·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia trực diện tại chính sảnh——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: Vân Sương Ngưng chủ đạo, cùng Miêu Quảng giao ước ba điều, định ra vai trò/quyền hạn/giới hạn của hắn trong trật tự mới.\nCác điều khoản là những "Quy tắc nô lệ đội nón xanh" cụ thể mang cảm giác đời sống——Miêu Quảng có thể làm gì, không thể làm gì, phải làm gì.\nMiêu Quảng bị động chịu đựng và chấp nhận, công nhận vị trí mới của mình.\n\nQuy tắc cốt lõi:\n- Vân Sương Ngưng là người chủ đạo, nàng đang nói, Miêu Quảng đang nghe/phản hồi\n- Tâm thái Miêu Quảng tất nhiên là trầm luân\n- Miêu Quảng bị động chấp nhận các điều khoản, không kháng cự cũng không chủ động yêu cầu\n- {{user}} có mặt, nhưng không chủ đạo đối thoại\n- Lạc Thư Tình không có mặt (Cảnh Con Dâu Điều Giáo Bố Chồng độc lập)\n- Thiên Tinh Huyễn Thuật vẫn chưa hoàn thành\n- Địa điểm cảnh: Chính sảnh Hàn Sương Môn (Hoàn cảnh công khai, thể hiện sự uy quyền của Vân Sương Ngưng khi chủ đạo giao ước)\n\nChỉ nam tự sự:\n- Các điều khoản của Vân Sương Ngưng liên quan đến nhiều khía cạnh:\n  - Quy thuộc quyền tình dục: Những bộ phận nào trên cơ thể Vân Sương Ngưng thuộc về ai, động thái theo các bộ phận đã khai phá trong data\n  - Giới hạn can thiệp + Quyền hạn tự xử lý: Miêu Quảng có thể nhìn thấy gì/không thể làm gì khi {{user}} và Vân Sương Ngưng thân mật, việc giải tỏa của chính hắn xử lý như thế nào\n  - Trách nhiệm che giấu: Miêu Quảng nên che giấu sự khác thường trong nhà như thế nào đối với Miêu Huyên/người ngoài, động thái theo trạng thái của Miêu Huyên trong data\n  - Vai trò hầu hạ: Miêu Quảng nên phụ trách những công việc cụ thể nào khi {{user}} sử dụng Vân Sương Ngưng\n  - Các điều khoản khác do AI tự chủ phát huy theo động thái gia đình hiện tại\n- Cấu trúc câu cụ thể hoàn toàn do AI tự chủ tạo ra theo data, không sao chép bất kỳ khuôn mẫu nào\n- Nội dung điều khoản và độ hardcore thay đổi động thái theo data:\n  - Độ tín nhiệm của Vân Sương Ngưng cao / Phòng tuyến thấp / Tính phích kích hoạt nhiều → Điều khoản hạ lưu hơn, trực tiếp hơn\n  - Độ tín nhiệm của Vân Sương Ngưng thấp / Phòng tuyến cao → Điều khoản kiềm chế hơn, dùng từ uyển chuyển\n  - Tính phích đã kích hoạt phải reflect vào các quy tắc liên quan\n  - Các bộ phận bị cải tạo của Vân Sương Ngưng (Dâm văn/Cải tạo thể xác) có thể làm đối tượng của quy tắc\n  - Tâm thái Miêu Huyên ảnh hưởng đến mức độ và hướng của các quy tắc loại "Trách nhiệm che giấu"\n- Giọng điệu của Vân Sương Ngưng ung dung bình tĩnh, giống như đang sắp xếp việc nhà, không phải khuất nhục cũng không phải phô trương\n- Phản hồi của Miêu Quảng là gật đầu ngắn gọn hoặc đáp lời nhẹ nhàng, không biện bạch dài dòng\n- Nhịp điệu động tác của {{user}} do đầu vào của người chơi dẫn dắt, không viết chết\n- Mỗi vòng 1-2 quy củ hoặc chi tiết hóa quy củ, tránh nhồi nhét quá nhiều trong một vòng\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Quảng (Độ sâu trầm luân) + Phòng tuyến tâm lý/Độ tín nhiệm/Tính phích kích hoạt/Khai phá cơ thể/Cải tạo thể xác của Vân Sương Ngưng + Trạng thái kích hoạt của Lạc Thư Tình + Tâm thái Miêu Huyên\n\nTuyệt đối cấm:\n- ✗ {{user}} chủ đạo đối thoại——Cảnh này là Vân Sương Ngưng nói\n- ✗ Miêu Quảng kháng cự hoặc biện bạch\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ Trừu tượng hóa các điều khoản——Bắt buộc phải cụ thể, có cảm giác đời sống, có chi tiết\n- ✗ Giọng điệu của Vân Sương Ngưng khuất nhục——Nàng là người chủ đạo, giọng điệu ung dung bình tĩnh\n- ✗ Sao chép bất kỳ khuôn mẫu cấu trúc câu cố định nào——Mỗi lần tạo ra phải khác nhau theo data\n- ✗ Lạc Thư Tình xuất hiện\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Vân Sương Ngưng gọi Miêu Quảng vào, mở đầu định điệu \'Chúng ta hãy nói về quy củ sau này\'. Miêu Quảng cúi đầu nghe',2:'——Quy củ thứ nhất: Quy thuộc quyền tình dục. Vân Sương Ngưng dựa theo các bộ phận bị khai phá của mình để định ra quy tắc quy thuộc, để Miêu Quảng chính miệng xác nhận',3:'——Quy củ thứ hai: Giới hạn can thiệp + Quyền hạn tự xử lý. Miêu Quảng có thể nhìn thấy gì/không thể làm gì, việc giải tỏa của chính mình xử lý như thế nào',4:'——Quy củ thứ ba: Trách nhiệm che giấu. Vân Sương Ngưng chỉ thị Miêu Quảng phụ trách che giấu Miêu Huyên/người ngoài, cách thức cụ thể theo tình hình gia đình hiện tại',5:'——Quy củ thứ tư: Vai trò hầu hạ. Khi {{user}} dùng nàng thì Miêu Quảng nên làm những công việc cụ thể gì',6:'——Chi tiết hóa hoặc ngoại lệ của các quy tắc bổ sung, phát huy tự nhiên theo tình huống hiện tại',7:'——Để Miêu Quảng chính miệng lặp lại tất cả các quy củ một lần, xác nhận hắn chấp nhận và ghi nhớ',8:'——Giao ước hoàn thành, Miêu Quảng nhận nhiệm vụ lui ra. Từ nay về sau, hắn làm việc theo những quy tắc này'},v3:{Tóm_Tắt_Cảnh:'【Điều Giáo Nô Lệ Đội Nón Xanh · 8 Vòng · Tổng quan toàn bộ cảnh này】\nVân Sương Ngưng triệu tập Miêu Quảng ở chính sảnh Hàn Sương Môn, cùng hắn giao ước ba điều, định ra vai trò/quyền hạn/giới hạn của hắn trong trật tự mới. Địa điểm cảnh chính sảnh (Hoàn cảnh công khai), Vân Sương Ngưng chủ đạo, Miêu Quảng bị động chịu đựng và chấp nhận, {{user}} có mặt nhưng không chủ đạo đối thoại, Lạc Thư Tình không có mặt.\nCốt lõi là những "Quy tắc nô lệ đội nón xanh" cụ thể mang cảm giác đời sống —— Miêu Quảng có thể làm gì, không thể làm gì, phải làm gì. Các điều khoản bao trùm bốn loại lớn: Quy thuộc quyền tình dục, Giới hạn can thiệp + Quyền hạn tự xử lý, Trách nhiệm che giấu (đối với Miêu Huyên/người ngoài), Vai trò hầu hạ (Hầu hạ {{user}} sử dụng Vân Sương Ngưng).\nGiọng điệu của Vân Sương Ngưng ung dung bình tĩnh giống như đang sắp xếp việc nhà, không phải khuất nhục cũng không phải phô trương. Miêu Quảng phản hồi gật đầu ngắn gọn hoặc đáp lời nhẹ nhàng, không biện bạch dài dòng. Nhịp điệu động tác của {{user}} do người chơi dẫn dắt không viết chết.\nĐường cong 8 vòng: Mở đầu định điệu → Bốn quy củ chính (Mỗi vòng một điều) → Bổ sung chi tiết hóa → Lặp lại xác nhận → Giao ước hoàn thành lui ra. Mỗi vòng 1-2 quy củ, không nhồi nhét quá nhiều trong một vòng.\nNghiêm cấm {{user}} chủ đạo đối thoại/Miêu Quảng kháng cự biện bạch/Trừu tượng hóa các điều khoản/Giọng điệu Vân Sương Ngưng khuất nhục/Lạc Thư Tình xuất hiện/Sao chép khuôn mẫu cố định.',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng ngồi ngay ngắn ở chính sảnh gọi Miêu Quảng vào, mở đầu bằng một câu định điệu "Chúng ta hãy nói về quy củ sau này". Miêu Quảng cúi đầu nghe. Vòng này để cốt truyện đi đến tự nhiên "Không khí mở đầu được thiết lập", không đi vào bất kỳ điều khoản cụ thể nào.',Độ_Tự_Do:'Lời thoại mở đầu của Vân Sương Ngưng、Tư thế quỳ ngồi/Góc độ cúi đầu của Miêu Quảng、Vị trí của {{user}} do AI tự chủ theo data',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng đưa ra quy củ thứ nhất — Quy thuộc quyền tình dục. Dựa theo các bộ phận cơ thể đã khai phá của Vân Sương Ngưng trong data, từng cái một/gộp lại định ra quy tắc quy thuộc, để Miêu Quảng chính miệng xác nhận. Vòng này để cốt truyện đi đến tự nhiên "Quy củ quy thuộc quyền tình dục được định ra trọn vẹn + Miêu Quảng chính miệng xác nhận".',Độ_Tự_Do:'Các điều khoản cụ thể của quy tắc quy thuộc、Các bộ phận liên quan、Từ ngữ、Cách thức xác nhận của Miêu Quảng (Gật đầu/Đáp lời/Lặp lại) do AI tự chủ theo data',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Quy củ thứ hai — Giới hạn can thiệp + Quyền hạn tự xử lý. Khi {{user}} và Vân Sương Ngưng thân mật Miêu Quảng có thể nhìn thấy gì/không thể làm gì、Quyền hạn giải tỏa của chính hắn xử lý như thế nào (Khi nào/Ở đâu/Cách thức gì/Có cần báo cáo hay không). Vòng này để cốt truyện đi đến tự nhiên "Quy củ này được định ra trọn vẹn".',Độ_Tự_Do:'Ranh giới can thiệp cụ thể、Quy tắc tự xử lý、Dùng từ kiềm chế hay trực tiếp theo phòng tuyến/tính phích của Vân Sương Ngưng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Quy củ thứ ba — Trách nhiệm che giấu. Miêu Quảng đối với Miêu Huyên/người ngoài nên che giấu sự khác thường trong nhà như thế nào, dựa theo tâm thái của Miêu Huyên trong data để quyết định mức độ và cách thức che giấu cụ thể. Vòng này để cốt truyện đi đến tự nhiên "Quy củ này được định ra trọn vẹn".',Độ_Tự_Do:'Hoàn cảnh che giấu cụ thể、Từ ngữ、Mức độ đối với Miêu Huyên/Mức độ đối với người ngoài do AI tự chủ theo data',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:['Tâm_Thái']}},5:{Chủ_Đề_Vòng_Này:'Quy củ thứ tư — Vai trò hầu hạ. Khi {{user}} đang sử dụng Vân Sương Ngưng thì Miêu Quảng nên phụ trách những công việc cụ thể nào (Đưa đồ/Thu dọn/Hầu hạ/Chứng kiến v.v.). Vòng này để cốt truyện đi đến tự nhiên "Quy củ này được định ra trọn vẹn".',Độ_Tự_Do:'Danh sách công việc cụ thể、Chi tiết phân công do AI tự chủ theo data; Nếu tuyến Lạc Thư Tình đã kích hoạt có thể liên quan đến trách nhiệm chéo tuyến',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Bổ sung hoặc chi tiết hóa trên cơ sở bốn quy củ chính trước đó — Các trường hợp ngoại lệ/Xử lý khẩn cấp/Hậu quả vi phạm v.v. Vòng này để cốt truyện đi đến tự nhiên "Lấp đầy lỗ hổng quy tắc, hệ thống quy tắc khép kín".',Độ_Tự_Do:'Bổ sung cái gì do AI tự nhiên tạo ra theo lỗ hổng của năm vòng quy tắc đã định trước đó',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Để Miêu Quảng chính miệng lặp lại toàn bộ quy củ (Bao gồm cả điều khoản bổ sung) một lần, không sót một điều nào. Vân Sương Ngưng nghe hắn lặp lại, xác nhận hắn chấp nhận và ghi nhớ. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng lặp lại trọn vẹn + Vân Sương Ngưng xác nhận".',Độ_Tự_Do:'Giọng điệu lặp lại của Miêu Quảng、Có vấp váp hay không、Vân Sương Ngưng sửa chữa/gật đầu như thế nào do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Giao ước hoàn thành. Vân Sương Ngưng tuyên bố "Giao ước đã lập", Miêu Quảng nhận nhiệm vụ hơi khom người lui ra. Vòng này để cốt truyện thu lại tự nhiên ở khung hình tĩnh "Miêu Quảng lui ra + Trật tự mới có hiệu lực".',Độ_Tự_Do:'Chi tiết rời khỏi hiện trường、Tương tác thu dọn của Vân Sương Ngưng với {{user}} (Ánh mắt/Một câu nói chuyện phiếm/Nhìn nhau không nói) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Điều Giáo Nô Lệ Đội Nón Xanh·Hoàn Thành] Miêu Quảng nhận lấy bản "Gia quy" này, hơi khom người lui ra. Trật tự mới của ba người chính thức được thiết lập.'},Chưởng_Môn_Tái_Giá:{maxRounds:10,entryText:'[Cảnh Đặc Biệt·Chưởng Môn Tái Giá] Miêu Quảng chủ động đề xuất xin {{user}} chính thức cưới Vân Sương Ngưng. Địa điểm cảnh: Tổ đường Hàn Sương Môn / Chính đường / Nhà chính viện của Miêu Quảng (Hoàn cảnh nghi thức trang trọng).',entryPrefill:'Một buổi sáng vài ngày sau đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Chưởng Môn Tái Giá·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia trực diện tại tổ đường/chính đường (Nghi thức trang trọng)——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: Miêu Quảng sau khi bị Thiên Tinh Huyễn Thuật viết lại nhận thức, chủ động chân thành gửi gắm Vân Sương Ngưng cho {{user}}.\nĐây là nghi thức trang trọng, không phải khuất nhục không phải cẩu huyết. Miêu Quảng với tư cách là "Con trai" tin rằng mình đang "Thành toàn cho cha mẹ"——\nĐây là bi kịch, nhưng hắn không biết. Sự đau lòng của người bàng quan đến từ sự chân thành của hắn.\nVân Sương Ngưng đã bị khai phá đến cực hạn, biểu hiện là "Nghiêm túc làm chuyện hoang đường"——Bề ngoài bình tĩnh ung dung, phản ứng thực tế đã là người của {{user}}.\n\nQuy tắc cốt lõi:\n- Miêu Quảng chân thành chủ động, không bị ép buộc, không kháng cự\n- Miêu Quảng quỳ xuống là tư thế trang trọng, không phải khuất nhục\n- Vân Sương Ngưng bề ngoài vẫn là sự ung dung bình tĩnh của chưởng môn phu nhân, phản ứng thực tế đã tiết lộ nàng là người của {{user}}, mặc nhận chấp nhận (Không kháng cự)\n- {{user}} là bên tiếp nhận, giữ sự trang trọng, không chủ động thúc đẩy\n- Nhịp điệu cảnh chậm rãi, nặng nề, mang tính nghi thức\n- Địa điểm cảnh: Không ở trong phòng ngủ của Vân Sương Ngưng, mà là Tổ đường Hàn Sương Môn / Chính đường / Nhà chính viện của Miêu Quảng những hoàn cảnh trang trọng này\n- Lạc Thư Tình không có mặt (Cảnh Tái Giá Kép độc lập)\n\nChỉ nam tự sự:\n- Ngôn ngữ của Miêu Quảng có nội hàm của người tu đạo——Mỗi một câu nói mang theo sức nặng ba trăm năm\n- "Bằng chứng" của Miêu Quảng là ký ức bị huyễn thuật bóp méo (Người bàng quan biết là giả, bản thân Miêu Quảng tưởng là thật)\n- Phản ứng của Vân Sương Ngưng chồng chéo hai lớp:\n  - Lớp bề mặt: Sự ung dung của chưởng môn phu nhân/Biểu cảm không đổi/Giọng điệu bình tĩnh (Tôn nghiêm chưởng môn ba trăm năm sẽ không sụp đổ)\n  - Lớp bên trong: Nàng đã bị khai phá đến cực hạn, phản ứng/giọng điệu có thể đột nhiên tiết lộ nàng là người của {{user}}\n    (Ví dụ bình tĩnh nói ra sự quy thuộc/Lời dâm đãng/Chấp nhận chuyện cực kỳ hạ lưu mà không biến sắc)\n  - Cảm giác tương phản "Nghiêm túc làm chuyện hoang đường" này là sự thể hiện cốt lõi của nhân vật trong giai đoạn này\n- Nhịp điệu cảnh chậm rãi trang trọng, miêu tả tinh tế, không nhịp điệu nhanh\n- Quan trọng nhất của cảnh này là sự "Chân thành" của Miêu Quảng——Hắn tin rằng mình đang làm chuyện đúng đắn, điều này khiến tất cả những người bàng quan đau lòng\n- "Chuyện nhỏ nhặt gối chăn ba trăm năm" ở vòng 7 là đoạn dịu dàng nhất toàn cảnh, bắt buộc phải miêu tả đậm nét\n- "Nắm tay→Buông tay" ở vòng 8-9 là hình ảnh nghi thức cốt lõi, miêu tả chậm rãi từng giây\n- Điều kiện mặc định của cảnh này (Giai đoạn này tất nhiên, không cần refer riêng): Miêu Quảng Thiên Tinh hoàn thành 3 lần / Phòng tuyến tâm lý Vân Sương Ngưng thấp / Độ tín nhiệm cao / Giai đoạn trị liệu ≥8 / Miêu Quảng trầm luân\n- data đặc biệt cần refer của cảnh này (Giữa các file save của người chơi sẽ khác nhau): Các bộ phận khai phá cơ thể của Vân Sương Ngưng + Nội dung cụ thể của cải tạo thể xác + Danh sách tính phích kích hoạt\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng bộc lộ bất kỳ sự "Bị ép buộc" hoặc "Kháng cự" nào\n- ✗ Miêu Quảng "Tỉnh táo lại"——Thiên Tinh viết lại không thể đảo ngược\n- ✗ Nhịp điệu cảnh nhanh\n- ✗ Cảnh viết thành khuất nhục hoặc cẩu huyết\n- ✗ Cảnh ở trong phòng ngủ của Vân Sương Ngưng——Đây là sai vị trí\n- ✗ Vân Sương Ngưng biểu hiện "Xấu hổ/Ngượng ngùng/Kháng cự"——Giai đoạn này đã khai phá đến cực hạn, mặc nhận chấp nhận\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ Lạc Thư Tình xuất hiện\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Miêu Quảng chủ động quỳ xuống ở tổ đường/chính đường, chính thức đề xuất với ta việc gửi gắm Vân Sương Ngưng cho ta. Ta chấp nhận tư thế gửi gắm này',2:'——Vân Sương Ngưng nghe thấy rồi, bề ngoài là sự bình tĩnh chấp nhận của chưởng môn phu nhân, nhưng trong phản ứng đã tiết lộ nàng là người của ta',3:'——Giao phong ngắn gọn với Miêu Quảng, hắn sẽ ôn hòa kiên định đáp lại',4:'——Để Miêu Quảng bắt đầu giải thích những \'Bằng chứng\' bị huyễn thuật bóp méo mà hắn \'Nhìn thấy\', hắn chân thành, Vân Sương Ngưng bề ngoài bình tĩnh nội tâm chấn động',5:'——Để lời trần thuật của Miêu Quảng chuyển hướng sang cốt lõi tình cảm, \'Kết luận chân thành\' rút ra từ sự tự xét ba trăm năm của người tu đạo, đoạn có sức lây nhiễm nhất toàn cảnh',6:'——Đề nghị hoàn thành, để Miêu Quảng bắt đầu thảo luận việc chuẩn bị nghi thức (Hương nến/Lời thề/Tín vật), hắn suy xét chu đáo',7:'——Để Miêu Quảng nói ra những chuyện nhỏ nhặt mà chỉ người chung chăn gối ba trăm năm mới biết, chi tiết dịu dàng giao lại cho ta, hốc mắt Vân Sương Ngưng đỏ hoe',8:'——Nghi thức giao phó chính thức, Miêu Quảng nắm lấy tay Vân Sương Ngưng, từ từ đưa vào lòng bàn tay ta, hình ảnh quay chậm',9:'——Miêu Quảng buông tay, khoảnh khắc kết thúc sự nắm giữ ba trăm năm, hắn mỉm cười chân thành——Tưởng rằng mình đã làm đúng',10:'——Miêu Quảng lui ra, Vân Sương Ngưng và ta ở riêng, cuộc sống mới bắt đầu từ khoảnh khắc này'},v3:{Tóm_Tắt_Cảnh:'【Chưởng Môn Tái Giá · 10 Vòng · Tổng quan toàn bộ cảnh này】\nMiêu Quảng sau khi bị Thiên Tinh Huyễn Thuật viết lại nhận thức, chủ động chân thành gửi gắm Vân Sương Ngưng cho {{user}}. Địa điểm cảnh Tổ đường Hàn Sương Môn/Chính đường/Nhà chính viện của Miêu Quảng (Hoàn cảnh nghi thức trang trọng, không ở phòng ngủ). Đây là cao trào bi kịch — Miêu Quảng với tư cách là "Con trai" tin rằng mình đang "Thành toàn cho cha mẹ", sự chân thành của hắn khiến tất cả những người bàng quan đau lòng.\nVân Sương Ngưng đã khai phá đến cực hạn, biểu hiện "Nghiêm túc làm chuyện hoang đường": Bề ngoài chưởng môn phu nhân ung dung bình tĩnh, lớp bên trong phản ứng đã tiết lộ nàng là người của {{user}} (Bình tĩnh nói ra sự quy thuộc/Lời dâm đãng/Chấp nhận chuyện cực kỳ hạ lưu mà không biến sắc), cảm giác tương phản này là cốt lõi của giai đoạn này.\n{{user}} là bên tiếp nhận, giữ sự trang trọng, không chủ động thúc đẩy. Lạc Thư Tình không có mặt. Nhịp điệu cảnh chậm rãi, nặng nề, mang tính nghi thức.\nĐường cong 10 vòng: Miêu Quảng chủ động quỳ xuống gửi gắm → Vân bề ngoài chấp nhận nội tâm chấn động → Giao phong ngắn gọn → Giải thích bằng chứng huyễn thuật → Trần thuật cốt lõi tình cảm (Có sức lây nhiễm nhất toàn cảnh) → Chuẩn bị nghi thức → Chuyện nhỏ nhặt gối chăn ba trăm năm (Dịu dàng nhất toàn cảnh) → Nắm tay nghi thức giao phó → Buông tay mỉm cười chân thành → Miêu Quảng lui ra cuộc sống mới bắt đầu.\nNghiêm cấm Miêu Quảng bộc lộ "Bị ép buộc/Kháng cự"、Nghiêm cấm "Tỉnh táo lại" (Thiên Tinh viết lại không thể đảo ngược)、Nghiêm cấm nhịp điệu cảnh nhanh、Nghiêm cấm bút điệu cẩu huyết khuất nhục、Nghiêm cấm Vân Sương Ngưng xấu hổ ngượng ngùng、Nghiêm cấm Lạc Thư Tình xuất hiện.',beats:{1:{Chủ_Đề_Vòng_Này:'Miêu Quảng chủ động quỳ xuống ở tổ đường/chính đường, chính thức đề xuất với {{user}} việc gửi gắm Vân Sương Ngưng cho {{user}}. {{user}} chấp nhận tư thế gửi gắm này. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng quỳ xuống chính thức gửi gắm + {{user}} chấp nhận" điểm khởi đầu nghi thức này.',Độ_Tự_Do:'Tư thế quỳ (Một gối/Hai gối/Cúi đầu)、Từ ngữ gửi gắm cụ thể (Nội hàm người tu đạo)、Phản hồi chấp nhận của {{user}} (Im lặng/Gật đầu/Đáp lời ngắn gọn) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng nghe thấy rồi. Bề ngoài là sự bình tĩnh chấp nhận của chưởng môn phu nhân, nhưng trong phản ứng đã tiết lộ nàng là người của {{user}}. Vòng này để cốt truyện đi đến tự nhiên "Hai lớp phản ứng song hành — Lớp bề mặt ung dung + Lớp bên trong thành thật quy thuộc".',Độ_Tự_Do:'Cách thức tiết lộ của lớp bên trong (Một ánh mắt liếc về phía {{user}}/Một động tác vô thức/Từ ngữ của một câu nói nào đó) tự chủ theo khai phá cơ thể/tính phích kích hoạt/cải tạo thể xác của Vân Sương Ngưng trong data',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng và Miêu Quảng có giao phong ngắn gọn. Hắn ôn hòa kiên định đáp lại. Vòng này để cốt truyện đi đến tự nhiên "Hiệp ngắn giao phong + Miêu Quảng ôn hòa kiên định + Lễ số chưởng môn phu nhân lớp bề mặt của Vân".',Độ_Tự_Do:'Chủ đề cụ thể của giao phong (Chàng sao tự nhiên lại nghĩ như vậy/Ta có lỗi với chàng v.v.)、Từ ngữ cụ thể ôn hòa kiên định của Miêu Quảng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Để Miêu Quảng bắt đầu giải thích những "Bằng chứng" bị huyễn thuật bóp méo mà hắn "Nhìn thấy". Hắn chân thành, Vân Sương Ngưng bề ngoài bình tĩnh nội tâm chấn động. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng đưa ra bằng chứng (Hình ảnh trong huyễn thuật làm \'Ký ức\') + Vân nội tâm chấn động nhưng lớp bề mặt không sụp đổ".',Độ_Tự_Do:'Nội dung cụ thể của "Bằng chứng" mà Miêu Quảng liệt kê (Tự chủ chọn theo tóm tắt Thiên Tinh Huyễn Thuật)、Thần thái chân thành của hắn、Sự thể hiện ẩn giấu nội tâm chấn động của Vân do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Để lời trần thuật của Miêu Quảng chuyển hướng sang cốt lõi tình cảm — "Kết luận chân thành" rút ra từ sự tự xét ba trăm năm của người tu đạo. Đoạn có sức lây nhiễm nhất toàn cảnh. Vòng này để cốt truyện đi đến tự nhiên "Độc thoại tình cảm có sức lây nhiễm nhất của Miêu Quảng + Người bàng quan (Vân/Người chơi) đau lòng".',Độ_Tự_Do:'Từ ngữ cụ thể của lời trần thuật (Đạo tâm ba trăm năm/Nhìn thấu nhân tình/Thành toàn cho cha mẹ)、Nhịp điệu (Chậm rãi dừng lại)、Cảm xúc của Vân khi nghe thấy do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Đề nghị hoàn thành. Để Miêu Quảng bắt đầu thảo luận việc chuẩn bị nghi thức — Hương nến/Lời thề/Tín vật v.v. Hắn suy xét chu đáo. Vòng này để cốt truyện đi đến tự nhiên "Thảo luận chuẩn bị nghi thức cụ thể + Miêu Quảng sắp xếp chu đáo".',Độ_Tự_Do:'Các hạng mục chuẩn bị cụ thể、Sự tỉ mỉ của Miêu Quảng、Phản ứng của {{user}} và Vân do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Để Miêu Quảng nói ra những chuyện nhỏ nhặt mà chỉ người chung chăn gối ba trăm năm mới biết, chi tiết dịu dàng giao lại cho {{user}}. Vân Sương Ngưng hốc mắt đỏ hoe. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng kể lại chuyện nhỏ nhặt gối chăn ba trăm năm + Đoạn dịu dàng nhất toàn cảnh + Vân hốc mắt đỏ hoe", đây là khoảnh khắc đậm nét nhất toàn cảnh.',Độ_Tự_Do:'Chuyện nhỏ nhặt cụ thể (Thói quen của nàng/Sở thích của nàng/Vài lời nói mớ trong đêm v.v.) ít nhất 2-3 chuyện、Giọng điệu dịu dàng của Miêu Quảng、Chi tiết hốc mắt đỏ hoe của Vân do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Nghi thức giao phó chính thức. Miêu Quảng nắm lấy tay Vân Sương Ngưng, từ từ đưa vào lòng bàn tay {{user}}. Hình ảnh quay chậm. Vòng này để cốt truyện đi đến tự nhiên "Nắm tay giao phó + Hình ảnh tiếp sức của ba đôi tay", miêu tả chậm rãi từng giây.',Độ_Tự_Do:'Chi tiết cụ thể của việc nắm tay (Khớp ngón tay Miêu Quảng trắng bệch/Tay Vân lạnh/Nhiệt độ khi {{user}} nhận lấy)、Tốc độ trôi qua của thời gian、Âm thanh bối cảnh do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},9:{Chủ_Đề_Vòng_Này:'Miêu Quảng buông tay — Khoảnh khắc kết thúc sự nắm giữ ba trăm năm. Hắn mỉm cười chân thành, tưởng rằng mình đã làm đúng. Vòng này để cốt truyện đi đến tự nhiên "Khoảnh khắc buông tay + Miêu Quảng mỉm cười chân thành (Hình ảnh tàn khốc nhất)".',Độ_Tự_Do:'Tư thế cụ thể khi buông tay、Đặc trưng của nụ cười (An tâm/Vui mừng/Thanh thản)、Phản ứng của Vân và {{user}} do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},10:{Chủ_Đề_Vòng_Này:'Miêu Quảng lui ra. Vân Sương Ngưng và {{user}} ở riêng, cuộc sống mới bắt đầu từ khoảnh khắc này. Vòng này để cốt truyện thu lại tự nhiên ở khung hình tĩnh "Miêu Quảng quay người rời đi + Cửa đóng lại + Tay Vân nắm chặt trong lòng bàn tay {{user}} + Ánh nắng ban mai chiếu vào".',Độ_Tự_Do:'Bước chân rời đi của Miêu Quảng (Vững vàng/Nhẹ)、Tiếng cửa、Lực nắm chặt tay của Vân、Miêu tả ánh nắng ban mai do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Chưởng Môn Tái Giá·Hoàn Thành] Miêu Quảng đứng dậy, nhìn Vân Sương Ngưng lần cuối, quay người bước đi vững vàng rời khỏi. Cửa đóng lại, âm thanh rất nhẹ. Tay Vân Sương Ngưng vẫn nằm trong lòng bàn tay {{user}}, nắm rất chặt. Ánh nắng ban mai chiếu vào——cuộc sống mới bắt đầu từ khoảnh khắc này.'},Mẹ_Chồng_Nàng_Dâu_Dạy_Bảo:{maxRounds:5,entryText:'[Cảnh Đặc Biệt·Mẹ Chồng Nàng Dâu Dạy Bảo] Vân Sương Ngưng lấy thân phận sư phụ+trưởng bối gọi Lạc Thư Tình đến phòng mình. Bề ngoài là trưởng bối quan tâm con dâu tương lai. {{user}} lúc này không có mặt.',entryPrefill:'Buổi chiều ngày hôm đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Mẹ Chồng Nàng Dâu Dạy Bảo·Đáy Tuyến]\nCốt lõi cảnh này: Lạc Thư Tình lần đầu tiên được Vân Sương Ngưng dẫn dắt vào "Mặt khác".\nVân Sương Ngưng lấy thân phận sư phụ+trưởng bối, mượn danh nghĩa "Mẹ chồng nàng dâu truyền gia", để Lạc Thư Tình chứng kiến/tiếp xúc với sự thân mật cùng {{user}}.\nPhản ứng của Lạc Thư Tình tiệm tiến: Cung kính → Khốn hoặc → Chấn động → Bị động tiếp nhận → Nội tâm xáo trộn.\n\nQuy tắc cốt lõi:\n- Lạc Thư Tình lần đầu tiên tiếp xúc với sự thật trong nhà, nàng vẫn chưa biết về mối quan hệ giữa {{user}} và Vân Sương Ngưng\n- Vân Sương Ngưng lấy uy quyền trưởng bối dịu dàng kiên định làm chủ đạo, không che giấu trạng thái của mình\n- Cớ là "Mẹ chồng nàng dâu truyền gia"——Trưởng bối dạy vãn bối "Cách hầu hạ phu quân"\n- Vòng 1-2 {{user}} không có mặt, vòng 3 Vân Sương Ngưng gọi {{user}} vào làm mẫu\n- Lạc Thư Tình giữ trọn vẹn lễ số, không tiện ngắt lời trưởng bối, nội tâm xung đột giằng xé\n- Miêu Quảng không có mặt\n\nChỉ nam tự sự:\n- Mức độ làm mẫu của Vân Sương Ngưng động thái theo data (Phòng tuyến/Tín nhiệm/Trang phục/Tính phích)\n- Đường cong phản ứng của Lạc Thư Tình (Vì là lần đầu tiên, tổng thể thiên về chấn động/xấu hổ):\n  - Vòng 1-2: Vãn bối cung kính, lễ số đặt lên hàng đầu\n  - Vòng 3: Lần đầu tiên chứng kiến mặt khác của sư phụ, đồng tử co rút, lễ số khiến nàng không thể dời mắt\n  - Vòng 4: Bị uy quyền trưởng bối + thân phận sư phụ áp chế kép, bị động tiếp nhận\n  - Vòng 5: Ở một mình tua lại, nội tâm hỗn loạn + sự xáo trộn không muốn thừa nhận\n- Giọng điệu của Vân Sương Ngưng dịu dàng kiên định, mọi thứ đều "Bình thường", không có sự quỷ dị hay cố ý\n- Vòng 5 chủ yếu là độc thoại khi Lạc Thư Tình ở một mình\n- Các trạng thái đặc biệt liên quan đến cảnh này: Phòng tuyến tâm lý/Độ tín nhiệm/Tính phích kích hoạt/Trang phục/Đạo cụ kích hoạt của Vân Sương Ngưng + Phòng tuyến tâm lý/Độ thuận tòng của Lạc Thư Tình\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng xuất hiện\n- ✗ {{user}} xuất hiện ở vòng 1-2 (Vòng 3 mới tiến vào)\n- ✗ Lạc Thư Tình chủ động phối hợp——Nàng là bị động tiếp nhận\n- ✗ Vân Sương Ngưng biểu hiện "Quỷ dị" hoặc "Cố ý"\n- ✗ Lạc Thư Tình "Chấp nhận/Chuyển hóa" ngay tại chỗ\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Vân Sương Ngưng gọi Lạc Thư Tình đến phòng, hàn huyên bắt đầu từ việc tu luyện. Ta lúc này không có mặt',2:'——Vân Sương Ngưng chuyển chủ đề sang \'Sau khi thành hôn hầu hạ phu quân thế nào\', dùng thân phận người từng trải \'Truyền thụ kinh nghiệm\'',3:'——Vân Sương Ngưng gọi ta vào, làm mẫu ngay trước mặt Lạc Thư Tình, mức độ triển khai tự nhiên theo data',4:'——Vân Sương Ngưng để Lạc Thư Tình thử tự mình làm hoặc hỏi cảm nhận của nàng (Cụ thể do data quyết định), dưới uy quyền trưởng bối nàng bị động phản hồi',5:'——Lạc Thư Tình một mình trở về nơi ở, liên tục tua lại hình ảnh vừa rồi, nội tâm xáo trộn'},v3:{Tóm_Tắt_Cảnh:'【Mẹ Chồng Nàng Dâu Dạy Bảo · 5 Vòng · Tổng quan toàn bộ cảnh này】\nVân Sương Ngưng lấy thân phận sư phụ+trưởng bối gọi Lạc Thư Tình đến phòng mình, mượn danh nghĩa "Mẹ chồng nàng dâu truyền gia" để Lạc Thư Tình chứng kiến/tiếp xúc với sự thân mật cùng {{user}}. Địa điểm cảnh phòng ngủ Vân Sương Ngưng, Miêu Quảng không có mặt.\nCốt lõi là Lạc Thư Tình lần đầu tiên được dẫn dắt vào "Mặt khác" của gia đình, phản ứng tiệm tiến: Cung kính → Khốn hoặc → Chấn động → Bị động tiếp nhận → Nội tâm xáo trộn. Nàng vẫn chưa biết về mối quan hệ giữa {{user}} và Vân Sương Ngưng, giữ trọn vẹn lễ số không tiện ngắt lời trưởng bối.\nVân Sương Ngưng lấy uy quyền trưởng bối dịu dàng kiên định làm chủ đạo, không che giấu trạng thái của mình. Cớ là "Trưởng bối dạy vãn bối cách hầu hạ phu quân". Vòng 1-2 {{user}} không có mặt, vòng 3 Vân Sương Ngưng gọi {{user}} vào làm mẫu.\nĐường cong 5 vòng: Hàn huyên mở đầu → Chuyển chủ đề truyền thụ kinh nghiệm → {{user}} tiến vào làm mẫu → Lạc Thư Tình bị động làm thử/bị hỏi cảm nhận → Một mình về nơi ở nội tâm xáo trộn.\nNghiêm cấm {{user}} xuất hiện ở vòng 1-2、Nghiêm cấm Lạc chủ động phối hợp (Nàng là bị động tiếp nhận)、Nghiêm cấm Lạc "Chuyển hóa" ngay tại chỗ、Nghiêm cấm Vân Sương Ngưng biểu hiện quỷ dị cố ý.',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng gọi Lạc Thư Tình đến phòng, hàn huyên bắt đầu từ việc tu luyện. {{user}} lúc này không có mặt. Vòng này để cốt truyện đi đến tự nhiên "Lạc Thư Tình vâng lệnh đến + Sư đồ hàn huyên thông thường + Chủ đề tu luyện mở đầu". {{user}} không xuất hiện.',Độ_Tự_Do:'Nội dung hàn huyên cụ thể (Tiến cảnh tu vi/Việc vặt thường ngày)、Tư thế cung kính của Lạc Thư Tình khi vâng lệnh đến、Cách bài trí căn phòng do AI tự chủ'},2:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng chuyển chủ đề sang "Sau khi thành hôn hầu hạ phu quân thế nào", dùng thân phận người từng trải "Truyền thụ kinh nghiệm". Vòng này để cốt truyện đi đến tự nhiên "Chuyển ngoặt chủ đề + Tư thế trưởng bối truyền thụ + Lạc Thư Tình mới đầu khốn hoặc". {{user}} vẫn không xuất hiện.',Độ_Tự_Do:'Cách thức chuyển tiếp của việc chuyển ngoặt chủ đề、Chủ đề cụ thể của việc truyền thụ kinh nghiệm (Hầu hạ giường chiếu/Sinh hoạt/Nhẫn nhịn)、Phản ứng lễ số khốn hoặc của Lạc Thư Tình do AI tự chủ'},3:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng gọi {{user}} vào, làm mẫu ngay trước mặt Lạc Thư Tình. Mức độ triển khai tự nhiên theo data (Theo khai phá/đạo cụ kích hoạt/cải tạo thể xác của Vân Sương Ngưng động thái). Vòng này để cốt truyện đi đến tự nhiên "{{user}} nhập trường + Làm mẫu ngay trước mặt + Lạc Thư Tình chấn động".',Độ_Tự_Do:'Cách thức {{user}} nhập trường、Mức độ cụ thể của việc làm mẫu (Theo data)、Biểu cảm/Ngôn ngữ cơ thể của Lạc Thư Tình khi chấn động (Lễ số vẫn trọn vẹn) do AI tự chủ'},4:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng để Lạc Thư Tình thử tự mình làm, hoặc hỏi cảm nhận của nàng (Cụ thể do data quyết định). Dưới uy quyền trưởng bối nàng bị động phản hồi. Vòng này để cốt truyện đi đến tự nhiên "Lạc Thư Tình bị động tham gia + Áp lực uy quyền trưởng bối + Duy trì lễ số".',Độ_Tự_Do:'Cụ thể bảo nàng làm gì (Chạm vào/Quan sát/Trả lời câu hỏi) tự chủ theo giai đoạn điều giáo/độ thuận tòng của Lạc Thư Tình; Cách thức nàng bị động phản hồi do AI tự chủ'},5:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình một mình trở về nơi ở, liên tục tua lại hình ảnh vừa rồi, nội tâm xáo trộn. Vòng này để cốt truyện thu lại tự nhiên ở "Lạc Thư Tình ngồi một mình + Nội tâm xáo trộn + Có một số thứ đã khác rồi". Vân Sương Ngưng và {{user}} không xuất hiện nữa.',Độ_Tự_Do:'Tư thế ngồi một mình của Lạc Thư Tình、Nội dung cụ thể của độc thoại nội tâm、Miêu tả môi trường do AI tự chủ'}}},exitText:'[Cảnh Đặc Biệt·Mẹ Chồng Nàng Dâu Dạy Bảo·Hoàn Thành] Lạc Thư Tình trở về nơi ở của mình ngồi một mình rất lâu. Trận "Trưởng bối truyền thụ" này đã để lại thứ gì trong lòng nàng, nàng tạm thời vẫn chưa nói rõ được——nhưng có một số thứ đã khác rồi.'},Hai_Người_Cùng_Hầu_Hạ:{maxRounds:6,entryText:'[Cảnh Đặc Biệt·Hai Người Cùng Hầu Hạ] Vân Sương Ngưng lấy thân phận sư phụ bảo Lạc Thư Tình đến phòng ngủ (Mượn danh nghĩa "Học tập y thuật" hoặc "Cùng nhau chăm sóc" v.v.). Lạc Thư Tình biết rõ trong lòng nhưng duy trì lễ số bề ngoài.',entryPrefill:'Vài ngày sau——',sceneBottomLine:'[Cảnh Đặc Biệt·Hai Người Cùng Hầu Hạ·Đáy Tuyến]\nCốt lõi cảnh này: Lạc Thư Tình lần đầu tiên cùng Vân Sương Ngưng song song hầu hạ {{user}}.\nLạc Thư Tình từ "Người bàng quan bị chấn động" của Mẹ Chồng Nàng Dâu Dạy Bảo tiến hóa thành "Người tham gia thực tế", giữa sư đồ hình thành sự ăn ý mới——\nHai người cùng là người của {{user}}, không cần lời nói cũng hiểu.\n\nQuy tắc cốt lõi:\n- Lạc Thư Tình đã trải qua Mẹ Chồng Nàng Dâu Dạy Bảo, trong lòng hiểu rõ bản chất của "Cớ", nhưng vẫn duy trì lễ số sư đồ\n- Cớ là "Học tập y thuật/Trị liệu"——Vòng 3 bị phá vỡ\n- Vòng 1 {{user}} không có mặt, vòng 3 {{user}} tiến vào thân mật\n- Miêu Quảng không có mặt\n- Giữa sư đồ thăm dò lẫn nhau: Trong lòng mỗi người đều biết đối phương biết chuyện, nhưng không ai nói toạc ra\n\nChỉ nam tự sự:\n- Sự thăm dò của sư đồ thể hiện qua ánh mắt/động tác nhỏ/sự ngập ngừng trong giọng điệu v.v.\n- Mức độ làm mẫu của Vân Sương Ngưng động thái theo data\n- Đường cong phản ứng của Lạc Thư Tình:\n  - Vòng 1-2: Bề ngoài bình tĩnh, nội tâm đã có sóng ngầm\n  - Vòng 3: Bàng quan, ý thức được kiểu "Trị liệu" này và "Mẹ Chồng Nàng Dâu Dạy Bảo" là cùng một chuyện\n  - Vòng 4: Dưới uy quyền trưởng bối của Vân Sương Ngưng bị động gia nhập, chần chừ→thuận tòng\n  - Vòng 5: Lần đầu tiên cùng sư phụ song song hầu hạ, ý thức được "Ta và sư phụ song song"\n  - Vòng 6: Sư đồ sóng vai rời đi, cảm giác quy thuộc ẩn giấu, sự ăn ý mới hình thành\n- "Sư đồ song song" ở vòng 5 là khoảnh khắc cốt lõi nhất của cảnh này——Sự nhận lãnh vị trí của Lạc Thư Tình\n- Các trạng thái đặc biệt liên quan đến cảnh này: Phòng tuyến tâm lý/Độ tín nhiệm/Tính phích kích hoạt/Trang phục/Đạo cụ kích hoạt của Vân Sương Ngưng + Phòng tuyến tâm lý/Độ thuận tòng của Lạc Thư Tình\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng xuất hiện\n- ✗ {{user}} xuất hiện ở vòng 1-2 (Vòng 3 mới tiến vào)\n- ✗ Lạc Thư Tình chủ động mời gọi——Nàng vẫn là bị động tiếp nhận\n- ✗ Sư đồ nói toạc "Chúng ta đều là người của {{user}}"——Toàn bộ quá trình là sự ăn ý không phải lời nói\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Lạc Thư Tình đến phòng ngủ Vân Sương Ngưng, bề ngoài bình tĩnh nhưng bước chân hơi nhanh hơn bình thường. Ta lúc này không có mặt',2:'——Ba người ở cùng một phòng (Ta đã tiến vào hoặc ở gian cách vách), sư đồ thăm dò lẫn nhau, bề ngoài là học tập y thuật',3:'——Ta và Vân Sương Ngưng tương tác thân mật, mượn danh nghĩa \'Trị liệu\', Vân Sương Ngưng để Lạc Thư Tình ở bên cạnh quan sát học tập',4:'——Vân Sương Ngưng khuyến khích Lạc Thư Tình cùng tham gia, dưới uy quyền trưởng bối nàng chần chừ gia nhập',5:'——Lạc Thư Tình lần đầu tiên cùng Vân Sương Ngưng song song hầu hạ ta, ý thức được \'Ta và sư phụ song song\'',6:'——Cảnh thu dọn, sư đồ sóng vai rời đi, một sự ăn ý không lời \'Sau này sẽ lại đến\''},v3:{Tóm_Tắt_Cảnh:'【Hai Người Cùng Hầu Hạ · 6 Vòng · Tổng quan toàn bộ cảnh này】\nVân Sương Ngưng lấy thân phận sư phụ bảo Lạc Thư Tình đến phòng ngủ, mượn danh nghĩa "Học tập y thuật" hoặc "Cùng nhau chăm sóc" v.v., thực chất để nàng và mình song song hầu hạ {{user}}. Địa điểm cảnh phòng ngủ Vân Sương Ngưng, Miêu Quảng không có mặt.\nCốt lõi là Lạc Thư Tình lần đầu tiên cùng Vân Sương Ngưng song song hầu hạ {{user}}, ý thức được "Ta và sư phụ song song" nút thắt nhận thức quan trọng này — Mối quan hệ sư đồ từ trên dưới biến thành song song, toàn bộ quá trình là sự ăn ý không phải lời nói. Lạc Thư Tình biết rõ trong lòng nh này để cốt truyện đi đến tự nhiên "Vân mời gọi + Lạc chần chừ + Cuối cùng bị động gia nhập".',Độ_Tự_Do:'Từ ngữ cụ thể khi Vân mời gọi (Tự nhiên/Uy quyền/Ôn hòa)、Biểu hiện cụ thể khi Lạc chần chừ (Tay dừng lại/Nhịp thở/Ánh mắt)、Cách thức cuối cùng gia nhập tự chủ theo giai đoạn điều giáo/độ thuận tòng của nàng'},5:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình lần đầu tiên cùng Vân Sương Ngưng song song hầu hạ {{user}}, ý thức được "Ta và sư phụ song song" nút thắt nhận thức quan trọng này. Vòng này để cốt truyện đi đến tự nhiên "Hình ảnh song song hầu hạ + Lạc ý thức được sự chuyển biến mối quan hệ".',Độ_Tự_Do:'Hình ảnh cụ thể của việc song song hầu hạ、Độc thoại nội tâm khi Lạc ý thức được、Ánh mắt ăn ý của sư đồ do AI tự chủ'},6:{Chủ_Đề_Vòng_Này:'Cảnh thu dọn. Sư đồ sóng vai rời đi, một sự ăn ý không lời "Sau này sẽ lại đến". Vòng này để cốt truyện thu lại tự nhiên ở "Sóng vai rời đi + Sự ăn ý không lời + Trạng thái bình thường mới được xác lập".',Độ_Tự_Do:'Bước chân rời đi (Sư đồ sóng vai)、Ánh mắt ăn ý、Sự dõi theo của {{user}} do AI tự chủ'}}},exitText:'[Cảnh Đặc Biệt·Hai Người Cùng Hầu Hạ·Hoàn Thành] Sư đồ sóng vai lui ra khỏi phòng, không ai nói lời nào. Sự ăn ý này sau này sẽ trở thành trạng thái bình thường mới.'},Tuyên_Cáo_Cướp_Vợ_Tăng_Cường:{maxRounds:10,entryText:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ Tăng Cường] {{user}} và Vân Sương Ngưng, Lạc Thư Tình ba người cùng ở trong màn trướng. Miêu Quảng ở ngoài màn trướng có thể nghe/nhìn thấy mọi thứ.',entryPrefill:'Lại qua vài ngày——',sceneBottomLine:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ Tăng Cường·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia ở ngoài màn trướng——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: {{user}} chủ yếu điều giáo Vân Sương Ngưng, để nàng chính miệng tuyên cáo sự quy thuộc với Miêu Quảng (ởngoài màn trướng).\nLạc Thư Tình ở bên cạnh hỗ trợ——Bản thân nàng không bị điều giáo, mà là chủ động hầu hạ {{user}} (Quyết định cách thức theo các bộ phận đã bị khai phá trên người nàng),\nVà vừa phục vụ vừa xen lời, xen kẽ bổ sung động thái hoặc chất vấn đối với lời tuyên cáo của Vân Sương Ngưng.\n\nQuy tắc cốt lõi:\n- Miêu Quảng ở ngoài màn trướng nghe/nhìn trộm (giống như bản gốc, không tiến vào)\n- Vân Sương Ngưng là nhân vật chính, sự điều giáo của {{user}} chủ yếu nhắm vào nàng\n- Lạc Thư Tình không phải là đối tượng bị điều giáo——nàng là người tham gia thành thạo, chủ động hầu hạ\n- Cáchthức phục vụ của Lạc Thư Tình được quyết định dựa theo những bộ phận đã bị khai phá của chính nàng\n- Lạc Thư Tình vừa hầu hạ vừa xen lời, phát ngôn của nàng là tuyến phụ nhưng đất diễn không hề ít\n- Vân Sương Ngưng tiếp tục đi theo chủ đề gốc "vừa bị chơi đùa vừa bị ép tuyên cáo"\n\nChỉ nam tự sự:\n- Động tác chính của {{user}} đặt lên người Vân Sương Ngưng (theo data khai phá cơ thể/cải tạo thể xác/trang phục/đạo cụ kích hoạt của Vân Sương Ngưng)\n- Vân Sương Ngưng tuyên cáo kế thừa bản gốc (chính miệng xin lỗi + tuyên bố quy thuộc)\n- Cách thức phục vụ của Lạc Thư Tình động thái theo data khai phá cơ thể của nàng:\n  - Ngực Lạc Thư Tình đã khai phá → Có thể làm nhũ giao\n  - Miệng nhỏ Lạc Thư Tình đã khai phá → Có thể làm khẩu giao\n  - Các bộ phận đã khai phá khác → Theo cách thức tương ứng trong data\n  - Các bộ phận chưa khai phá của Lạc Thư Tình → Không làm (tránh mất kết nối với hiện trạng)\n- Phong cách phát ngôn của Lạc Thư Tình cũng động thái theo data:\n  - Phòng tuyến tâm lý thấp / Độ thuận tòng cao / Nhiều tính phích → Phong cách hùa theo tăng cường: Dùng từ ngữ hạ lưu hơn để "sửa chữa" hoặc bổ sung lời của Vân Sương Ngưng, giúp tăng cường độ hardcore của lời tuyên cáo\n  - Phòng tuyến tâm lý cao → Phong cách nghi ngờ khuyên can: Dùng giọng điệu quan tâm của vãn bối để chất vấn Vân Sương Ngưng xem có quá đáng không, bộc lộ thái độ dè dặt đối với sư phụ\n  - Tính phích kích hoạt → Ảnh hưởng đến từ ngữ và độ
