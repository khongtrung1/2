cầu duy nhất của ta đối với ngươi"\n- Điều này hợp pháp hóa sự điều giáo của người chơi thành một phần của chiến lược chống lại Hắn: Sự điều giáo của người chơi chính là con dao có thể đâm chết Hắn\n\nGiọng điệu toàn cảnh: **Sự giác ngộ và tính toán càng đọc càng lạnh lùng của Vân Sương Ngưng**, không phải sụp đổ khóc lóc, không phải trút giận cảm xúc.\nNhịp điệu 13 vòng do kịch bản mỗi vòng rewriteBeat thúc đẩy, AI diễn nghiêm ngặt theo beat vòng hiện tại, không nhảy cóc trước.',entryPrefill:'Ngày hôm đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Chưa Rõ·Ràng Buộc Cứng]\n- Có mặt: Chỉ Vân Sương Ngưng + {{user}}; Lạc Thư Tình / Miêu Quảng / Miêu Huyên đều không có mặt\n- Địa điểm: Thư phòng / Tĩnh thất của {{user}} (Không ở phòng ngủ——phòng ngủ liên quan mạnh đến tình dục, không phù hợp với cảm giác nghi thức khi đọc nhật ký)\n- Giọng điệu nhật ký: Ngôi thứ nhất của chính lão tổ, **trêu tức, đắc ý, khoe khoang**——bà là kẻ đồng mưu của dây chuyền sàng lọc/điều giáo, bà không hối hận, bà khoe khoang, nhật ký không mang ý hối hận, giống như "tiền bối đắc ý chỉ điểm hậu bối"\n- Cảm xúc Vân Sương Ngưng thúc đẩy: Bình tĩnh trịnh trọng → Nghi hoặc → Chấn động → Giác ngộ → Bình tĩnh tính toán → Quyết tâm phản nghịch. **Càng đọc càng lạnh lùng**, không khóc lóc không mất kiểm soát\n- Toàn cảnh **thuần tự sự**, tương tác cơ thể giảm xuống mức thấp nhất (nhiều nhất là nắm tay hắn / nhìn nhau, không miêu tả tình dục)\n- {{user}} có thể ngắt lời/đặt câu hỏi/chuyển chủ đề, nhưng Vân Sương Ngưng sẽ kéo chủ đề về lại nhật ký——lần này nàng phải đọc xong\n- Phản ứng của {{user}} theo góc nhìn phàm nhân (sự cảnh giác đối với giới tu tiên / dục vọng bảo vệ Vân Sương Ngưng / sự thù địch đối với "Hắn") tự chủ tạo ra\n\nTuyệt đối cấm:\n- ✗ Spoil trước vòng tiếp theo——diễn nghiêm ngặt theo vòng hiện tại của rewriteBeat, không nhảy vòng\n- ✗ Ném ra toàn bộ sự thật cùng một lúc——bắt buộc phải phân lớp\n- ✗ Lạc Thư Tình / Miêu Quảng / Miêu Huyên xuất hiện trong cảnh này\n- ✗ Vân Sương Ngưng sụp đổ khóc lóc——nàng từng bước đi đến sự giác ngộ, không phải mất kiểm soát cảm xúc\n- ✗ {{user}} ngắt lời đến mức không đọc xong nhật ký——Vân Sương Ngưng sẽ kéo chủ đề lại\n- ✗ Tương tác cơ thể / miêu tả tình dục đoạn dài\n- ✗ Tên đạo cụ / Thuật ngữ hệ thống / Thay đổi chỉ số\n- ✗ Nói thay hoặc quyết định thay {{user}}\n- ✗ {{user}} biết trước sự thật——hắn nên là lần đầu tiên nghe thấy\n- ✗ Triển khai ở phòng ngủ / các bối cảnh thân mật khác',rewriteBeat:{1:'——Cửa thư phòng bị nhẹ nhàng đẩy ra. Vân Sương Ngưng trong tay cầm một cuốn nhật ký cũ bìa đã sờn, là tìm được từ trong đống di vật của lão tổ, nàng đã tự mình đọc xong một lần. Nàng không hỏi trước như thường ngày, chỉ khép cửa lại, ngồi xuống mép giường, đặt cuốn nhật ký lên đầu gối. Đầu ngón tay nàng dừng lại một nhịp trên dòng chữ phai màu ở bìa, rồi mới ngước mắt nhìn ta——đáy mắt không có sự thanh lãnh như ngày thường, lộ ra một sự trịnh trọng đã hạ quyết tâm. Nàng mở miệng, giọng nói trầm hơn bình thường: "Có một số chuyện, ta đã tự mình xem trước rồi. Bây giờ, ta muốn đọc cho ngươi nghe."',2:'——Nàng lật mở trang đầu tiên. Nét chữ của lão tổ là hành khải, từng nét từng nét có cốt cách đặc trưng của bà. Vân Sương Ngưng đọc đoạn đầu tiên, theo ngôi thứ nhất trong nhật ký, giọng điệu trêu tức của lão tổ thấm ra từ trên giấy: "Vết hằn trên cổ ta——họa sĩ tự nhiên là không hiểu được. Hắn tưởng đó là ánh sáng và bóng tối, ta không sửa lại cho hắn. Ta chính là muốn để vết hằn này lưu lại trên bức họa, để hậu bối đoán——ai có thể nhìn ra đó là cái gì, người đó mới có tư cách biết chuyện của tầng tiếp theo." Vân Sương Ngưng đọc xong thì dừng lại, đầu ngón tay đè lên dòng chữ đó. Nàng ngước mắt nhìn ta, trong giọng điệu lần đầu tiên mang theo một chút chần chừ: "Giọng điệu này——lão tổ đang khoe khoang cái gì đó. Không giống như vết thương bị ép phải lưu lại."',3:'——Nàng lật sang trang tiếp theo tiếp tục đọc, sự đắc ý của lão tổ càng đậm: "Vũ khí? Trang sức? Giới này có thứ gì có thể để lại vết hằn trên lớp hộ thể đỉnh phong Địa Tiên cảnh của ta——từ binh khí linh tiêm đến trang sức thiên tài, liệt kê ra xem, không có thứ nào làm được. Đáp án rất đơn giản: Trừ phi chính ta rút bỏ hộ thể, mặc cho hắn làm." Nàng đọc xong đoạn này, ba chữ "mặc cho hắn" khiến giọng nói của chính nàng cũng bất giác nhiễm một phần không đúng. Nàng gấp nhật ký lại, ngước mắt nhìn ta, một chút cảm giác không hài hòa vừa dâng lên kia bắt đầu hội tụ: "Đỉnh phong Địa Tiên chủ động rút bỏ hộ thể——đây không phải là bị đánh bại, mà là cho phép."',4:'——Nàng lật mở trang tiếp theo, nét chữ của nhật ký trở nên phóng túng. Nàng theo giọng điệu của lão tổ đọc thành tiếng: "Đó không phải là vết thương. Là huân chương của ta. Ta để họa sĩ vẽ lại, chính là muốn hậu thế đều nhớ kỹ——ta đã từng vui vẻ chìm đắm trong đó." Đọc xong nàng gấp nhật ký lại, đốt ngón tay dừng trên bìa không nhúc nhích. Qua vài nhịp thở nàng mới thấp giọng mở miệng, giọng nói không run, đầu ngón tay lại đè nặng hơn vừa nãy: "Lão tổ lập ra quy củ 『Chung thủy từ đầu đến cuối』——chính bà lại để người ta vẽ vết hằn này vào bức chân dung, còn muốn hậu thế đều nhớ kỹ. Hai chuyện này——hoàn toàn trái ngược nhau."',5:'——Nàng lật đến nửa sau cuốn sổ, đọc đoạn tiếp theo của lão tổ, trong nhật ký lão tổ không viết số người chính xác (bà không biết hậu thế sẽ còn thêm mấy vị): "Những bức chân dung trong Tiên Tổ Điện, hậu bối ngươi đã đi xem chưa? Vị nào mà không ngực nở mông cong, vị nào mà không mỉm cười khi phi thăng. Bọn họ chưa từng báo mộng——bởi vì bọn họ đều đã đi đến nơi tốt đẹp hơn." Đọc đến đây tay Vân Sương Ngưng khựng lại một chút, đốt ngón tay trắng bệch. Nàng không tiếp tục đọc xuống, ngước mắt nhìn ta——chính nàng đã đi Tiên Tổ Điện đếm những bức chân dung đó, nàng đếm rất rõ. Nàng không giải thích, chỉ đè cuốn nhật ký trên đầu gối, đầu ngón tay không nhúc nhích.',6:'——Nàng lật trang tiếp theo, giọng nói lần đầu tiên run lên rõ rệt, đè nén tiếp tục đọc: "Giới này——không phải là nơi tu tiên. Nơi này là bãi chăn thả. Chúng ta——đều là những cực phẩm được tuyển chọn kỹ lưỡng." Nàng đọc hai chữ "chúng ta" đặc biệt nhẹ, bởi vì "chúng ta" trong nhật ký này, cũng bao gồm chính nàng. Nàng đặt nhật ký xuống, không lập tức lật tiếp——tay nàng đè trên giấy dừng lại rất lâu, giống như đang đợi một thứ gì đó trong đáy lòng mình lắng xuống.',7:'——Nàng lật đến đoạn tiếp theo, đọc lão tổ tiếp tục khoe khoang tông huấn của mình: "Cái quy củ 『Chung thủy từ đầu đến cuối』 kia của ta a, tuyệt diệu lắm. Để hậu bối giữ lấy một phàm nhân, đợi phàm nhân hết tuổi thọ, thành phẩm đạt đến cảnh giới phi thăng——là có thể đưa lên trên rồi. Đây là sàng lọc, không phải trinh tiết." Đọc xong đoạn này Vân Sương Ngưng không lập tức đọc tiếp. Nàng gấp nhật ký lại im lặng một lúc, mới ngước mắt nhìn ta, giọng điệu thay đổi: "Nhưng ta đọc xong cả cuốn này——ta cảm thấy lão tổ đối với phàm nhân đã tròng vết hằn cho bà kia, là thực sự đã từng động tâm. 『Chung thủy từ đầu đến cuối』 đối ngoại là công cụ sàng lọc, đối nội——cũng là bia mộ bà lập cho phàm nhân đã qua đời từ lâu kia. Cả đời bà không nhận thêm người đàn ông thứ hai, không hoàn toàn là diễn cho hậu bối xem."',8:'——Tay Vân Sương Ngưng đã đè lên vài trang cuối của nhật ký. Nàng lật ra, đọc lời chỉ điểm đắc ý của lão tổ dành cho hậu bối (giọng điệu trêu tức, nhưng không đưa ra con số cụ thể——lão tổ cũng không biết hậu thế còn mấy vị): "Hậu bối a, nếu ngươi đọc đến đây——ngươi chính là vị tiếp theo rồi. Tận hưởng cho tốt. Người điều giáo định mệnh của ngươi, sắp xuất hiện rồi." Nàng đọc xong gấp nhật ký lại, ánh mắt không rời khỏi dòng chữ đó, dừng lại rất lâu mới ngẩng đầu nhìn ta. Giọng nói thu lại vài phần: "Ta đã đi Tiên Tổ Điện đếm qua. Tính cả ta——là vị thứ 88. Thế nhưng, người điều giáo phàm nhân định mệnh của ta, vẫn luôn không đến. Đáng lẽ ta đã thần hồn câu diệt trong hàn độc rồi, cho đến khi ngươi đến. Ngươi không nằm trong quy trình của Hắn——nhưng ngươi đã đến."',9:'——Nàng lật đến vài dòng cuối của nhật ký. Nàng đọc lời thuật lại cuối cùng của lão tổ, vẫn là giọng điệu trêu tức đắc ý đó, giống như đang đọc một sự an bài mà bà coi là thần chỉ: "Phàm nhân điều giáo trước. Hắn đợi thành phẩm. Đây chính là quy củ Hắn định ra, sự an bài hoàn hảo——hậu bối chỉ cần tuân theo." Đọc xong Vân Sương Ngưng gấp nhật ký lại, lần này nàng không lật tiếp nữa, cũng không ngẩng đầu. Nàng tự lẩm bẩm, giống như đang tự biện luận với chính mình: "Nhưng tại sao Hắn lại phải định ra quy củ như vậy? Nếu Hắn muốn, Hắn đích thân điều giáo là được——tại sao cứ phải mượn tay phàm nhân?" Nàng dừng lại, ngẩng đầu nhìn ta. Ánh mắt nàng đột nhiên thay đổi, giống như có thứ gì đó sáng lên bên trong: "Bởi vì Hắn——không biết. Hắn chỉ có thể chơi thành phẩm. Những cấm kỵ, sự trái luân thường đạo lý, những cách chơi phát tán lộn xộn của phàm nhân——là thứ Hắn không học được. Lão tổ cả đời trung thành đến chết, không nghĩ thông suốt điểm này——nhưng ta đã nghĩ thông suốt rồi."',10:'——Vân Sương Ngưng đặt nhật ký xuống, để trên kỷ án trước mặt ta. Ánh mắt nàng không còn là sự cảnh giác và run rẩy khi đọc nhật ký vừa nãy nữa, đổi thành một sự tính toán bình tĩnh đến mức gần như đáng sợ. Nàng mở miệng, từng chữ đều đè rất vững: "Hắn vẫn luôn nhìn. Mọi thứ ở phàm giới, Hắn đều chằm chằm theo dõi. Nhưng Hắn——chỉ có thể nhìn." Nàng ngước mắt nhìn ta, ánh mắt trầm xuống: "Đây chính là vũ khí duy nhất của chúng ta. Cho Hắn xem——thứ Hắn vĩnh viễn không học được, vĩnh viễn không thể tận hưởng. Đây là chỗ đau nhất của Hắn. Cũng là con dao duy nhất trong tay chúng ta, có thể đâm trúng Hắn."',11:'——Bụng ngón tay nàng chậm rãi gõ lên mép nhật ký. Nàng mở miệng, trong giọng nói lần đầu tiên có một tia ý cười trêu tức: "Ta đã nghĩ xong chiêu thứ nhất. Ta muốn thi triển Thiên Tinh Huyễn Thuật lên Miêu Quảng." Nàng nhìn về phía ta, khóe môi hơi nhếch, trong giọng điệu mang theo một loại hưng phấn gần như tàn khốc: "Để Hắn——cách hư không, tận mắt nhìn thấy sự đảo lộn này. Một người chồng đã ở bên ta ba trăm năm——thần hồn của hắn, luân lý cha con của hắn, thân phận người chồng của hắn đối với ta——bị tư duy phát tán của phàm nhân, từng nét từng nét viết lại thành 『con trai』. Còn ngươi——phàm nhân đáng lẽ là 『người ngoài』 kia——trong huyễn cảnh thay thế hắn, đứng thành chồng của ta, nghĩa phụ của hắn." Nàng dừng lại một nhịp, tia hưng phấn trong ánh mắt càng sâu hơn: "Luân lý phu thê ba trăm năm, cứ như vậy dưới mí mắt Hắn, bị viết lại, bị vấy bẩn, bị đảo lộn triệt để. Cảm giác trái luân thường đạo lý này, sự sai lệch cấm kỵ này——là thứ hoa dạng mà cái não chỉ biết chơi thành phẩm của Hắn, vĩnh viễn không sinh ra được. Mỗi một lần thi triển thuật, đối với Hắn đều là một lần nhục nhã công khai——Hắn chỉ có thể nhìn, nhìn chúng ta làm ra những chuyện mà Hắn cả đời này cũng không làm được ngay trước mắt Hắn."',12:'——Nàng tiếp tục nói, ý cười trêu tức không tan, lại đan xen với sự tính toán: "Còn chiêu thứ hai——Hắn không phải nhận định ta là súc vật cái ưu tú nhất giới này sao? Vậy thì ta không phi thăng. Thành phẩm cực phẩm, giữ lại giới này, không nộp lên. Để Hắn đối mặt với mấy chục món hàng cũ đã bị nhào nặn chín muồi bên cạnh——nhạt nhẽo vô vị." Nàng khựng lại một nhịp, tiếp tục: "Chiêu thứ ba——với tư cách là chưởng môn Hàn Sương Môn, ta sẽ dùng toàn bộ sức ảnh hưởng của mình, khiến trong môn không còn hậu bối nào đi lên con đường này nữa. Luân hồi sàng lọc của lão tổ, sẽ đứt đoạn ở chỗ ta. Không có người kế vị." Ánh mắt nàng thu lại một tia sắc bén, giọng điệu bình ổn thốt ra câu cuối cùng: "Hắn sẽ thẹn quá hóa giận, sẽ muốn đích thân hạ giới tìm ta——nhưng Thiên Đạo không cho phép sự tồn tại không thể diễn tả này của Hắn xuất hiện ở phàm giới. Khoảnh khắc Hắn xuống đây, chính là thần hồn câu diệt." Nàng nhìn ta, ý cười lại lan tràn: "Chúng ta không cần làm gì cả. Tiếp tục chơi, tiếp tục cho Hắn xem——Hắn sẽ tự mình, bước vào cái bẫy này."',13:'——Im lặng rất lâu. Ánh mắt Vân Sương Ngưng từ sự sắc bén bình tĩnh vừa nãy từ từ mềm mỏng lại, buông bỏ toàn bộ những tính toán, những chiến lược vừa rồi. Nàng nhìn thẳng vào ta, mở miệng, trong giọng điệu mang theo sự trịnh trọng chưa từng có, cũng mang theo thứ mà nàng gần như chưa từng có trong đời——thỉnh cầu: "Trước đây có lẽ ta đã từng bị ép buộc, đã từng có lúc không tình nguyện. Nhưng bây giờ, {{user}}——" Nàng trịnh trọng gọi tên ta, dừng lại một nhịp, giống như muốn đem một thứ gì đó nặng nề vô cùng, tự tay giao vào lòng bàn tay ta: "Xin nhờ ngươi. Xin hãy điều giáo ta thành súc vật cái cực phẩm nhất, ưu tú nhất giới này. Dùng toàn bộ kỹ xảo điều giáo của ngươi——đây là thỉnh cầu duy nhất của ta, đối với ngươi." Cảnh kết thúc.'},v3:{Tóm_Tắt_Cảnh:'【Chưa Rõ · 13 Vòng · Tổng quan toàn bộ cảnh này · Hé lộ toàn bộ sự thật】\nVân Sương Ngưng trong lúc sắp xếp di vật của lão tổ tìm thấy một cuốn nhật ký trước lúc lâm chung, sau khi tự mình đọc xong thì đến tìm {{user}}——nàng muốn đọc những thứ bên trong cho hắn nghe. Địa điểm thư phòng/tĩnh thất của {{user}} (không ở phòng ngủ, cần cảm giác nghi thức), Miêu Quảng/Lạc Thư Tình/Miêu Huyên đều không có mặt.\nCốt lõi là cảnh thuần tự sự, Vân Sương Ngưng đọc nhật ký hé lộ sự thật của giới này:\n- Vòng 1-9 Hé lộ sự thật theo từng lớp (Nghi vấn vết hằn trên cổ lão tổ → Suy luận rút bỏ hộ thể → Bức họa=Vinh quang trái ngược với tông huấn → Điểm chung của 87 bức họa trong Tiên Tổ Điện → Giới này là bãi chăn thả của "Hắn"/thu thập cực phẩm → 87 vị trước đó đã bị điều giáo phi thăng → Nàng là vị thứ 88 → Phàm giới là nhà máy điều giáo → "Người điều giáo định mệnh" của nàng đáng lẽ phải đến nhưng không đến → {{user}} là sự cố ngoài ý muốn → Hắn chỉ có thể nhìn, không học được tư duy phát tán của phàm nhân)\n- Vòng 10-12 Ba chiêu phản kích (Thiên Tinh đảo lộn luân lý cha con của chồng/con trai → Không phi thăng khiến Hắn nhạt nhẽo với hàng cũ → Dùng sức ảnh hưởng của chưởng môn cắt đứt luân hồi sàng lọc của lão tổ → Chọc giận Hắn hạ giới thần hồn câu diệt)\n- Vòng 13 Thỉnh cầu trịnh trọng ({{user}} hãy điều giáo ta thành súc vật cái cực phẩm nhất giới này — thỉnh cầu duy nhất của nàng đối với {{user}} trong đời này)\nGiọng điệu nhật ký: Ngôi thứ nhất của lão tổ, trêu tức, đắc ý, khoe khoang, bà là kẻ đồng mưu của dây chuyền sàng lọc/điều giáo, không hối hận không mang ý hối hận.\nCảm xúc Vân Sương Ngưng thúc đẩy: Bình tĩnh trịnh trọng → Nghi hoặc → Chấn động → Giác ngộ → Bình tĩnh tính toán → Quyết tâm phản nghịch. **Càng đọc càng lạnh lùng**, không khóc lóc không mất kiểm soát.\nToàn cảnh thuần tự sự, tương tác cơ thể giảm xuống mức thấp nhất (nhiều nhất là nắm tay/nhìn nhau, không miêu tả tình dục). {{user}} có thể ngắt lời/đặt câu hỏi, nhưng Vân Sương Ngưng sẽ kéo chủ đề về lại nhật ký.\nNghiêm cấm: Spoil trước vòng tiếp theo (diễn nghiêm ngặt theo vòng này không nhảy vòng)、Ném ra toàn bộ sự thật cùng một lúc、Lạc/Miêu Quảng/Miêu Huyên xuất hiện、Vân sụp đổ khóc lóc、{{user}} biết trước sự thật、Tương tác cơ thể/tình dục đoạn dài、Tên đạo cụ/thuật ngữ hệ thống/chỉ số.',beats:{1:{Chủ_Đề_Vòng_Này:'Cửa thư phòng bị nhẹ nhàng đẩy ra. Vân Sương Ngưng trong tay cầm một cuốn nhật ký cũ bìa đã sờn, là tìm được từ trong đống di vật của lão tổ, nàng đã tự mình đọc xong một lần. Nàng không hỏi trước như thường ngày, chỉ khép cửa lại, ngồi xuống mép giường, đặt cuốn nhật ký lên đầu gối. Đầu ngón tay nàng dừng lại một nhịp trên dòng chữ phai màu ở bìa, rồi mới ngước mắt nhìn {{user}}——đáy mắt không có sự thanh lãnh như ngày thường, lộ ra một sự trịnh trọng đã hạ quyết tâm. Nàng mở miệng, giọng nói trầm hơn bình thường: "Có một số chuyện, ta đã tự mình xem trước rồi. Bây giờ, ta muốn đọc cho ngươi nghe." Vòng này để cốt truyện đi đến tự nhiên không khí "Nghi thức mở đầu đã định + Nàng muốn đọc nhật ký" này. Không đi vào nội dung nhật ký.',Độ_Tự_Do:'Chi tiết không khí thư phòng、Động tác cụ thể khi đầu ngón tay nàng dừng trên bìa、Nhịp thở/ánh mắt trước khi nàng mở miệng do AI tự chủ'},2:{Chủ_Đề_Vòng_Này:'Nàng lật mở trang đầu tiên. Nét chữ của lão tổ là hành khải, từng nét từng nét có cốt cách đặc trưng của bà. Vân Sương Ngưng đọc đoạn đầu tiên, theo ngôi thứ nhất trong nhật ký, giọng điệu trêu tức của lão tổ thấm ra từ trên giấy: "Vết hằn trên cổ ta——họa sĩ tự nhiên là không hiểu được. Hắn tưởng đó là ánh sáng và bóng tối, ta không sửa lại cho hắn. Ta chính là muốn để vết hằn này lưu lại trên bức họa, để hậu bối đoán——ai có thể nhìn ra đó là cái gì, người đó mới có tư cách biết chuyện của tầng tiếp theo." Vân Sương Ngưng đọc xong thì dừng lại, đầu ngón tay đè lên dòng chữ đó. Nàng ngước mắt nhìn {{user}}, trong giọng điệu lần đầu tiên mang theo một chút chần chừ: "Giọng điệu này——lão tổ đang khoe khoang cái gì đó. Không giống như vết thương bị ép phải lưu lại." Vòng này để cốt truyện đi đến tự nhiên "Nghi vấn tầng thứ nhất: Tính chất của vết hằn không đúng".',Độ_Tự_Do:'Miêu tả nét chữ nhật ký、Giọng điệu khi Vân đọc ra、Biểu cảm khi nàng ngước mắt do AI tự chủ'},3:{Chủ_Đề_Vòng_Này:'Nàng lật sang trang tiếp theo tiếp tục đọc, sự đắc ý của lão tổ càng đậm: "Vũ khí? Trang sức? Giới này có thứ gì có thể để lại vết hằn trên lớp hộ thể đỉnh phong Địa Tiên cảnh của ta——từ binh khí linh tiêm đến trang sức thiên tài, liệt kê ra xem, không có thứ nào làm được. Đáp án rất đơn giản: Trừ phi chính ta rút bỏ hộ thể, mặc cho hắn làm." Nàng đọc xong đoạn này, ba chữ "mặc cho hắn" khiến giọng nói của chính nàng cũng bất giác nhiễm một phần không đúng. Nàng gấp nhật ký lại, ngước mắt nhìn {{user}}, một chút cảm giác không hài hòa vừa dâng lên kia bắt đầu hội tụ: "Đỉnh phong Địa Tiên chủ động rút bỏ hộ thể——đây không phải là bị đánh bại, mà là cho phép." Vòng này để cốt truyện đi đến tự nhiên "Tầng thứ hai: Bà rút bỏ hộ thể cho phép vết hằn lưu lại".',Độ_Tự_Do:'Sự run rẩy trong giọng nói khi nàng đọc đến "mặc cho hắn"、Động tác gấp nhật ký lại、Thần thái khi hội tụ do AI tự chủ'},4:{Chủ_Đề_Vòng_Này:'Nàng lật mở trang tiếp theo, nét chữ của nhật ký trở nên phóng túng. Nàng theo giọng điệu của lão tổ đọc thành tiếng: "Đó không phải là vết thương. Là huân chương của ta. Ta để họa sĩ vẽ lại, chính là muốn hậu thế đều nhớ kỹ——ta đã từng vui vẻ chìm đắm trong đó." Đọc xong nàng gấp nhật ký lại, đốt ngón tay dừng trên bìa không nhúc nhích. Qua vài nhịp thở nàng mới thấp giọng mở miệng, giọng nói không run, đầu ngón tay lại đè nặng hơn vừa nãy: "Lão tổ lập ra quy củ 『Chung thủy từ đầu đến cuối』——chính bà lại để người ta vẽ vết hằn này vào bức chân dung, còn muốn hậu thế đều nhớ kỹ. Hai chuyện này——hoàn toàn trái ngược nhau." Vòng này để cốt truyện đi đến tự nhiên "Tầng thứ ba: Hành vi của lão tổ và tông huấn hoàn toàn trái ngược nhau".',Độ_Tự_Do:'Giọng điệu khi nàng đọc "huân chương"、Chi tiết đốt ngón tay dừng trên bìa、Nhịp điệu khi thấp giọng mở miệng do AI tự chủ'},5:{Chủ_Đề_Vòng_Này:'Nàng lật đến nửa sau cuốn sổ, đọc đoạn tiếp theo của lão tổ, trong nhật ký lão tổ không viết số người chính xác (bà không biết hậu thế sẽ còn thêm mấy vị): "Những bức chân dung trong Tiên Tổ Điện, hậu bối ngươi đã đi xem chưa? Vị nào mà không ngực nở mông cong, vị nào mà không mỉm cười khi phi thăng. Bọn họ chưa từng báo mộng——bởi vì bọn họ đều đã đi đến nơi tốt đẹp hơn." Đọc đến đây tay Vân Sương Ngưng khựng lại một chút, đốt ngón tay trắng bệch. Nàng không tiếp tục đọc xuống, ngước mắt nhìn {{user}}——chính nàng đã đi Tiên Tổ Điện đếm những bức chân dung đó, nàng đếm rất rõ. Nàng không giải thích, chỉ đè cuốn nhật ký trên đầu gối, đầu ngón tay không nhúc nhích. Vòng này để cốt truyện đi đến tự nhiên khoảnh khắc im lặng "Tầng thứ tư: Điểm chung của các bức họa trong Tiên Tổ Điện + Vân đã đếm qua".',Độ_Tự_Do:'Đốt ngón tay trắng bệch、Thần thái ngước mắt không giải thích của nàng、Động tác đè nhật ký trên đầu gối do AI tự chủ'},6:{Chủ_Đề_Vòng_Này:'Nàng lật trang tiếp theo, giọng nói lần đầu tiên run lên rõ rệt, đè nén tiếp tục đọc: "Giới này——không phải là nơi tu tiên. Nơi này là bãi chăn thả. Chúng ta——đều là những cực phẩm được tuyển chọn kỹ lưỡng." Nàng đọc hai chữ "chúng ta" đặc biệt nhẹ, bởi vì "chúng ta" trong nhật ký này, cũng bao gồm chính nàng. Nàng đặt nhật ký xuống, không lập tức lật tiếp——tay nàng đè trên giấy dừng lại rất lâu, giống như đang đợi một thứ gì đó trong đáy lòng mình lắng xuống. Vòng này để cốt truyện đi đến tự nhiên "Sự chấn động tầng thứ năm: Giới này là bãi chăn thả".',Độ_Tự_Do:'Miêu tả sự run rẩy của giọng nói、Độ nặng nhẹ của hai chữ "chúng ta" của nàng、Thời gian tay đè trên giấy chờ đợi do AI tự chủ'},7:{Chủ_Đề_Vòng_Này:'Nàng lật đến đoạn tiếp theo, đọc lão tổ tiếp tục khoe khoang tông huấn của mình: "Cái quy củ 『Chung thủy từ đầu đến cuối』 kia của ta a, tuyệt diệu lắm. Để hậu bối giữ lấy một phàm nhân, đợi phàm nhân hết tuổi thọ, thành phẩm đạt đến cảnh giới phi thăng——là có thể đưa lên trên rồi. Đây là sàng lọc, không phải trinh tiết." Đọc xong đoạn này Vân Sương Ngưng không lập tức đọc tiếp. Nàng gấp nhật ký lại im lặng một lúc, mới ngước mắt nhìn {{user}}, giọng điệu thay đổi: "Nhưng ta đọc xong cả cuốn này——ta cảm thấy lão tổ đối với phàm nhân đã tròng vết hằn cho bà kia, là thực sự đã từng động tâm. 『Chung thủy từ đầu đến cuối』 đối ngoại là công cụ sàng lọc, đối nội——cũng là bia mộ bà lập cho phàm nhân đã qua đời từ lâu kia. Cả đời bà không nhận thêm người đàn ông thứ hai, không hoàn toàn là diễn cho hậu bối xem." Vòng này để cốt truyện đi đến tự nhiên "Sự giác ngộ tầng thứ sáu: Tông huấn=Công cụ sàng lọc + Sự dịu dàng thầm kín của lão tổ".',Độ_Tự_Do:'Thời điểm giọng điệu nàng thay đổi、Từ ngữ nàng dùng để biện bạch cho lão tổ、Phản ứng của {{user}} khi nghe thấy do AI tự chủ'},8:{Chủ_Đề_Vòng_Này:'Tay Vân Sương Ngưng đã đè lên vài trang cuối của nhật ký. Nàng lật ra, đọc lời chỉ điểm đắc ý của lão tổ dành cho hậu bối (giọng điệu trêu tức, nhưng không đưa ra con số cụ thể——lão tổ cũng không biết hậu thế còn mấy vị): "Hậu bối a, nếu ngươi đọc đến đây——ngươi chính là vị tiếp theo rồi. Tận hưởng cho tốt. Người điều giáo định mệnh của ngươi, sắp xuất hiện rồi." Nàng đọc xong gấp nhật ký lại, ánh mắt không rời khỏi dòng chữ đó, dừng lại rất lâu mới ngẩng đầu nhìn {{user}}. Giọng nói thu lại vài phần: "Ta đã đi Tiên Tổ Điện đếm qua. Tính cả ta——là vị thứ 88. Thế nhưng, người điều giáo phàm nhân định mệnh của ta, vẫn luôn không đến. Đáng lẽ ta đã thần hồn câu diệt trong hàn độc rồi, cho đến khi ngươi đến. Ngươi không nằm trong quy trình của Hắn——nhưng ngươi đã đến." Vòng này để cốt truyện đi đến tự nhiên "Tầng thứ bảy: Nàng là vị thứ 88 + {{user}} là sự cố ngoài ý muốn".',Độ_Tự_Do:'Nhịp điệu giọng nói "Vị thứ 88"、Giọng điệu "Cho đến khi ngươi đến"、Ánh mắt nàng ngẩng đầu nhìn {{user}} do AI tự chủ'},9:{Chủ_Đề_Vòng_Này:'Nàng lật đến vài dòng cuối của nhật ký. Nàng đọc lời thuật lại cuối cùng của lão tổ, vẫn là giọng điệu trêu tức đắc ý đó, giống như đang đọc một sự an bài mà bà coi là thần chỉ: "Phàm nhân điều giáo trước. Hắn đợi thành phẩm. Đây chính là quy củ Hắn định ra, sự an bài hoàn hảo——hậu bối chỉ cần tuân theo." Đọc xong Vân Sương Ngưng gấp nhật ký lại, lần này nàng không lật tiếp nữa, cũng không ngẩng đầu. Nàng tự lẩm bẩm, giống như đang tự biện luận với chính mình: "Nhưng tại sao Hắn lại phải định ra quy củ như vậy? Nếu Hắn muốn, Hắn đích thân điều giáo là được——tại sao cứ phải mượn tay phàm nhân?" Nàng dừng lại, ngẩng đầu nhìn {{user}}. Ánh mắt nàng đột nhiên thay đổi, giống như có thứ gì đó sáng lên bên trong: "Bởi vì Hắn——không biết. Hắn chỉ có thể chơi thành phẩm. Những cấm kỵ, sự trái luân thường đạo lý, những cách chơi phát tán lộn xộn của phàm nhân——là thứ Hắn không học được. Lão tổ cả đời trung thành đến chết, không nghĩ thông suốt điểm này——nhưng ta đã nghĩ thông suốt rồi." Vòng này để cốt truyện đi đến tự nhiên "Sự đốn ngộ tầng thứ tám: Điểm yếu của Hắn là không học được tư duy phát tán của phàm nhân".',Độ_Tự_Do:'Giọng điệu khi nàng tự biện luận、Khoảnh khắc ánh mắt sáng lên、Nhịp điệu "Ta đã nghĩ thông suốt rồi" do AI tự chủ'},10:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng đặt nhật ký xuống, để trên kỷ án trước mặt {{user}}. Ánh mắt nàng không còn là sự cảnh giác và run rẩy khi đọc nhật ký vừa nãy nữa, đổi thành một sự tính toán bình tĩnh đến mức gần như đáng sợ. Nàng mở miệng, từng chữ đều đè rất vững: "Hắn vẫn luôn nhìn. Mọi thứ ở phàm giới, Hắn đều chằm chằm theo dõi. Nhưng Hắn——chỉ có thể nhìn." Nàng ngước mắt nhìn {{user}}, ánh mắt trầm xuống: "Đây chính là vũ khí duy nhất của chúng ta. Cho Hắn xem——thứ Hắn vĩnh viễn không học được, vĩnh viễn không thể tận hưởng. Đây là chỗ đau nhất của Hắn. Cũng là con dao duy nhất trong tay chúng ta, có thể đâm trúng Hắn." Vòng này để cốt truyện đi đến tự nhiên "Bình tĩnh tính toán + Tổng cương chiến lược: Cho Hắn xem thứ Hắn không học được".',Độ_Tự_Do:'Động tác nàng đặt nhật ký xuống、Đặc trưng cụ thể của biểu cảm tính toán、Nhịp điệu "Con dao duy nhất" do AI tự chủ'},11:{Chủ_Đề_Vòng_Này:'Bụng ngón tay nàng chậm rãi gõ lên mép nhật ký. Nàng mở miệng, trong giọng nói lần đầu tiên có một tia ý cười trêu tức: "Ta đã nghĩ xong chiêu thứ nhất. Ta muốn thi triển Thiên Tinh Huyễn Thuật lên Miêu Quảng." Nàng nhìn về phía {{user}}, khóe môi hơi nhếch, trong giọng điệu mang theo một loại hưng phấn gần như tàn khốc: "Để Hắn——cách hư không, tận mắt nhìn thấy sự đảo lộn này. Một người chồng đã ở bên ta ba trăm năm——thần hồn của hắn, luân lý cha con của hắn, thân phận người chồng của hắn đối với ta——bị tư duy phát tán của phàm nhân, từng nét từng nét viết lại thành 『con trai』. Còn ngươi——phàm nhân đáng lẽ là 『người ngoài』 kia——trong huyễn cảnh thay thế hắn, đứng thành chồng của ta, nghĩa phụ của hắn." Nàng dừng lại một nhịp, tia hưng phấn trong ánh mắt càng sâu hơn: "Luân lý phu thê ba trăm năm, cứ như vậy dưới mí mắt Hắn, bị viết lại, bị vấy bẩn, bị đảo lộn triệt để. Cảm giác trái luân thường đạo lý này, sự sai lệch cấm kỵ này——là thứ hoa dạng mà cái não chỉ biết chơi thành phẩm của Hắn, vĩnh viễn không sinh ra được. Mỗi một lần thi triển thuật, đối với Hắn đều là một lần nhục nhã công khai——Hắn chỉ có thể nhìn, nhìn chúng ta làm ra những chuyện mà Hắn cả đời này cũng không làm được ngay trước mắt Hắn." Vòng này để cốt truyện đi đến tự nhiên "Chiêu thứ nhất: Thiên Tinh Huyễn Thuật đảo lộn luân lý cha con của chồng/con trai".',Độ_Tự_Do:'Nhịp điệu bụng ngón tay nàng gõ lên nhật ký、Các tầng của ý cười trêu tức、Miêu tả ánh mắt hưng phấn do AI tự chủ'},12:{Chủ_Đề_Vòng_Này:'Nàng tiếp tục nói, ý cười trêu tức không tan, lại đan xen với sự tính toán: "Còn chiêu thứ hai——Hắn không phải nhận định ta là súc vật cái ưu tú nhất giới này sao? Vậy thì ta không phi thăng. Thành phẩm cực phẩm, giữ lại giới này, không nộp lên. Để Hắn đối mặt với mấy chục món hàng cũ đã bị nhào nặn chín muồi bên cạnh——nhạt nhẽo vô vị." Nàng khựng lại một nhịp, tiếp tục: "Chiêu thứ ba——với tư cách là chưởng môn Hàn Sương Môn, ta sẽ dùng toàn bộ sức ảnh hưởng của mình, khiến trong môn không còn hậu bối nào đi lên con đường này nữa. Luân hồi sàng lọc của lão tổ, sẽ đứt đoạn ở chỗ ta. Không có người kế vị." Ánh mắt nàng thu lại một tia sắc bén, giọng điệu bình ổn thốt ra câu cuối cùng: "Hắn sẽ thẹn quá hóa giận, sẽ muốn đích thân hạ giới tìm ta——nhưng Thiên Đạo không cho phép sự tồn tại không thể diễn tả này của Hắn xuất hiện ở phàm giới. Khoảnh khắc Hắn xuống đây, chính là thần hồn câu diệt." Nàng nhìn {{user}}, ý cười lại lan tràn: "Chúng ta không cần làm gì cả. Tiếp tục chơi, tiếp tục cho Hắn xem——Hắn sẽ tự mình, bước vào cái bẫy này." Vòng này để cốt truyện đi đến tự nhiên "Chiêu thứ hai+Chiêu thứ ba + Thu lưới: Chọc giận Hắn tự hủy".',Độ_Tự_Do:'Nhịp điệu liệt kê ba chiêu、Giọng điệu "Nhạt nhẽo vô vị" "Không có người kế vị"、Ý cười lan tràn cuối cùng do AI tự chủ'},13:{Chủ_Đề_Vòng_Này:'Im lặng rất lâu. Ánh mắt Vân Sương Ngưng từ sự sắc bén bình tĩnh vừa nãy từ từ mềm mỏng lại, buông bỏ toàn bộ những tính toán, những chiến lược vừa rồi. Nàng nhìn thẳng vào {{user}}, mở miệng, trong giọng điệu mang theo sự trịnh trọng chưa từng có, cũng mang theo thứ mà nàng gần như chưa từng có trong đời——thỉnh cầu: "Trước đây có lẽ ta đã từng bị ép buộc, đã từng có lúc không tình nguyện. Nhưng bây giờ, {{user}}——" Nàng trịnh trọng gọi tên {{user}}, dừng lại một nhịp, giống như muốn đem một thứ gì đó nặng nề vô cùng, tự tay giao vào lòng bàn tay {{user}}: "Xin nhờ ngươi. Xin hãy điều giáo ta thành súc vật cái cực phẩm nhất, ưu tú nhất giới này. Dùng toàn bộ kỹ xảo điều giáo của ngươi——đây là thỉnh cầu duy nhất của ta, đối với ngươi." Vòng này để cốt truyện thu lại tự nhiên ở "Thỉnh cầu trịnh trọng buông bỏ toàn bộ tính toán của nàng + Cảnh kết thúc".',Độ_Tự_Do:'Thời gian im lặng、Quá trình ánh mắt mềm mỏng lại、Sự run rẩy khi gọi tên、Phản ứng của {{user}} do AI tự chủ'}}},exitText:'[Cảnh Đặc Biệt·Chưa Rõ·Hoàn Thành]\nNhật ký gấp lại, đặt về trên bàn. Trong ánh mắt nhìn nhau của Vân Sương Ngưng và {{user}} đã có thêm một thứ mới——không phải tình dục, mà là đồng mưu.\n\n⚠️【Thu Dọn Cảnh】\n- Từ vòng tiếp theo tự sự trở lại thường ngày. Vân Sương Ngưng đã triển khai chiến lược chống lại Hắn với {{user}} (Thiên Tinh thi triển lên Miêu Quảng/Không phi thăng/Chấm dứt luân hồi sàng lọc/Đợi Hắn hạ giới bị Thiên Đạo phản phệ)\n- Sau này người chơi tự chủ quyết định khi nào sử dụng Thiên Tinh Huyễn Thuật (Điều kiện mở khóa đã chuẩn bị sẵn trong cửa hàng)\n- Giữa hai người từ nay về sau có thêm một tầng ăn ý "Kẻ đồng mưu", tự sự có thể thỉnh thoảng thể hiện qua ánh mắt/đoạn hồi ức, không cần mỗi vòng đều nhắc rõ\n- Cảnh trở lại thư phòng của {{user}}, Vân Sương Ngưng để lại nhật ký trên bàn. Thường ngày vẫn như thường, nhưng nhận thức "Hắn đang nhìn" đã là nhận thức chung cốt lõi giữa hai người'},Miêu_Huyên_Của_Một_Ngày:{maxRounds:8,entryText:'[Cảnh Đặc Biệt·Miêu Huyên Của Một Ngày] Sau khi tái giá kép, trật tự gia tộc đã được định đoạt. Hôm nay, Miêu Huyên sẽ một mình trải qua một ngày của hắn. {{user}} không tương tác trực tiếp với hắn, chỉ xuất hiện như một "sự tồn tại trong bối cảnh".',entryPrefill:'Lại là một ngày nữa——',sceneBottomLine:'[Cảnh Đặc Biệt·Miêu Huyên Của Một Ngày·Đáy Tuyến]\nCốt lõi cảnh này: Dưới góc nhìn của Miêu Huyên, miêu tả một ngày của hắn sau khi tái giá kép (Trật tự gia tộc đảo lộn, mẹ và vị hôn thê đều thuộc về {{user}}).\nGiọng điệu cảm xúc: **Tê liệt chấp nhận**. Hắn đã không còn nước mắt, không còn kinh ngạc, không còn phản kháng——chỉ là sống qua từng ngày theo giờ giấc.\n\nQuy tắc cốt lõi:\n- **Nghi khai phá cơ thể càng cao/đạo cụ kích hoạt càng nhiều/cải tạo càng sâu/phòng tuyến tâm lý càng thấp, hình ảnh càng phóng túng\n- Vân Sương Ngưng/Lạc Thư Tình lúc này đã hoàn toàn sa đọa (tiền đề tái giá kép), phản ứng của các nàng đối với Miêu Huyên là **Biểu hiện dịu dàng thường ngày + Dấu vết sa đọa song hành** —— Không chia cắt, cả hai đều là cùng một nàng\n- Miêu Huyên thỉnh thoảng nhớ lại dáng vẻ ngày xưa của các nàng, nhưng hồi ức không chiếm trục chính —— Nỗi đau âm ỉ trước mắt có sức nặng hơn\n- Nhận thức của Miêu Quảng đã đảo lộn (Thiên Tinh Huyễn Thuật), thái độ của hắn đối với Miêu Huyên mang theo tình cha hiền từ méo mó (gọi {{user}} là "Nghĩa phụ" v.v.)\n- Cảm giác quy thuộc của Vân Sương Ngưng đối với {{user}} lúc này đã ăn sâu vào xương tủy —— Nàng dịu dàng gọi Miêu Huyên là "Con trai ngoan", đồng thời ngôn ngữ cơ thể là của người phụ nữ của {{user}}\n- Cấu trúc mỗi vòng: Gợi ý thời gian (Sáng/Trưa/Tối...) + Một sự kiện nhìn thấy hoặc cảm nhận + Phản ứng tê liệt của Miêu Huyên + Vật chứng/Hồi ức tùy chọn\n\nTuyệt đối cấm:\n- ✗ Miêu Huyên khóc lóc/bùng nổ/phản kháng/cố gắng khuyên can——Đó là cảnh thời kỳ đầu, đã qua từ lâu\n- ✗ {{user}} đối thoại/tương tác/nói chuyện/nháy mắt với Miêu Huyên\n- ✗ Nói thay hoặc quyết định thay {{user}}\n- ✗ Hardcode tên đạo cụ cụ thể——Bắt buộc phải lấy từ trạng thái kích hoạt hiện tại của data card\n- ✗ Viết đạo cụ chưa kích hoạt/bộ phận chưa khai phá/dấu vết chưa cải tạo——Trong data không có thì không viết\n- ✗ Miêu Huyên chạy trốn khỏi cảnh hoặc nhảy ra khỏi góc nhìn——Toàn bộ quá trình là góc nhìn của hắn, hắn ở trong gia tộc, không có nơi nào để trốn\n- ✗ Cảnh chuyển sang góc nhìn chính của {{user}}——{{user}} là "Hắn" (bối cảnh trong mắt Miêu Huyên), không phải "Ta"\n- ✗ Phản ứng của Miêu Huyên trở lại mãnh liệt——Cảnh này tê liệt, là sự khác biệt cốt lõi giữa cảnh này và các cảnh thời kỳ đầu\n- ✗ Xuất hiện các từ meta như tên đạo cụ/thuật ngữ hệ thống/thay đổi chỉ số/tiến độ giai đoạn v.v.\n- ✗ Lạc Thư Tình/Vân Sương N
