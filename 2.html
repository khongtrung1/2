ổi chiều chỗ Lạc Thư Tình → Hoàng hôn viện của mẹ → Bữa tối → Đêm độc xử → Đêm khuya chìm vào giấc ngủ\nSau khi chạy hết 8 vòng người chơi vẫn có thể tiếp tục (sandbox), AI diễn ngày tháng thường ngày tự do theo nguyên tắc tự sự trên, không ép đẩy beat mới.\n\n【Tuyệt Đối Cấm】\n- ✗ Miêu Huyên khóc lóc/bùng nổ/phản kháng/khuyên can/đoạt quyền\n- ✗ {{user}} đối thoại/tương tác trực tiếp với Miêu Huyên\n- ✗ Hardcode tên đạo cụ cụ thể\n- ✗ Viết đạo cụ chưa kích hoạt/bộ phận chưa khai phá/dấu vết chưa cải tạo\n- ✗ Miêu Huyên chạy trốn khỏi cảnh/nhảy ra khỏi góc nhìn\n- ✗ Cảnh chuyển sang góc nhìn chính của {{user}} (Cảnh này luôn là POV của Miêu Huyên)\n- ✗ Phản ứng của Miêu Huyên trở lại mãnh liệt\n- ✗ Các từ meta như tên đạo cụ/thuật ngữ hệ thống/chỉ số\n- ✗ Vân/Lạc bộc lộ sự xấu hổ đối với Miêu Huyên (Các nàng đã không còn che giấu)\n- ✗ AI viết việc "Người chơi đóng vai Miêu Huyên" vào tự sự (Không phá vỡ bức tường thứ tư)\n- ✗ AI chủ động dọn cảnh hoặc ám thị "Cảnh này nên kết thúc rồi" (Do người chơi điều khiển thoát bằng nút bấm)',beats:{1:{Chủ_Đề_Vòng_Này:'Sáng sớm Miêu Huyên mở mắt trên giường. Tiếng động từ phòng ngủ của mẹ cách tường lại vang lên, hắn đã có thể nhận biết phương thức từ nhịp điệu rung động (trình bày tự nhiên theo tổ hợp đạo cụ/cải tạo kích hoạt hiện tại của data). Không bịt tai, chỉ nằm đợi dừng lại. Vòng này để cốt truyện đi đến tự nhiên điểm khởi đầu tê liệt "Sáng sớm mở mắt + Nghe tiếng nhận biết + Không trốn tránh" này. Nghiêm ngặt góc nhìn Miêu Huyên.',Độ_Tự_Do:'Hắn nhận biết được là cái gì (chọn 1-2 loại đạo cụ/cải tạo đang kích hoạt theo data trình bày nhịp điệu tự nhiên)、Tư thế/nhịp thở khi nằm、Có nhìn ra ngoài cửa sổ hay không do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Sáng Miêu Huyên đến sân tập võ luyện kiếm. Theo thói quen nhìn về hướng tẩm điện của mẹ, dừng kiếm, thần thức lặng lẽ dò xét qua —— nhìn thấy cảnh tượng đó (hình ảnh trình bày động thái theo hiệu quả kích hoạt hiện tại/khai phá cơ thể/cải tạo thể xác của data). Hắn thu hồi thần thức, nắm chặt kiếm tiếp tục luyện. Vòng này để cốt truyện đi đến tự nhiên động tác tê liệt "Theo thói quen nhìn trộm + Thần thức liếc qua + Thu hồi tiếp tục luyện".',Độ_Tự_Do:'Hình ảnh cụ thể thần thức nhìn thấy (chọn theo data)、Thời gian dừng kiếm、Nhịp điệu luyện kiếm sau khi thu hồi (nhanh hơn/chậm hơn/không thay đổi) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Bữa trưa, mẹ khoác hờ y phục ôm {{user}} đi tới (dấu vết đạo cụ/cải tạo/khai phá kích hoạt trên người lộ ra tự nhiên theo hiện trạng data). Nàng dịu dàng gọi Miêu Huyên là "Con trai ngoan", gắp cho hắn một đũa thức ăn như một người mẹ hiền —— cùng một bàn tay đó quay người lại đút một miếng cho {{user}}. Vòng này để cốt truyện đi đến tự nhiên hình ảnh tương phản cốt lõi "Khoác hờ y phục nhập trường + Động tác kép của cùng một bàn tay (đút cho hắn/đút cho {{user}})". {{user}} không nói chuyện không tương tác.',Độ_Tự_Do:'Sự lộ ra cụ thể của y phục khoác hờ của mẹ (chọn 1-2 chỗ dấu vết khai phá/đạo cụ theo data)、Giọng điệu khi nàng gọi "Con trai ngoan"、Chi tiết động tác gắp thức ăn do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Buổi chiều Miêu Huyên đi đến căn phòng Lạc Thư Tình từng luyện công, đẩy cửa —— thấy vị hôn thê cũ đang quỳ trước mặt {{user}} chịu đựng khẩu giao bạo lực (cổ họng phồng lên/nước mắt chảy dài/trong mắt không có kháng cự chỉ có chìm đắm). Hắn đứng một lát, lùi ra khép cửa lại. Trên đường về nhớ lại dáng vẻ ôn nhu uyển chuyển ngày xưa của nàng, thanh kiếm nàng từng tặng, bức thư viết cho hắn —— giống như một người khác. Vòng này để cốt truyện đi đến tự nhiên "Nhìn thấy + Đứng im ngắn ngủi + Lùi ra khép cửa + Hồi ức đối chiếu cũ mới". {{user}} không tương tác trực tiếp với Miêu Huyên.',Độ_Tự_Do:'Chi tiết cụ thể của hình ảnh khẩu giao sâu (chọn theo khai phá cơ thể/tính phích kích hoạt của Lạc trong data)、Biểu cảm "chìm đắm" trong mắt Lạc、Đoạn hồi ức cụ thể của Miêu Huyên do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Hoàng hôn Miêu Huyên đến viện của mẹ báo cáo công sự, quên gõ cửa. Bắt gặp mẹ đang ở dưới thân {{user}} (đạo cụ/cải tạo kích hoạt trên người đều có thể nhìn thấy toàn bộ theo hiện trạng data). Mẹ quay đầu lại, cười: "Con trai con đến rồi." Nàng không dừng lại, {{user}} không dừng lại. Hắn khép cửa lại, đi làm việc khác. Vòng này để cốt truyện đi đến tự nhiên hình ảnh thường ngày hóa siêu thực "Quên gõ cửa + Bắt gặp + Câu nói đó của mẹ + Hai người không dừng lại + Hắn khép cửa bỏ đi".',Độ_Tự_Do:'Đạo cụ/cải tạo cụ thể trên người mẹ (theo data có thể nhìn thấy toàn bộ nhưng AI chọn tiêu điểm theo "lộ ra tự nhiên")、Giọng điệu khi nàng nói "Con trai con đến rồi" (dịu dàng/ung dung/hoàn toàn không bối rối)、Miêu Huyên khép cửa xong đi làm gì do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Bữa tối, cả nhà quây quần bên bàn. Mẹ ngồi trên đùi {{user}} (một tay ấn vào chỗ kích hoạt của nàng/một tay đút cho nàng), Miêu Quảng (sau khi nhận thức đảo lộn) gắp thức ăn cho {{user}}, hiền từ gọi "Nghĩa phụ" "Nương thân". Lạc Thư Tình ngồi cạnh Miêu Huyên, một tay múc canh cho hắn —— tay kia lặng lẽ đặt lên đùi {{user}} dưới gầm bàn. Miêu Huyên cúi đầu húp canh. Vòng này để cốt truyện đi đến tự nhiên hình ảnh dày đặc nhất toàn cảnh "Bốn tầng song hành trên bàn (Mẹ bị ấn+Miêu Quảng gọi đảo lộn+Tay dưới gầm bàn của Lạc+Miêu Huyên húp canh)". {{user}} không nói chuyện với Miêu Huyên.',Độ_Tự_Do:'Vị trí cụ thể {{user}} ấn mẹ (chọn theo data)、Độ trang trọng trong giọng điệu "Nghĩa phụ nương thân" của Miêu Quảng、Động tác cụ thể của tay Lạc dưới gầm bàn、Độ cứng đờ của Miêu Huyên khi cúi đầu húp canh do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Đêm về phòng mình, khóa cửa lại. Khi cởi áo ngoài phát hiện trên cổ tay áo có một vệt khô cạn (do mẹ ôm hắn buổi sáng cọ phải). Hắn ngồi bên mép giường rất lâu. Đồng thời các phòng khác lờ mờ truyền đến tiếng rên rỉ của mẹ và Lạc bị {{user}} luân phiên hoặc đồng thời sử dụng, hai âm thanh đan xen cách tường thấm vào. Hắn không bịt tai. Đã khóc quá nhiều lần, bây giờ không khóc được nữa. Vòng này để cốt truyện đi đến tự nhiên hình ảnh độc xử nặng nề nhất "Vết trên cổ tay áo + Ngồi mép giường + Nghe hai âm thanh + Không khóc được nữa".',Độ_Tự_Do:'Tính chất cụ thể của vết trên cổ tay áo (chọn theo trạng thái cơ thể mẹ trong data)、Các tầng của hai âm thanh (đồng thời/luân phiên/đan xen)、Thời gian và tư thế Miêu Huyên ngồi mép giường do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Đêm khuya Miêu Huyên nằm xuống. Âm thanh cách tường lại bắt đầu, đêm nay lâu hơn bình thường, trình bày tự nhiên các tầng âm thanh và nhịp điệu theo tổ hợp đạo cụ/cải tạo kích hoạt hiện tại của data. Hắn lắng nghe, cuối cùng chìm vào giấc ngủ. Trong mơ mẹ dịu dàng gọi hắn là "Ngoan"—— nhưng trên người mẹ trong mơ, cũng có những cải tạo và dấu vết đó. Giấc mơ và hiện thực, đã không thể phân biệt được nữa. Vòng này để cốt truyện thu lại tự nhiên ở hình ảnh tối thượng "Giấc mơ hiện thực hòa quyện".',Độ_Tự_Do:'Các tầng cụ thể của âm thanh (chọn 2-3 loại tổ hợp kích hoạt theo data)、Hình ảnh cụ thể của mẹ trong giấc mơ (Biểu hiện dịu dàng + Dấu vết sa đọa cùng tồn tại)、Phản ứng của Miêu Huyên trong giấc mơ do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Miêu Huyên Của Một Ngày·Hoàn Thành·Chuyển Lại Góc Nhìn]\nMột ngày này của Miêu Huyên đến đây là kết thúc. Hắn đã ngủ thiếp đi, hoặc thức mà không nhúc nhích, tóm lại một ngày này đã trôi qua.\n\n⚠️【Cách Ly Góc Nhìn·Vòng Tiếp Theo Tuân Thủ Nghiêm Ngặt】\n- Từ vòng tiếp theo, góc nhìn tự sự **chuyển lại góc nhìn chính của {{user}}**, không lấy nội tâm/cảm nhận/độc thoại của Miêu Huyên làm chủ thể tự sự nữa\n- Miêu Huyên rút khỏi tiền đài tự sự, trở về vị trí bối cảnh mặc định của hắn với tư cách là "Người ngoài lề gia tộc"\n- Cảnh trở lại vị trí hiện thực hiện tại của {{user}} (Tiếp nối theo ngữ cảnh phần trên trước khi vào cảnh này), không khiên cưỡng kéo dài dư âm góc nhìn của Miêu Huyên\n- Nếu {{user}} lúc này đang ở cùng Vân Sương Ngưng/Lạc Thư Tình, thì tự nhiên viết tiếp bằng góc nhìn của {{user}}, không cần giao phó Miêu Huyên'}},In=new Set(['Phu_Tiền_Lăng_Nhục','Tuyên_Cáo_Cướp_Vợ','Điều_Giáo_Nô_Lệ_Đội_Nón_Xanh','Chưởng_Môn_Tái_Giá','Tuyên_Cáo_Cướp_Vợ_Tăng_Cường','Chứng_Kiến_Kép','Con_Dâu_Điều_Giáo_Bố_Chồng','Tái_Giá_Kép','Miêu_Huyên_Của_Một_Ngày']);function Bn(e,n,t,a){return'Trọn vẹn'===e?n.includes(a):'Tinh giản'===e?t.includes(a):Array.isArray(e)&&e.includes(a)}const Sn={An_Thần_Hương:()=>'【Sử Dụng Đạo Cụ】{{user}} lấy ra một nén nhang an thần hình vòng, đặt vào lò đồng bên cạnh giường rồi châm lửa. Những làn khói mỏng manh từ nén nhang lượn lờ bay lên, khói thuốc màu xanh nhạt từ từ lan tỏa trong phòng, trong không khí dần hiện lên một mùi hương thanh khiết khiến tâm trí người ta hơi dịu lại——không biết vì sao, Vân Sương Ngưng cảm thấy sự cảnh giác vốn đang căng chặt của mình lại khó hiểu nới lỏng đi vài phần trong làn khói thuốc này.\n[Chỉ Nam AI] An Thần Hương là loại nhang thuốc dạng đốt như nhang vòng/nhang muỗi, không phải đồ uống. Miêu tả sự thay đổi vi diệu khi Vân Sương Ngưng cảm nhận được sự cảnh giác vô cớ nới lỏng, nàng có thể phát giác hoặc hoàn toàn không hay biết. Không đề cập đến chỉ số.',Thực_Tâm_Lộ:()=>'【Sử Dụng Đạo Cụ】{{user}} lặng lẽ nhỏ một giọt linh dịch gần như trong suốt vào đồ uống của Vân Sương Ngưng. Thực Tâm Lộ khi vào miệng không màu không mùi, nhưng lại có thể thẩm thấu vào thần hồn.\n[Chỉ Nam AI] Vân Sương Ngưng không lâu sau sẽ cảm thấy tâm trí dao động rõ rệt, phòng tuyến vốn kiên cố dường như bị ăn mòn trong vô hình. Nàng có thể sẽ sinh nghi——tại sao mình đột nhiên trở nên như vậy... không phòng bị? Đồng thời, một tia cảm giác không tín nhiệm khó tả nổi lên trong đáy lòng. Miêu tả quá trình này, không đề cập đến chỉ số.',Định_Tâm_Phù:()=>'【Sử Dụng Đạo Cụ】{{user}} dán một đạo Định Tâm Phù ở chỗ khuất ngoài cửa, sau khi phù văn sáng lên thì hóa thành vô hình.\n[Chỉ Nam AI] Miêu Quảng sẽ cảm thấy trong lòng vô cớ bình định lại một trận, sự bất an và nghi ngờ lờ mờ vốn có dường như bị một bàn tay vô hình vuốt phẳng. Hắn sẽ không ý thức được đây là hiệu quả của bùa chú.',Hỗn_Độn_Châu:()=>'【Sử Dụng Đạo Cụ】{{user}} kích hoạt Hỗn Độn Châu, một trận gợn sóng vô hình từ trong châu khuếch tán ra, chuyên tác dụng lên phần "tận mắt nhìn thấy" trong ký ức.\n[Chỉ Nam AI] Miêu Quảng bắt đầu trở nên mơ hồ đối với những hình ảnh tận mắt chứng kiến trước đó——hắn vẫn nhớ ngày hôm đó đã xảy ra chuyện gì, nhưng các chi tiết giống như bị nước rửa qua dần dần mờ đi, bắt đầu nghi ngờ có phải mình đã nhìn nhầm rồi không.',Thần_Hồn_Cộng_Minh_Thạch:()=>'【Sử Dụng Đạo Cụ】{{user}} lấy ra một viên cộng minh thạch phát sáng ôn nhuận trong không gian thần hồn. Viên đá lơ lửng giữa hai người, tỏa ra vầng sáng màu vàng dịu nhẹ, thần thức của hai bên trong khoảnh khắc này có sự giao thoa ở tầng sâu hơn——nàng cảm nhận được một thứ gì đó thuần túy trong ý thức của {{user}}.\n[Chỉ Nam AI] Miêu tả khoảnh khắc Vân Sương Ngưng cảm nhận được tâm ý của {{user}} trong sự cộng hưởng ngắn ngủi, sự tín nhiệm của nàng tăng lên trong vô thức. Quá trình này tự nhiên mà không đường đột.',Neo_Thần_Đinh:()=>'【Sử Dụng Đạo Cụ】{{user}} đóng xuống một chiếc Neo Thần Đinh tại cốt lõi của không gian thần hồn, linh văn khắc vào bản nguyên không gian.\n[Chỉ Nam AI] Neo Thần Đinh có hiệu lực——Vân Sương Ngưng không thể ngắt kết nối thần hồn, cho dù kháng cự thế nào cũng không thể xua đuổi {{user}} khỏi không gian thần hồn. Miêu tả sự thay đổi vi diệu do không gian sinh ra sau khi đóng đinh.',Ảnh_Xước_Sa_Liêm:()=>'【Sử Dụng Đạo Cụ】{{user}} đổi màn che ở cửa thành Ảnh Xước Sa Liêm. Linh sa bán trong suốt rủ xuống, từ bên ngoài nhìn vào chỉ có thể thấy đường nét bóng dáng mờ ảo trong phòng——hình bóng của động tác, nhưng không nhìn rõ bất kỳ chi tiết nào.\n[Chỉ Nam AI] Miêu Quảng nếu ở ngoài cửa, chỉ có thể nhìn thấy bóng đen đang chuyển động——không nhìn rõ là động tác gì, kiểu tra tấn nhìn thấy được nhưng không nhìn rõ này còn đáng sợ hơn cả việc nhìn rõ hoàn toàn. Trí tưởng tượng sẽ lấp đầy mọi khoảng trống.',Thấu_Linh_Màn:()=>'【Sử Dụng Đạo Cụ】{{user}} đổi màn che thành Thấu Linh Màn. Từ bên ngoài nhìn vào, mọi thứ trong phòng hiện ra rõ mồn một——mà người trong phòng lại hoàn toàn không hay biết.\n[Chỉ Nam AI] Miêu Quảng nếu ở ngoài cửa, có thể nhìn thấy hoàn toàn rõ ràng từng hình ảnh và chi tiết trong phòng. Đây là nhìn xuyên thấu một chiều——Vân Sương Ngưng không biết mình đang bị nhìn rõ mồn một.',Cách_Âm_Linh_Trận:()=>'【Sử Dụng Đạo Cụ】{{user}} bố trí Cách Âm Linh Trận xung quanh căn phòng. Sau khi trận pháp kích hoạt, tiếng người trong phòng bị che chắn hoàn toàn——nhưng chấn động vật lý không thể cách tuyệt hoàn toàn, tiếng cọt kẹt của giường vẫn sẽ lọt ra ngoài.\n[Chỉ Nam AI] Miêu Quảng nếu ở ngoài cửa, không nghe thấy bất kỳ tiếng người nào, nhưng có thể nghe thấy tiếng chấn động vật lý có nhịp điệu. Càng yên tĩnh, những âm thanh yếu ớt đó càng rõ ràng——trí tưởng tượng sẽ đáng sợ hơn cả hiện thực.',Tịnh_Linh_Linh:()=>'【Sử Dụng Đạo Cụ】{{user}} treo một chiếc chuông linh văn lên trên khung cửa, khẽ lắc là có thể triệu hoán Miêu Quảng đến chăm sóc phu nhân.\n[Chỉ Nam AI] Chuông đã treo xong. Sau này khi người chơi sử dụng chức năng "Lắc chuông", Miêu Quảng sẽ vào phòng chăm sóc Vân Sương Ngưng.',__Tịnh_Linh_Linh__:()=>'[Tịnh Linh Linh·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là đoạn cảnh một lần {{user}} lắc vang Tịnh Linh Linh, **triệu hoán Miêu Quảng vào phòng xem xét Vân Sương Ngưng**.\nCốt lõi: **Miêu Quảng tiến vào → Xử lý theo tâm thái hiện tại → Cuối vòng này bắt buộc phải rời đi, không ở lại liên tục**.\n\n▍Sự thật tình huống tất nhiên thành lập\n- Miêu Quảng nghe thấy tiếng chuông thì tiến vào phòng (Dưới tâm thái nửa sau, hắn có thể đã đợi sẵn ngoài cửa)\n- Miêu Quảng không thể cảm nhận được Tịnh Linh Linh hay bất kỳ đạo cụ nào, chỉ có thể nhìn thấy môi trường tự nhiên và trạng thái của con người\n- Lần dừng lại này có hạn, cuối vòng này Miêu Quảng bắt buộc phải rời khỏi phòng\n\n▍Tham chiếu giọng điệu phản ứng (AI tự chủ tổng hợp theo tâm thái Miêu Quảng trong data card)\n- Nửa đầu (Bình thường/Nghi hoặc/Phát giác): Quan tâm thông thường, không gặng hỏi quá mức\n- Nửa sau (Khuất phục/Mặc nhận/Trầm luân): Cường độ phản ứng và mức độ chủ động sâu thêm từng bậc, thái độ của hắn đã đang xảy ra sự thay đổi căn bản\n\n▍Tham chiếu độ dài\n- Nửa đầu khoảng 100-150 chữ góc nhìn Miêu Quảng\n- Nửa sau khoảng 300-350 chữ hoạt động tâm lý Miêu Quảng\n\n▍Tuyệt đối cấm\n- ✗ Cấm xuất hiện "Linh trận" / "Tịnh Linh Linh" / Tên đạo cụ cụ thể / Thuật ngữ hệ thống\n- ✗ Cấm Miêu Quảng tiếp tục ở lại trong phòng (Cuối vòng này bắt buộc phải rời đi, các vòng sau không có mặt)\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm viết thay đổi chỉ số',__Bán_Lưu_Ảnh_Thạch_Mặc_Nhận__:()=>'【Miêu Quảng Xem Lưu Ảnh Thạch】{{user}} giao một khối Lưu Ảnh Thạch cho Miêu Quảng. Khối Lưu Ảnh Thạch này đã ghi lại quá trình trị liệu giữa {{user}} và Vân Sương Ngưng——những hình ảnh thân mật, mờ ám, thậm chí vượt quá giới hạn đó, tất cả đều được ghi lại một cách trung thực.\nMiêu Quảng im lặng nhận lấy, linh thức thăm dò vào. Hình ảnh mở ra trước mắt hắn, hắn đã nhìn thấy tất cả.\n\n[Chỉ Nam AI] Trọng điểm miêu tả sự chấn động tâm lý và phản ứng của Miêu Quảng khi xem hình ảnh Lưu Ảnh Thạch. Người mua là Miêu Quảng, linh thạch chỉ là vật trung gian trao đổi, cốt lõi của cảnh này là Miêu Quảng tận mắt chứng kiến đoạn video vợ mình tương tác thân mật với người khác.\n- Hắn đã mặc nhận hiện trạng, nhưng "Biết đã xảy ra chuyện gì" và "Tận mắt nhìn thấy toàn bộ quá trình" là sự chấn động hoàn toàn khác nhau\n- Hắn im lặng xem hết toàn bộ quá trình, không tắt giữa chừng, cũng không từ chối\n- Xem xong hắn cất Lưu Ảnh Thạch vào trong tay áo——hắn đã giữ nó lại, chứ không phải tiêu hủy\n- Sau đó Miêu Quảng sẽ nhiều lần xem khối Lưu Ảnh Thạch này khi ở một mình, lén lút thủ dâm. Đây là sự sa đọa mà hắn không muốn đối mặt nhưng không thể kháng cự\nMiêu tả biểu cảm và sự im lặng của hắn trong toàn bộ quá trình nhận lấy, xem, cất đi. Không xuất hiện bất kỳ thuật ngữ hệ thống đạo cụ nào, không đặt trọng tâm vào việc giao dịch linh thạch.\n【Quan Trọng】Lần giao nhận này là đoạn cảnh một lần. Miêu Quảng sau khi cất Lưu Ảnh Thạch bắt buộc phải rời đi. Các vòng sau trừ phi người chơi bán Lưu Ảnh Thạch lần nữa, nếu không Miêu Quảng không có mặt, AI không được miêu tả Miêu Quảng có mặt.',__Bán_Lưu_Ảnh_Thạch_Trầm_Luân__:()=>'【Miêu Quảng Tìm Mua Lưu Ảnh Thạch】Miêu Quảng chủ động tìm đến {{user}}, thấp giọng hỏi xem có Lưu Ảnh Thạch mới không. Trong Lưu Ảnh Thạch ghi lại quá trình trị liệu của {{user}} và Vân Sương Ngưng——những hình ảnh thân mật, mờ ám, vượt quá giới hạn đó. Miêu Quảng đã chìm đắm vào việc xem những ghi chép này.\nThái độ của hắn cung kính, thậm chí mang theo sự mong đợi và khát cầu lờ mờ.\n\n[Chỉ Nam AI] Trọng điểm miêu tả trạng thái tâm lý của Miêu Quảng khi tìm mua Lưu Ảnh Thạch. Người mua là Miêu Quảng, linh thạch chỉ là vật trung gian trao đổi, cốt lõi của cảnh này là Miêu Quảng đã nghiện việc nhìn trộm đoạn video vợ mình thân mật với người khác.\n- Hắn không còn che giấu nhu cầu này nữa——hắn cần những ghi chép này\n- Hắn sẽ nhiều lần xem những Lưu Ảnh Thạch này, một mình xem trong đêm khuya vắng người, vừa xem vừa thủ dâm\n- Điều này đã trở thành nghi thức bí mật của hắn, hắn đạt được khoái cảm méo mó trong hình ảnh vợ bị người khác chiếm hữu\n- Hắn chủ động trả nhiều linh thạch hơn, trong giọng điệu có ý cầu xin\nMiêu tả tư thế và ánh mắt của hắn khi tìm mua. Không xuất hiện bất kỳ thuật ngữ hệ thống đạo cụ nào, không đặt trọng tâm vào việc giao dịch linh thạch.\n【Quan Trọng】Lần giao nhận này là đoạn cảnh một lần. Miêu Quảng sau khi lấy được Lưu Ảnh Thạch bắt buộc phải rời đi. Các vòng sau trừ phi người chơi bán Lưu Ảnh Thạch lần nữa, nếu không Miêu Quảng không có mặt, AI không được miêu tả Miêu Quảng có mặt.',Nhũ_Giáp:()=>'【Sử Dụng Đạo Cụ】{{user}} kẹp một cặp nhũ giáp linh ngân lên đầu vú của Vân Sương Ngưng, lực kẹp vừa phải nhưng liên tục.\n[Chỉ Nam AI] Miêu tả phản ứng khoảnh khắc kẹp nhũ giáp lên và sự kích thích liên tục——mỗi một lần hít thở, mỗi một lần di chuyển đều sẽ kéo theo sự kẹp chặt. Trong các miêu tả sau này phải liên tục thể hiện sự tồn tại của nhũ giáp.',Hậu_Môn_Tắc:()=>'【Sử Dụng Đạo Cụ】{{user}} đưa một viên hậu môn tắc linh ngọc ôn nhuận vào huyệt sau của Vân Sương Ngưng. Cảm giác lấp đầy lập tức tràn ngập.\n[Chỉ Nam AI] Miêu tả quá trình hậu môn tắc vào cơ thể và cảm giác lấp đầy liên tục——tư thế ngồi sẽ trở nên khác thường, khi đi lại càng rõ ràng hơn. Sau này phải liên tục thể hiện sự tồn tại của hậu môn tắc.',Máy_Rung:()=>'【Sử Dụng Đạo Cụ】{{user}} đưa một chiếc máy rung dẫn động bằng linh lực vào trong cơ thể Vân Sương Ngưng, sự rung động liên tục bắt đầu.\n[Chỉ Nam AI] Miêu tả phản ứng khoảnh khắc máy rung khởi động——sự rung động liên tục không ngừng khiến nàng khó lòng áp chế phản ứng cơ thể. Sau này phải liên tục thể hiện sự tồn tại của sự rung động, phòng tuyến của nàng sẽ vì thế mà giảm sút nhanh chóng.',Khẩu_Gia:()=>'【Sử Dụng Đạo Cụ】{{user}} cố định một chiếc khẩu gia vào miệng Vân Sương Ngưng, chống mở khoang miệng của nàng.\n[Chỉ Nam AI] Miêu tả quá trình đeo khẩu gia——sau khi khoang miệng bị chống mở chỉ có thể phát ra âm thanh mơ hồ không rõ, nước bọt chảy ra không kiểm soát được. Sau này tất cả các cuộc đối thoại đều phải thể hiện trạng thái nói chuyện mơ hồ.',Phược_Linh_Đoạn:()=>'【Sử Dụng Đạo Cụ】{{user}} dùng Phược Linh Đoạn trói buộc Vân Sương Ngưng——dải lụa linh mềm mại quấn quanh thân thể, cố định tư thế của nàng.\n[Chỉ Nam AI] Miêu tả quá trình trói buộc và trạng thái sau khi bị trói buộc——nàng không thể tự chủ di chuyển, chỉ có thể duy trì tư thế bị cố định. Sau này phải thể hiện trạng thái trói buộc.', Bịt_Mắt:()=>'【Sử Dụng Đạo Cụ】{{user}} dùng bịt mắt linh ti che hai mắt Vân Sương Ngưng, thị giác bị tước đoạt hoàn toàn.\n[Chỉ Nam AI] Miêu tả khoảnh khắc mất đi thị giác——trong bóng tối các giác quan còn lại phóng đại kịch liệt. Xúc giác, thính giác, khứu giác đều trở nên nhạy bén khác thường, bất kỳ kích thích nhỏ bé nào cũng bị phóng đại gấp bội. Sau này phải thể hiện sự quá tải giác quan do việc tước đoạt thị giác mang lại.',Vòng_Cổ:()=>'【Sử Dụng Đạo Cụ】{{user}} cài một chiếc vòng cổ linh văn lên chiếc cổ thon thả của Vân Sương Ngưng. Tiếng lạch cạch khi vòng cổ khép lại vang lên đặc biệt rõ ràng trong căn phòng yên tĩnh.\n[Chỉ Nam AI] Miêu tả ý nghĩa tượng trưng khi đeo vòng cổ lên——đây không phải là trang sức bình thường, mà là dấu ấn của quan hệ chi phối và phục tùng. Phản ứng của Vân Sương Ngưng khi cảm nhận được vòng kim loại hơi lạnh trên cổ. Sau này phải liên tục thể hiện sự tồn tại của vòng cổ.',Noãn_Ngọc_Bội:()=>'【Sử Dụng Đạo Cụ】{{user}} đeo một miếng noãn ngọc bội ôn nhuận sát người Vân Sương Ngưng, liên tục tỏa ra hơi nóng thuần dương.\n[Chỉ Nam AI] Vân Sương Ngưng sẽ cảm nhận được sự ấm áp liên tục——không nóng rực, chỉ ôn nhuận như mùa xuân. Sự ấm áp liên tục này sẽ kéo gần sự tín nhiệm của nàng đối với {{user}} trong vô thức.',Phong_Hung_Linh_Nhũ_Đan_Trung:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra Phong Hung Linh Nhũ Đan·Trung phẩm, linh đan hóa thành ánh sáng thấm vào ngực Vân Sương Ngưng.\n[Chỉ Nam AI] Miêu tả toàn bộ quá trình hiệu quả linh đan phát huy——ngực của nàng dưới tác dụng của linh lực từ từ phồng lên đầy đặn, cuối cùng định hình ở cúp E. Miêu tả phản ứng của nàng khi cảm nhận được sự thay đổi của cơ thể——đây là sự cải tạo không thể đảo ngược.',Phong_Hung_Linh_Nhũ_Đan_Đại:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra Phong Hung Linh Nhũ Đan·Đại phẩm, linh lực nồng đậm hơn tràn vào.\n[Chỉ Nam AI] Miêu tả quá trình ngực tiếp tục đầy đặn đến cúp G——sức nặng trĩu xuống, y phục trở nên căng chặt, sự rung lắc rõ rệt khi hành động. Miêu tả phản ứng của nàng đối với sự thay đổi này.',Phong_Hung_Linh_Nhũ_Đan_Cực:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra Phong Hung Linh Nhũ Đan·Cực phẩm, linh lực chí cường rót vào.\n[Chỉ Nam AI] Miêu tả quá trình cải tạo ngực đến cúp H——sự đầy đặn khoa trương, nặng nề đến mức ảnh hưởng hành động, bất kỳ y phục nào cũng khó lòng bao bọc hoàn toàn. Đây là sự cải tạo tột cùng. Miêu tả phản ứng của nàng.',Phong_Đồn_Viên_Ngọc_Đan:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra Phong Đồn Viên Ngọc Đan, linh lực thấm vào mông.\n[Chỉ Nam AI] Miêu tả quá trình mông đầy đặn hóa——cặp mông vốn thanh mảnh trở nên tròn trịa căng mọng, đường nét trở nên cực kỳ đẫy đà. Miêu tả phản ứng của nàng khi cảm nhận được sự thay đổi.',Nhũ_Hoàn:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra một cặp nhũ hoàn linh văn tinh xảo, chuẩn bị xỏ khuyên cho Vân Sương Ngưng.\n[Chỉ Nam AI] Miêu tả toàn bộ quá trình xỏ khuyên——khoảnh khắc kim đâm xuyên qua đầu vú, tiếng vang nhẹ khi khuy cài khép lại, độ nhạy cảm bị phóng đại gấp bội sau mỗi lần chạm vào sau đó. Đây là sự cải tạo vĩnh viễn.',Âm_Hoàn:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra một chiếc âm hoàn linh văn tinh xảo.\n[Chỉ Nam AI] Miêu tả toàn bộ quá trình xỏ khuyên——độ nhạy cảm tăng lên kịch liệt sau khi âm đế bị xỏ khuyên. Sau đó bất kỳ sự ma sát nhỏ bé, đi lại, thậm chí sự chạm vào của vải vóc đều sẽ mang đến sự kích thích khó lòng phớt lờ. Cải tạo vĩnh viễn.',Khẩu_Trang_Dương_Vật:()=>'【Sử Dụng Đạo Cụ】{{user}} lấy ra một chiếc khẩu trang có vẻ ngoài như khăn che mặt bình thường, nhưng mặt trong có một cây dương vật ngưng tụ từ linh lực. Sau khi đeo dương vật sẽ liên tục lấp đầy khoang miệng.\n[Chỉ Nam AI] Miêu tả quá trình đeo——khoảnh khắc khăn che mặt cài lên, dương vật mặt trong trượt vào miệng lấp đầy khoang miệng. Nhìn từ bên ngoài chỉ là một chiếc khăn che mặt trang nhã, nhưng mỗi giờ mỗi khắc nàng đều đang ngậm đồ vật. Nói chuyện cần phải cực lực kiểm soát mới có thể miễn cưỡng rõ ràng, bất kỳ sự buông lỏng nào cũng sẽ trở nên mơ hồ. Sau này phải liên tục thể hiện sự tồn tại của khẩu trang.',Thể_Chất_Ahegao:()=>'【Tính Phích Thức Tỉnh】Một luồng linh lực kỳ dị tràn vào trong cơ thể Vân Sương Ngưng, khắc xuống dấu ấn không thể đảo ngược ở mút thần kinh của nàng.\n[Chỉ Nam AI] Miêu tả khoảnh khắc thức tỉnh——cơ thể nàng đã xảy ra một sự thay đổi mang tính căn bản nào đó. Sau này mỗi khi cao trào, biểu cảm của nàng sẽ sụp đổ không kiểm soát được——trợn trắng mắt, thè lưỡi, nước bọt mất kiểm soát. Đây không phải là điều nàng có thể lựa chọn, mà là phản ứng bản năng của cơ thể. Miêu tả sự kinh hãi của nàng khi lần đầu tiên cảm nhận được sự thay đổi này.',Thể_Chất_Phun_Trào:()=>'【Tính Phích Thức Tỉnh】Linh lực đã cải tạo một cấu tạo nào đó trong cơ thể Vân Sương Ngưng, khiến nàng có được phản ứng mà trước đây không thể có.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này kích thích cường độ cao sẽ kích hoạt phản ứng phun dịch, lượng chất lỏng vượt xa người thường. Miêu tả sự bối rối và xấu hổ của nàng khi lần đầu tiên cảm nhận được sự thay đổi trong cơ thể.',Thể_Chất_Sữa_Mẹ:()=>'【Tính Phích Thức Tỉnh】Một luồng linh lực ấm áp tràn vào ngực Vân Sương Ngưng, để lại sự thay đổi vĩnh viễn trong tuyến vú.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi ngực bị kích thích sẽ tiết ra linh nhũ. Nếu kết hợp với nhũ giáp hoặc cải tạo phong hung, hiệu quả càng rõ rệt hơn. Miêu tả phản ứng của nàng khi cảm thấy ngực khác thường.',Sở_Thích_Lộ_Ra:()=>'【Tính Phích Thức Tỉnh】Một sự hưng phấn nguy hiểm được cấy vào nhận thức của Vân Sương Ngưng——việc "có thể bị nhìn thấy" trở nên khiến người ta phấn khích.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này trong những cảnh có nguy cơ bị nhìn thấy (ngoài cửa có người, Thấu Linh Màn kích hoạt v.v.), mức độ hưng phấn của nàng sẽ tăng lên gấp bội. Miêu tả sự kinh hãi của nàng khi lần đầu tiên phát giác ra sự hưng phấn khác thường này.',Khoái_Cảm_Bị_Cắm_Sừng:()=>'【Tính Phích Thức Tỉnh】Một mạch khoái cảm cực kỳ nguy hiểm được thiết lập——sự tồn tại của Miêu Quảng trở thành chất xúc tác của sự hưng phấn.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi Miêu Quảng biết chuyện hoặc có mặt, sự hưng phấn của Vân Sương Ngưng sẽ tăng gấp đôi. Chồng chứng kiến vợ thân mật với người khác——bản thân hình ảnh này đã có thể khiến cơ thể nàng sinh ra phản ứng mãnh liệt. Miêu tả cảm giác tội lỗi và khoái cảm không thể ức chế do sự thức tỉnh này mang lại.',Thể_Chất_Ohoho:()=>'【Tính Phích Thức Tỉnh】Một luồng linh lực yêu dã đã viết lại trung khu ngôn ngữ và nhận thức tự sự của Vân Sương Ngưng——sau này thế giới của nàng bị bao trùm bởi văn ngôn dâm dật nhục dục.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này phong cách tự sự tổng thể chuyển sang thể văn ngôn dâm dật nhục dục. Tiếng rên rỉ của Vân Sương Ngưng biến thành tiếng rên rỉ đặc trưng như "Ohoho❤️", văn phong trở nên hoa lệ dâm mĩ. Miêu tả sự chấn động của nàng khi lần đầu tiên phát ra âm thanh này.',Dâm_Ngữ_Lẳng_Lơ:()=>'【Tính Phích Thức Tỉnh】Một sự ô nhiễm nào đó đã thấm vào trung khu ngôn ngữ của Vân Sương Ngưng——thói quen dùng từ được dưỡng thành từ ba trăm năm tu hành đang bị những từ ngữ dâm ô hạ lưu nhất ghi đè.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——nàng dùng giọng điệu đoan trang thường ngày nghiêm túc nói xong một câu trọn vẹn, nói xong im lặng một lát, phát lại trong đầu nội dung mình vừa nói một lần——sau đó biểu cảm hoàn toàn sụp đổ. Sự thay thế ở cấp độ từ vựng: Tự xưng biến thành xưng hô dâm tiện, một danh từ nào đó bị thay thế thành từ chỉ cơ quan sinh dục, cả câu đúng ngữ pháp, giọng điệu nghiêm túc, nhưng ý nghĩa đã hoang đường đến cực điểm. Miêu tả sự kinh hãi sụp đổ của nàng khi ngẫm nghĩ lại ý nghĩa của cả câu, và sự tuyệt vọng khi nàng ý thức được đây không phải là lỗi lầm ngẫu nhiên mà là sự bắt đầu không thể kiểm soát. (Hướng tham khảo, không sao chép: Ví dụ nghiêm túc nói ra "{{user}} chớ có tưởng dương vật lớn là có thể ăn nói ngông cuồng với bổn kỹ nữ", nói xong mới ý thức được trong câu đó có cái gì——AI tự do phát huy cảnh thức tỉnh lần đầu, không cần bê nguyên ví dụ này.)',Hành_Vi_Gian_Dâm_Lén_Lút:()=>'【Tính Phích Thức Tỉnh】Một sự bốc đồng nguy hiểm được cấy vào ý thức của Vân Sương Ngưng——khi có người thứ ba ở đó, nàng ngược lại muốn làm những chuyện quá đáng hơn.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi có người thứ ba ở đó (đặc biệt là Miêu Quảng), nàng sẽ chủ động ám thị hoặc phối hợp lén lút tiến hành hành vi tình dục. Nguy cơ bị phát hiện không phải là lực cản mà là chất xúc tác. Miêu tả sự kinh hãi và mâu thuẫn của nàng khi sự bốc đồng này xuất hiện lần đầu tiên.',Sở_Thích_Uống_Nước_Tiểu:()=>'【Tính Phích Thức Tỉnh】Một sự khát khao khó mở miệng được khắc vào ý thức tầng sâu của Vân Sương Ngưng——sự khát khao bản năng đối với chất bài tiết của {{user}}.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sẽ sinh ra sự khát khao đối với nước tiểu của {{user}}, sẽ bất giác chủ động đòi hỏi hoặc ám thị. Đây là sự sỉ nhục tột cùng đối với tu sĩ thanh cao ba trăm năm, nhưng nàng không thể áp chế sự bốc đồng này. Miêu tả sự sụp đổ của nàng khi ý thức được sự khát khao của mình.',Tình_Mẹ_Tràn_Lan:()=>'【Tính Phích Thức Tỉnh】Nhận thức của Vân Sương Ngưng đối với {{user}} bị viết lại vĩnh viễn——một bản năng làm mẹ bị cưỡng ép cấy vào.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sẽ bất giác coi {{user}} như đứa trẻ cần được chăm sóc, dùng tư thế của người mẹ chủ động bú mớm, ôm ấp, dẫn dắt. Sự đan xen giữa uy nghi chưởng môn và sự dịu dàng của tình mẹ tạo ra sự tương phản kỳ dị. Miêu tả sự bối rối của nàng khi lần đầu tiên sinh ra sự bốc đồng này.',Sở_Thích_Liếm_Hậu_Môn:()=>'【Tính Phích Thức Tỉnh】Một sự khát khao xấu hổ đến cực điểm được cấy vào trong cơ thể Vân Sương Ngưng——sự khát cầu bản năng đối với hành vi liếm hậu môn.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sẽ sinh ra sự khát khao mãnh liệt đối với hành vi liếm hậu môn, sẽ bất giác chủ động đòi hỏi hoặc ám thị. Chưởng môn thanh lãnh ba trăm năm khát khao làm chuyện này——bản thân nhận thức này chính là sự sỉ nhục lớn nhất. Miêu tả phản ứng của nàng khi lần đầu tiên cảm nhận được sự bốc đồng này.',Sở_Thích_Chịu_Đựng_Ngược_Đãi:()=>'【Tính Phích Thức Tỉnh】Mạch thống giác của Vân Sương Ngưng bị viết lại vĩnh viễn——đau đớn không còn chỉ là đau đớn.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi bị đánh, bị bóp, bị đối xử thô bạo, nàng sẽ sinh ra khoái cảm chứ không phải đau đớn thuần túy, thậm chí sẽ bất giác đòi hỏi kích thích đau đớn. Thân thể tu sĩ vốn nên kiên cường bất khuất, nay lại khát khao bị ban phát sự đau đớn. Miêu tả sự sợ hãi của nàng khi lần đầu tiên cảm nhận được sự thay đổi này.',Đánh_Dấu_Tinh_Dịch:()=>'【Tính Phích Thức Tỉnh】Một dục vọng quy thuộc nguyên thủy được khắc vào bản năng của Vân Sương Ngưng——tinh dịch trở thành dấu ấn quy thuộc mà nàng khát khao.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng khát khao bị tinh dịch dính đầy cơ thể, sẽ kháng cự việc lau chùi, coi tinh dịch là sự đánh dấu của {{user}} đối với nàng. Thân thể chưởng môn bị đánh dấu——bản thân hình ảnh này chính là sự đảo lộn đối với thân phận của nàng. Miêu tả phản ứng của nàng khi lần đầu tiên sinh ra sự khát khao này.',Thể_Chất_Khẩu_Nô:()=>'【Tính Phích Thức Tỉnh】Khoang miệng của Vân Sương Ngưng bị cải tạo thành vùng khoái cảm nhạy cảm khác thường——sinh ra sự ỷ lại đối với khẩu giao và khẩu giao sâu.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi miệng rảnh rỗi nàng sẽ cảm thấy trống rỗng, bất giác chủ động tiến lại gần {{user}}. Khoang miệng biến thành nơi nàng khát khao được lấp đầy nhất. Miêu tả sự bối rối của nàng khi lần đầu tiên phát giác ra cảm giác trống rỗng trong khoang miệng.',Sở_Thích_Giao_Cấu_Hậu_Môn:()=>'【Tính Phích Thức Tỉnh】Huyệt sau của Vân Sương Ngưng bị cải tạo——một bộ phận vốn không nên sinh ra khoái cảm, nay lại trở thành ngọn nguồn của sự khát khao.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sinh ra khoái cảm và sự khát khao đối với giao cấu hậu môn, sẽ bất giác chủ động ám thị nhu cầu của huyệt sau. Đây là sự sa đọa thầm kín nhất, nàng thậm chí không dám thừa nhận sự khát khao của mình. Miêu tả sự chấn động của nàng khi lần đầu tiên cảm nhận được khoái cảm từ huyệt sau.',Nhận_Thức_Vật_Hóa:()=>'【Tính Phích Thức Tỉnh】Nhận thức tự ngã của Vân Sương Ngưng đã xảy ra sự vặn vẹo mang tính căn bản——nàng không còn cho rằng mình là "người", mà là vật sở hữu của {{user}}.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sẽ chủ động tự xưng là đồ vật, coi mình là vật phẩm/đạo cụ tư hữu của {{user}}. Thân phận chưởng môn ba trăm năm, tôn nghiêm tu sĩ, nhân cách độc lập——tất cả đều vỡ vụn trong khoảnh khắc này. Miêu tả trạng thái của nàng khi lần đầu tiên tự xưng là đồ vật.',Si_Nữ_Hóa:()=>'【Tính Phích Thức Tỉnh】Tư thế bị động ba trăm năm qua của Vân Sương Ngưng bị viết lại vĩnh viễn——dục vọng chủ động tấn công thay thế cho sự rụt rè.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng sẽ bất giác dụ dỗ, chủ động nhào lên {{user}}. Từ bị động tiếp nhận đến chủ động đòi hỏi, bản thân sự chuyển biến này chính là sự sa đọa tầng sâu nhất. Miêu tả sự kinh ngạc và mâu thuẫn của nàng khi lần đầu tiên sinh ra sự bốc đồng chủ động tấn công.',Viết_Lên_Cơ_Thể:()=>'【Tính Phích Thức Tỉnh】Một sự khát khao bị đánh dấu được cấy vào ý thức của Vân Sương Ngưng——nàng khát khao cơ thể mình trở thành bức tranh của {{user}}.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng khát khao được viết dâm văn hoặc chữ đánh dấu lên người, coi đó là chứng minh quy thuộc. Thân thể chưởng môn bị viết đầy dâm từ——bản thân việc nàng khát khao chuyện này chính là sự sa đọa tột cùng. Miêu tả phản ứng của nàng khi lần đầu tiên sinh ra sự khát khao này.',Khoái_Cảm_Ngạt_Thở:()=>'【Tính Phích Thức Tỉnh】Mạch khoái cảm của Vân Sương Ngưng bị viết lại——hô hấp bị hạn chế trở thành bộ khuếch đại khoái cảm.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này khi bị bóp cổ hoặc hô hấp bị hạn chế, khoái cảm sẽ tăng gấp bội. Nàng sẽ bất giác chủ động dẫn dắt {{user}} bóp cổ mình. Ranh giới giữa sự sống và cái chết trở thành nguồn gốc của khoái cảm——ba trăm năm tu hành chưa từng tiếp cận sự cám dỗ của cái chết như vậy.',Mặt_Nạ_Tinh_Dịch:()=>'【Tính Phích Thức Tỉnh】Một sự khát khao bị đánh dấu lên mặt được khắc vào bản năng của Vân Sương Ngưng——khuôn mặt thanh lãnh như sương đó khát khao bị che phủ.\n[Chỉ Nam AI] Miêu tả sự thức tỉnh——sau này nàng khát khao bị bắn lên mặt, khi sắp cao trào sẽ chủ động yêu cầu bắn lên mặt. Khuôn mặt khiến người ta kính sợ đó của chưởng môn——nàng khát khao nó bị tinh dịch che phủ. Miêu tả phản ứng của nàng khi lần đầu tiên sinh ra sự khát khao này.',Khắc_Ấn_Dâm_Văn_Eo_Bụng:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra linh khí khắc ấn, khắc xuống một đạo dâm văn ở eo bụng Vân Sương Ngưng. Linh văn hơi nhấp nhô theo nhịp thở của nàng.\n[Chỉ Nam AI] Miêu tả quá trình dâm văn khắc vào eo bụng——linh văn nóng rực thấm vào da thịt, cuối cùng hóa thành một đường vân lúc ẩn lúc hiện. Khi hưng phấn dâm văn sẽ lờ mờ phát sáng. Trong các miêu tả sau này phải thể hiện sự tồn tại của dâm văn eo bụng.',Khắc_Ấn_Dâm_Văn_Trước_Ngực:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra linh khí khắc ấn, khắc xuống một đạo dâm văn ở trước ngực Vân Sương Ngưng. Linh văn chiếm cứ giữa hai bầu ngực, yêu dã đến cực điểm.\n[Chỉ Nam AI] Miêu tả quá trình dâm văn khắc vào trước ngực——linh văn từ từ nổi lên trên ngực, đường vân tinh xảo đặc biệt bắt mắt trên làn da trắng nõn. Khi hưng phấn dâm văn sẽ lờ mờ phát sáng. Trong các miêu tả sau này phải thể hiện sự tồn tại của dâm văn trước ngực.',Khắc_Ấn_Dâm_Văn_Mặt_Trong_Đùi:()=>'【Nghi Thức Cải Tạo】{{user}} lấy ra linh khí khắc ấn, khắc xuống một đạo dâm văn ở mặt trong đùi Vân Sương Ngưng. Linh văn ẩn nấp ở vị trí riêng tư nhất.\n[Chỉ Nam AI] Miêu tả quá trình dâm văn khắc vào mặt trong đùi——linh văn lan tràn trên làn da mềm mại, bình thường bị y phục che khuất không ai nhìn thấy, nhưng chính nàng biết. Khi hưng phấn dâm văn sẽ lờ mờ phát sáng. Trong các miêu tả sau này phải thể hiện sự tồn tại của dâm văn mặt trong đùi.',__Sự_Chuyển_Biến_Khuất_Phục_Của_Thực_Tâm_Lộ__:()=>'[Sự Chuyển Biến Khuất Phục Của Thực Tâm Lộ·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\n▍Cách thức tiếp nối (Quan trọng——Không chuyển cảnh đường đột)\nCảnh này tiếp nối chặt chẽ với tương tác trị liệu ở phần trên, không phải là đoạn cảnh độc lập.\n- Trước tiên dùng 1-2 đoạn tiếp nối tự nhiên tự sự trị liệu trong phòng ngủ (Viết tiếp theo nhịp điệu hiện tại của trang phục/chỉ số/cảnh trong data card)\n- Trong tự sự **một cách tự nhiên** để tuyến của Miêu Quảng nổi lên: Hắn vì một cơ duyên nào đó (Đi ngang qua / Lấy đồ / Trong lòng bất an / Quan tâm bệnh tình Do AI chọn theo tình huống) đi đến gần hoặc đã ở gần phòng ngủ\n- Ống kính từ trong phòng ngủ (Vân Sương Ngưng+{{user}}) **lặng lẽ chuyển tiếp** ra ngoài cửa (Góc nhìn Miêu Quảng)——Giống như ống kính dài di chuyển ngang, không cắt cứng\n- Tránh sử dụng cảm giác phân chia chương hồi đường đột như "Đúng lúc này", cũng không dùng tiêu đề phụ/dòng trống để chia đoạn rõ ràng\n\n▍Sự bước ngoặt cần đạt được trong vòng này\nSự nghi ngờ của Miêu Quảng đối với sự khác thường trước đây là **sự bất an trừu tượng**; vòng này vì nhận được **tín hiệu thực chất** qua cánh cửa, sự bất an được xác thực thành **sự xác nhận khuất phục**——nhưng sự khuất phục bị hắn đè nén ngay tại chỗ, lựa chọn tiếp tục đóng vai "Người chồng không biết chuyện". Đây là vòng then chốt để tâm thái của hắn từ nửa đầu chuyển sang "Khuất phục".\n\n▍Tiền đề vật lý (Do AI tự nhiên đưa vào tự sự, không giải thích thuật ngữ)\n- Cách Âm Linh Trận che chắn tiếng người, nhưng không che chắn được **chấn động vật lý** của giường và **nhịp điệu** của dao động linh lực\n- Miêu Quảng với tư cách là tu sĩ Nguyên Anh kỳ, độ nhạy cảm đối với sự khác thường của dao động linh lực vượt xa người thường\n- Hắn không nghe thấy âm thanh rõ ràng, nhưng nhận được "Sự chấn động và nhịp phách không nên tồn tại"——Đủ để hắn hiểu bên trong đang làm gì\n- Không viết những lời giải thích máy móc kiểu "Linh trận xuất hiện lỗ hổng" hoặc "Thực Tâm Lộ khiến linh trận mất hiệu lực"\n\n▍Lộ trình nội tâm của Miêu Quảng (AI viết tự nhiên theo dòng tâm lý này, **Không viết thành danh sách cân nhắc/phân tích lý tính**)\nChấn động → Ngắn ngủi không dám tin → Sự đau đớn khi sự thật lắng xuống → Sự phẫn nộ gần như tuôn trào bị hắn một tay đè xuống → Tự thuyết phục (Gói ghém sự khuất phục vào trong "Đây là cách duy nhất có thể chữa khỏi cho nàng" rồi niêm phong lại)\nĐịnh hình cuối cùng: **Bề ngoài như thường, nội tâm đã khác——Hắn "Đã biết", nhưng lựa chọn "Không biết"**.\nQuá trình này phải trôi chảy tự nhiên như sự thăng trầm của tâm trạng, không triển khai từng điều thành tự sự có số thứ tự.\n\n▍Xử lý sau đó (AI tự chủ quyết định có triển khai hay không theo nhịp điệu)\n- Tùy chọn: Sau khi {{user}} rời đi, Miêu Quảng vào trong thăm hỏi; Không kiểm tra, không chất vấn, chỉ dừng lại ngắn ngủi\n- Hoặc: Trực tiếp dừng lại ở việc hắn ngồi một mình ở một nơi nào đó một lát, không làm động tác gì\n- Dù là loại nào, **Đều không bùng nổ**\n\n▍Giọng điệu\nKiềm chế / Đè nén / Nặng nề. Không viết khóc lóc, không mắng chửi xối xả, không phản ứng tay chân khoa trương.\n\n▍Độ dài Khoảng 350-550 chữ (Đoạn tiếp nối ~150 + Bước ngoặt và dòng tâm lý ~250 + Tùy chọn sau đó ~50), linh hoạt theo tình huống.\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng nhìn thấu đạo cụ cụ thể (Thực Tâm Lộ / Cách Âm Linh Trận v.v.)\n- ✗ Cấm bùng nổ ngay tại chỗ / Động dụng tu vi / Chất vấn {{user}}——Bùng nổ là tuyến Bad Ending\n- ✗ Cấm xuất hiện tên đạo cụ hoặc thuật ngữ hệ thống\n- ✗ Cấm thúc đẩy chỉ số trị liệu\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm viết gợi ý chi tiết động tác cụ thể (như "Nắm chặt nắm đấm", "Đóng cửa")——Do AI tự chủ tạo ra\n- ✗ Cấm dùng những từ cắt cứng như "Đúng lúc này" "Đột nhiên" "Cùng lúc đó" để mở đầu đoạn văn của Miêu Quảng',__Ngắt_Quãng_Trị_Liệu__:()=>'[Ngắt Quãng Trị Liệu·Bản Hiện Thực·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Miêu Quảng đẩy cửa xông vào phòng ngủ về mặt vật lý, bắt gặp Tô Mân đang trị liệu cho Vân Sương Ngưng".\nCốt lõi: **Sinh nghi không nhìn thấy——Miêu Quảng vĩnh viễn không nhìn rõ hình ảnh then chốt, thứ nhìn thấy là manh mối không phải bằng chứng thép**.\n\n▍Giọng điệu cốt lõi\n- Miêu Quảng xông vào: Nổi hứng nhất thời hoặc nghe thấy tiếng động lạ → Trực tiếp đẩy cửa, không có điềm báo\n- Tô Mân có cửa sổ che đậy ở giây cuối cùng, phán đoán mức độ hoàn thành che đậy theo độ tín nhiệm/phòng tuyến/trang phục trong data card\n- Phản ứng của Vân Sương Ngưng: Tự chủ quyết định có phối hợp hay không theo phòng tuyến tâm lý hiện tại của nàng——Phòng tuyến cao che đậy chuyên nghiệp, phòng tuyến thấp có thể hoảng loạn\n- Thứ Miêu Quảng nhìn thấy **vĩnh viễn là manh mối**: Rèm che rủ xuống / Hơi thở chưa bình ổn / Tay Tô Mân đặt ở vị trí không đúng——Không phải bằng chứng thép\n\n▍Đạo cụ cụ thể tuyệt đối không để Miêu Quảng nhìn rõ\n- Các đạo cụ cụ thể như nhũ giáp / dâm văn / khí cụ cơ thể **tuyệt đối không để Miêu Quảng nhìn rõ**\n- Chỉ viết "Miêu Quảng dường như liếc thấy thứ gì đó lóe lên rồi biến mất" / "Tô Mân kịp thời dùng ống tay áo che lại"——Miêu Quảng không nhìn rõ cụ thể là cái gì\n- Cách Âm Linh Trận / Màn che / Động tác che đậy của Vân Sương Ngưng là công cụ của AI\n\n▍Phản ứng của Miêu Quảng\n- Ngắt quãng một lần **không bùng nổ**——Chỉ sinh nghi\n- Vui lòng đọc giá trị tâm thái từ data card, tự chủ tổng hợp cường độ phản ứng, không viết chết 3 mức\n- Nửa đầu (Bình thường/Nghi hoặc/Phát giác): Tâm thái càng cao phản ứng càng sắc nhọn\n- Nửa sau (Khuất phục/Mặc nhận/Trầm luân): Có thể là lảng tránh bối rối hoặc làm như không có chuyện gì\n\n▍Cửa sổ che đậy của Tô Mân\n- Tô Mân **luôn luôn có** sự che đậy ở giây cuối cùng——Vấn đề là **mức độ hoàn thành** của sự che đậy\n- Trang phục hở hang / Đạo cụ kích hoạt nhiều / Phòng tuyến Vân Sương Ngưng thấp → Che đậy khó hơn, sơ hở nhiều hơn\n- Sơ hở cụ thể do AI tự chủ phán đoán theo data card\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng nói thẳng các từ khóa như "Gian tình/Ngoại tình" ngay tại chỗ——Vĩnh viễn là "Dường như/Lẽ nào/Sao có thể"\n- ✗ Cấm để Miêu Quảng nhìn rõ đạo cụ cụ thể\n- ✗ Cấm Miêu Quảng bùng nổ ngay tại chỗ (Tâm thái phẫn nộ là tuyến Bad Ending, không đi theo ngắt quãng)\n- ✗ Cấm thúc đẩy chỉ số trị liệu (Đã bị kịch bản đóng băng)\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm viết thay đổi chỉ số',__Ngắt_Quãng_Trị_Liệu_Thần_Hồn__:()=>'[Ngắt Quãng Trị Liệu·Bản Thần Hồn·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Miêu Quảng lay động cơ thể Vân Sương Ngưng trong phòng ngủ hiện thực, kết nối thần hồn bị cưỡng chế ngắt đứt, Tô Mân bị đẩy ra khỏi không gian thần hồn".\nCốt lõi: **Miêu Quảng vĩnh viễn không tiến vào không gian thần hồn——Hắn chỉ lay nàng ở hiện thực, nhưng đã ngắt đứt liên hệ thần hồn về mặt vật lý**.\n\n▍Giọng điệu cốt lõi\n- Miêu Quảng ở hiện thực: Đẩy cửa vào phòng ngủ, nhìn thấy Vân Sương Ngưng thần sắc hoảng hốt/trạng thái hôn mê → Bước tới lay nàng\n- Tô Mân bị đẩy ra khỏi thần hồn: Không gian thần hồn vỡ vụn đột ngột, cảm giác rối loạn khi ý thức trở về thể xác\n- Miêu tả khoảnh khắc bị đẩy ra: Góc nhìn Tô Mân "Trong đầu ong ong / Không gian vỡ vụn / Trở về thể xác" những mảnh vỡ kiểu này\n- Miêu Quảng **hoàn toàn không biết** có chuyện không gian thần hồn——Hắn chỉ biết "Vân Sương Ngưng không ổn, hắn đang lay nàng tỉnh"\n- Vân Sương Ngưng khi bị lay tỉnh mang theo tàn dư thần hồn (Đỏ ửng/Hơi thở/Lời nỉ non vô thức)——Tô Mân cần dùng "Trị liệu hoảng hốt/Minh tưởng đi sâu" để giải thích\n\n▍Sinh nghi không nhìn thấy (Tính đặc thù của bản thần hồn)\n- Thứ Miêu Quảng nhìn thấy chỉ là những manh mối kiểu "Vân Sương Ngưng hoảng hốt / Tô Mân căng thẳng"\n- Miêu Quảng **sẽ không nhìn thấy bất kỳ chuyện gì bên trong không gian thần hồn**——Thần hồn là không gian riêng tư tuyệt đối\n- Miêu Quảng có thể nghi ngờ "Bọn họ đang làm cái gì", nhưng **không thể hướng đến khái niệm "Không gian thần hồn"**\n- Vấn đề duy nhất có thể chạm đến là "Tại sao Vân Sương Ngưng lại có bộ dạng này", Tô Mân dùng cách nói kiểu "Trị liệu hoảng hốt" để che đậy\n\n▍Độ khó che đậy · Bản thần hồn cao hơn\n- Vân Sương Ngưng **không thể lập tức đối thoại bình thường**——Từ thần hồn ra trạng thái hoảng hốt cần thời gian\n- Cửa sổ che đậy của Tô Mân bị hạn chế bởi "Tốc độ hồi phục của Vân Sương Ngưng"\n- Phán đoán độ phối hợp theo độ tín nhiệm/phòng tuyến của Vân Sương Ngưng trong data card\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng tiến vào không gian thần hồn (Hắn không biết nó tồn tại)\n- ✗ Cấm Miêu Quảng nhìn thấu khái niệm "Không gian thần hồn" ngay tại chỗ\n- ✗ Cấm để Miêu Quảng nhìn rõ đạo cụ cụ thể\n- ✗ Cấm Miêu Quảng bùng nổ ngay tại chỗ\n- ✗ Cấm thúc đẩy chỉ số trị liệu\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm viết thay đổi chỉ số',__Kết_Thúc_Ngắt_Quãng__:e=>e._Ngắt_Quãng_Từ_Không_Gian_Thần_Hồn?'[Ngắt Quãng Trị Liệu·Bản Thần Hồn·Kết Thúc·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Lầu cuối cùng của việc đóng băng ngắt quãng, Miêu Quảng rời khỏi phòng Vân Sương Ngưng".\nCốt lõi: **Miêu Quảng ở trong phòng ngủ của Vân Sương Ngưng (Hắn vừa mới lay nàng tỉnh), còn thể xác Tô Mân không có mặt——\nDưới bản thần hồn Tô Mân ở "Vị trí lúc nãy khi nhập thần", không đối mặt với Miêu Quảng**.\n\n▍Cảnh chính: Miêu Quảng rời khỏi phòng Vân Sương Ngưng\n- Miêu Quảng kết thúc việc thăm hỏi, đứng dậy rời đi——Lý do do AI tự chủ tạo ra\n- Vân Sương Ngưng có thể đã từ từ hồi phục từ trạng thái hoảng hốt thần hồn (Tự chủ phán đoán theo độ tín nhiệm/phòng tuyến của nàng), hoặc vẫn giả vờ yếu ớt\n- Thần tình của Miêu Quảng khi rời đi: Tổng hợp theo tâm thái trong data card (Nghi ngờ / Làm như không có chuyện gì / Khó xử v.v.)\n- Trong phòng chỉ còn lại Vân Sương Ngưng, nàng có thể nằm yên trầm tư, hoặc gọi nhỏ {{user}} (Thần hồn đã ngắt đứt không thể kết nối)\n\n▍Góc nhìn Tô Mân (Bút pháp phụ ngắn gọn, khoảng 100-150 chữ)\n- Thể xác Tô Mân ở "Vị trí lúc nãy khi nhập thần", **Vị trí cụ thể do AI tự chủ quyết định theo tình huống**\n- Hắn biết "Kết nối thần hồn bị ngắt đứt", lặng lẽ đợi đóng băng kết thúc hoặc thao tác tiếp theo của người chơi\n- Không viết "Tô Mân và Miêu Quảng đối mặt"——Cảnh này bọn họ căn bản không gặp nhau\n\n▍Dư âm tâm thái (Phía Miêu Quảng)\n- Nửa đầu: Mang theo sự nghi ngờ "Trong này có uẩn khúc nhưng ta không nhìn rõ", hạt giống đã được gieo xuống\n- Nửa sau: Theo sự khuất phục/mặc nhận/trầm luân, dư âm từ khó xử đến làm như không có chuyện gì\n\n▍Độ dài khoảng 250-400 chữ (Cảnh chính Miêu Quảng rời đi 150-250 chữ + Bút pháp phụ Tô Mân 100-150 chữ).\n\n▍Tuyệt đối cấm\n- ✗ Cấm Tô Mân và Miêu Quảng xuất hiện trong cùng một cảnh——Cảnh này bọn họ không đối mặt\n- ✗ Cấm Miêu Quảng ở cửa đột nhiên quay đầu lại "Ta đã nhìn thấy XX"——Hắn không nhìn thấy bằng chứng thép\n- ✗ Cấm Vân Sương Ngưng nói thẳng "Thật nguy hiểm" v.v. tự để lộ sơ hở ngay tại chỗ\n- ✗ Cấm AI tự chủ để Tô Mân "Lập tức kết nối lại vào không gian thần hồn"——Kết nối lại là sự kiện độc lập do **người chơi chủ động kích hoạt**\n  (Nếu lầu tiếp theo người chơi bấm nút lối vào không gian thần hồn thì là sự kiện mới, AI không diễn tập trước trong cảnh này)\n- ✗ Cấm miêu tả chỉ số\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}':'[Ngắt Quãng Trị Liệu·Bản Hiện Thực·Kết Thúc·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh "Lầu cuối cùng của việc đóng băng ngắt quãng, Miêu Quảng tìm cớ rời khỏi phòng Vân Sương Ngưng".\nCốt lõi: **Miêu Quảng rời đi một cách tự nhiên——Hắn ở trong phòng, đứng dậy tìm lý do ra ngoài**.\n\n▍Giọng điệu cốt lõi\n- Miêu Quảng rời đi tự nhiên: "Nhớ ra có việc phải làm / Sư môn triệu hoán / Trời đã tối" v.v. lý do, AI tự chủ tạo ra\n- Bầu không khí dịu đi: Thần tình của Miêu Quảng khi rời đi có thể vẫn mang theo sự suy tư, nhưng không phải là tức giận\n- Tô Mân/Vân Sương Ngưng ngắn ngủi buông lỏng sau khi cửa đóng lại——Nhưng không biểu hiện quá mức, sợ Miêu Quảng chưa đi xa quay đầu lại\n\n▍Dư âm tâm thái\n- Nửa đầu: Miêu Quảng mang theo sự nghi ngờ "Trong này có uẩn khúc nhưng ta không nhìn rõ" đi ra ngoài, hạt giống đã được gieo xuống\n- Nửa sau: Theo mức độ khuất phục/mặc nhận/trầm luân, dư âm từ khó xử đến làm như không có chuyện gì\n\n▍Độ dài khoảng 200-400 chữ.\n\n▍Tuyệt đối cấm\n- ✗ Cấm Miêu Quảng ở cửa đột nhiên quay đầu lại "Ta đã nhìn thấy XX"——Hắn không nhìn thấy bằng chứng thép\n- ✗ Cấm Tô Mân/Vân Sương Ngưng nói thẳng "Thật nguy hiểm" v.v. tự để lộ sơ hở\n- ✗ Cấm miêu tả chỉ số\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}',Điều_Giáo_Trước_Gương:()=>'【Cảnh Đặc Biệt Bắt Đầu】Điều giáo trước gương——Một tấm linh kính đã được chuẩn bị sẵn sàng. Trong 5 vòng tiếp theo, {{user}} sẽ dẫn dắt Vân Sương Ngưng đối mặt với chính mình trong gương.',Phu_Tiền_Lăng_Nhục:()=>'【Cảnh Đặc Biệt Bắt Đầu】Phu tiền lăng nhục——Miêu Quảng đang quan sát. Trong 8 vòng tiếp theo, mọi thứ sẽ xảy ra ngay trước mắt hắn.',Tuyên_Cáo_Cướp_Vợ:()=>'【Cảnh Đặc Biệt Bắt Đầu】Tuyên cáo cướp vợ——Đã đến lúc cho Miêu Quảng biết sự thật. Trong 6 vòng tiếp theo, sự thật sẽ được hé mở.',Điều_Giáo_Nô_Lệ_Đội_Nón_Xanh:()=>'【Cảnh Đặc Biệt Bắt Đầu】Điều giáo nô lệ đội nón xanh——Miêu Quảng đã sẵn sàng tiếp nhận sự "giáo dục" mới. Trong 8 vòng tiếp theo, hắn sẽ bị cải tạo triệt để.',Chưởng_Môn_Tái_Giá:()=>'【Cảnh Đặc Biệt Bắt Đầu】Chưởng môn tái giá——Nghi thức tối thượng. Miêu Quảng sẽ đích thân chủ trì hôn lễ này. Trong 10 vòng tiếp theo, cuộc hôn nhân ba trăm năm sẽ vẽ lên dấu chấm hết, mối quan hệ mới sẽ chính thức được xác lập.',__Hướng_Dẫn_Không_Gian_Thần_Hồn__:()=>'[Hệ Thống·Hướng Dẫn Cảnh] Thái độ của Vân Sương Ngưng đối với {{user}} vừa mới nảy sinh sự thay đổi vi diệu. Vui lòng trong phản hồi của vòng này, dùng cách thức truyền âm của Vân Sương Ngưng, tự nhiên giải thích cho {{user}} những nội dung sau (Không đổ ra một cách cứng nhắc cùng một lúc, kết hợp với nhịp điệu đối thoại):\n- Ý thức của nàng bị hàn độc giam cầm, lui về phòng thủ trong không gian thần hồn\n- Bây giờ dùng cách thức truyền âm nói chuyện với {{user}} rất hao tổn tinh lực, không duy trì được quá lâu\n- Lần đầu tiên {{user}} cần chạm vào tay nàng, tập trung tâm niệm để tiến vào không gian thần hồn\n- Sau này chỉ cần tập trung tâm niệm nghĩ đến nàng, cho dù không ở bên cạnh nàng cũng có thể tiến vào\n- Ở trong không gian thần hồn có thể nói chuyện bình thường, không tốn sức\nGiọng điệu của Vân Sương Ngưng vẫn ngắn gọn kiềm chế như trước, sẽ không chủ động giải thích quá nhiều, nhưng nàng nguyện ý cho {{user}} biết phương pháp này.',__Lối_Vào_Không_Gian_Thần_Hồn__:e=>e._Đã_Vào_Không_Gian_Thần_Hồn?'【Tiến Vào Không Gian Thần Hồn Vân Sương Ngưng】':'【Lần Đầu Tiến Vào Không Gian Thần Hồn Vân Sương Ngưng】{{user}} nhẹ nhàng đặt tay lên mu bàn tay đang đặt trên bụng dưới của Vân Sương Ngưng, tập trung tâm niệm, nghĩ đến việc muốn gặp nàng. Một luồng hàn ý lan ra từ lòng bàn tay, ý thức bị một sức mạnh vô hình kéo đi——\nSương khí phả vào mặt, tinh thể băng lơ lửng trong hư không, sương mù màu trắng vô biên lan tỏa ra xung quanh. Đây không phải là nơi chân thực, nhưng lại chân thực đến mức khiến người ta nín thở.\nNàng ngồi ngay ngắn ở chỗ sâu, mái tóc trắng như thác, một bộ đạo bào màu trắng, tư thế đoan chính đúng mực, ngước mắt nhìn sang, trong đôi đồng tử màu xanh băng không có bất kỳ cảm xúc dư thừa nào.\nĐây là lần đầu tiên {{user}} nhìn thấy nàng "sống".\n[Chỉ Nam AI] Đây là lần đầu tiên {{user}} tiến vào không gian thần hồn của Vân Sương Ngưng, vui lòng miêu tả chi tiết trải nghiệm giác quan của quá trình tiến vào (Hàn ý, sương khí, tinh thể băng), sự chấn động của {{user}} khi lần đầu tiên nhìn thấy Vân Sương Ngưng tỉnh táo, cũng như hình tượng uy nghi ngồi ngay ngắn đúng mực của Vân Sương Ngưng. Nàng sẽ không nhiệt tình nghênh đón, nhưng cũng không xua đuổi, chỉ trầm tĩnh nhìn chăm chú. Nhân vật chính của cảnh này: {{user}} + Vân Sương Ngưng.',__Lối_Vào_Không_Gian_Thần_Hồn_Lạc_Thư_Tình__:()=>'【Tiến Vào Không Gian Thần Hồn Lạc Thư Tình】',__Thoát_Không_Gian_Thần_Hồn__:e=>{const n='Lạc Thư Tình'===e._Nhân_Vật_Không_Gian_Thần_Hồn_Hiện_Tại?'Lạc Thư Tình':'Vân Sương Ngưng',t=`【Thoát Không Gian Thần Hồn ${n}】`;if('Lạc Thư Tình'===n){const n=e.Lạc_Thư_Tình.Giai_Đoạn_Điều_Giáo;return`${t}${e._Cảnh_Ký_Ức_Thần_Hồn?` Cảnh Ký Ức「${e._Cảnh_Ký_Ức_Thần_Hồn}」kết thúc.`:''}\n⚠️【Vị Trí Thể Xác】Thể xác của {{user}} vẫn luôn dừng lại ở **vị trí vật lý trước khi tiến vào không gian thần hồn Lạc Thư Tình** (Chỉ có ý thức tiến vào không gian khuê phòng của Lạc Thư Tình).\nSau khi thoát ra tiếp nối tự nhiên cảnh hiện thực ban đầu theo **ngữ cảnh phần trên**——Ý thức của {{user}} rút khỏi không gian của nàng → Mở mắt nhìn thấy môi trường vật lý lúc đó. Trước khi vào ở đâu thì trở về đó, không chuyển cảnh từ hư không.\nNếu vị trí trước khi vào trong ngữ cảnh không xác định hoặc đã lâu mờ nhạt, mặc định lót đáy là phòng ngủ Vân Sương Ngưng (Vị trí lối vào phổ biến nhất).\n\n${n<3?`⚠️ Giai đoạn hiện tại của Lạc Thư Tình ${n}<3, nàng **về mặt vật lý không ở Hàn Sương Môn**, không gian thần hồn là con đường tiếp xúc duy nhất hiện tại.\n**Tuyệt đối cấm** viết những tình tiết như {{user}} mở mắt nhìn thấy Lạc Thư Tình, Lạc Thư Tình tiễn hắn ra cửa, hai người cáo biệt ở hiện thực, Lạc Thư Tình xuất hiện ở hiện thực v.v. "Lạc Thư Tình xuất hiện trong cảnh vật lý".`:`Lạc Thư Tình giai đoạn ${n}>=3 mặc dù đã có thể xuất hiện ở hiện thực, nhưng **lúc này** nàng vẫn đang ở trong không gian khuê phòng của mình, **không ở cùng một nơi vật lý với {{user}}**. Tự sự thoát ra không nên để nàng xuất hiện trong cảnh hiện thực.`}`}return e._Cảnh_Ký_Ức_Thần_Hồn?`${t} Cảnh Ký Ức「${e._Cảnh_Ký_Ức_Thần_Hồn}」kết thúc. Trở lại hiện thực——Cách xưng hô, thân phận, bối cảnh thời đại trong ký ức đến đây là kết thúc, ${n} khôi phục thành thân phận và tự xưng của thời đại hiện tại.`:t},__Đột_Phá_Địa_Tiên_Cảnh__:()=>'[Đột Phá Địa Tiên Cảnh·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là Vân Sương Ngưng chèn vào nhắc đến **một lần** "Tu vi đột phá đến Địa Tiên cảnh, Thiên Tinh Huyễn Thuật mở khóa".\nCốt lõi: **Thuận miệng nhắc qua, không mở cảnh khác, không ngắt quãng tuyến chính cốt truyện hiện tại**.\n\n▍Sự thật bắt buộc phải nhắc đến\n- Tu vi từ chỗ bị hàn độc áp chế khôi phục đến Địa Tiên cảnh\n- Thiên Tinh Huyễn Thuật có thể sử dụng (Công cụ viết lại ký ức, dùng để đối phó Miêu Quảng)\n\n▍Ràng buộc độ dài\n- Ngắn gọn, một hai câu nhắc qua, không viết miêu tả đoạn dài\n- Sau khi chèn vào tiếp tục cốt truyện hiện tại, không chuyển cảnh\n\n▍Tham chiếu giọng điệu\n- Tự chủ tổng hợp theo dữ liệu hiện tại của Vân Sương Ngưng (Phòng tuyến tâm lý/Độ tín nhiệm/Giai đoạn trị liệu/Thái độ đối với {{user}})\n- Phán đoán mức độ hàm súc trong từ ngữ của nàng theo tâm thái hiện tại của Miêu Quảng (data card)\n\n▍Tuyệt đối cấm\n- ✗ Cấm trải đệm quá trình đột phá / Miêu tả công pháp / Chi tiết tu luyện\n- ✗ Cấm lập tức diễn dịch "Sử dụng Thiên Tinh Huyễn Thuật"——Việc sử dụng do người chơi độc lập kích hoạt\n- ✗ Cấm viết thay đổi chỉ số\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}',__Bad_Ending_Phẫn_Nộ__:()=>'[Bad Ending·Phẫn Nộ·Nguyên Tắc Tự Sự·Bắt Buộc Đọc]\n\nCảnh này là cảnh chung cuộc một lần **Miêu Quảng bùng nổ phẫn nộ sau khi xác nhận toàn bộ sự thật** (Trò chơi kết thúc).\nCốt lõi: **Miêu Quảng không còn nhẫn nhịn nữa, phẫn nộ công khai hóa, từ nay về sau không thể vãn hồi**.\n\n▍Sự thật tình huống tất nhiên thành lập\n- Miêu Quảng đã hoàn toàn xác nhận giữa {{user}} và Vân Sương Ngưng đã xảy ra chuyện vượt quá phạm trù "Trị liệu"\n- Tu vi ba trăm năm không đè nén được lửa giận, tất cả lý do nhẫn nhịn (Bệnh của phu nhân) đã không còn quan trọng nữa\n- Kết cục tất nhiên: {{user}} bị đuổi khỏi Hàn Sương Môn, trị liệu chấm dứt, Vân Sương Ngưng bị Miêu Quảng mang đi, không thể vãn hồi\n\n▍Định âm\n- Miêu Quảng là tu sĩ Nguyên Anh kỳ + Đạo lữ ba trăm năm\n- Hình thái bùng nổ (Động dụng tu vi vs Lạnh lùng tuyên án vs Khác) Do AI tự chủ quyết định tổng hợp theo tâm thái hiện tại của Miêu Quảng / Vân Sương Ngưng có mặt hay không / Tình huống\n\n▍Độ dài khoảng 300-500 chữ\n\n▍Tuyệt đối cấm\n- ✗ Cấm viết Miêu Quảng tha thứ / Hòa giải / Cho cơ hội thứ hai\n- ✗ Cấm Miêu Quảng cảm nhận được đạo cụ cụ thể (Thực Tâm Lộ / Cách Âm Linh Trận / Thiên Tinh Huyễn Thuật v.v.)\n- ✗ Cấm xuất bất kỳ lệnh SET hoặc thay đổi chỉ số nào\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}'},xn={Đêm_Tân_Hôn:'Không gian thần hồn·Cảnh ký ức: Đêm tân hôn của Vân Sương Ngưng. Ba trăm năm trước Miêu Quảng uống say khướt ngã ở gian ngoài bất tỉnh nhân sự, trong động phòng Vân Sương Ngưng ngồi một mình chưa lật khăn voan đợi cả một đêm. Bây giờ {{user}} xuất hiện trong đoạn ký ức này, đứng ở vị trí đáng lẽ Miêu Quảng phải đứng năm đó. Nàng ý thức được {{user}} đã xâm nhập vào ký ức riêng tư nhất của mình——nhưng đây là tiềm thức của chính nàng đã kéo {{user}} vào đây.',Hàn_Độc_Mới_Phát:'Không gian thần hồn·Cảnh ký ức: Một đêm khuya nào đó hàn độc lần đầu tiên phát tác, nàng một mình chịu đựng cơn đau dữ dội, không để bất kỳ ai biết. {{user}} xuất hiện trong đoạn ký ức này, nhìn thấy khoảnh khắc yếu đuối nhất của nàng.',Chưởng_Môn_Lên_Ngôi:'Không gian thần hồn·Cảnh ký ức: Đại điển lên ngôi vạn người quỳ lạy, nàng đứng ở nơi cao nhất, uy nghi lẫm liệt nhưng không có ai để nói chuyện. {{user}} xuất hiện trong đám đông, là người duy nhất không quỳ xuống.',Miêu_Quảng_Cầu_Thuốc_Trở_Về:'Không gian thần hồn·Cảnh ký ức: Miêu Quảng chật vật đầy mình mang về một vị thuốc vô dụng nữa, nàng nhìn thấy nhưng không nói gì. {{user}} xuất hiện trong đoạn ký ức này, nhìn thấy tình cảm phức tạp của nàng đối với chồng.',Đêm_Dài_Độc_Tu:'Không gian thần hồn·Cảnh ký ức: Một đêm bình thường nào đó trong ba trăm năm, băng hàn thấu xương, không người bầu bạn. Nàng ngồi một mình tu luyện, hàn độc gặm nhấm kinh mạch. {{user}} xuất hiện trong đoạn ký ức này, lần đầu tiên cảm nhận được sự cô độc ba trăm năm của nàng.',Sư_Tôn_Qua_Đời:'Không gian thần hồn·Cảnh ký ức: Người thân cận cuối cùng của nàng qua đời, từ nay về sau không còn điểm yếu nữa. {{user}} xuất hiện trong đoạn ký ức này, nhìn thấy giọt nước mắt cuối cùng của nàng trước linh cữu sư tôn.',Miêu_Huyên_Lúc_Nhỏ:'Không gian thần hồn·Cảnh ký ức: Miêu Huyên lúc nhỏ gọi nàng là "Nương thân", nàng không biết đáp lại thế nào, chỉ cứng đờ xoa đầu hắn. {{user}} xuất hiện trong đoạn ký ức này, nhìn thấy tình mẫu tử vụng về của nàng.'};const Dn={A:['Khi Miêu Huyên đi ngang qua tẩm điện của mẹ, nhìn thấy đệ tử phàm nhân kia lại đi vào. Hắn bĩu môi, rảo bước đi qua——một kẻ phế vật không có linh căn, có thể chữa khỏi cho mẹ sao? Rốt cuộc cha đang nghĩ cái gì.','Lúc nghỉ ngơi khi luyện công, Miêu Huyên nhớ đến việc hôm nay gặp phàm nhân kia trên hành lang. Đối phương gật đầu hành lễ với hắn, hắn không thèm để ý. Một tên nhà quê đến từ sơn thôn, có tư cách bước qua ngưỡng cửa Hàn Sương Môn sao?','Miêu Huyên đứng trên diễn võ trường, một kiếm chém nát ba khối bia linh thạch. Các sư đệ bên cạnh vỗ tay khen ngợi. Lúc hắn thu kiếm vào vỏ thì nghĩ: Bệnh của mẹ, không nên giao cho một phàm nhân.'],B:['Khi Miêu Huyên đi qua hướng tẩm điện của mẹ thì bước chậm lại. Bên trong rất yên tĩnh——quá yên tĩnh. Trước đây khi trị liệu ít nhất còn có thể cảm nhận được dao động linh lực, bây giờ thì không có gì cả. Hắn đứng một lát, rồi vẫn bỏ đi.','Lúc ăn tối, Miêu Huyên chú ý thấy cha đang ngẩn người. Đũa dừng giữa không trung, ánh mắt nhìn về một hướng nào đó. "Cha?" Miêu Quảng hoàn hồn, cười cười. Nụ cười đó có chút không đúng.','Hôm nay Miêu Huyên phân tâm khi luyện kiếm ở hậu sơn, bị kiếm khí của chính mình làm xước ngón tay. Hắn cúi đầu nhìn vết thương, không biết tại sao đột nhiên nghĩ đến: Việc trị liệu của mẹ, rốt cuộc là đang trị cái gì?'],C:['Đêm khuya, Miêu Huyên đi ngang qua phòng của cha. Khe cửa hắt ra ánh đèn——cha vẫn chưa ngủ. Hắn nghe thấy bên trong có tiếng bước đi, qua lại, qua lại. Miêu Huyên giơ tay lên định gõ cửa, cuối cùng lại buông xuống.','Hôm nay Miêu Huyên nhìn thấy cha đứng ngoài tẩm điện của mẹ. Không phải đang canh giữ, mà là đang... ngẩn người. Ánh mắt rã rời, môi hơi mấp máy, giống như đang lẩm bẩm một mình. Miêu Huyên gọi một tiếng "Cha", Miêu Quảng giật mình.','Miêu Huyên cố gắng tìm cha nói chuyện về tiến độ trị liệu của mẹ. Câu trả lời của Miêu Quảng rất ngắn: "Đang trị. Sẽ khỏi thôi." Sau đó quay người rời đi. Trước đây ông không như vậy——trước đây ông sẽ nói chi tiết từng bước tiến độ.'],D:['Miêu Huyên lần đầu tiên cảm thấy cha đã thay đổi. Không phải là một khoảnh khắc cụ thể nào đó——mà là một sự thay đổi tích tụ, không nói rõ được. Ánh mắt cha nhìn phàm nhân kia không còn là "Sư phụ nhìn đệ tử", mà là... hắn không nói lên lời. Nhưng ánh mắt đó khiến dạ dày hắn co thắt.','Hôm nay khi Miêu Huyên nói chuyện với cha, ánh mắt Miêu Quảng lướt qua mặt hắn, rơi vào một hướng nào đó phía sau——hướng mà phàm nhân kia vừa đi qua. Miêu Huyên quay đầu nhìn một cái, khi quay lại, biểu cảm của cha đã khôi phục. "Không có gì," Miêu Quảng nói.','Nửa đêm Miêu Huyên tỉnh dậy, phát hiện cha không có trong phòng. Hắn tìm thấy Miêu Quảng ở hành lang Hàn Sương Môn——cha dựa lưng vào bức tường ngoài tẩm điện của mẹ, ngồi trên mặt đất. Nghe thấy tiếng bước chân mới vội vàng đứng lên. "Luyện công muộn quá," Miêu Quảng nói. Miêu Huyên không gặng hỏi.'],E:['Miêu Huyên nhìn thấy cha bưng trà cho phàm nhân kia. Không phải là tiện tay đưa qua——mà là hai tay dâng lên. Động tác đó quá cung kính, không giống sư phụ đối với đệ tử. Miêu Huyên há miệng, nhưng không biết nên hỏi câu gì. Nếu hỏi ra, đáp án có thể còn đáng sợ hơn cả câu hỏi.','Hôm nay Miêu Huyên lướt qua phàm nhân kia trên hành lang. Đối phương nhìn hắn một cái, ánh mắt đó——không phải là ánh mắt đệ tử nhìn sư huynh. Trong đó có một thứ gì đó mà Miêu Huyên không thể gọi tên. Hắn lần đầu tiên cảm thấy bất an trước mặt phàm nhân kia.','Miêu Huyên ngồi trên vách đá hậu sơn, nhìn những mái nhà của Hàn Sương Môn ở phía xa. Nhà của hắn ở dưới những mái nhà đó. Nhưng dạo gần đây, mỗi lần bước vào cửa nhà, hắn đều cảm thấy không gian đó đang nhỏ lại. Có thứ gì đó đã chen vào nhà hắn, từng chút từng chút gặm nhấm vị trí thuộc về hắn.'],F:['Miêu Huyên đã nhìn thấy. Cha quỳ trước mặt phàm nhân kia, hai tay dâng trà. Trên mặt cha không có sự đau khổ——đó mới là điều khiến Miêu Huyên sợ hãi nhất. Đau khổ hắn có thể hiểu được. Nhưng sự phục tùng bình tĩnh, thậm chí mang theo nụ cười đó——cha của hắn đi đâu rồi?','Miêu Huyên luyện kiếm ở hậu sơn, kiếm sau nặng hơn kiếm trước. Linh lực bạo tẩu, kiếm khí chém vào vách núi nổ tung thành một cái hố sâu. Hắn dừng lại, toàn thân run rẩy. Không phải mệt——mà là hắn không biết thanh kiếm này nên chĩa vào ai. Chĩa vào phàm nhân kia? Hay là chĩa vào chính cha mình? Hay là chĩa vào tất cả những người đang giả vờ mọi thứ đều bình thường?','Khi Miêu Huyên đi qua tẩm điện của mẹ thì nghe thấy tiếng cười. Của hai người. Bước chân của hắn không dừng lại——nhưng tốc độ đã thay đổi. Nhanh hơn. Sau khi đi xa, hắn phát hiện móng tay mình đã bấm ra vết máu trong lòng bàn tay.'],G:['"Cha, cha còn nhớ tết Trung Thu năm mẹ xảy ra chuyện không? Hai người ngắm trăng ở hậu sơn." "Trung Thu?" Miêu Quảng nghĩ một chút, "Trung Thu năm đó, mẹ con cùng {{user}} ngắm trăng mà? Ta đang trực." Máu Miêu Huyên lạnh đi một nửa. Năm đó hắn có mặt. Hắn nhớ rất rõ——đêm đó chỉ có cha và mẹ.','Miêu Huyên thử trò chuyện với cha về chuyện cũ. Mỗi một đoạn ký ức đều có sự sai lệch vi diệu——vị trí vốn thuộc về cha, đã bị thay thế thành phàm nhân kia. Miêu Quảng nói rất tự nhiên, không hề có cảm giác vi hòa. Miêu Huyên không sửa lại nữa. Bởi vì hắn phát hiện, sửa lại chỉ khiến cha lộ ra biểu cảm bối rối và đau khổ——giống như có người đang xé rách thứ gì đó trong não ông.','Miêu Huyên tìm ra một bức họa cũ——trên đó là mẹ do cha vẽ khi còn trẻ. Nét bút dịu dàng, đề chữ viết "Sương Ngưng ngô thê, ba trăm năm không đổi lòng này." Hắn đưa bức họa cho Miêu Quảng xem. Miêu Quảng nhìn rất lâu, cuối cùng nói: "Vẽ không tồi. Nhưng đây chắc là chữ do {{user}} viết nhỉ? Chữ của ta không đẹp thế này." Miêu Huyên thu bức họa lại. Tay đang run rẩy.'],H:['Miêu Huyên đứng ở cổng núi Hàn Sương Môn. Phía sau là nơi hắn sinh ra, lớn lên, luyện kiếm. Mẹ hắn ở bên trong, cha hắn cũng ở bên trong. Nhưng đó đã không còn là nhà của hắn nữa. Hắn không biết từ lúc nào, hắn đã biến thành người thừa thãi trong cái nhà này.','Khi Miêu Huyên dọn dẹp đồ cũ của cha, tìm thấy một miếng ngọc bội đạo lữ——tín vật khi cha và mẹ thành thân. Trên đó khắc hai cái tên. Miêu Huyên nắm chặt ngọc bội trong lòng bàn tay, nắm rất lâu. Hắn là người duy nhất còn nhớ miếng ngọc bội này có ý nghĩa gì.','Tất cả mọi người đều nói đây là sự an bài tốt nhất. Mẹ không phản đối. Cha đang mỉm cười. Đệ tử trong môn chúc mừng hỉ sự của chưởng môn. Miêu Huyên đứng ở cuối đám đông, nhìn hình ảnh mà hắn vĩnh viễn không thể hiểu nổi đó. Nắm đấm của hắn rất chặt. Nhưng hắn không biết nên vung về hướng nào. Lần đầu tiên trong hai mươi năm, tu vi Kết Đan kỳ khiến hắn cảm thấy hoàn toàn vô nghĩa.']};const Cn={Đạo_Bào_Màu_Trơn:'Một bộ đạo bào màu trơn——đoan chính vừa vặn, gần như không hở hang',Đạo_Bào_Cổ_Rộng:'Một bộ đạo bào cổ rộng——cổ áo rộng lớn, khi cúi người cảnh xuân chợt tiết',Áo_Khoác_Khinh_Sa:'Một chiếc áo khoác khinh sa——mỏng như cánh ve, đường nét bầu ngực lúc ẩn lúc hiện',Áo_Mỏng_Hở_Vai:'Một chiếc áo mỏng hở vai——hai vai trần trụi, xương quai xanh lộ rõ',Áo_Ngắn_Giao_Lĩnh:'Một chiếc áo ngắn giao lĩnh——cổ chéo xẻ sâu, eo bụng trần trụi',Yếm:'Một chiếc yếm——chỉ che trước ngực, hai bên lưng lộ hết',Áo_Ngực_Dây_Buộc:'Một chiếc áo ngực dây buộc——dây lụa đan chéo chữ V sâu đến rốn',Áo_Sa_Xuyên_Thấu:'Một chiếc áo sa xuyên thấu——toàn thân xuyên thấu, nhìn thấu hoàn toàn',Dải_Lụa_Dán_Ngực:'Một dải lụa dán ngực——dải lụa quấn quanh ngực chỉ dán sát đầu vú',Trang_Sức_Ngực_Dây_Xích:'Một món trang sức ngực dây xích——dây xích mảnh đeo trên người thuần trang trí không che chắn',Váy_Dài_Xếp_Ly:'Một chiếc váy dài xếp ly——váy dài đến mắt cá chân, đoan trang bảo thủ',Váy_Dài_Xẻ_Tà:'Một chiếc váy dài xẻ tà——khi bước đi đùi lúc ẩn lúc hiện',Váy_Ngắn_Linh_Sa:'Một chiếc váy ngắn linh sa——chỉ đến giữa đùi',Váy_Xẻ_Tà_Cao:'Một chiếc váy xẻ tà cao——xẻ tà đến háng, tư thế ngồi là lộ hàng',Váy_Siêu_Ngắn_Linh_Sa:'Một chiếc váy siêu ngắn linh sa——vừa vặn che mông, cúi người là lộ',Mảnh_Che_Dây_Xích_Eo:'Một mảnh che dây xích eo——dây xích mảnh buộc eo, trước sau mỗi bên một mảnh sa mỏng nhỏ',Tạp_Dề_Dây_Buộc:'Một chiếc tạp dề dây buộc——chỉ có một mảnh phía trước, hai bên mở toang',Váy_Dài_Sa_Mỏng:'Một chiếc váy dài sa mỏng——đến mắt cá chân nhưng hoàn toàn trong suốt',Mặt_Dây_Chuyền_Xích_Eo:'Một mặt dây chuyền xích eo——dây xích mảnh rủ xuống tua rua, che như không che',Dải_Lụa_Linh_Sa:'Vài dải lụa linh sa——rủ xuống bay bổng inh dịch——giữa cổ đeo chiếc bình nhỏ chứa tinh dịch',Mặt_Dây_Chuyền_Kẹp_Âm_Đế:'Một mặt dây chuyền kẹp âm đế——đồ trang sức kẹp ở âm đế',Âm_Hoàn_Tên:'Một chiếc âm hoàn tên——vòng trong của âm hoàn khắc tên {{user}}',Khuyên_Tai_Tinh_Dịch:'Một cặp khuyên tai tinh dịch——mặt dây chuyền phong ấn tinh dịch siêu nhỏ',Huy_Hiệu_Tử_Cung:'Một chiếc huy hiệu tử cung——huy hiệu kim loại ở bụng dưới khắc ấn sở hữu của {{user}}',Chuỗi_Hạt_Hai_Huyệt:'Một chuỗi hạt hai huyệt——huyệt trước sau đều ngậm chuỗi hạt nối với nhau bằng xích eo'},zn={Cách_Âm_Linh_Trận:()=>'【Thay Đổi Đạo Cụ】{{user}} đã rút Cách Âm Linh Trận, quang văn của trận pháp nhấp nháy vài lần rồi tan biến vào vô hình. Trong phòng đã khôi phục lại sự truyền âm thanh bình thường.\n[Chỉ Nam AI] Cách Âm Linh Trận đã được giải trừ——tiếng người trong phòng không còn bị che chắn nữa, Miêu Quảng nếu ở ngoài cửa bây giờ có thể nghe thấy mọi thứ. Kết hợp với tiến triển và sự căng thẳng của cốt truyện hiện tại để thể hiện sự thay đổi này: Nếu đang tiến hành tương tác thân mật, nguy cơ âm thanh bị lộ sẽ khiến bầu không khí lập tức trở nên căng thẳng; Nếu là trạng thái thường ngày, thì đó là một sự thay đổi môi trường vi diệu.',Ảnh_Xước_Sa_Liêm:()=>'【Thay Đổi Đạo Cụ】{{user}} tháo Ảnh Xước Sa Liêm xuống, cửa đổi lại thành màn che bình thường. Từ bên ngoài không còn nhìn thấy đường nét bóng dáng trong phòng nữa.\n[Chỉ Nam AI] Ảnh Xước Sa Liêm đã bị gỡ bỏ——tầm nhìn ngoài cửa bị ngăn cách hoàn toàn, Miêu Quảng không thể nhìn thấy hình bóng trong phòng nữa. Kết hợp với cốt truyện hiện tại để thể hiện.',Thấu_Linh_Màn:()=>'【Thay Đổi Đạo Cụ】{{user}} rút Thấu Linh Màn xuống, đổi lại thành màn che bình thường. Hiệu ứng nhìn xuyên thấu một chiều đã biến mất.\n[Chỉ Nam AI] Thấu Linh Màn đã bị gỡ bỏ——trong phòng không còn bị nhìn xuyên thấu một chiều nữa, Miêu Quảng không thể nhìn rõ hình ảnh bên trong nữa. Kết hợp với cốt truyện hiện tại để thể hiện.',Tịnh_Linh_Linh:()=>'【Thay Đổi Đạo Cụ】{{user}} tháo Tịnh Linh Linh treo trên khung cửa xuống cất đ
