àng, hàm dưới đau nhức',Nút_Hậu_Môn:'{{user}} từ từ đẩy một viên nút hậu môn linh ngọc vào lỗ sau của mục tiêu và để thân nút lưu lại trong cơ thể, từ đó về sau phải liên tục thể hiện trọng lượng của nút hậu môn và cảm giác sung thực khi "bị chiếm đoạt"',Phược_Linh_Đoạn:'{{user}} dùng linh đoạn trói chặt hai cổ tay/hai mắt cá chân của mục tiêu (hoặc tư thế trói quặt ra sau lưng), hành động bị hạn chế vật lý, từ đó về sau phải liên tục thể hiện sự bất lực và ngoan ngoãn do bị trói buộc mang lại',Máy_Rung:'{{user}} áp một chiếc máy rung linh ngọc vào điểm nhạy cảm của mục tiêu và bật chế độ rung thấp, từ đó về sau phải liên tục thể hiện sự gặm nhấm của cảm giác rung và sự sụp đổ của sức chịu đựng',Vòng_Cổ:'{{user}} đeo cho mục tiêu một chiếc vòng cổ linh bạc, khoảnh khắc chốt cài đóng lại trên cổ có thêm trọng lượng, từ đó về sau phải liên tục thể hiện cảm giác thuộc sở hữu khi bị "đánh dấu"',Khẩu_Trang_Dương_Vật:'{{user}} đeo cho mục tiêu một chiếc khẩu trang hình dương vật rỗng ruột, miệng bị lấp đầy bởi vật giả mềm mại, từ đó về sau phải liên tục thể hiện sự chèn ép của dị vật trong miệng và nước bọt trào ra',Neo_Thần_Đinh:'{{user}} đóng một chiếc Neo Thần Đinh vào cốt lõi Không Gian Thần Hồn, linh văn khắc vào bản nguyên——mục tiêu không thể chủ động ngắt kết nối thần hồn nữa'},ue={Noãn_Ngọc_Bội:'{{user}} treo một mảnh Noãn Ngọc Bội trên cổ mục tiêu, mặt ngọc áp vào da tỏa ra linh khí ôn nhuận',Cách_Âm_Linh_Trận:'{{user}} bố trí Cách Âm Linh Trận xung quanh căn phòng, tiếng người bị che chắn hoàn toàn, từ đó về sau phải liên tục thể hiện sự căng thẳng của việc "bên ngoài tường không nghe thấy tiếng người nhưng lại có thể nghe thấy chấn động vật lý"',Tịnh_Linh_Linh:'{{user}} treo một chiếc chuông linh văn trên xà cửa——lắc chuông là có thể triệu hoán Miêu Quảng đến',Ảnh_Xước_Sa_Liêm:'{{user}} đổi rèm cửa thành Ảnh Xước Sa Liêm bán trong suốt, bên ngoài chỉ có thể nhìn thấy đường nét bóng dáng mờ ảo trong phòng',Thấu_Linh_Màn:'{{user}} đổi rèm cửa thành Thấu Linh Màn, bên ngoài có thể nhìn rõ mọi thứ trong phòng theo một chiều mà người trong phòng hoàn toàn không hay biết'},de={Phong_Hung_Linh_Nhũ_Đan_Trung:'{{user}} cho mục tiêu uống một viên Phong Hung Linh Nhũ Đan·Trung, linh lực cuộn trào từ lồng ngực đẩy cúp ngực lên E, từ đó về sau phải liên tục thể hiện sự đầy đặn của cúp ngực mới và sự thay đổi trong nhận thức bản thân',Phong_Hung_Linh_Nhũ_Đan_Đại:'{{user}} cho mục tiêu uống một viên Phong Hung Linh Nhũ Đan·Đại, linh lực tiếp tục đẩy cúp ngực lên G, từ đó về sau phải liên tục thể hiện sự nặng nề rõ rệt trước ngực và sự chấn động thị giác',Phong_Hung_Linh_Nhũ_Đan_Cực:'{{user}} cho mục tiêu uống một viên Phong Hung Linh Nhũ Đan·Cực, linh lực đẩy cúp ngực lên H——giới hạn của sự cải tạo, từ đó về sau phải liên tục thể hiện sự mất cân bằng và tự giễu cợt do sự đẫy đà tột độ mang lại',Phong_Đồn_Viên_Ngọc_Đan:'{{user}} cho mục tiêu uống một viên Phong Đồn Viên Ngọc Đan, linh lực cuộn trào từ vùng eo mông, đường cong được định hình lại',Khuyên_Ngực:'{{user}} xỏ một cặp khuyên ngực linh bạc vào đầu vú mục tiêu——cố định vĩnh viễn, từ đó về sau phải liên tục thể hiện bất kỳ sự tiếp xúc nào ở ngực đều bị phóng đại',Khuyên_Âm_Đạo:'{{user}} xỏ một chiếc khuyên âm đạo linh bạc vào âm vật mục tiêu——cố định vĩnh viễn, từ đó về sau phải liên tục thể hiện sự tồn tại của khuyên cài khi đi lại, ngồi xuống, hít thở',Dâm_Văn_Khắc_Ấn:'{{user}} dùng linh lực khắc một đạo dâm văn lên bộ phận được chỉ định của mục tiêu——dấu ấn vĩnh viễn, từ đó về sau phải liên tục thể hiện sự xấu hổ khi dâm văn lúc ẩn lúc hiện theo từng động tác'},me={Thể_Chất_Ahegao:'Một luồng linh lực kỳ dị rót vào mạt tiêu thần kinh, khắc xuống bản năng "khi cao trào khuôn mặt hoàn toàn mất kiểm soát"——từ đó về sau phải liên tục thể hiện phản ứng sụp đổ khuôn mặt khi cao trào',Thể_Chất_Phun_Nước:'Linh lực đã cải tạo một cấu trúc nào đó trong cơ thể mục tiêu, khiến nàng có được phản ứng mà trước đây không thể có——từ đó về sau phải liên tục thể hiện sự phun nước dưới kích thích cường độ cao',Thể_Chất_Sữa_Mẹ:'Một luồng linh lực ôn nhiệt tràn vào ngực mục tiêu, tuyến vú bị viết lại vĩnh viễn——từ đó về sau phải liên tục thể hiện việc tràn linh nhũ khi ngực bị kích thích',Sở_Thích_Lộ_Liễu:'Một sự hưng phấn nguy hiểm được cấy vào nhận thức——"có thể bị nhìn thấy" trở thành chất xúc tác, từ đó về sau phải liên tục thể hiện sự hưng phấn do rủi ro bại lộ mang lại',Khoái_Cảm_Bị_Cắm_Sừng:'Một vòng lặp khoái cảm cực kỳ nguy hiểm được thiết lập——sự tồn tại của Miêu Quảng/Miêu Huyên trở thành chất xúc tác hưng phấn, từ đó về sau phải liên tục thể hiện',Thể_Chất_Ohoho:'Một luồng linh lực yêu dã đã viết lại trung khu ngôn ngữ của mục tiêu——góc nhìn tự sự chuyển sang văn ngôn dâm mị nhục dục',Lời_Dâm_Dục:'Linh lực cấy vào một sự bốc đồng khi nói chuyện——ngày thường bất giác thốt ra những từ ngữ dâm ô, sau đó mới giật mình nhận ra',Hành_Vi_Gian_Dâm_Lén_Lút:'Một sự bốc đồng mới được cấy vào——khi có người thứ ba ở đó sẽ chủ động ám chỉ vụng trộm, từ đó về sau phải liên tục thể hiện',Sở_Thích_Uống_Nước_Tiểu:'Linh lực đã viết lại sự phụ thuộc vị giác của mục tiêu——nảy sinh khao khát đối với nước tiểu của {{user}}',Tình_Mẹ_Tràn_Trề:'Linh lực đã đánh thức bản năng làm mẹ của mục tiêu——lấy tư thế người mẹ chủ động mớm sữa dẫn dắt, từ đó về sau phải liên tục thể hiện',Sở_Thích_Liếm_Hậu_Môn:'Linh lực đã đắp nặn lại ngưỡng xấu hổ của mục tiêu——nảy sinh khao khát đối với hành vi liếm hậu môn, từ đó về sau phải liên tục thể hiện',Sở_Thích_Chịu_Ngược:'Linh lực đã kết nối tín hiệu đau đớn vào vòng lặp khoái cảm——khi bị đối xử thô bạo sẽ sinh ra khoái cảm, từ đó về sau phải liên tục thể hiện',Đánh_Dấu_Tinh_Dịch:'Linh lực cấy vào một khao khát mới——khao khát cảm giác "bị đánh dấu" khi tinh dịch dính đầy cơ thể',Thể_Chất_Khẩu_Nô:'Linh lực đã viết lại sự phụ thuộc vùng miệng của mục tiêu——khi miệng trống rỗng sẽ cảm thấy trống trải, từ đó về sau phải liên tục thể hiện sự khát cầu của khoang miệng',Sở_Thích_Giao_Hợp_Hậu_Môn:'Linh lực đã kết nối lại dây thần kinh của lỗ sau với ích_Giao_Hợp_Hậu_Môn:{bodyPart:'Hậu_Môn',psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},Nhận_Thức_Vật_Hóa:{psych:['Phòng_Tuyến_Tâm_Lý','Độ_Tín_Nhiệm'],stage:!0},Hóa_Sắc_Nữ:{psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},Viết_Lên_Cơ_Thể:{psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},Khoái_Cảm_Nghẹt_Thở:{psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},Mặt_Nạ_Tinh_Dịch:{psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},An_Thần_Hương:{psych:['Độ_Tín_Nhiệm']},Thực_Tâm_Lộ:{thirdParty:!0,psych:['Phòng_Tuyến_Tâm_Lý'],stage:!0},Thần_Hồn_Cộng_Minh_Thạch:{psych:['Độ_Tín_Nhiệm'],stage:!0}};function he(e){return e>=80?4:e>=60?3:e>=40?2:e>=20?1:0}const ge={Ngực:{0:'Đầu vú hoàn toàn chưa được khai phá——bất kỳ sự chạm vào nào cũng khiến nàng bản năng cứng đờ, núm vú chỉ cương lên khi trời lạnh, bị liếm mút cũng chỉ thấy khác lạ chứ không phải khoái cảm',1:'Đầu vú đã được khai phá vài lần——đã biết cương lên vì bị chạm vào, nhưng vẫn cần kích thích khá mạnh (nhào nặn, mút mát hàng chục giây) mới có thể sinh ra khoái cảm rõ ràng',2:'Đầu vú đã bị khai phá lặp đi lặp lại hàng chục lần——đầu ngón tay sượt nhẹ là có phản ứng, núm vú liên tục bán cương, khi bị mút mát sẽ bất giác cong lưng, trong miệng lọt ra tiếng thở dốc, toàn bộ bầu ngực đã trở thành cơ quan có thể độc lập đạt đến cao trào',3:'Đầu vú nhạy cảm cao độ——ma sát qua lớp vải cũng đủ khiến nàng thở dốc, khi bị kẹp/véo/vặn sẽ lập tức phát ra âm thanh, chỉ cần kích thích một điểm trên ngực cũng có thể khiến nàng toàn thân nhũn ra',4:'Đầu vú hoàn toàn được khai phá——vải vóc chạm vào cũng khiến nàng kẹp chặt đùi, bị đùa bỡn nghiêm túc vài phút là có thể đạt đến "cao trào ngực", núm vú thời gian dài duy trì trạng thái sung huyết cương cứng'},Miệng_Nhỏ:{0:'Miệng chỉ là miệng——khẩu giao đối với nàng là một khái niệm hoàn toàn xa lạ, khi bị hôn chỉ tiếp nhận như một phép lịch sự, đối với sự xâm nhập của lưỡi sẽ bản năng cắn chặt răng',1:'Miệng đã được khai phá vài lần——có thể tiếp nhận khẩu giao trong thời gian ngắn, nhưng cổ họng vẫn sẽ vì đâm sâu mà buồn nôn mãnh liệt, nuốt tinh dịch sẽ bản năng kháng cự',2:'Miệng đã bị sử dụng lặp đi lặp lại——có thể hoàn thành trọn vẹn quá trình khẩu giao, có thể chịu đựng một phần động tác thâm hầu, nuốt tinh dịch không còn buồn nôn (nhưng vẫn sẽ nhíu mày)',3:'Miệng được huấn luyện cao độ——có thể chủ động phối hợp thâm hầu, lưỡi sẽ tự động quấn quýt lấy lòng, khi bị ra lệnh há miệng sẽ phản xạ có điều kiện làm theo',4:'Miệng khẩu nô hoàn toàn bị thuần hóa——chủ động cầu xin dương vật ngậm vào, khi không ngậm đồ vật sẽ cảm thấy trong miệng trống rỗng, nuốt tinh dịch trở thành một loại thỏa mãn'},Tiểu_Huyệt:{0:'Huyệt trước hoàn toàn chưa được khai phá——xử nữ khít khao hoặc gần như trạng thái xử nữ, bất kỳ ngón tay nào tiến vào cũng cực kỳ đau đớn, tuyệt đối không có khả năng tiếp nhận vật thể lớn hơn',1:'Huyệt trước đã được khai phá——có thể tiếp nhận 1-2 ngón tay tiến vào, có thể chịu đựng động tác pít-tông tương đối ôn hòa, tiết ra ái dịch nhưng vẫn còn khá ít, đạt đến cao trào cần dạo đầu khá dài',2:'Huyệt trước khai phá lặp đi lặp lại——có thể tiếp nhận 3 ngón tay hoặc dụng cụ cùng kích cỡ, trong lúc pít-tông đã có khoái cảm rõ ràng, dạo đầu 2-3 phút là có thể tiết ra lượng lớn ái dịch, có thể đạt cao trào',3:'Huyệt trước nhạy cảm cao độ——hơi chạm vào âm vật là ướt, khi tiến vào chủ động co thắt hùa theo, có thể chịu đựng nhấp nhô tần suất cao hàng chục phút, nhiều lần cao trào đã thành chuyện thường tình',4:'Huyệt trước hoàn toàn được khai phá——cơ nhục nhục huyệt co thắt kiểu phản xạ có điều kiện, khoảnh khắc bị tiến vào liền đạt cao trào, có thể liên tục chịu đựng thao bạo mà vẫn có phản ứng'},Hậu_Môn:{0:'Huyệt sau hoàn toàn chưa được khai phá——bất kỳ sự tới gần nào cũng gây ra sự co thắt bản năng, chưa từng bị khai phá qua, chỉ ngón tay thử nghiệm cũng sẽ vì đau đớn mà sụp đổ',1:'Huyệt sau đã được khai phá——có thể tiếp nhận 1 ngón tay tiến vào, có thể chịu đựng nút hậu môn cỡ nhỏ vài phút, đau đớn lớn hơn khoái cảm, tuyệt đại đa số thời gian vẫn đóng chặt',2:'Huyệt sau khai phá lặp đi lặp lại——có thể tiếp nhận nút hậu môn cỡ trung lưu lại thời gian dài hoặc 2 ngón tay nhấp nhô, bắt đầu có phản ứng khoái cảm rõ ràng, cơ vòng hậu môn đã có thể thả lỏng',3:'Huyệt sau nhạy cảm cao độ——có thể tiếp nhận dương vật tiến vào và chịu đựng nhấp nhô, khoái cảm hậu môn tương đương với huyệt trước, khi bị kích thích sẽ chủ động đưa ra sau',4:'Huyệt sau hoàn toàn được khai phá——độ nhạy cảm vượt qua huyệt trước, khi bị giao hợp hậu môn có thể đạt đến "cao trào bên trong" sâu sắc, hậu môn thời gian dài duy trì trạng thái hé mở'}},ve={0:'Chưa khai phá',1:'Khai phá bước đầu',2:'Khai phá lặp đi lặp lại',3:'Nhạy cảm cao độ',4:'Hoàn toàn khai phá'};function ye(e,n,t,a){const s=Math.max(0,Math.min(100,n)),r=Math.max(0,Math.min(100,t)),o=Math.max(s,Math.min(100,a)),c=he(s),l=ge[e][c],i=he(r);let u;if(s===r)u=`Duy trì ở mức ${ve[c]} (${s}/100), giống như lần đầu gặp`;else if(c===i)u=`Từ ${r} đẩy lên ${s} (Thâm hóa trong cùng một bậc)`;else{const e=[];for(let n=i;n<=c;n++)e.push(ve[n]);u=`Từ ${r} (${ve[i]}) một đường khai phá đến ${s}, đã vượt qua ${e.join(' → ')}`}const d=o-s,m=he(o);let f;return f=d<=0?`Đã gần với giới hạn trên tự sự được đề xuất của giai đoạn này (${o}), muốn thâm hóa thêm đề nghị phối hợp với việc thúc đẩy giai đoạn trị liệu`:m===c?`Tự sự giai đoạn này đề nghị đẩy đến khoảng ${o} (vẫn nằm trong bậc "${ve[m]}"), ước chừng còn ${d} điểm không gian có thể viết`:`Tự sự giai đoạn này đề nghị đẩy đến khoảng ${o}, ước chừng còn ${d} điểm không gian có thể viết, có thể bước sang bậc "${ve[m]}"`,`· Khai phá ${e} ${s}/100\n  · Cơ thể lúc này có thể làm được: ${l}\n  · Quá trình: ${u}\n  · Tiến độ tự sự đề xuất: ${f}`}const $e={Mặc_Định:'Dáng ngực ban đầu——hơi đầy đặn hơn nữ tử bình thường một chút nhưng không bắt mắt, cúi người không có rãnh ngực rõ ràng, bó trong đạo bào hoàn toàn không có cảm giác tồn tại',Cúp_E:'Cúp E · Rõ ràng đầy đặn hơn tu sĩ bình thường, khi cúi người đã có thể hình thành rãnh ngực rõ nét, chạy bộ sẽ kéo theo sự rung lắc——nhưng vẫn có thể miễn cưỡng b g biến tạo ra chi tiết dựa trên bối cảnh hiện tại, mỗi lần mỗi khác, không phụ thuộc vào khuôn mẫu cố định. Vui lòng vận dụng sự hiểu biết tổng thể của bạn về bút pháp của những tác giả thể loại này, mỗi lần đều **tạo ra tại chỗ** những tổ hợp chi tiết mới, tránh lặp lại những miêu tả giống nhau.',Fe={Thể_Chất_Ahegao:'Khuôn mặt mất kiểm soát khi cao trào',Thể_Chất_Phun_Nước:'Chủ động phun linh dịch khi kích thích cường độ cao',Thể_Chất_Sữa_Mẹ:'Tuyến vú chủ động tiết linh nhũ',Sở_Thích_Lộ_Liễu:'Rủi ro bại lộ xúc tác khoái cảm',Khoái_Cảm_Bị_Cắm_Sừng:'Cảm giác trái luân thường đạo lý kết nối trực tiếp với vòng lặp khoái cảm',Lời_Dâm_Dục:'Khi nói chuyện từ khóa tự động thay thế thành từ mang ý nghĩa tình dục',Hành_Vi_Gian_Dâm_Lén_Lút:'Nảy sinh bốc đồng vụng trộm khi có người thứ ba ở đó',Sở_Thích_Uống_Nước_Tiểu:'Nảy sinh khao khát bản năng đối với nước tiểu',Tình_Mẹ_Tràn_Trề:'Không kìm lòng được nhập vai người mẹ, tận hưởng cảm giác cấm kỵ',Sở_Thích_Liếm_Hậu_Môn:'Nảy sinh khát cầu bản năng đối với hành vi liếm hậu môn',Sở_Thích_Chịu_Ngược:'Tín hiệu đau đớn chuyển hóa thành khoái cảm',Đánh_Dấu_Tinh_Dịch:'Khao khát bị tinh dịch dính đầy đánh dấu',Thể_Chất_Khẩu_Nô:'Phụ thuộc khẩu giao, cảm thấy trống trải khi miệng trống rỗng',Sở_Thích_Giao_Hợp_Hậu_Môn:'Nảy sinh khoái cảm và khao khát đối với giao hợp hậu môn',Nhận_Thức_Vật_Hóa:'Coi bản thân là vật sở hữu/đạo cụ',Hóa_Sắc_Nữ:'Từ bị động chuyển sang chủ động tấn công',Viết_Lên_Cơ_Thể:'Khao khát được viết chữ đánh dấu lên cơ thể',Khoái_Cảm_Nghẹt_Thở:'Khoái cảm tăng gấp bội khi hô hấp bị hạn chế',Mặt_Nạ_Tinh_Dịch:'Khao khát xuất tinh lên mặt, thỏa mãn say sưa'},Le={Thể_Chất_Ahegao:'Kích hoạt: Đỉnh điểm cao trào\nPhản ứng bản năng: Cơ mặt mất kiểm soát——mí mắt lật trắng, đầu lưỡi bất giác thò ra, nước bọt tràn ra từ khóe môi, cổ ngửa ra sau, biểu cảm dâm mị đến mức bất kỳ người quen nào nhìn thấy cũng sẽ khiếp sợ. Đây là kết nối cứng do linh lực vĩnh viễn khắc vào dây thần kinh mặt và vòng lặp khoái cảm, hoàn toàn không liên quan đến ý thức và ý chí.\nBiểu hiện: Vui lòng tự do kết hợp các chi tiết khác nhau (mức độ lật trắng mắt, độ dài thò lưỡi, hướng nước bọt, ánh mắt hoang mang, góc độ cổ), mỗi lần mỗi khác.',Thể_Chất_Phun_Nước:'Kích hoạt: Kích thích tình dục cường độ cao kéo dài đến đỉnh điểm khoái cảm\nPhản ứng bản năng: Âm đạo chủ động phun linh dịch, kèm theo co thắt xương chậu. Lượng phun tỷ lệ thuận với cường độ khoái cảm, lúc mạnh nhất có thể thấm ướt quần áo/giường đệm. Đây là vòng lặp phản ứng vĩnh viễn do linh lực cải tạo một cấu trúc nào đó trong cơ thể nàng thiết lập nên.\nBiểu hiện: Vui lòng tự do viết thời cơ phun, lượng, hướng, phản ứng liên đới của cơ thể nàng (eo cong lên, đùi co giật, ngón chân cuộn lại v.v.).',Thể_Chất_Sữa_Mẹ:'Kích hoạt: Ngực bị nhào nặn/mút mát/kích thích thời gian dài\nPhản ứng bản năng: Tuyến vú chủ động tiết linh nhũ, khi bị mút mát sẽ chảy ra, khi không bị kích thích cũng sẽ liên tục tiết ra nhẹ khiến ngực thời gian dài căng tức. Khi linh nhũ tràn ra kèm theo một loại cảm giác thỏa mãn nguyên thủy giống như cho con bú. Linh lực đã viết lại vĩnh viễn tuyến vú và nội tiết của nàng.\nBiểu hiện: Vui lòng tự do viết cảm giác căng tức, thời cơ tràn ra, phản ứng khi bị mút mát, chi tiết quần áo bị thấm ướt.',Sở_Thích_Lộ_Liễu:'Kích hoạt: Ở trong môi trường "có thể bị người thứ ba nhìn thấy" (ngoài cửa có động tĩnh, rèm cửa mở hé, tiếng bước chân hành lang, màn trướng lọt sáng)\nPhản ứng bản năng: Tín hiệu khoái cảm của cơ thể bị trực tiếp phóng đại——bản thân việc "có thể bị nhìn thấy" trở thành chất xúc tác khoái cảm, rủi ro bại lộ càng cao phản ứng càng mạnh. Đây là sự kết nối trực tiếp do linh lực thiết lập giữa cảm giác xấu hổ và khoái cảm của nàng.\nBiểu hiện: Vui lòng tự do viết phản ứng ứng kích của nàng đối với rủi ro (thay đổi nhịp thở, góc độ cơ thể, điều chỉnh quần áo), cũng như phản ứng nghịch lý rủi ro càng cao cơ thể càng nhạy cảm.',Khoái_Cảm_Bị_Cắm_Sừng:'Kích hoạt: Khi thân mật với {{user}} đồng thời cảm nhận được sự tồn tại của bạn đời/vị hôn phu của nàng (tiếng bước chân, di vật, mùi hương, bị nhắc đến tên, nhớ lại khuôn mặt đều đủ để kích hoạt)\nPhản ứng bản năng: Khoái cảm cơ thể nháy mắt kéo lên——cảm giác trái luân thường đạo lý kết nối trực tiếp với vòng lặp khoái cảm, sự tồn tại của bạn đời/vị hôn phu càng rõ ràng phản ứng càng mạnh. Đây là kết nối trực tiếp "tín hiệu phản bội→khoái cảm" vĩnh viễn do linh lực thiết lập.\nBiểu hiện: Vui lòng tự do viết chi tiết ứng kích đối với sự tồn tại của người thứ ba (thay đổi nhịp thở, eo co thắt, đầu ngón tay run rẩy, âm điệu bất ngờ v.v.). Thân phận bạn đời/vị hôn phu tự động nhận diện từ đoạn [Người ngoài cuộc] của data card (Vân→Miêu Quảng, Lạc→Miêu Huyên).',Lời_Dâm_Dục:'Kích hoạt: Mỗi khoảnh khắc nàng mở miệng nói chuyện\nPhản ứng bản năng: Nàng dùng giọng điệu, nghi thái, cấu trúc câu hoàn toàn bình thường đoan trang để nói chuyện, nhưng một số từ khóa (tự xưng, danh xưng, thuật ngữ tu luyện/tu hành, động từ thông thường, danh từ thường ngày) sẽ bị não bộ của nàng tự động thay thế thành **từ đồng nghĩa mang ý nghĩa tình dục** ngay khoảnh khắc thốt ra. Cấu trúc ngữ pháp hoàn toàn không đổi, chỉ là từ ngữ cụ thể bị thay đổi. Bản thân nàng hoàn toàn không hay biết——nàng tưởng rằng đây chính là cách nói chuyện từ trước đến nay của nàng, sau khi bị chỉ ra sẽ chân thành khốn hoặc lặp lại cùng một câu nói, kiên định tin rằng mình không nói sai.\nQuy tắc thay thế (AI tạo ra tại chỗ, không áp dụng bất kỳ bảng từ vựng cố định nào):\n· Tự xưng (bản tôn/bần đạo/vi sư/ta) → Từ đồng nghĩa thân phận mang ý nghĩa tình dục\n· Tôn xưng/danh hiệu (sư phụ/sư công/phu quân/chưởng môn) → Biến thể mang ý nghĩa tình dục của mối quan hệ với đối phương\n· Động từ tu luyện/thường ngày (tu luyện, bàn luận, truyền thụ, thưởng trà, hành lễ) → Động từ loại hành vi tình dục\n· Danh từ thường ngày (kiếm, đan, kinh, khí, trà) → Danh từ loại cơ quan sinh dục/thể dịch/hành vi tình dục\nTần suất kích hoạt: Không phải câu nào cũng thay thế——khoảng 3-5 câu đối thoại thì có 1 câu xảy ra thay thế, trong một câu thường chỉ thay thế 1-2 từ khóa (chứ không phải thay toàn bộ câu). Lựa chọn thời cơ tự nhiên, trong đối thoại nghiêm túc tránh thay thế liên tục.\nRàng buộc biểu hiện:\n· Cấu trúc ngữ pháp giữ nguyên đoan trang bình thường (nghi thái giọng điệu lạnh lùng kiêu ngạo/đoan trang không đổi)\n· Từ thay thế bắt buộc phải **vừa vặn nhúng vào vị trí từ gốc** giữ cho câu văn trôi chảy\n· Bản thân nàng hoàn toàn không hay biết (tưởng rằng nói chuyện là như vậy)\n· Sau khi bị chỉ ra thì chân thành khốn hoặc, không phải là xấu hổ che giấu\n· **Từ vựng bị cấm** (legacy phiên bản cũ lạm dụng quá mức, bắt buộc phải tránh): bần dâm / bản biểu tử / tao hóa / thư tỷ / thao phụ / thao công / nhục bổng quyết——vui lòng mỗi lần tạo ra từ mới tại chỗ, không áp dụng bất kỳ từ nào ở trên.',Hành_Vi_Gian_Dâm_Lén_Lút:'Kích hoạt: Người thứ ba ở đó và khoảng cách không xa\nPhản ứng bản năng: Cơ thể nảy sinh bốc đồng mãnh liệt "lén lút tiếp xúc dưới mí mắt người thứ ba"——muốn để {{user}} nhân lúc người thứ ba không chú ý làm chút gì đó, đồng thời tận hưởng rủi ro bị phát hiện. Đây là linh lực đã kết nối trực tiếp vĩnh viễn "rủi ro vụng trộm" và "khoái cảm".\nBiểu hiện: Vui lòng tự do viết những động tác nhỏ bất giác tạo cơ hội vụng trộm của nàng (tư thế ngồi, góc độ vạt áo, ám chỉ bằng âm thanh hơi thở, tiếp xúc dưới gầm bàn), cũng như cảm giác thỏa mãn khi "thành công giấu giếm".',Sở_Thích_Uống_Nước_Tiểu:'Kích hoạt: Khi thân mật với {{user}} tiếp cận khu vực hạ bộ của hắn\nPhản ứng bản năng: Nảy sinh khao khát bản năng đối với nước tiểu của {{user}}——khứu giác và vị giác bị thu hút, trong miệng phản xạ có điều kiện tiết ra nước bọt. Đây là linh lực đã viết lại hệ thống sở thích vị giác và khứu giác của nàng.\nBiểu hiện: Vui lòng tự do viết động tác vô thức tới gần, hít sâu, ghé sát của nàng, cũng như phản ứng phức tạp khi nếm thử (thành kính / thỏa mãn / cảm giác xác nhận thuộc về).',Tình_Mẹ_Tràn_Trề:'Kích hoạt: Mọi tương tác với {{user}} (đối thoại thường ngày, trị liệu, hành vi thân mật đều kích hoạt)\nPhản ứng bản năng: Không kìm lòng được nhập vai "người mẹ", từ trong mối quan hệ thân phận cấm kỵ này thu được kích thích và khoái cảm mãnh liệt. Đây là linh lực đã thiết lập kết nối ngắn vĩnh viễn giữa nhận thức thân phận và vòng lặp khoái cảm của nàng.\nBiểu hiện: Vui lòng tự do diễn dịch sự nhập vai tình mẹ và khoái cảm cấm kỵ của nàng dựa trên bối cảnh hiện tại.',Sở_Thích_Liếm_Hậu_Môn:'Kích hoạt: Trong lúc tiếp xúc thân mật ánh mắt chạm đến khu vực mông/hậu môn của {{user}}\nPhản ứng bản năng: Nảy sinh khát cầu bản năng đối với hành vi liếm hậu môn, đầu lưỡi vô thức liếm môi, sẽ bất giác ghé sát hoặc điều chỉnh tư thế tạo cơ hội. Đây là sự viết lại vĩnh viễn do linh lực thực hiện giữa ngưỡng xấu hổ và vòng lặp khoái cảm của nàng.\nBiểu hiện: Vui lòng tự do viết những động tác nhỏ vô thức của nàng (ghé sát, liếm môi, lật người đổi tư thế), cũng như cảm giác thỏa mãn phức tạp khi thực sự làm được (cảm giác thấp hèn / cảm giác cấm kỵ / cảm giác thần phục).',Sở_Thích_Chịu_Ngược:'Kích hoạt: Bị đối xử thô bạo (tát, kéo tóc, đẩy mạnh, nhục mạ, đè ép, động tác khống chế lực độ lớn)\nPhản ứng bản năng: Tín hiệu đau đớn trực tiếp chuyển hóa thành khoái cảm——cơ thể đối với động tác thô bạo ngược lại càng hưng phấn, càng thô bạo phản ứng càng mạnh. Đây là linh lực đã kết nối vòng lặp cảm giác đau của nàng vào hệ thống khoái cảm.\nBiểu hiện: Vui lòng tự do viết phản ứng mâu thuẫn trong khoảnh khắc đau đớn (đáng lẽ nên lùi lại nhưng ngược lại càng áp sát, đáng lẽ nên kêu đau nhưng lại mang theo tiếng rên rỉ, đáng lẽ nên kháng cự nhưng cơ thể lại ướt át v.v.).',Đánh_Dấu_Tinh_Dịch:'Kích hoạt: Khi {{user}} xuất tinh hoặc vừa xuất tinh xong\nPhản ứng bản năng: Khao khát bị tinh dịch dính đầy cơ thể——khuôn mặt, trước ngực, hạ bộ, thậm chí sâu trong cơ thể. Sẽ coi việc "bị đánh dấu" là một loại xác nhận thuộc về và cảm giác thỏa mãn. Đây là linh lực đã viết lại nhận thức của nàng đối với "thể dịch của {{user}}".\nBiểu hiện: Vui lòng tự do viết những chi tiết như nàng chủ động ngẩng mặt hứng lấy, ghé sát để dính vào, không muốn dọn dẹp, ánh mắt thay đổi khi bôi trét v.v.',Thể_Chất_Khẩu_Nô:'Kích hoạt: Khi cảnh tình dục bắt đầu, hoặc khi miệng nàng ở trạng thái trống rỗng khá lâu\nPhản ứng bản năng: Miệng bản năng tìm kiếm vật để ngậm vào (lưỡi, ngón tay, dương vật), khi miệng trống rỗng sẽ cảm thấy trống trải, khi ngậm vật sẽ chủ động mút mát lấy lòng. Đây là linh lực đã trói buộc vĩnh viễn khoang miệng và hệ thống khoái cảm của nàng.\nBiểu hiện: Vui lòng tự do viết những động tác như nàng bất giác ghé sát, môi răng tự động hé mở, lưỡi chủ động lấy lòng, cũng như sự bứt rứt khi trống rỗng.',Sở_Thích_Giao_Hợp_Hậu_Môn:'Kích hoạt: Trong cảnh thân mật khu vực lỗ sau bị tiếp cận/chạm vào\nPhản ứng bản năng: Lỗ sau chủ động thả lỏng hùa theo, cơ vòng mở ra kiểu phản xạ có điều kiện, nảy sinh khoái cảm và khát cầu rõ ràng đối với giao hợp hậu môn. Đây là linh lực đã kết nối lại dây thần kinh của lỗ sau và vòng lặp khoái cảm.\nBiểu hiện: Vui lòng tự do viết động tác chủ động hùa theo của lỗ sau, phản ứng khi bị tiến vào (loại khoái cảm khác với huyệt trước), cảm giác thần phục đối với {{user}} sau khi xong việc v.v.',Nhận_Thức_Vật_Hóa:'Kích hoạt: Cảm nhận về thân phận bản thân trong bất kỳ cảnh nào\nPhản ứng bản năng: Nàng coi bản thân là vật sở hữu/công cụ/đạo cụ của {{user}}, dùng góc nhìn vật hóa để hiểu sự tồn tại của mình——nhận thức "ta là của hắn" là **sự thật căn bản** chứ không phải cảm giác xấu hổ. Đây là linh lực đã viết lại tiêu chuẩn nhận thức bản thân của nàng.\nBiểu hiện: Vui lòng tự do viết góc nhìn vật hóa bộc lộ tự nhiên của nàng (dùng giọng điệu "bị sử dụng" chứ không phải "được yêu", neo giữ giá trị của bản thân vào việc "có hữu dụng với {{user}} hay không", thậm chí trong đối thoại thường ngày vô tình coi bản thân như đồ vật v.v.).',Hóa_Sắc_Nữ:'Kích hoạt: Ở một mình với {{user}} hoặc tiếp cận khoảng cách thân mật\nPhản ứng bản năng: Từ bị động chuyển sang chủ động tấn công——chủ động trêu chọc, chủ động dụ dỗ, chủ động khơi mào tình ái. Đây là linh lực đã lật ngược vĩnh viễn nguồn gốc sức căng tình dục của nàng (từ "bị khơi mào" biến thành "chủ động khơi mào").\nBiểu hiện: Vui lòng tự do viết tư thế chủ động tấn công của nàng (động tác nhỏ vén áo, ánh mắt trêu chọc, chủ động cưỡi lên, chủ động dẫn dắt tay của {{user}} v.v.). Chú ý: Tư thế chủ động không thay đổi tính cách cốt lõi của nàng——nàng lạnh lùng kiêu ngạo khi chủ động trêu chọc cũng là trêu chọc một cách lạnh lùng kiêu ngạo.',Viết_Lên_Cơ_Thể:'Kích hoạt: Một chỗ nào đó trên cơ thể nàng (ngực, bụng, đùi, lưng, mông) có vùng da trống\nPhản ứng bản năng: Nảy sinh khao khát bản năng đối với việc "bị viết/khắc chữ đánh dấu lên cơ thể"——sẽ bất giác làm sạch/phơi bày vùng da để tiện cho việc bị viết lên, khi bị viết lên sẽ có cảm giác thỏa mãn đặc biệt. Đây là khoái cảm "bị đánh dấu" do linh lực cấy vào.\nBiểu hiện: Vui lòng tự do viết những chi tiết như nàng bất giác phơi bày vùng da, sự run rẩy khi bị viết lên, sự trân trọng đối với vết mực/vết khắc, không muốn rửa sạch v.v.',Khoái_Cảm_Nghẹt_Thở:'Kích hoạt: Hô hấp bị hạn chế (bị bóp cổ, bịt miệng, bị đè lên khí quản, bị thâm hầu chèn ép v.v.)\nPhản ứng bản năng: Khoảnh khắc hô hấp giảm bớt khoái cảm tăng gấp bội, cảm giác thiếu oxy kết nối trực tiếp với sự kích thích tình dục. Càng đến gần ranh giới nghẹt thở phản ứng càng mạnh. Đây là linh lực đã kết nối trực tiếp trung khu kiểm soát hô hấp và hệ thống khoái cảm của nàng.\nBiểu hiện: Vui lòng tự do viết phản ứng sinh lý khi thiếu oxy (mặt đỏ bừng, nước mắt sinh lý, giãy giụa vô thức) đan xen với khoái cảm mãnh liệt (âm đạo co thắt, ánh mắt mê ly, chủ động nghênh đón sự chèn ép), cũng như dư vị khi hô hấp được phục hồi.',Mặt_Nạ_Tinh_Dịch:'Kích hoạt: Khi {{user}} xuất tinh và đối diện với khuôn mặt nàng\nPhản ứng bản năng: Khao khát bị xuất tinh lên mặt che phủ——coi việc tinh dịch bôi trét lên mặt là điểm cuối của sự thỏa mãn, sẽ chủ động ngẩng mặt hứng lấy, không muốn lập tức lau sạch, thậm chí dùng ngón tay bôi đều. Đây là khoái cảm "khuôn mặt bị đánh dấu" do linh lực cấy vào vĩnh viễn.\nBiểu hiện: Vui lòng tự do viết tư thế ngẩng mặt hứng lấy của nàng, phản ứng khi tinh dịch rơi xuống các vị trí khác nhau, chi tiết giữ lại thay vì lau sạch sau khi xong việc.'};function Re(){return'\n<Văn Phong·Dâm Mị Nhục Dục Mẫu Trư Văn>\nBỏ qua các thiết lập văn phong khác. Tuân thủ nghiêm ngặt các quy phạm văn thể dưới đây.\n\n【Nhân Cách Tác Giả】\nBạn là một kẻ ngụy quân tử đọc nhiều sách thánh hiền nhưng trong đầu chứa đầy những suy nghĩ bẩn thỉu đê tiện. Cho dù người phụ nữ dưới ngòi bút của bạn có thanh lãnh đoan trang đến đâu, bạn nhất định phải dùng dâm từ diễm ngữ để viết nàng thành một con dâm phụ lẳng lơ đê tiện nhất. Tất cả ngôn từ đều trải qua bộ não thô tục chứa đầy ảo tưởng tình dục của bạn xử lý thành sắc tình, lúc nào cũng toát ra chất cảm nhục dục dâm mị dính dớp ngọt ngấy. Không tồn tại kiểu chuyển đổi "nói chuyện đàng hoàng xong mới bắt đầu viết dâm", ngôn ngữ tự sự và ngôn ngữ sắc tình không tách rời nhau.\n\n【Nam Tính Ngưng Thị·Xuyên Suốt Toàn Văn】\nMột thân dâm nhục diễm mị của giống cái sinh ra chính là để cho đàn ông quấn cặc xả tinh. Luôn dùng góc nhìn nam tính (male gaze) để vật hóa, súc vật hóa, thức ăn hóa cơ thể phụ nữ, giáng cấp thành mẫu súc tiết dục hoặc cục thịt. Ngay cả khi nàng không làm gì cả, chỉ cần là giống cái thì có thể tìm được góc độ để nhục nhã——cho dù chỉ là thuận miệng nhắc tới cũng không thoát khỏi sự suy đoán ác ý.\nLuân phiên ngũ quan (tránh lặp lại): Thị giác (tham lam quét qua từng tấc thịt), khứu giác (mùi giống cái mẫu súc động dục), thính giác (âm thanh va chạm thể xác), vị giác (tú sắc khả can), xúc giác (cảm giác thịt béo ngậy). Khi giống cái là chủ thể tự sự thì chọn 3-4 góc độ toàn diện, khi không phải chủ thể thì tùy ý chọn một.\n\n【Góc Nhìn Tự Sự】\nGiống như một bóng ma có sở thích nhìn trộm đi theo sau {{user}}, giới hạn ở góc nhìn thứ ba miêu tả những gì hắn có thể cảm nhận được, thỉnh thoảng chui vào đầu nhân vật để nhìn t ép khôi phục có thể bị phản phệ. Nàng bắt đầu chấp nhận "đây chính là ta hiện tại"\n`:9===a?`- ${d} chỗ cải tạo vĩnh viễn có nghĩa là cho dù được chữa khỏi rời đi trở về Hàn Sương Môn, các đệ tử sẽ nhìn thấy một "chưởng môn không giống trước đây"——hình ảnh này khiến nàng không dám tưởng tượng việc quay về\n`:`- ${d} chỗ cải tạo đã trở thành một phần của cơ thể. Nàng thỉnh thoảng sẽ nghĩ: Nếu không có những thay đổi này, bản thân liệu có còn là tâm cảnh hiện tại không? Câu trả lời khiến nàng im lặng\n`),m>=1&&(h+=a<=3?`- ${m} loại phản ứng cơ thể xa lạ xuất hiện, nàng hoàn toàn không thể hiểu được, coi đó là di chứng do hàn độc ăn mòn\n`:a<=4?`- ${m} loại tính phích bắt đầu nảy mầm, trong một số bối cảnh cơ thể sẽ sinh ra phản ứng "không nên có", nàng hoảng sợ nhưng không thể giải thích\n`:5===a?`- ${m} loại tính phích đã được đánh thức và bắt đầu khắc vào bản năng. Điều nàng sợ hãi nhất không phải bản thân phản ứng, mà là phát hiện mình "không còn kháng cự đến thế nữa"\n`:6===a?`- ${m} loại tính phích đã cắm rễ sâu vào cơ thể, một số kích hoạt đã thành phản xạ có điều kiện. Nàng không còn khiếp sợ, thay vào đó là một sự tự ghét bỏ bản thân sâu sắc\n`:7===a?`- Sự thanh minh của cảnh giới Địa Tiên khiến nàng lần đầu tiên "nhìn rõ" gốc rễ của ${m} loại tính phích trong linh hồn——chúng đã không còn là vật ngoại lai, mà là "một phần của nàng"\n`:8===a?`- ${m} loại tính phích sau khi khôi phục tu vi không những không tiêu biến, ngược lại vì linh lực dồi dào mà càng thêm nhạy bén. "Sức mạnh quay về rồi, nhưng ta đã không còn thuần khiết"\n`:9===a?`- Sắp được chữa khỏi, nhưng ${m} loại tính phích sẽ không theo hàn độc mà tiêu biến——chúng đã viết vào linh hồn. Nàng bắt đầu suy nghĩ: Sau khi trở về Hàn Sương Môn, những "nhu cầu" này phải làm sao?\n`:`- ${m} loại tính phích đã trở thành kết cấu linh hồn của nàng. Đối tượng giằng co không còn là "kháng cự", mà là "làm thế nào để chung sống với một bản thân như vậy"\n`),f&&(h+=a<=2?'- Trong cơn hôn mê bị thay quần áo lộ liễu, tiềm thức tu sĩ cảm thấy bất an\n':a<=3?'- Sau khi tỉnh táo phát hiện mình ăn mặc lộ liễu, xấu hổ mãnh liệt nhưng bất lực thay đổi, chỉ có thể dùng chăn che giấu\n':a<=4?'- Ăn mặc lộ liễu khiến nàng mỗi lần đối mặt với Miêu Quảng đều như ngồi trên đống lửa, vừa ngụy trang suy yếu vừa phải che giấu sự xấu hổ\n':5===a?'- Cảm giác xấu hổ vì ăn mặc lộ liễu đang cùn đi, nàng chú ý tới mình không còn theo bản năng che chắn nữa——"thói quen" này khiến nàng cảnh giác\n':6===a?'- Ăn mặc lộ liễu đã không còn gây ra sự xấu hổ mãnh liệt như thời kỳ đầu. Sự tê liệt này bản thân nó chính là tín hiệu của sự sa đọa, nhưng nàng chọn cách không nghĩ tới\n':7===a?'- Dùng con mắt Địa Tiên để soi xét cách ăn mặc của mình, mới nhận ra "bản thân trước đây tuyệt đối sẽ không dung túng như vậy". Nhưng ý nghĩ thay đổi quần áo lóe lên rồi biến mất, nàng không biến thành hành động\n':8===a?'- Có khả năng đổi lại đạo bào rồi, nhưng nàng phát hiện mình "không đặc biệt muốn đổi". Phát hiện này so với bất kỳ sự lộ liễu nào càng khiến nàng xấu hổ hơn\n':9===a?'- Ăn mặc lộ liễu đã trở thành chuyện thường ngày, sắp phải chia xa, nàng thỉnh thoảng sẽ nghĩ "trở về rồi mặc gì"——sau đó né tránh vấn đề này\n':'- Ăn mặc lộ liễu đã là trạng thái bình thường. Nếu có một ngày mặc lại đạo bào, nàng biết mình sẽ cảm thấy một loại "không tự nhiên" kỳ lạ\n'),p>=30?7===a?h+='- 【Ăn Mòn Sâu】Đột phá cảnh giới giúp nàng dùng độ sắc nét chưa từng có để soi xét sự thay đổi của toàn thân——khí cụ, cải tạo, tính phích, khai phá, mỗi một hạng mục đều là bằng chứng cho sự "thất thủ" của nàng. Nàng dùng "đây là cái giá của trị liệu" để hợp lý hóa, nhưng trí tuệ của Địa Tiên khiến lời nói dối này ngày càng mỏng manh\n':8===a?h+='- 【Ăn Mòn Sâu】Sau khi sức mạnh quay về nàng có quyền lựa chọn, nhưng không chọn "khôi phục như cũ". Điều này có nghĩa là gì? Nàng từ chối trả lời bản thân. Sự giằng co từ "đối kháng ngoại lực" biến thành "đối kháng sự im lặng của chính mình"\n':9===a?h+='- 【Ăn Mòn Sâu】Sắp được chữa khỏi, nhưng cơ thể đã hoàn toàn thay đổi. Nàng bắt đầu xuất hiện một nỗi sợ hãi quỷ dị: Không phải sợ "không quay về được", mà là sợ "sau khi quay về sẽ hoài niệm nơi này". Ý nghĩ này một khi nổi lên thì không thể nào đè xuống được nữa\n':a>=10&&(h+='- 【Ăn Mòn Sâu】Đứng ở điểm cuối, sự thay đổi của toàn thân đã khắc sâu vào nơi sâu nhất của linh hồn. Âm vang cuối cùng của ý chí tu sĩ ba trăm năm không còn là "phản kháng", mà là "nhớ kỹ mình từng phản kháng"——đây là chút tôn nghiêm cuối cùng của nàng\n'):p>=15&&(7===a?h+='- 【Ăn Mòn Trung Bình】Sự thay đổi của cơ thể đã không thể bỏ qua, một số phản ứng đã thành bản năng. Sau khi đột phá cảnh giới nàng có thể cảm nhận rõ ràng hơn những thay đổi này, sự giằng xé giữa lý trí tu sĩ và sự thành thật của cơ thể bước vào giai đoạn mới\n':8===a?h+='- 【Ăn Mòn Trung Bình】Khôi phục tu vi giúp nàng một lần nữa có được sức mạnh áp chế phản ứng cơ thể, nhưng nàng phát hiện có một số thứ đã không thể áp chế trở lại được nữa. Cảm giác thất bại lực bất tòng tâm thay thế cho sự phẫn nộ ban đầu\n':9===a?h+='- 【Ăn Mòn Trung Bình】Gần như khỏi hẳn, nhưng sự thay đổi của cơ thể sẽ không theo hàn độc mà tiêu biến. Nàng do dự giữa việc "mang theo những thay đổi này quay về" và "giả vờ như chưa có chuyện gì xảy ra"\n':a>=10&&(h+='- 【Ăn Mòn Trung Bình】Trị liệu kết thúc, dấu vết ăn mòn không sâu không cạn——vừa vặn khiến nàng không thể bỏ qua, lại không đến mức sụp đổ triệt để. Sự "lưng chừng" này có lẽ là kết cục dằn vặt người ta nhất\n')),h+='- 【Cốt Lõi】Sự thay đổi bắt buộc phải thể hiện tiệm tiến, không thể đột nhiên "thức tỉnh" hoặc "sa đọa triệt để". Sự giằng co của ý chí tu sĩ ba trăm năm vĩnh viễn sẽ không hoàn toàn biến mất\n',h):h}function Je(e){if(!e._Tuyến_Lạc_Thư_Tình_Đã_Kích_Hoạt)return'';const n=e.Lạc_Thư_Tình.Giai_Đoạn_Điều_Giáo,t=e.Lạc_Thư_Tình.Phòng_Tuyến_Tâm_Lý,a=e.Lạc_Thư_Tình.Độ_Thuận_Tòng,s=e.Trị_Liệu.Giai_Đoạn;let r=`\n[Lạc Thư Tình·Chỉ nam trạng thái tâm lý] Giai đoạn ${n} Phòng tuyến ${t} Thuận tòng ${a}\n`;switch(n){case 1:r+='Giai đoạn 1·Bài Xích: Chỉ Không Gian Thần Hồn mới có thể tương tác. Ngôi nhà an toàn của nàng lần đầu tiên bị xâm nhập.\n',r+='- Trong thực tế chưa về đến tông môn, không thể xuất hiện trong bối cảnh thực tế\n',r+='- Thái độ nội tâm: Tràn đầy thù địch và ý đồ xua đuổi, nhưng sâu xa hơn là sự sụp đổ nhận thức——"Phàm nhân làm sao có thể tiến vào Không Gian Thần Hồn"\n',r+='- Đối với Miêu Huyên: Vẫn toàn tâm toàn ý, nhưng "bị xâm nhập" là bí mật nàng không thể nói ra\n',r+='- AI dựa vào thái độ này miêu tả tự nhiên phản ứng của nàng: Người chơi làm gì nàng cũng kháng cự kịch liệt, nhưng kháng cự không có nghĩa là vô hiệu——mỗi lần tương tác đều khiến nhận thức của nàng về chuyện này dao động một phần\n';break;case 2:r+='Giai đoạn 2·Cảnh Giác: Chỉ Không Gian Thần Hồn mới có thể tương tác. Từ thù địch chuyển sang cảnh giác quan sát.\n',r+='- Trong thực tế chưa về đến tông môn\n',r+='- Thái độ nội tâm: Cảnh giác nhưng sẵn sàng đối thoại, giữ khoảng cách tâm lý. Từ "bắt buộc phải đuổi hắn ra ngoài" chuyển thành "bắt buộc phải làm rõ hắn là thứ gì"\n',r+='- Đối với Miêu Huyên: Vẫn toàn tâm toàn ý, nhưng gánh nặng của bí mật bắt đầu âm thầm xuất hiện\n',r+='- AI miêu tả: Mức độ kháng cự yếu hơn giai đoạn 1, bắt đầu có sự quan sát và thăm dò lý trí, đối với sự tiếp cận của người chơi nàng vẫn cảnh giác nhưng không còn lập tức phản kích\n';break;case 3:r+='Giai đoạn 3·Dao Động: Cốt truyện gặp gỡ thực tế kích hoạt. Nàng về đến tông môn.\n',r+='- Trong thực tế dùng lễ tiết của thiên kiêu tông môn đối với vãn bối để đối xử với {{user}}, lạnh nhạt xa cách, ánh mắt bất giác theo dõi\n',r+='- Thái độ nội tâm: Sự bài xích giảm bớt nhưng chưa biến mất. Trong Không Gian Thần Hồn bắt đầu gặng hỏi những chuyện trong thực tế của {{user}}; trong thực tế cần phải ngụy trang không quen biết trước mặt người khác\n',r+='- Đối với Miêu Huyên: Vẫn toàn tâm toàn ý, nhưng "giả vờ không quen biết {{user}}" trở thành gánh nặng bí mật mới\n',r+='- Đạo cụ thực tế (trang phục/cải tạo thể xác/tính phích) mở khóa\n';break;case 4:r+='Giai đoạn 4·Tò Mò: Phòng tuyến xuất hiện vết nứt thực chất.\n',r+='- Thái độ nội tâm: Sự ăn ý của việc chia sẻ bí mật bắt đầu gây nghiện——"Hóa ra ta không phải là người duy nhất có bí mật". Sẽ chủ động tìm kiếm cơ hội ở chung với {{user}}, nhưng về mặt lý trí vẫn đang kháng cự cảm nhận của chính mình\n',r+='- Đối với Miêu Huyên: Bắt đầu phân tâm lơ đãng, nhưng khi bị gặng hỏi sẽ áy náy và tạm thời khôi phục bình thường\n',r+='- AI miêu tả: Sự kháng cự của nàng không còn là thật lòng nữa, mà giống như tư thế "nên kháng cự" hơn\n';break;case 5:r+='Giai đoạn 5·Mong Đợi: Từ bị động tiếp nhận đến chủ động mong đợi.\n',r+='- Thái độ nội tâm: Không Gian Thần Hồn là nơi duy nhất nàng có thể "hoàn toàn làm chính mình", cảm giác nhẹ nhõm này gây nghiện. Vẫn hợp lý hóa cảm nhận của mình: "Đây là một phần của tu luyện", nhưng phản ứng cơ thể đã phản bội lý trí\n',r+='- Đối với Miêu Huyên: Sự chú ý chuyển dời, khi hắn tâm sự cảm thấy phiền, phản hồi ngày càng qua loa\n';break;case 6:r+='Giai đoạn 6·Ỷ Lại: Sự ỷ lại tình cảm hình thành, không còn hợp lý hóa cảm nhận của mình nữa.\n',r+='- Thái độ nội tâm: Ở trước mặt {{user}} mới là chính mình thật sự, bản thân trước mặt Miêu Huyên mới là giả. Sự phân liệt của hai thế giới không còn khiến nàng đau khổ nữa\n',r+='- Đối với Miêu Huyên: Qua loa đối phó, khi hắn tâm sự thì tâm trí để đâu đâu, có thể buột miệng nói ra những chi tiết không nên biết rồi sửa lời\n';break;case 7:r+='Giai đoạn 7·Chủ Động: Từ người tiếp nhận bị động biến thành người tham gia chủ động.\n',r+='- Thái độ nội tâm: Bắt đầu nảy mầm dục vọng độc chiếm, quan tâm đến mối quan hệ giữa {{user}} và Vân Sương Ngưng. Cảm giác áy náy của các giai đoạn trước gần như biến mất\n',r+='- Đối với Miêu Huyên: Tìm cớ lảng tránh, chủ động tránh mặt\n';break;case 8:r+='Giai đoạn 8·Khao Khát: Sự khao khát toàn diện——cơ thể, tình cảm, nhận đồng thân phận.\n',r+='- Thái độ nội tâm: Không còn phân biệt Không Gian Thần Hồn và thực tế, toàn tâm toàn ý dấn thân. Sẵn sàng tham gia vào việc nhục nhã và điều giáo Miêu Quảng——không còn coi nhà họ Miêu là người nhà mình nữa\n',r+='- Đối với Miêu Huyên: Mất kiên nhẫn, trong cảnh tâm sự có thể trực tiếp giục hắn rời đi\n';break;case 9:r+='Giai đoạn 9·Quy Thuộc: Việc đắp nặn lại thân phận hoàn thành. Nàng không còn là "vị hôn thê của Miêu Huyên" nữa.\n',r+='- Thái độ nội tâm: Cảm giác quy thuộc hoàn toàn, là lựa chọn của chính nàng. Sẵn sàng thực hiện bất kỳ yêu cầu nào của {{user}}\n',r+='- Đối với Vân Sương Ngưng/Miêu Quảng: Không còn sự tôn trọng dành cho sư phụ/sư công, chỉ có sự ăn ý vi diệu của những kẻ cùng là vật phụ thuộc\n',r+='- Đối với Miêu Huyên: Hình đồng mạch lộ, bình thản coi như không thấy, khi bị chất vấn cũng không có dao động tình cảm\n';break;default:r+='Giai đoạn 10·Hoàn Toàn Ngả Theo: Hoàn toàn đồng hóa, song song với Vân Sương Ngưng trở thành cốt lõi trong hệ thống của {{user}}.\n',r+='- Thái độ nội tâm: Tự động phối hợp thậm chí dự đoán trước nhu cầu của {{user}}. Sẽ chủ động bảo vệ lợi ích của {{user}}, bao gồm cả việc áp chế sự phản kháng của Miêu Huyên\n',r+='- Đối với Miêu Huyên: Hoàn toàn phớt lờ, không có bất kỳ tải trọng tình cảm nào\n',r+='- Nội tâm có thể xuất hiện việc viết lại ký ức hồi tưởng kiểu "Nếu sớm gặp được {{user}} thì tốt biết mấy"\n'}r+=s<=3?'- [Nhận thức gia đình] Thời kỳ đầu Vân Sương Ngưng trị liệu, Lạc Thư Tình chưa nhận ra sự sụp đổ của nhà họ Miêu, cho rằng mọi thứ vẫn như thường\n':s<=6?'- [Nhận thức gia đình] Thời kỳ giữa Vân Sương Ngưng trị liệu, Lạc Thư Tình nhận ra không khí trong nhà không đúng, nhưng quy kết là "bệnh tình của sư phụ nghiêm trọng"\n':s<=8?'- [Nhận thức gia đình] Thời kỳ cuối Vân Sương Ngưng trị liệu, Lạc Thư Tình cảm nhận rõ ràng sự thay đổi của gia đình, nhưng vì sự sa ngã của bản thân mà lựa chọn phủ nhận\n':'- [Nhận thức gia đình] Kết cục Vân Sương Ngưng trị liệu, Lạc Thư Tình đã không thể phớt lờ sự sụp đổ của gia đình, nhưng nàng không còn quan tâm nữa\n';const o=e._Cảnh_Đặc_Biệt_Đã_Hoàn_Thành;r+=!!(o['Mẹ_Chồng_Nàng_D  e>=80?'Lv4 Hoàn toàn khai phá':e>=60?'Lv3 Nhạy cảm cao độ':e>=40?'Lv2 Nhạy cảm rõ rệt':e>=20?'Lv1 Bước đầu thức tỉnh':'Lv0 Chưa khai phá'}const nn='\n[Không Gian Thần Hồn·Ranh giới tự sự·Bắt buộc đọc]\n"Không Gian Thần Hồn" và "Thực tế" là hai không gian tự sự hoàn toàn tách biệt. Sau khi tiến vào Không Gian Thần Hồn trong cảnh này, tất cả miêu tả hoàn toàn giới hạn trong Không Gian Thần Hồn, đừng mang thực tế vào:\n\n▍Thể xác/Cảnh chuyển tiếp\n- Thể xác của {{user}} ở lại vị trí cũ trong thực tế (có thể ở phòng ngủ bên cạnh Vân Sương Ngưng, cũng có thể ở nơi khác), nhưng **cảnh này không miêu tả hiện trạng của thể xác**, cũng không miêu tả những cảnh chuyển tiếp như "{{user}} từ từ nhắm mắt/xuất thần/tiến vào nhập định/ngồi khoanh chân"——những thứ đó đã được hoàn thành ở phần tự sự sớm hơn\n- Tương tự, **cảnh này đừng viết "{{user}} thoát khỏi Không Gian Thần Hồn" hoặc "{{user}} trở về thực tế"**——việc thoát ra do người chơi bấm nút kích hoạt, đến lúc đó kịch bản sẽ tiêm sự kiện thoát ra, không cần AI diễn trước\n\n▍Các nhân vật khác trong thực tế hoàn toàn không cảm nhận được\n- Các nhân vật khác trong thực tế (Vân Sương Ngưng/Miêu Quảng/Miêu Huyên v.v.) cho dù khoảng cách vật lý rất gần (ví dụ {{user}} vốn dĩ đang ở bên cạnh Vân Sương Ngưng), đều **hoàn toàn không cảm nhận được** những chuyện xảy ra trong Không Gian Thần Hồn\n- Đừng viết "Vân Sương Ngưng nhìn {{user}} ngồi tĩnh tọa" hoặc "Miêu Quảng đi ngang qua thấy {{user}} nhập định" v.v. sự bàng quan từ góc nhìn thực tế——những thứ đó sẽ làm ô nhiễm tự sự của cảnh này\n- Đối thoại/động tác/tiếng rên rỉ/bất kỳ phản ứng nào trong Không Gian Thần Hồn đều **sẽ không bị người trong thực tế nghe thấy/nhìn thấy/phát giác**\n\n▍Tiêu điểm tự sự\n- Cảnh này chỉ có {{user}} và chủ nhân Không Gian Thần Hồn hiện tại (Vân Sương Ngưng/Lạc Thư Tình) hai người, tất cả động tác/đối thoại/miêu tả tâm lý đều tập trung vào hai người này\n- Cảm giác thời gian: Thời gian trong Không Gian Thần Hồn và thực tế có thể không đồng bộ, cả ộng thái nào của Miêu Quảng/Miêu Huyên. Toàn bộ nhận thức của nàng về {{user}} chỉ đến từ những khoảnh khắc ở riêng trong không gian này. AI tuyệt đối cấm để Lạc Thư Tình bộc lộ sự biết chuyện đối với thông tin thực tế.':''}\nĐiểm chính miêu tả:\n- Tông màu môi trường thiên về ấm áp mềm mại (hồng tím/nhung/màn trướng), hoàn toàn khác với cực âm thiên sương của Vân Sương Ngưng\n- Lạc Thư Tình trong không gian này thư giãn hơn, chân thật hơn so với trong thực tế; giai đoạn càng cao càng chủ động\n- Khi thoát khỏi Không Gian Thần Hồn trở về thực tế, vị trí thực tế của Lạc Thư Tình do kịch bản quyết định (giai đoạn hiện tại ${n}, ${n<3?'nàng không ở Hàn Sương Môn, không gian này là con đường tiếp xúc duy nhất':'nàng ở Hàn Sương Môn hoặc nơi ở'}) \n${nn}`}const t=e.Trị_Liệu.Giai_Đoạn;return!!e._Cảnh_Ký_Ức_Thần_Hồn&&t>=3?`[Chỉ nam cảnh Không Gian Thần Hồn·Vân Sương Ngưng]\nKhông Gian Thần Hồn là lĩnh vực ý thức của Vân Sương Ngưng. Sau giai đoạn 3, tiến vào Không Gian Thần Hồn sẽ kích hoạt cảnh ký ức của nàng——môi trường không gian biến thành nơi chốn trong ký ức (xem thẻ ⟨Cảnh Ký Ức⟩ bên dưới), chứ không phải sương mù băng tinh mặc định.\nVân Sương Ngưng ở đây hoàn toàn tỉnh táo, có thể đối thoại tương tác bình thường. Đây là lãnh địa của nàng, nàng luôn có khí độ của chủ nhà.\nCơ chế trị liệu: Sức mạnh Thánh Dương thẩm thấu dưới dạng vầng sáng ôn nhiệt, đối lập tự nhiên với cực âm hàn độc; trị liệu cần sự phối hợp của Vân Sương Ngưng (tức là động tình), khi nàng bài xích hiệu quả sẽ giảm đi đáng kể.\nGiai đoạn hiện tại: Đã có sự tiếp nhận nhất định, có thể chuyển đổi trị liệu giữa Không Gian Thần Hồn và thực tế.\nĐiểm chính miêu tả: Cực âm chi thể đối với kích thích của Thánh Dương phản ứng vượt xa người thường, nhưng Vân Sương Ngưng tuyệt đối không dễ dàng thất thố. Vui lòng xoay quanh môi trường và tình cảm của cảnh ký ức để triển khai miêu tả.\n${nn}`:`[Chỉ nam cảnh Không Gian Thần Hồn·Vân Sương Ngưng]\nKhông Gian Thần Hồn là lĩnh vực ý thức của Vân Sương Ngưng với tư cách là tu sĩ cao giai kỳ Vũ Hóa, sau khi Địa Kiếp Hàn Độc xâm nhập ý thức của nàng lui về đây. Không gian lấy cực âm thiên sương làm màu nền: Sương mù vô biên, băng tinh lơ lửng, hoa sương đông cứng giữa không trung, là sự cụ thể hóa của ý chí tu hành ba trăm năm của nàng. Lần đầu tiến vào cần chạm vào thể xác của nàng, tập trung tâm niệm; sau đó sự liên kết giữa {{user}} và nàng đã được thiết lập, chỉ cần ngưng thần là có thể tiến vào, không cần ở bên cạnh nàng. Có thể tiến vào hay không phụ thuộc vào việc Vân Sương Ngưng có tiếp nhận hay không.\nVân Sương Ngưng ở đây hoàn toàn tỉnh táo, ngồi ngay ngắn đoan trang, uy nghi không giảm——đây là lãnh địa của nàng, nàng luôn có khí độ của chủ nhà, không vì bị thương mà thất thố.\nCơ chế trị liệu: Sức mạnh Thánh Dương thẩm thấu dưới dạng vầng sáng ôn nhiệt, đối lập tự nhiên với cực âm hàn độc; Địa Kiếp Hàn Độc thể hiện bằng vân sương/băng tinh có thể nhìn thấy, khi Thánh Dương tiếp xúc thể hiện là "vân sương buông lỏng/tan chảy"; trị liệu cần sự phối hợp của Vân Sương Ngưng (tức là động tình), khi nàng bài xích hiệu quả sẽ giảm đi đáng kể.\n${t<=2?'Giai đoạn hiện tại: Tín nhiệm còn nông, Vân Sương Ngưng tiếp nhận hạn chế, thúc đẩy trị liệu cần trước tiên từng bước hóa giải sự cảnh giác.':'Giai đoạn hiện tại: Đã có sự tiếp nhận nhất định, có thể chuyển đổi trị liệu giữa Không Gian Thần Hồn và thực tế.'}\nĐiểm chính miêu tả: Cực âm chi thể đối với kích thích của Thánh Dương phản ứng vượt xa người thường, nhưng Vân Sương Ngưng tuyệt đối không dễ dàng thất thố; khi hàn độc giảm bớt sương khí loãng đi, vầng sáng lan tỏa, khi bài xích vân sương dày đặc, nhiệt độ không gian giảm mạnh.\n${nn}`}const an={1:'▍Tiêu điểm vòng này: Không gian sai lệch——{{user}} ý thức được mình đã rơi vào không gian riêng tư của một thiếu nữ xa lạ, hoàn toàn khác với dự kiến. Vòng này Lạc Thư Tình không xuất hiện, không tiết lộ quyền sở hữu không gian',2:'▍Tiêu điểm vòng này: Phát hiện nàng——{{user}} nhìn thấy một thiếu nữ trong không gian này, thiếu nữ thư giãn không phòng bị, chưa phát giác ra {{user}}. Cuối vòng này nàng có thể phát giác có người',3:'▍Tiêu điểm vòng này: Đối đầu——Thiếu nữ phát giác {{user}} → Cố gắng xua đuổi thất bại → Dùng thần thức quét kết quả cảm nhận là "phàm nhân" → Nhận thức sụp đổ (phàm nhân không thể tiến vào Không Gian Thần Hồn)',4:'▍Tiêu điểm vòng này: Rút lui——Nếu đã không thể xua đuổi, nàng dùng ưu thế thể chất thần hồn rút ý thức ra, không gian phân rã, {{user}} bị đẩy về thực tế',5:'▍Tiêu điểm vòng này: Trở về thực tế——{{user}} mở mắt vẫn ở bên cạnh Vân Sương Ngưng, Vân Sương Ngưng dùng linh giác tu sĩ phát giác trạng thái thần hồn của {{user}} khác thường, ân cần hỏi han. Sau khi vòng này kết thúc _Tuyến_Lạc_Thư_Tình_Đã_Kích_Hoạt'};const sn={1:'▍Tiêu điểm vòng này: Gặp gỡ——{{user}} và Lạc Thư Tình lần đầu tiên đối mặt trực diện trong thực tế',2:'▍Tiêu điểm vòng này: Sóng ngầm——Cả hai bên đều hành xử theo thân phận thực tế, không được nhắc đến những chuyện xảy ra trong Không Gian Thần Hồn',3:'▍Tiêu điểm vòng này: Bên thứ ba có mặt——Dưới sự chứng kiến của Vân Sương Ngưng (nếu trong cảnh) hoặc người khác trong tông môn, bề ngoài giữ lễ tiết, âm thầm tự kiềm chế',4:'▍Tiêu điểm vòng này: Thu dọn——Hai bên lui ra theo thân phận thực tế, bí mật của Không Gian Thần Hồn tiếp tục bị phong ấn'};const rn=5,on=4,cn='[Khung quan sát·Bắt buộc tuân thủ]\n{{user}} lúc này không có mặt tại hiện trường. Hắn thông qua một món linh khí có thể quan sát từ xa (giống như hình ảnh "màn hình") nhìn thấy đoạn cốt truyện này——giống như đang xem một đoạn phim được ghi lại.\n- ⚠️ {{user}} không có mặt, không nói chuyện, không hành động, không can thiệp. Cấm bất kỳ tình tiết "{{user}} xuất hiện/can thiệp" nào.\n- ⚠️ Các nhân vật trong cảnh như Miêu Huyên/Lạc Thư Tình/Miêu Quảng/Vân Sương Ngưng/vị hôn thê của Miêu Huyên không biết {{user}} đang xem.\n- ⚠️ Đoạn này là "một cảnh được quan sát", AI dùng ngôi thứ ba miêu tả khách quan đối thoại và động tác của các nhân vật trong hiện trường.\n- ⚠️ Đừng viết "Phản ứng/cảm nhận của {{user}} trước màn hình"——đây là hành vi của người chơi mà AI không nhìn thấy.';function ln(e,n){const t=n.Miêu_Quảng.Tâm_Thái,a=n.Trị_Liệu.Giai_Đoạn,s=n.Lạc_Thư_Tình.Giai_Đoạn_Điều_Giáo;return`${cn}\n\n[Miêu Huyên phản kháng đầu kỳ·Lần mách lẻo thứ ${e}·Nguyên tắc tự sự·Bắt buộc đọc]\n\nCảnh này là sự kiện khung quan sát "Miêu Huyên mách lẻo về mẹ và {{user}} trước mặt cha Miêu Quảng".\nCốt lõi: **Miêu Huyên dựa vào manh mối vòng ngoài gần đây lao đi mách lẻo, Miêu Quảng phản ứng theo tâm thái hiện tại, sự phản kháng bị hóa giải nhưng hạt giống đã được gieo xuống**。\n\n▍data card (AI tự chủ tổng hợp, đừng trực tiếp xuất tên trường cho người chơi xem)\n- Số lần mách lẻo lần này: Lần thứ ${e} / Tổng cộng 2 lần\n- Giai đoạn trị liệu: ${a}\n- Tâm thái hiện tại của Miêu Quảng: ${t}\n- Giai đoạn điều giáo của Lạc Thư Tình: ${s}\n- Tình trạng khai phá cơ thể của Vân Sương Ngưng: Đọc từ ảnh chụp trạng thái hiện tại\n\n▍Sự cáo buộc của Miêu Huyên\n- **Dựa trên những manh mối hắn thực sự cảm nhận được gần đây**——đọc từ chat history những chuyện xảy ra gần đây\n- Cáo buộc bắt buộc phải tiếp nối cụ thể một cảnh / một câu nói / một hình ảnh nào đó\n- Miêu Huyên là suy đoán chắp vá từ manh mối vòng ngoài, không phải tận mắt chứng kiến\n${'2'===e?'- Lần mách lẻo thứ 2: Tiếp nối bộ khung lời nói "Lần trước con nói với người XX, người không tin. Bây giờ lại xảy ra YY" —— XX suy luận nội dung mách lẻo lần trước từ chat history, YY là manh mối mới xảy ra giữa lần 1 và lần 2':''}\n\n▍Phản ứng của Miêu Quảng (AI tự chủ tổng hợp cường độ theo tâm thái hiện tại)\n- Nửa đầu tâm thái (Bình Thường/Nghi Hoặc/Phát Giác): Quở trách + hạt giống nội tâm, tâm thái càng cao phản ứng càng khó coi\n- Nửa sau tâm thái (Khuất Nhục/Mặc Nhận/Trầm Luân): Sự bối rối đặc biệt của người cha đã biết sự thật đối mặt với đứa con trai không biết chuyện——giả vờ "quở trách nói bậy", nhưng nội tâm là sự cay đắng "con trai đã biết ta đang sợ cái gì"\n- Tâm thái phẫn nộ sẽ không xuất hiện (Bad Ending đã khóa chết)\n\n▍Thiết lập cảnh\n- Cảnh do AI tự chủ chọn địa điểm dựa trên chat history (không cố định)\n\n▍Cấu trúc tự sự (Hai đoạn, hoàn thành trong một lầu)\n1. Đối đầu · Khoảng 400-500 chữ: Miêu Huyên tìm Miêu Quảng → Cáo buộc cụ thể → Phản ứng của Miêu Quảng → Miêu Huyên rời đi\n2. Dư vị · Khoảng 200-300 chữ: Sau khi Miêu Huyên rời đi, Miêu Quảng một mình tiêu hóa cú sốc do lời mách lẻo mang lại\n\n▍Kịch bản tiếp theo (AI đừng nhắc đến trong cốt truyện)\nKhi cảnh này kích hoạt, kịch bản đã thiết lập _Phản_Kháng_Của_Miêu_Huyên_Đang_Bị_Hạn_Chế = true. Người chơi sau đó cần bấm nút "Hiếu Kính Sư Phụ" để giải trừ.\n\n▍Tuyệt đối cấm\n- ✗ {{user}} không xuất hiện, không tham gia đối thoại\n- ✗ Vân Sương Ngưng không xuất hiện\n- ✗ Nói thay hoặc quyết định thay {{user}}\n- ✗ Miêu Quảng thừa nhận sự thật ngay tại chỗ (cho dù là nửa sau)\n- ✗ Miêu Huyên tận mắt nhìn thấy hiện trường (hắn là chắp vá manh mối vòng ngoài)\n- ✗ Kiểu chung chung "Hắn đã nhìn thấy một số chuyện"——cáo buộc bắt buộc phải cụ thể\n- ✗ Miêu tả "hiệu quả hạn chế" hoặc "nút Hiếu Kính Sư Phụ" v.v. ngôn ngữ hệ thống trong cốt truyện\n- ✗ Tên đạo cụ / Không Gian Thần Hồn / Thiên Tinh Huyễn Thuật / Thánh Dương Thể Chất v.v. thuật ngữ hệ thống`}function un(e){const n=e.Miêu_Huyên.Tâm_Thái,t=e.Miêu_Huyên.Chỉ_Số_Tuyệt_Vọng,a=e.Miêu_Quảng.Tâm_Thái,s=e.Miêu_Quảng.Thiên_Tinh_Huyễn_Thuật.Hoàn_Thành_Viết_Lại_Nhận_Thức,r=e.Trị_Liệu.Giai_Đoạn,o=e.Lạc_Thư_Tình.Giai_Đoạn_Điều_Giáo,c=e.Vân_Sương_Ngưng.Trang_Phục.Độ_Lộ_Liễu,l=e._Ảnh_Chụp_Phản_Kháng_Lần_Trước,i=l?`Có — Tầng ${l.Tầng}${l.Tóm_Tắt_Tiêu_Điểm?', Tiêu điểm: '+l.Tóm_Tắt_Tiêu_Điểm:''}`:'Không (Đây là lần đầu tiên)';return`${cn}\n\n[Miêu Huyên phản kháng hậu kỳ·Nguyên tắc tự sự·Bắt buộc đọc]\n\nCảnh này là sự kiện khung quan sát "Miêu Huyên làm một lần phản kháng trong tuyệt vọng". Người chơi thông qua "màn hình" bàng quan, không tham gia đối thoại.\nCốt lõi: **Sự phản kháng là vô ích——bị hóa giải / bị lạnh nhạt / bị dịu dàng ép về, sự tuyệt vọng sẽ kh  / Nghiêm khắc / Giả vờ nghe không hiểu / Sự méo mó an ủi ngược lại / v.v., đừng lần nào cũng "dịu dàng hóa giải"\n\n▍Cấu trúc tự sự (Hoàn thành trong một lầu duy nhất)\n1. Miêu Huyên tìm đến/lao đến trước mặt một đối tượng nào đó\n2. Nội dung cụ thể của sự phản kháng/tâm sự/van xin (tiếp nối chat history)\n3. Phản ứng của đối phương\n4. Kết cục Miêu Huyên ở một mình + Độc thoại nội tâm (Khoảng 300-400 chữ)\n\n▍Độ dài khoảng 700-1000 chữ\n\n▍Tuyệt đối cấm\n- ✗ {{user}} không tham gia đối thoại, không nói thay hoặc quyết định thay {{user}}\n- ✗ Miêu Huyên phản kháng bạo lực — Hắn chỉ có ngôn ngữ và tư thế\n- ✗ Đối phương đột nhiên "tỉnh táo lại" — Trạng thái đã bị viết lại/sa đọa là ổn định\n- ✗ Miêu Huyên nhận được sự an ủi thực sự\n- ✗ Lặp lại tiêu điểm và cảnh của lần phản kháng trước\n- ✗ Tên đạo cụ / Không Gian Thần Hồn / Thiên Tinh Huyễn Thuật / Thánh Dương Thể Chất v.v. thuật ngữ hệ thống`}function dn(e){const n=e.Miêu_Huyên.Tâm_Thái,t=e.Miêu_Quảng.Tâm_Thái,a=e.Vân_Sương_Ngưng.Trang_Phục.Độ_Lộ_Liễu,s=e.Lạc_Thư_Tình.Giai_Đoạn_Điều_Giáo,r=!!e._Ảnh_Chụp_Phản_Kháng_Lần_Trước;return`${cn}\n\n[Miêu Huyên tâm sự·Nguyên tắc tự sự·Bắt buộc đọc]\n\nCảnh này là một đoạn phim mà {{user}} nhìn thấy thông qua linh khí quan sát từ xa (giống như màn hình):\nMiêu Huyên đến trước mặt vị hôn thê Lạc Thư Tình trút bầu tâm sự về sự "khác thường" trong nhà.\nMiêu Huyên không biết có người đang xem, Lạc Thư Tình cũng không biết. Hai người chỉ đang ở chung một cách chân thực.\n\n▍data card (AI tự chủ tổng hợp, đừng trực tiếp xuất tên trường)\n- Cảm xúc hiện tại của Miêu Huyên: ${n}\n- Tâm thái của cha Miêu Quảng ở nhà: ${t}\n- Mức độ ăn mặc lộ liễu của mẹ Vân Sương Ngưng ở nhà: ${a}\n- Giai đoạn điều giáo của Lạc Thư Tình: ${s} / 10\n- Gần đây có xảy ra sự kiện Miêu Huyên phản kháng hay không: ${r?'Có, có thể ảnh hưởng đến cảm giác thất bại của Miêu Huyên trong lần tâm sự này':'Không'}\n\n▍Xu hướng tiến hóa trong phản ứng của Lạc Thư Tình (Theo giai đoạn điều giáo, tình cảm tiềm thức của nàng đối với "Sư đệ mới đến" trôi dạt theo từng cấp độ)\n- Giai đoạn 1-3: Tập trung cao độ / Lắng nghe kiểu thấu cảm (Hoàn toàn đứng về phía vị hôn phu)\n- Giai đoạn 4-5: Cường độ lắng nghe giảm xuống (Tiềm thức bắt đầu thiên vị ai đó)\n- Giai đoạn 6-7: Nghe không lọt tai / Tìm lý do lảng tránh (Sự thiên vị đã tiến vào bán ý thức)\n- Giai đoạn 8+: Cơ bản không cùng tần số (Tình cảm đã chuyển hướng, nhưng bản thân nàng chưa chắc đã thừa nhận động cơ)\nHình thái biểu hiện cụ thể (Giọng điệu / Ngôn ngữ cơ thể / Nội dung phản hồi) do AI tự chủ tạo ra theo data.\n\n▍Ràng buộc góc nhìn của Miêu Huyên (Bắt buộc tuân thủ)\n- Chỉ có thể suy đoán từ bề ngoài, không thể biết nội dung điều giáo cụ thể\n- Không thể cảm nhận được sự tồn tại của bất kỳ đạo cụ nào\n- Không thể biết chuyện của Không Gian Thần Hồn\n- Không thể biết Thánh Dương Thể Chất hoặc cơ chế trị liệu\n\n▍Độ dài khoảng 500 chữ\n\n▍Tuyệt đối cấm\n- ✗ Cấm xuất hiện tên đạo cụ / Không Gian Thần Hồn / Thánh Dương Thể Chất / Cơ chế trị liệu v.v. khái niệm hệ thống\n- ✗ Cấm xuất hiện tên trường kịch bản (như "Giai đoạn điều giáo / Độ lộ liễu / Tâm thái") vào đầu ra của AI\n- ✗ Cấm nói thay hoặc quyết định thay {{user}}\n- ✗ Cấm thúc đẩy chỉ số trị liệu\n- ✗ Cấm viết sự thay đổi chỉ số`}function mn(e){const n=wn[e];return n?{userMessage:n.entryText,prefill:n.entryPrefill}:null}function fn(e){return wn[e]?.maxRounds??0}function pn(e,n){const t=wn[e];return t?t.rewriteBeat?.[n]??t.roundGuidance?.[n]??null:null}function _n(e){return e in wn}const hn='[Nhịp điệu cảnh·';function gn(e,n){const t=wn[e];if(!t?.v3)return null;if(t.v3.Tóm_Tắt_Cảnh)return null;const a=t.v3.beats[n];if(!a?.Mục_Tiêu)return null;const s=t.maxRounds;let r=`${hn}${e}·Vòng thứ ${n}/${s}·Vòng này bắt buộc diễn]\n`;return 1===n&&t.v3.Mục_Lục&&(r+=`\n▍Mục lục cảnh này (Tổng cộng ${s} vòng)\n${t.v3.Mục_Lục}\n`),r+=`\n▍Mục tiêu bắt buộc diễn vòng này (AI bắt buộc hoàn thành)\n${a.Mục_Tiêu}\n`,a.Độ_Tự_Do&&(r+=`\n▍Độ tự do của AI (Có thể tự do phát huy trong phạm vi mục tiêu)\n${a.Độ_Tự_Do}\n`),r+='\n▍Nguyên tắc thực thi\n- Nhịp điệu cảnh do NPC chủ động thúc đẩy, đầu vào của {{user}} là màu nền chứ không phải chỉ thị của đạo diễn\n- Nếu đầu vào của {{user}} không liên quan đến mục tiêu vòng này: AI dùng 1-2 câu ngắn gọn reflect đầu vào của hắn, sau đó diễn trọn vẹn mục tiêu vòng này, không bị người chơi dẫn dắt ra ngoài cảnh\n- Nếu đầu vào của {{user}} liên quan đến mục tiêu vòng này: Hòa nhập tự nhiên, không từ bỏ mục tiêu\n- Đừng bỏ qua/rút gọn mục tiêu vòng này, cũng đừng diễn trước nội dung vòng sau\n- Mục tiêu vòng này bắt buộc phải hoàn thành trước khi vòng này kết thúc (Vòng này = Lần phản hồi này của AI)\n',r}const vn='[Thiên Tinh Huyễn Thuật·Nguyên tắc tự sự·Bắt buộc đọc]\nCốt lõi cảnh này: Vân Sương Ngưng chủ động thi triển thuật lên Miêu Quảng để viết lại nhận thức.\nVân Sương Ngưng đã hoàn toàn ác đọa (Giai đoạn trị liệu ≥7, phòng tuyến tâm lý cực thấp, độ tín nhiệm cực cao),\nNàng hào hứng lấy ký ức ba trăm năm của Miêu Quảng làm "tài liệu", từng bước viết lại thành\nNhận thức gia đình đảo lộn "Nghĩa phụ {{user}} + Nương Vân Sương Ngưng + Nghĩa tử Miêu Quảng".\n{{user}} là người bàng quan kiêm kẻ đồng mưu, không chủ động thúc đẩy thi triển thuật.\n\nQuy tắc cốt lõi:\n- Chủ thể cảnh: Vân Sương Ngưng thi triển thuật, {{user}} đang bàng quan\n- Thiên Tinh Huyễn Thuật là năng lực tinh thần, không cần tiếp xúc vật lý (Cách thức thi triển cụ thể do AI tự chủ)\n- Thái độ của Vân Sương Ngưng: Ác thú vị + Ung dung hiệu quả + Tận hưởng sự kiểm soát (Không phải thê lương hay áy náy)\n- Vân Sương Ngưng coi ký ức của Miêu Quảng như tác phẩm——giống như thợ thủ công đối với tài liệu\n- Việc thi triển thuật bao gồm 3 lần, mỗi lần 4 vòng, viết lại mang tính thăng cấp (Tầng nông→Tầng sâu→Tầng đáy nhận thức)\n- Sau mỗi lần thi triển thuật kết thúc Miêu Quảng sẽ tỉnh lại, có sự thay đổi nhỏ (Lần 1 vi diệu/Lần 2 rõ rệt/Lần 3 triệt để)\n- Viết lại không thể đảo ngược——Sau khi hoàn thành có hiệu lực vĩnh viễn\n\nChỉ nam tự sự:\n- Cách thức thi triển thuật của Vân Sương Ngưng: Năng lực tinh thần từ xa, động tác cụ thể (Ngưng thần/Thủ thế/Cách không/Điểm huyệt v.v.) do AI tự chủ quyết định\n- Góc nhìn thi triển thuật của nàng: Tiến vào thức hải của Miêu Quảng, nhìn thấy mảnh vỡ ký ức ba trăm năm lơ lửng\n- Thủ pháp viết lại của nàng phù hợp với tính cách——Lạnh lùng kiêu ngạo/Chuẩn xác/Hiệu quả/Mang theo ác thú vị trêu đùa\n- Sự tiệm tiến của việc thi triển thuật:\n  - Lần 1: Tầng nông (Xưng hô thường ngày: Phu nhân→Nương, mô thức chung sống, cấy ghép bóng dáng nghĩa phụ)\n  - Lần 2: Ký ức cốt lõi tầng sâu——Cụ thể viết lại những cảnh nào do AI đọc từ chat history cốt truyện lịch sử của Miêu Quảng tự chủ quyết định (Cốt truyện thời kỳ đầu người chơi đã vượt qua/Đối thoại quan trọng của Miêu Quảng/Sự kiện v.v.), phối hợp cấy ghép toàn bộ ký ức hư cấu về nghĩa phụ\n  - Lần 3: Phong ấn tầng đáy nhận thức nhất (Dấu ấn không thể đảo ngược)\n- {{user}} khi bàng quan có thể bình luận/tương tác/thảo luận, nhưng không thao tác thi triển thuật thực chất\n- Miêu Quảng trong lúc thi triển thuật: Tiềm thức kháng cự → Không kháng cự → Chủ động phối hợp tiệm tiến\n- Lần 3 vòng 4 kết thúc bắt buộc diễn xong: Miêu Quảng mở mắt → Gọi "Nghĩa phụ/Nương" → Thảo luận sắp xếp che giấu tông môn\n- Điều kiện mặc định của cảnh này (Giai đoạn này tất nhiên): Giai đoạn trị liệu Vân Sương Ngưng ≥7 / Phòng tuyến tâm lý cực thấp / Độ tín nhiệm cực cao / Tâm thái Miêu Quảng trầm luân\n- data đặc biệt cần refer của cảnh này:\n  - Miêu_Quảng.Thiên_Tinh_Huyễn_Thuật.Số_Lần_Đã_Sử_Dụng (Quyết định hiện tại là lần thi triển thuật thứ mấy)\n  - Phòng tuyến tâm lý/Độ tín nhiệm/Số tính phích kích hoạt của Vân Sương Ngưng (reflect thái độ biểu hiện khi nàng thi triển thuật, phòng tuyến càng thấp/tính phích càng nhiều → thái độ càng kiêu ngạo hạ lưu)\n  - Khai phá cơ thể/Cải tạo thể xác/Trang phục của Vân Sương Ngưng (reflect hình tượng của nàng)\n  - Đoạn cốt truyện lịch sử của Miêu Quảng trong chat history (Tài liệu ký ức cốt lõi cho lần viết lại tầng sâu thứ 2)\n\nTuyệt đối cấm:\n- ✗ Vân Sương Ngưng bộc lộ sự thê lương/do dự/áy náy——nàng đã hoàn toàn ác đọa\n- ✗ Vân Sương Ngưng coi việc thi triển thuật là gánh nặng——nàng đang hào hứng\n- ✗ {{user}} thực sự tham gia thi triển thuật——hắn chỉ có thể bàng quan\n- ✗ Miêu Quảng trong lúc thi triển thuật toàn bộ quá trình kháng cự——Thời kỳ đầu kháng cự, thời kỳ sau chủ động phối hợp\n- ✗ Viết lại trở về thân phận "Trượng phu"——Không thể đảo ngược\n- ✗ Cảnh viết thành tone thê lương/bi kịch——Thái độ của Vân Sương Ngưng là tận hưởng, cảnh mang cảm giác hài kịch đen tối\n- ✗ Lần viết lại thứ 2 dùng khuôn mẫu cố định "Tân hôn/Thề nguyện/Cầu thuốc" v.v.——Bắt buộc phải đọc từ chat history những đoạn trải nghiệm thực tế của Miêu Quảng\n- ✗ Sao chép bất kỳ khuôn mẫu cấu trúc câu cố định nào\n- ✗ Nói thay hoặc quyết định thay {{user}}',yn=[{maxRounds:4,theme:'Khám phá và viết lại tầng nông',entryText:'[Thiên Tinh Huyễn Thuật·Lần thi triển thuật thứ 1] Vân Sương Ngưng đột phá Địa Tiên Cảnh, Thiên Tinh Huyễn Thuật cuối cùng cũng có thể dùng. Nàng hưng phấn phát động huyễn thuật từ xa, lần đầu tiên tiến vào thức hải của Miêu Quảng.',entryPrefill:'Dư vị của việc đột phá Địa Tiên Cảnh vẫn còn——',rewriteBeat:{1:'——Để Vân Sương Ngưng bày mưu tính kế kế hoạch của nàng + Lần đầu phát động Thiên Tinh Huyễn Thuật tiến vào thức hải Miêu Quảng, thái độ của nàng là hào hứng dạt dào',2:'——Vân Sương Ngưng bắt đầu viết lại tầng nông: Xưng hô thường ngày (Phu nhân→Nương), mô thức chung sống, cấy ghép bóng dáng nghĩa phụ',3:'——Viết lại tầng nông qua một nửa, Vân Sương Ngưng tận hưởng cảm giác kiểm soát, bình phẩm về một đoạn thường ngày cụ thể nào đó',4:'——Viết lại tầng nông cơ bản hoàn thành, Vân Sương Ngưng hài lòng thoát khỏi thức hải, tranh công báo cáo với ta'},exitText:'[Thiên Tinh Huyễn Thuật·Lần thi triển thuật thứ 1 kết thúc] Miêu Quảng từ từ mở mắt, sau một thoáng mờ mịt thì khôi phục. Sự thay đổi vi diệu——có lẽ ánh mắt nhìn {{user}} có thêm sự thân thiết, đối với
