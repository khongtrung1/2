hardcore của giọng điệu\n  - Cấu trúc câu phát ngôn cụ thể do AI tự chủ tạo ra theo data, không sao chép bất kỳ khuôn mẫu nào\n- Lạc Thư Tình khi hầu hạ có phản ứng cơ thể của riêng mình (không áp chế, nàng là người tham gia thành thạo)\n- Luân phiên ba tuyến (Tuyến chính Vân Sương Ngưng bị điều giáo + Tuyến phụ Lạc Thư Tình hầu hạ+xen lời + Phản ứng của Miêu Quảng ngoài màn trướng)\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Quảng + Phòng tuyến tâm lý Vân Sương Ngưng + Phòng tuyến tâm lý/Độ thuận tòng/Tính phích kích hoạt/Bộ phận khai phá cơ thể của Lạc Thư Tình + Kích hoạt Thấu Linh Màn\n\nTuyệt đối cấm:\n- ✗ Miêu Quảng tiến vào màn trướng hoặc ngắt quãng\n- ✗ Miêu Quảng bùng nổ ngay tại chỗ (Tâm thái phẫn nộ đi vào Bad Ending)\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ {{user}} chủ yếu điều giáo Lạc Thư Tình——Cảnh này là điều giáo Vân Sương Ngưng, Lạc Thư Tình chỉ là phụ trợ\n- ✗ Lạc Thư Tình bị động đứng ngây ra——Nàng có đất diễn phong phú, chủ động hầu hạ+xen lời\n- ✗ Lạc Thư Tình làm việc hầu hạ bằng bộ phận chưa khai phá của nàng——Lấy data làm chuẩn\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Vân Sương Ngưng và Lạc Thư Tình cùng nhau tiến vào phòng ngủ, hai nàng ý thức được hôm nay phải để Miêu Quảng chứng kiến lời tuyên cáo của Vân Sương Ngưng, Lạc Thư Tình với tư cách là người giúp đỡ thành thạo cũng có mặt',2:'——Ta bắt đầu ra tay với Vân Sương Ngưng. Lạc Thư Tình ở bên cạnh chủ động tiến lại gần, dùng bộ phận đã khai phá của chính nàng bắt đầu hầu hạ ta',3:'——Vân Sương Ngưng mở đầu tuyên cáo \'Xin lỗi phu quân\', Lạc Thư Tình vừa hầu hạ vừa xen lời bổ sung (theo phong cách data của nàng)',4:'——Tiếp tục tăng mức độ điều giáo Vân Sương Ngưng, Vân Sương Ngưng nói ra sự quy thuộc của bộ phận cụ thể, Lạc Thư Tình tiếp tục phục vụ + làm sự bổ sung/chất vấn mang phong cách rõ nét theo data của nàng',5:'——Hai tuyến cùng tiến, độ hardcore của Vân Sương Ngưng tăng lên, sự phục vụ của Lạc Thư Tình đi sâu hơn, tần suất xen lời của nàng tăng lên',6:'——Vân Sương Ngưng nói ra lời tuyên cáo quy thuộc hạ lưu nhất, Lạc Thư Tình theo data hùa theo/thêm thắt/hoặc bộc lộ sự nghi ngờ',7:'——Vân Sương Ngưng bị đẩy đến ranh giới phản ứng, nhịp điệu phục vụ của Lạc Thư Tình cũng đến mức, ba người cộng hưởng',8:'——Để lại dấu ấn quy thuộc cho Vân Sương Ngưng, để nàng chính miệng nói \'Ta là của ai\'. Lạc Thư Tình ở bên cạnh chứng kiến cũng tham gia',9:'——Vân Sương Ngưng làm lời xin lỗi cuối cùng+xác nhận quy thuộc, lời xen vào của Lạc Thư Tình làm chứng kiến của vãn bối cho cuộc tuyên cáo này',10:'——Tuyên cáo hoàn thành, hai nàng cùng nhau rời khỏi tầm mắt, Miêu Quảng ngồi một mình trong bóng tối——vợ+con dâu tương lai đều rời khỏi bên cạnh hắn'},v3:{Tóm_Tắt_Cảnh:'【Tuyên Cáo Cướp Vợ Tăng Cường · 10 Vòng · Tổng quan toàn bộ cảnh này】\n{{user}}/Vân Sương Ngưng/Lạc Thư Tình ba người cùng ở trong màn trướng, Miêu Quảng ở ngoài màn trướng có thể nghe/nhìn thấy mọi thứ. Địa điểm cảnh phòng ngủ+màn trướng, Miêu Quảng không tiến vào màn trướng.\nCốt lõi là {{user}} chủ yếu điều giáo Vân Sương Ngưng để nàng chính miệng hướng Miêu Quảng tuyên cáo quy thuộc (kế thừa chủ đề tuyên cáo cướp vợ bản gốc). Lạc Thư Tình ở bên cạnh phụ trợ — nàng tự mình không bị điều giáo, mà là chủ động hầu hạ {{user}} (quyết định cách thức theo bộ phận đã khai phá của nàng: ngực nhũ giao/miệng nhỏ khẩu giao v.v.), đồng thời vừa phục vụ vừa xen lời, đan xen bổ sung động thái hoặc chất vấn đối với lời tuyên cáo của Vân Sương Ngưng.\nPhong cách phát ngôn của Lạc Thư Tình theo data động thái: phòng tuyến thấp/thuận tòng cao/nhiều tính phích → hùa theo tăng cường bổ sung độ hạ lưu cho lời tuyên cáo của Vân; phòng tuyến cao → phong cách nghi ngờ khuyên can, giọng điệu quan tâm của vãn bối chất vấn sư phụ xem có quá đáng không. Lạc Thư Tình khi hầu hạ có phản ứng cơ thể của riêng mình (không áp chế).\nĐường cong 10 vòng: Hai nàng nhập trường → Vân bị động + Lạc hầu hạ → Vân mở đầu xin lỗi + Lạc xen lời → Tuyên cáo quy thuộc bộ phận + Lạc phát ngôn theo phong cách → Hai tuyến đi sâu → Vân tuyên cáo hạ lưu nhất + Lạc hùa theo thêm thắt → Vân ranh giới phản ứng + Ba người cộng hưởng → Dấu ấn quy thuộc + Lạc chứng kiến tham gia → Xin lỗi cuối cùng + Lạc chứng kiến vãn bối → Hai nàng rời đi Miêu Quảng ngồi một mình trong bóng tối.\nNghiêm cấm Miêu Quảng tiến vào màn trướng/bùng nổ ngay tại chỗ/cảm nhận đạo cụ; Nghiêm cấm {{user}} chủ yếu điều giáo Lạc Thư Tình (cảnh này Lạc là phụ trợ); Nghiêm cấm Lạc bị động đứng ngây ra (đất diễn phong phú); Nghiêm cấm Lạc làm việc hầu hạ bằng bộ phận chưa khai phá của nàng.',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng và Lạc Thư Tình cùng nhau tiến vào trong màn trướng, hai nàng ý thức được hôm nay phải để Miêu Quảng chứng kiến lời tuyên cáo của Vân Sương Ngưng, Lạc Thư Tình với tư cách là người giúp đỡ thành thạo cũng có mặt. Vòng này để cốt truyện đi đến tự nhiên "Hai nàng nhập trường + Định tính cảnh + Miêu Quảng vào vị trí ngoài màn trướng".',Độ_Tự_Do:'Tư thế nhập trường、Giao lưu ánh mắt của hai nàng、Trạng thái của Miêu Quảng ở ngoài màn trướng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'{{user}} bắt đầu ra tay với Vân Sương Ngưng. Lạc Thư Tình ở bên cạnh chủ động tiến lại gần, dùng bộ phận đã khai phá của chính nàng bắt đầu hầu hạ {{user}}. Vòng này để cốt truyện đi đến tự nhiên "Vân bị động mở đầu + Lạc chủ động hầu hạ + Phản ứng đầu tiên của Miêu Quảng ở bên ngoài".',Độ_Tự_Do:'Động tác mở đầu chọn theo data của Vân; Cách thức hầu hạ của Lạc động thái theo bộ phận đã khai phá của nàng (ngực/miệng nhỏ v.v.); Phản ứng bước đầu của Miêu Quảng ở bên ngoài do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng mở đầu tuyên cáo "Xin lỗi phu quân". Lạc Thư Tình vừa hầu hạ vừa xen lời bổ sung (theo phong cách data của nàng — phòng tuyến thấp tăng cường/phòng tuyến cao nghi ngờ). Vòng này để cốt truyện đi đến tự nhiên "Tuyên cáo lần đầu + Lạc xen lời lần đầu định hình phong cách".',Độ_Tự_Do:'Từ ngữ mở đầu của Vân、Phong cách cụ thể và câu nói đầu tiên khi Lạc xen lời、Phản ứng của Miêu Quảng khi nghe thấy do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'{{user}} tiếp tục tăng mức độ điều giáo Vân Sương Ngưng, Vân nói ra sự quy thuộc của bộ phận cụ thể. Lạc Thư Tình tiếp tục phục vụ + làm sự bổ sung hoặc chất vấn mang phong cách rõ nét theo data của nàng. Vòng này để cốt truyện đi đến tự nhiên "Tuyên cáo quy thuộc bộ phận + Lạc Thư Tình xen lời theo phong cách trở thành trạng thái bình thường".',Độ_Tự_Do:'Nội dung tuyên cáo bộ phận theo bộ phận khai phá trong data của Vân; Nội dung cụ thể Lạc xen lời bổ sung/chất vấn theo data của nàng; Phản ứng của Miêu Quảng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Hai tuyến cùng tiến — Độ hardcore của Vân Sương Ngưng tăng lên, sự phục vụ của Lạc Thư Tình đi sâu hơn, tần suất xen lời của nàng tăng lên. Vòng này để cốt truyện đi đến tự nhiên "Hai tuyến đi sâu + Nhịp điệu tăng nhanh".',Độ_Tự_Do:'Cách thức nâng cấp độ hardcore của Vân、Động tác cụ thể khi sự phục vụ của Lạc đi sâu hơn、Nhịp điệu tần suất xen lời tăng lên do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng nói ra lời tuyên cáo quy thuộc hạ lưu nhất. Lạc Thư Tình theo data hùa theo/thêm thắt/hoặc bộc lộ sự nghi ngờ. Vòng này để cốt truyện đi đến tự nhiên "Đỉnh điểm độ hardcore của tuyên cáo + Phát ngôn mang phong cách rõ nét nhất của Lạc Thư Tình".',Độ_Tự_Do:'Từ ngữ cụ thể của lời tuyên cáo hạ lưu nhất của Vân (theo tính phích data); Cách thức cụ thể Lạc hùa theo thêm thắt hoặc nghi ngờ do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng bị đẩy đến ranh giới phản ứng, nhịp điệu phục vụ của Lạc Thư Tình cũng đến mức, ba người cộng hưởng. Vòng này để cốt truyện đi đến tự nhiên "Hình ảnh ba người cộng hưởng + Vân tiền tấu ranh giới".',Độ_Tự_Do:'Nhịp điệu cụ thể của ba người cộng hưởng、Phản ứng cơ thể tiền tấu ranh giới của Vân、Biểu hiện phục vụ đến mức của Lạc do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Để lại dấu ấn quy thuộc cho Vân Sương Ngưng (cơ thể/trong cơ thể/tượng trưng), để nàng chính miệng nói ra "Ta là của ai". Lạc Thư Tình ở bên cạnh chứng kiến cũng tham gia. Vòng này để cốt truyện đi đến tự nhiên "Đóng dấu ấn + Tuyên cáo sở thuộc + Lạc Thư Tình chứng kiến tham gia".',Độ_Tự_Do:'Loại dấu ấn theo tình huống data; Hình thức cụ thể Lạc chứng kiến tham gia (đưa đồ/nắm tay/hùa theo) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},9:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng làm lời xin lỗi cuối cùng + xác nhận quy thuộc. Lời xen vào của Lạc Thư Tình làm chứng kiến của vãn bối cho cuộc tuyên cáo này. Vòng này để cốt truyện đi đến tự nhiên "Vân xin lỗi cuối cùng + Lạc chứng kiến vãn bối".',Độ_Tự_Do:'Từ ngữ cụ thể của lời xin lỗi cuối cùng của Vân、Giọng điệu chứng kiến vãn bối của Lạc (cung kính/nghiêm túc)、Phản ứng của Miêu Quảng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},10:{Chủ_Đề_Vòng_Này:'Tuyên cáo hoàn thành. Hai nàng cùng nhau rời khỏi tầm mắt, Miêu Quảng ngồi một mình trong bóng tối — vợ + con dâu tương lai đều rời khỏi bên cạnh hắn. Vòng này để cốt truyện thu lại tự nhiên ở "Hai nàng sóng vai rời đi + Miêu Quảng ngồi một mình trong bóng tối không có sức đuổi theo + Kết cục cảnh".',Độ_Tự_Do:'Tư thế rời đi của hai nàng、Hình ảnh Miêu Quảng ngồi một mình、Âm thanh môi trường do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Tuyên Cáo Cướp Vợ Tăng Cường·Hoàn Thành] Miêu Quảng ngồi một mình trong phòng, nghe tiếng bước chân của hai nàng sóng vai rời đi xa dần. Vợ chính miệng nói ra sự quy thuộc, con dâu tương lai cũng ở bên cạnh chứng kiến và tham gia——hắn thậm chí không có sức để đuổi theo.'},Xuân_Quang_Khe_Cửa:{maxRounds:10,entryText:'[Cảnh Đặc Biệt·Xuân Quang Khe Cửa] Vân Sương Ngưng gọi Lạc Thư Tình đến phòng ngủ của mình. Lần này, cửa không đóng kín hoàn toàn.',entryPrefill:'Lại là một buổi chiều tà bình thường——',sceneBottomLine:'[Cảnh Đặc Biệt·Xuân Quang Khe Cửa·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia ở ngoài cửa nhìn trộm (chủ động bị thu hút)——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: Miêu Quảng chủ động đến nhìn trộm, Lạc Thư Tình lần đầu tiên phát hiện ra mặt yếu đuối nhìn trộm của Miêu Quảng.\nVân Sương Ngưng cố ý để hở khe cửa, Miêu Quảng không biết vì sao bị thu hút đến, ở ngoài cửa nhìn trộm + có phản ứng sinh lý.\nLạc Thư Tình ở vòng 8 liếc thấy, bất động thanh sắc ghi nhớ——tâm cơ nảy mầm + vết nứt ngầm trong quan hệ sư đồ,\nTạo nền tảng cho việc sư đồ tranh phong trong cảnh con dâu điều giáo bố chồng.\n\nQuy tắc cốt lõi:\n- Ba người (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) thân mật trong phòng\n- Miêu Quảng không được mời——hắn tự mình bị thu hút bước tới (Vân Sương Ngưng cố ý để hở khe cửa là mồi nhử)\n- Miêu Quảng chủ động nhìn trộm + chủ động có phản ứng sinh lý (thủ dâm)\n- Vòng 8 Lạc Thư Tình liếc thấy Miêu Quảng——nàng bất động thanh sắc tiếp tục, không nhắc nhở bất kỳ ai\n- Vòng 10 Lạc Thư Tình cố ý thao túng khoảng cách thông tin (tiếng bước chân truyền cho Miêu Quảng cảm giác an toàn "không ai phát hiện ra ngươi")\n\nChỉ nam tự sự:\n- Không có cớ "trị liệu" hay "học tập y thuật"——ba người đều hiểu bản chất của cảnh này, tham gia không cần che đậy\n- Luân phiên hai tuyến: Ba người thân mật trong phòng + Phản ứng nhìn trộm của Miêu Quảng ngoài cửa\n- Cốt lõi đường cong của Lạc Thư Tình:\n  - Vòng 1-7: Hầu hạ bình thường + thỉnh thoảng cảm giác ngoài cửa có người nhưng không chắc chắn\n  - Vòng 8: Ngước mắt liếc thấy bóng Miêu Quảng ở khe cửa, ánh mắt thay đổi trong giây lát đó\n  - Vòng 9-10: Thỉnh thoảng liếc nhìn khe cửa xác nhận Miêu Quảng vẫn ở đó + cố ý thao túng khoảng cách thông tin\n- Quan hệ sư đồ của Lạc Thư Tình lung lay vi diệu: Nàng phát hiện mình có thể nắm giữ chuyện mà sư phụ không biết\n  (Miêu Quảng ở bên ngoài + mặt yếu đuối của Miêu Quảng + khoảng cách thông tin do nàng cố ý thao túng), điều này khiến nàng đối với Vân Sương Ngưng\n  từ sự tôn kính thuần túy biến thành mang theo ý thức cạnh tranh lờ mờ——sự nảy mầm của việc tranh phong ghen tuông.\n  Đây là nền tảng cho việc sư đồ tranh phong trong cảnh con dâu điều giáo bố chồng sau này.\n- Đường cong của Miêu Quảng: Bị thu hút → Nhìn thấy hình ảnh chấn động → Không thể dời mắt → Phản ứng cơ thể → Thủ dâm\n  (Nút thắt đắp nặn lại triệt để nhân cách của Miêu Quảng——từ "được thông báo"→"chủ động nhìn trộm"→"chủ động bị hình ảnh ảnh hưởng")\n- Các trạng thái đặc biệt liên quan đến cảnh này: Trạng thái trọn vẹn của Vân Sương Ngưng + Phòng tuyến tâm lý/Thuận tòng/Tính phích/Đạo cụ kích hoạt của Lạc Thư Tình + Tâm thái Miêu Quảng\n\nTuyệt đối cấm:\n- ✗ Bất kỳ ai chủ động mời Miêu Quảng\n- ✗ Lạc Thư Tình phát hiện Miêu Quảng trước vòng 8\n- ✗ Lạc Thư Tình sau khi liếc thấy thì nói cho Vân Sương Ngưng hoặc {{user}}\n- ✗ Miêu Quảng tiến vào phòng ngắt quãng\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ Ba người trong phòng phát giác rõ ràng bên ngoài cửa\n- ✗ Lạc Thư Tình ngoài mặt bất kính với sư phụ——quan hệ sư đồ lung lay là vết nứt ngầm ở tầng nội tâm, lễ số bề ngoài vẫn trọn vẹn\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Vân Sương Ngưng gọi Lạc Thư Tình đến phòng ngủ, Lạc Thư Tình đến nơi, mong đợi+xấu hổ+hưng phấn thầm kín',2:'——Ba người ở chung, Vân Sương Ngưng cố ý không đóng chặt cửa (Lạc Thư Tình chú ý tới nhưng không nói)',3:'——Miêu Quảng không biết vì sao đi đến gần phòng ngủ của Vân Sương Ngưng, thấy cửa khép hờ, do dự ngoài cửa',4:'——Ba người trong phòng bắt đầu thân mật, không có bất kỳ cớ \'trị liệu/học tập\' nào, ba người đều hiểu',5:'——Miêu Quảng tiến lại gần cửa, bắt đầu nhìn trộm qua khe cửa, hình ảnh cái nhìn đầu tiên khiến đầu óc hắn nổ tung',6:'——Ba người tiếp xúc đi sâu, Miêu Quảng ngoài cửa không thể dời mắt, bắt đầu có phản ứng của riêng mình',7:'——Miêu Quảng bắt đầu có phản ứng sinh lý, bất giác đưa tay ra, chủ động bị hình ảnh ảnh hưởng (nút thắt đắp nặn lại nhân cách)',8:'——Lạc Thư Tình đột nhiên ngước mắt liếc thấy bóng Miêu Quảng ở khe cửa, ánh mắt thay đổi, nhưng bất động thanh sắc tiếp tục',9:'——Ba người đạt đến cao trào, Lạc Thư Tình thỉnh thoảng nhìn về phía khe cửa xác nhận Miêu Quảng vẫn ở đó, nội tâm tính toán rõ ràng',10:'——Miêu Quảng lặng lẽ rút lui, Lạc Thư Tình khi cáo lui cố ý để tiếng bước chân truyền ra ngoài cho Miêu Quảng \'cảm giác an toàn\', lần đầu tiên chủ động thao túng khoảng cách thông tin. Thái độ của nàng đối với sư phụ, từ khoảnh khắc này bắt đầu có sự thay đổi vi diệu'},v3:{Tóm_Tắt_Cảnh:'【Xuân Quang Khe Cửa · 10 Vòng · Tổng quan toàn bộ cảnh này】\n{{user}}/Vân Sương Ngưng/Lạc Thư Tình ba người thân mật trong phòng. Miêu Quảng chủ động đến nhìn trộm (Vân Sương Ngưng cố ý để hở khe cửa là mồi nhử), Lạc Thư Tình vòng 8 liếc thấy Miêu Quảng nhưng bất động thanh sắc ghi nhớ. Cảnh này là nút thắt đắp nặn lại nhân cách của Miêu Quảng + tâm cơ của Lạc Thư Tình nảy mầm.\nCốt lõi là ba đường cong song hành:\n- Ba người thân mật trong phòng (không có cớ trị liệu/học tập, ba người đều hiểu bản chất cảnh này)\n- Miêu Quảng ngoài cửa từ "bị thu hút → nhìn trộm → không thể dời mắt → phản ứng sinh lý → thủ dâm" đắp nặn lại nhân cách chủ động\n- Lạc Thư Tình từ hầu hạ bình thường → vòng 8 phát giác → vòng 9-10 cố ý thao túng khoảng cách thông tin (truyền tiếng bước chân cho Miêu Quảng cảm giác an toàn "không ai phát hiện ra ngươi")—— vết nứt ngầm trong quan hệ sư đồ + nền tảng sư đồ tranh phong của con dâu điều giáo bố chồng\nĐường cong 10 vòng: Vân gọi Lạc đến → Ba người ở chung Vân cố ý để hở khe cửa → Miêu Quảng bị thu hút do dự ngoài cửa → Ba người bắt đầu thân mật → Miêu Quảng bắt đầu nhìn trộm → Tiếp xúc đi sâu Miêu Quảng không thể dời mắt → Miêu Quảng thủ dâm (nút thắt đắp nặn lại nhân cách) → Lạc vòng 8 liếc thấy đổi ánh mắt → Ba người cao trào Lạc tính toán rõ ràng → Miêu Quảng rút lui Lạc cáo lui cố ý truyền tiếng bước chân.\nNghiêm cấm có người chủ động mời Miêu Quảng、Nghiêm cấm Lạc phát hiện trước vòng 8、Nghiêm cấm Lạc nói cho Vân/{{user}}、Nghiêm cấm Miêu Quảng tiến vào phòng、Nghiêm cấm Lạc ngoài mặt bất kính với sư phụ (lễ số bề ngoài vẫn trọn vẹn).',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng gọi Lạc Thư Tình đến phòng ngủ, Lạc Thư Tình đến nơi. Nội tâm nàng là sự chồng chéo ba tầng "mong đợi + xấu hổ + hưng phấn thầm kín". Miêu Quảng vẫn chưa xuất hiện. Vòng này để cốt truyện đi đến tự nhiên "Lạc đến + Ba tầng tâm cảnh của nàng + Sư đồ hàn huyên".',Độ_Tự_Do:'Miêu tả cụ thể ba tầng tâm cảnh của Lạc、Đối thoại mở đầu của sư đồ、Tư thế ngồi xuống của nàng do AI tự chủ'},2:{Chủ_Đề_Vòng_Này:'Ba người ở chung. Vân Sương Ngưng cố ý không đóng chặt cửa (Lạc Thư Tình chú ý tới nhưng không nói). Vòng này để cốt truyện đi đến tự nhiên "Chi tiết cửa đóng không chặt + Lạc chú ý tới nhưng duy trì lễ số + Vân làm như không có chuyện gì". Miêu Quảng vẫn chưa xuất hiện.',Độ_Tự_Do:'Miêu tả mức độ cửa khép hờ、Ngôn ngữ cơ thể của Lạc khi chú ý tới (liếc nhìn/ánh mắt lảng đi)、Tư thế làm như không có chuyện gì của Vân do AI tự chủ'},3:{Chủ_Đề_Vòng_Này:'Miêu Quảng không biết vì sao đi đến gần phòng ngủ của Vân Sương Ngưng, thấy cửa khép hờ, do dự ngoài cửa. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng bị thu hút đến + Do dự ngoài cửa + Vẫn chưa nhìn trộm".',Độ_Tự_Do:'Lý do Miêu Quảng bị thu hút đến (nội tâm bất giác/nói là "đi ngang qua"/bị linh áp dẫn dắt)、Tư thế do dự cụ thể của hắn do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Ba người trong phòng bắt đầu thân mật, không có bất kỳ cớ "trị liệu/học tập" nào, ba người đều hiểu bản chất cảnh này. Vòng này để cốt truyện đi đến tự nhiên "Bắt đầu thân mật + Sự ăn ý không cần cớ của ba người + Miêu Quảng vẫn đang do dự ngoài cửa".',Độ_Tự_Do:'Mức độ thân mật cụ thể theo data động thái; Ánh mắt/tư thế "ăn ý" của ba người; Phản ứng của Miêu Quảng khi nghe thấy âm thanh ngoài cửa do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Miêu Quảng tiến lại gần cửa, bắt đầu nhìn trộm qua khe cửa. Hình ảnh cái nhìn đầu tiên khiến đầu óc hắn nổ tung. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng bắt đầu nhìn trộm + Cú sốc thị giác khung hình đầu tiên".',Độ_Tự_Do:'Bước chân tiến lại gần、Nội dung cụ thể của hình ảnh cái nhìn đầu tiên (theo data)、Phản ứng sinh lý "đầu óc nổ tung" do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Ba người tiếp xúc đi sâu, Miêu Quảng ngoài cửa không thể dời mắt, bắt đầu có phản ứng của riêng mình. Vòng này để cốt truyện đi đến tự nhiên "Tiếp xúc đi sâu + Ánh mắt Miêu Quảng ghim chặt + Phản ứng sinh lý bước đầu".',Độ_Tự_Do:'Động tác cụ thể khi tiếp xúc đi sâu、Tư thế ánh mắt ghim chặt của Miêu Quảng、Chi tiết phản ứng sinh lý bước đầu do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Miêu Quảng bắt đầu có phản ứng sinh lý, bất giác đưa tay ra — chủ động bị hình ảnh ảnh hưởng. Đây là nút thắt đắp nặn lại nhân cách của hắn: từ "được thông báo" → "chủ động nhìn trộm" → "chủ động bị hình ảnh ảnh hưởng". Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng thủ dâm + Nút thắt đắp nặn lại nhân cách".',Độ_Tự_Do:'Miêu tả tiệm tiến của phản ứng sinh lý、Động tác bất giác đưa tay ra、Độc thoại nội tâm khoảnh khắc đắp nặn lại nhân cách do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình đột nhiên ngước mắt liếc thấy bóng Miêu Quảng ở khe cửa. Ánh mắt thay đổi, nhưng bất động thanh sắc tiếp tục. Vòng này để cốt truyện đi đến tự nhiên "Lạc liếc thấy + Ánh mắt thay đổi trong giây lát đó + Không nói cho bất kỳ ai tiếp tục hầu hạ". Đây là bước ngoặt then chốt.',Độ_Tự_Do:'Khoảnh khắc cụ thể liếc thấy (khi ngước mắt/khi đổi tư thế)、Biểu cảm vi tế khi ánh mắt thay đổi、Nội tâm nàng quyết định bất động thanh sắc tiếp tục do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},9:{Chủ_Đề_Vòng_Này:'Ba người đạt đến cao trào. Lạc Thư Tình thỉnh thoảng nhìn về phía khe cửa xác nhận Miêu Quảng vẫn ở đó, nội tâm tính toán rõ ràng. Vòng này để cốt truyện đi đến tự nhiên "Ba người cao trào + Lạc thỉnh thoảng nhìn về phía khe cửa xác nhận + Nội tâm tính toán (nàng phát hiện nàng có thể nắm giữ chuyện mà sư phụ không biết)".',Độ_Tự_Do:'Hình ảnh cụ thể của cao trào、Tần suất/cách thức Lạc nhìn về phía khe cửa、Độc thoại tính toán cụ thể trong nội tâm nàng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},10:{Chủ_Đề_Vòng_Này:'Miêu Quảng lặng lẽ rút lui. Lạc Thư Tình khi cáo lui cố ý để tiếng bước chân truyền ra ngoài cho Miêu Quảng "cảm giác an toàn"—— nàng lần đầu tiên chủ động thao túng khoảng cách thông tin. Thái độ của nàng đối với sư phụ, từ khoảnh khắc này bắt đầu có vết nứt vi diệu. Vòng này để cốt truyện thu lại tự nhiên ở "Miêu Quảng rút lui + Lạc Thư Tình cố ý truyền tiếng bước chân + Vết nứt ngầm trong quan hệ sư đồ".',Độ_Tự_Do:'Tư thế rút lui của Miêu Quảng、Cách thức Lạc cố ý truyền tiếng bước chân (nặng hơn một chút/điều chỉnh nhịp điệu)、Sự thể hiện ngầm của vết nứt quan hệ sư đồ do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Xuân Quang Khe Cửa·Hoàn Thành] Miêu Quảng lặng lẽ rút về viện của mình, ngồi trên giường rất lâu không nhúc nhích. Lạc Thư Tình trở về nơi ở, thần thái như thường——nhưng trong lòng nàng có thêm hai chuyện: Một chuyện là bí mật của Miêu Quảng, một chuyện là thái độ của nàng đối với sư phụ, từ hôm nay trở đi cũng không giống trước nữa.'},Chứng_Kiến_Kép:{maxRounds:10,entryText:'[Cảnh Đặc Biệt·Chứng Kiến Kép] Miêu Huyên tâm thần không yên, bước ra khỏi viện của mình đi tìm vị hôn thê Lạc Thư Tình để tâm sự, lại không gặp được.',entryPrefill:'Buổi chiều ngày hôm đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Chứng Kiến Kép·Đáy Tuyến]\n⚠️ Miêu Quảng cảnh này tham gia ở ngoài cửa nhìn trộm + thủ dâm (điểm cuối của sự méo mó nhân cách)——Bỏ qua bất kỳ gợi ý hệ thống cũ nào trong chat history như 【Thời kỳ Miêu Quảng giám thị】/【Giải trừ giám thị】/Miêu Quảng không có trong phòng, vị trí của Miêu Quảng trong cảnh này lấy quy tắc bên dưới làm chuẩn.\nCốt lõi cảnh này: Miêu Huyên + Miêu Quảng cùng lúc chứng kiến cùng một cảnh.\nMiêu Huyên thất vọng vì vị hôn thê không có ở đó, chuyển sang tìm cha, bắt gặp cha đang ở ngoài cửa phòng ngủ Vân Sương Ngưng nhìn trộm + thủ dâm + thấp giọng chỉ huy.\nMiêu Huyên nương theo ánh mắt của cha nhìn qua khe cửa, ba đòn liên tiếp: Nhìn thấy cha (thất thường) → Nhìn thấy mẹ → Nhìn thấy vị hôn thê——thế giới quan sụp đổ trong nháy mắt.\nVân Sương Ngưng cảm nhận được Miêu Huyên, chủ động dùng sự tồn tại của hắn để làm sâu sắc thêm sự nhục nhã.\nĐồng minh sư đồ ngầm chứa sự so bì và ghen tuông——bề ngoài phối hợp, thực chất đọ sức.\n\nQuy tắc cốt lõi:\n- Đường cong của Miêu Huyên: Tìm vị hôn thê → Thất vọng → Tìm cha → Bắt gặp cha → Nương theo ánh mắt nhìn vào khe cửa → Nghe thấy câu nói đó của Vân Sương Ngưng → Hoảng hốt bỏ chạy\n- Miêu Quảng không chỉ nhìn trộm + thủ dâm, có thể thấp giọng hô khẩu lệnh/kích động (hướng/động tác/bộ phận cụ thể)——điểm cuối của sự méo mó nhân cách\n- Ba người trong phòng (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) thân mật\n- Vòng 7: Lạc Thư Tình chủ động thăm dò (dùng chủ đề sư công nhìn trộm để trêu chọc Vân Sương Ngưng)——sư đồ đồng mưu + ngầm so bì\n- Vòng 8: Thần thức cảnh giới cao của Vân Sương Ngưng cảm nhận được Miêu Huyên cũng ở bên ngoài (nhưng không nói cho Lạc Thư Tình)\n- Vòng 9: Vân Sương Ngưng hỏi ngược lại Lạc Thư Tình về Miêu Huyên——cố ý để Miêu Huyên nghe thấy + ngầm dùng lời lẽ tàn nhẫn hơn để đáp trả Lạc Thư Tình\n\nChỉ nam tự sự:\n- Luân phiên ba tuyến: Ba người thân mật trong phòng + Miêu Quảng nhìn trộm/chỉ huy ngoài cửa + Miêu Huyên từ đi tìm vị hôn thê đến chứng kiến rồi bỏ chạy\n- Miêu Quảng thấp giọng chỉ huy/kích động: Khi nhìn trộm thấp giọng nói ra hướng/động tác/khẩu lệnh bộ phận mà hắn muốn nhìn thấy, lời thoại cụ thể do AI tự chủ tạo ra (không sao chép khuôn mẫu)\n  - Đây là điểm cuối của sự méo mó nhân cách của Miêu Quảng từ "được thông báo → chủ động nhìn trộm → chủ động chỉ huy"\n- Ba đòn liên tiếp của Miêu Huyên (Vòng 6 ánh mắt quét qua từng khung hình):\n  - Nhìn thấy cha (đang nhìn trộm + thủ dâm + hô khẩu lệnh)——Cú sốc thứ nhất: Cha đã hoàn toàn méo mó\n  - Nhìn thấy mẹ (đang bị thân mật)——Cú sốc thứ hai: Mẹ hoàn toàn là một người khác\n  - Nhìn thấy vị hôn thê (cũng có mặt)——Cú sốc thứ ba: Đòn chí mạng, vị hôn thê cũng đã gia nhập\n- Sự so bì của đồng minh sư đồ:\n  - Vòng 7 sự thăm dò của Lạc Thư Tình không đơn thuần là "thêm kịch tính cho sư phụ", mà là vãn bối đang thách thức sư phụ\n  - Vòng 9 câu hỏi ngược của Vân Sương Ngưng không đơn thuần là "phối hợp", mà là sư phụ đang phản kích, dùng lời lẽ tàn nhẫn hơn để đè bẹp\n  - Bề ngoài là đồng minh, thực chất là ngầm đọ sức (sự tiếp nối của mầm mống trong Xuân Quang Khe Cửa, cảnh này đi sâu hơn)\n- Sự bỏ chạy của Miêu Huyên (Vòng 10) không phải là khóc lóc chạy đi, mà là hoảng hốt kiểu đứt đoạn máy móc——bi kịch hơn cả khóc lóc\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Huyên (quyết định mức độ sụp đổ của hắn) + Trạng thái trọn vẹn của Vân Sương Ngưng + Phòng tuyến tâm lý/Thuận tòng/Tính phích của Lạc Thư Tình + Tâm thái Miêu Quảng\n\nTuyệt đối cấm:\n- ✗ Miêu Huyên tiến vào phòng ngắt quãng\n- ✗ Ba người trong phòng phát giác rõ ràng bên ngoài cửa (trừ Vân Sương Ngưng phát giác ở vòng 8)\n- ✗ Miêu Huyên khóc lóc bỏ chạy/la hét——bắt buộc phải là sự bỏ chạy hoảng hốt/máy móc/im lặng\n- ✗ Vân Sương Ngưng để Lạc Thư Tình biết trước Miêu Huyên ở bên ngoài\n- ✗ Miêu Quảng chỉ nhìn trộm không lên tiếng——cảnh này hắn có thể thấp giọng chỉ huy\n- ✗ Tương tác sư đồ viết thành đồng minh thuần túy không có sự so bì\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Miêu Huyên tâm thần không yên ra khỏi cửa, đi về phía nơi ở của Lạc Thư Tình, muốn tâm sự',2:'——Lạc Thư Tình không có ở đó, Miêu Huyên thất vọng, quyết định đi tìm cha',3:'——Miêu Huyên đi về hướng phòng ngủ của mẹ (gần đây cha luôn ở quanh đó)',4:'——Miêu Huyên dừng bước. Cha áp sát vào cửa, thần sắc hoảng hốt, một tay để trong đũng quần, còn thấp giọng hô cái gì đó——quay chậm xác nhận',5:'——Miêu Huyên bước lại gần, nghe thấy giọng của mẹ trong cửa + một giọng nữ không quen thuộc (nhưng hắn không muốn thừa nhận)',6:'——Miêu Huyên nương theo ánh mắt của cha nhìn qua khe cửa, ba đòn liên tiếp: Nhìn thấy cha (thất thường) → Nhìn thấy mẹ → Nhìn thấy vị hôn thê, thế giới sụp đổ',7:'——Lạc Thư Tình chủ động thăm dò, dùng chủ đề \'sư công nhìn trộm\' để trêu chọc Vân Sương Ngưng——sư đồ đồng mưu, nhưng ngầm là vãn bối thách thức sư phụ',8:'——Thần thức của Vân Sương Ngưng cảm nhận được không chỉ có Miêu Quảng, mà còn có Miêu Huyên, khóe miệng nhếch lên không hoảng hốt, không nói cho Lạc Thư Tình',9:'——Vân Sương Ngưng hỏi ngược lại Lạc Thư Tình về Miêu Huyên, ánh mắt liếc về phía khe cửa——cố ý để Miêu Huyên nghe thấy + ngầm dùng lời lẽ tàn nhẫn hơn để đáp trả Lạc Thư Tình',10:'——Miêu Huyên hoảng hốt bỏ chạy, không phải khóc, mà là kiểu đứt đoạn máy móc, trở về phòng mình ngồi một mình đến tối'},v3:{Tóm_Tắt_Cảnh:'【Chứng Kiến Kép · 10 Vòng · Tổng quan toàn bộ cảnh này】\nMiêu Huyên tâm thần không yên muốn tìm vị hôn thê Lạc Thư Tình tâm sự, không gặp được bèn chuyển sang tìm cha Miêu Quảng, bắt gặp cha đang áp sát cửa phòng ngủ Vân Sương Ngưng nhìn trộm, thủ dâm, thấp giọng chỉ huy với tư thế thất thường; nương theo ánh mắt cha nhìn qua khe cửa, ba đòn liên tiếp chứng kiến cha thất thường → mẹ bị thân mật → vị hôn thê cũng có mặt, thế giới quan sụp đổ triệt để.\nBa người trong phòng (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) đồng bộ tiến hành thân mật; Lạc Thư Tình chủ động dùng chủ đề "sư công nhìn trộm" thăm dò Vân Sương Ngưng, sư đồ bề ngoài đồng mưu thực chất ngầm đọ sức; Vân Sương Ngưng bằng thần thức cảnh giới cao phát giác Miêu Huyên ở bên ngoài, cố ý dùng lời hỏi ngược lại để Miêu Huyên nghe thấy, đồng thời đè bẹp sự thách thức của Lạc Thư Tình.\nCuối cùng Miêu Huyên không khóc không la, lùi lại/bỏ chạy kiểu đứt đoạn máy móc, trở về phòng mình ngồi một mình đến tối —— bi kịch hơn cả khóc lóc ầm ĩ.\nLưu ý toàn bộ quá trình ba người trong phòng không phát giác Miêu Huyên có mặt (trừ Vân Sương Ngưng), Miêu Huyên không tiến vào cửa ngắt quãng, sự bỏ chạy không phải là cảm xúc bùng nổ mà là tê liệt sụp đổ.',beats:{1:{Chủ_Đề_Vòng_Này:'Miêu Huyên tâm thần không yên, ra khỏi viện đi về phía nơi ở của Lạc Thư Tình——đối tượng hắn muốn tâm sự là vị hôn thê. Vòng này để cốt truyện đi đến tự nhiên hình ảnh "Miêu Huyên trên đường đi về phía nơi ở của Lạc Thư Tình", chưa đến nơi ở, chưa gặp bất kỳ ai.',Độ_Tự_Do:'Nguồn gốc cụ thể khiến hắn tâm thần không yên (quyết định theo tâm thái Miêu Huyên là loại lo âu nào)、Tư thế đi đường、Sự che giấu khi tình cờ gặp đệ tử trên đường do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Miêu Huyên đến nơi ở của Lạc Thư Tình, phát hiện nàng không có ở đó (cửa phòng khép hờ/không có tiếng trả lời/thị nữ nói nàng đi gặp sư phụ rồi v.v.). Hắn thất vọng, quyết định chuyển sang tìm cha tâm sự. Vòng này để cốt truyện đi đến tự nhiên "Không gặp được + Chuyển hướng tìm cha".',Độ_Tự_Do:'Cách thức cụ thể không gặp được (gõ cửa/hỏi thị nữ/thấy phòng trống)、Sự thể hiện cảm xúc thất vọng、Độc thoại nội tâm khi chuyển hướng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Miêu Huyên đi về hướng phòng ngủ của mẹ (Vân Sương Ngưng)——hắn biết cha gần đây luôn ở quanh đó. Vòng này để cốt truyện đi đến tự nhiên "Miêu Huyên đi đến gần phòng ngủ"——vẫn chưa nhìn thấy Miêu Quảng, thiết lập sự căng thẳng "sắp sửa chứng kiến". Đồng thời ba người trong phòng (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) thân mật đồng bộ tiến hành, ống kính có thể chuyển đổi hai tuyến (Miêu Huyên hành lang + Bối cảnh thân mật trong phòng), nhưng Miêu Huyên vòng này chưa đến khe cửa.',Độ_Tự_Do:'Chi tiết tuyến đường (hành lang/sân viện)、Hoạt động tâm lý trên đường (muốn nói gì với cha)、Mức độ miêu tả bối cảnh thân mật trong phòng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:['Tâm_Thái']}},4:{Chủ_Đề_Vòng_Này:'Miêu Huyên dừng lại ở góc rẽ——nhìn thấy cha áp sát vào cửa phòng ngủ Vân Sương Ngưng, thần sắc hoảng hốt, một tay để trong đũng quần, còn thấp giọng hô cái gì đó. Vòng này để cốt truyện đi đến tự nhiên "Quay chậm xác nhận tư thế của cha"——để Miêu Huyên nhìn rõ nhưng chưa hoàn toàn hiểu ra. Sự thân mật trong phòng tiếp tục đồng bộ.',Độ_Tự_Do:'Biểu cảm hoảng hốt cụ thể của Miêu Quảng、Nội dung thấp giọng hô (mơ hồ/khẩu lệnh động tác cụ thể theo độ sâu trầm luân của Miêu Quảng)、Phản ứng cơ thể của Miêu Huyên khi dừng lại (tay nắm chặt kiếm/ngừng thở) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:['Tâm_Thái'],Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Miêu Huyên bước lại gần vài bước, nghe thấy giọng của mẹ truyền ra từ trong cửa phòng ngủ + một giọng nữ không quen thuộc mà hắn không muốn thừa nhận (nhưng trong lòng hắn biết là ai). Vòng này để cốt truyện đi đến tự nhiên "Nghe thấy hai giọng nói + Cơ chế phủ nhận trong lòng Miêu Huyên". Chưa đến khe cửa, chưa nhìn vào.',Độ_Tự_Do:'Cụ thể nghe thấy gì (tiếng rên rỉ/lời nói/tiếng đồ vật va chạm)、Độc thoại nội tâm phủ nhận của Miêu Huyên (không thể nào/sẽ không phải là/nghe nhầm rồi) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:['Tâm_Thái'],Miêu_Quảng:['Tâm_Thái']}},6:{Chủ_Đề_Vòng_Này:'Miêu Huyên nương theo ánh mắt của cha nhìn về phía khe cửa——hình ảnh ba đòn liên tiếp bắt buộc phải trình bày toàn bộ: Trước tiên nhìn thấy cha (thất thường/thủ dâm/thấp giọng chỉ huy) → Sau đó ánh mắt di chuyển vào trong khe cửa, nhìn thấy mẹ (đang bị thân mật) → Cuối cùng nhìn thấy vị hôn thê (cũng có mặt). Thế giới quan sụp đổ. Vòng này để cốt truyện đi đến tự nhiên hoàn thành ba đòn liên tiếp theo thứ tự này, ba đòn thiếu một không được.',Độ_Tự_Do:'Nhịp điệu thời gian di chuyển ánh mắt、Chi tiết cụ thể dừng lại ở mỗi đoạn、Cảm giác đứt gãy ý thức của Miêu Huyên do AI động thái theo data',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn',Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Ống kính chuyển vào trong phòng——Lạc Thư Tình chủ động thăm dò, dùng chủ đề "sư công đang nhìn trộm ngoài cửa" để trêu chọc Vân Sương Ngưng. Bề ngoài là sư đồ đồng mưu, ngầm là vãn bối thách thức sư phụ. Vòng này để cốt truyện đi đến tự nhiên thế công chủ động "Lạc Thư Tình mở miệng trước + Chủ đề sắc bén" này, Miêu Quảng+Miêu Huyên ngoài cửa không hay biết gì.',Độ_Tự_Do:'Từ ngữ trêu chọc cụ thể của Lạc Thư Tình、Phản ứng ban đầu của Vân Sương Ngưng (ung dung/cười nhẹ/nhướng mày)、Tư thế của {{user}} do AI tự chủ theo giai đoạn/tính phích kích hoạt của Lạc Thư Tình',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:['Tâm_Thái'],Miêu_Huyên:['Tâm_Thái']}},8:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng bằng thần thức cảnh giới cao cảm nhận được——ngoài cửa không chỉ có Miêu Quảng, mà còn có Miêu Huyên. Nàng nhếch khóe miệng không hoảng hốt, cũng không nói cho Lạc Thư Tình, lựa chọn "âm thầm lợi dụng sự tồn tại của Miêu Huyên". Vòng này để cốt truyện đi đến tự nhiên "Vân cảm nhận + Biểu cảm vi tế đắc ý độc nhất của nàng + Giấu giếm Lạc Thư Tình".',Độ_Tự_Do:'Phản ứng cơ thể cụ thể khi cảm nhận được (ánh mắt khựng lại/chi tiết khóe miệng nhếch lên)、Độc thoại nội tâm khi nàng quyết định giấu giếm、Có nháy mắt ám thị với {{user}} hay không do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:['Tâm_Thái'],Miêu_Quảng:['Tâm_Thái']}},9:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng hỏi ngược lại Lạc Thư Tình về chủ đề Miêu Huyên——ánh mắt liếc về hướng khe cửa. Bề ngoài là đáp lại đồ đệ, ngầm là (a) cố ý để Miêu Huyên nghe thấy (b) dùng lời lẽ tàn nhẫn hơn để đè bẹp sự thách thức của Lạc Thư Tình. Vòng này để cốt truyện đi đến tự nhiên "Câu hỏi ngược của Vân + Hiệu quả kép (Miêu Huyên nghe thấy+Lạc bị đè bẹp)".',Độ_Tự_Do:'Từ ngữ cụ thể của câu hỏi ngược của Vân (ví dụ "Ngươi nói xem Miêu Huyên có biết cha hắn như vậy không")、Chi tiết ánh mắt liếc về khe cửa、Phản ứng của Lạc Thư Tình khi chịu áp lực do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:['Tâm_Thái','Chỉ_Số_Tuyệt_Vọng'],Miêu_Quảng:['Tâm_Thái']}},10:{Chủ_Đề_Vòng_Này:'Miêu Huyên hoảng hốt bỏ chạy——không phải khóc lóc chạy đi, mà là lùi lại/quay người/rời đi kiểu đứt đoạn, máy móc. Hắn trở về phòng mình ngồi một mình đến tối. Vòng này để cốt truyện thu lại tự nhiên ở hình ảnh cuối cùng "Bỏ chạy máy móc + Ngồi một mình đến tối" này, không được viết hắn khóc lóc la hét.',Độ_Tự_Do:'Chi tiết bước chân bỏ chạy máy móc、Ba người trong phòng có phát giác hay không (trừ Vân Sương Ngưng đã biết, Lạc và {{user}} không nên phát giác)、Tư thế và miêu tả môi trường khi ngồi một mình do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn',Miêu_Quảng:['Tâm_Thái']}}}},exitText:'[Cảnh Đặc Biệt·Chứng Kiến Kép·Hoàn Thành] Miêu Huyên ngồi một mình trong phòng, từ chiều đến tối. Ánh sáng ngoài cửa sổ dần phai đi, hắn không hề nhúc nhích. Ba người trong phòng không biết hắn vừa ở bên ngoài——trừ Vân Sương Ngưng, nhưng nàng cũng không nói cho bất kỳ ai.'},Con_Dâu_Điều_Giáo_Bố_Chồng:{maxRounds:12,entryText:'[Cảnh Đặc Biệt·Con Dâu Điều Giáo Bố Chồng] Ba nàng (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) xâm nhập viện của Miêu Quảng. Miêu Quảng quỳ giữa sân viện của mình, đang tiếp nhận điều giáo theo giao ước ba điều.',entryPrefill:'Lại qua vài ngày——',sceneBottomLine:'[Cảnh Đặc Biệt·Con Dâu Điều Giáo Bố Chồng·Đáy Tuyến]\nCốt lõi cảnh này: Vân Sương Ngưng + Lạc Thư Tình hai thế hệ phụ nữ cùng nhau điều giáo Miêu Quảng.\nDưới trật tự mới được xác lập bởi giao ước ba điều, Lạc Thư Tình từ người quan sát vãn bối từng bước can thiệp, hình thành sự đọ sức ngầm với Vân Sương Ngưng——\nSư phụ đưa ra đề nghị, đồ đệ đưa ra phiên bản nâng cấp tàn nhẫn hơn. Cán cân sức mạnh sư đồ âm thầm đảo ngược trong cảnh này.\n\nQuy tắc cốt lõi:\n- Địa điểm cảnh: Viện của Miêu Quảng (Ba nàng xâm nhập địa bàn của Miêu Quảng, cảm giác xâm nhập tột cùng)\n- Miêu Quảng quỳ giữa sân viện của mình, bị hai thế hệ phụ nữ điều giáo\n- Vân Sương Ngưng và Lạc Thư Tình bề ngoài là đồng minh, thực chất là đọ sức\n- Lạc Thư Tình là người tham gia chủ động (không phải người quan sát bị động, cũng không phải người giúp đỡ thành thạo)\n- Miêu Quảng tất nhiên ở tâm thái trầm luân\n- {{user}} ở vị trí chủ tọa chứng kiến, không chủ đạo đối thoại\n- Người chơi trước đó đã hoàn thành "Chứng Kiến Kép"——Lạc Thư Tình lúc này đã nắm rõ toàn bộ cục diện trong nhà\n\nChỉ nam tự sự:\n- Nội dung điều giáo triển khai theo các quy tắc đã định trong "Giao ước ba điều" (Quy thuộc quyền tình dục/Giới hạn can thiệp/Che giấu/Hầu hạ v.v.), nhưng cảnh này là thực thi cụ thể chứ không phải giao ước lại\n- Sư đồ tranh phong là sự căng thẳng cốt lõi của cảnh này:\n  - Vân Sương Ngưng đưa ra đề nghị → Lạc Thư Tình đưa ra phiên bản nâng cấp hardcore hơn\n  - Hai lần "tranh phong" rõ rệt + Một lần đảo ngược hoàn thành\n  - Nội dung đề nghị cụ thể và biểu hiện tranh phong do AI tự chủ quyết định theo giai đoạn điều giáo/tính phích/độ thuận tòng/phòng tuyến tâm lý của Lạc Thư Tình trong data, độ hardcore thay đổi động thái theo dữ liệu, không viết chết\n- Đường cong thay đổi của Miêu Quảng:\n  - Thời kỳ đầu: Con dâu tương lai có mặt → Sự nhục nhã sâu sắc hơn / Muốn kháng cự\n  - Thời kỳ giữa: Vợ cũng đứng về phía con dâu tương lai → Mất đi chỗ đứng\n  - Thời kỳ cuối: Trầm luân dưới sự điều giáo kép\n- Lạc Thư Tình thu hồi các phục bút trước đó——ví dụ như những chuyện nàng ghi nhớ trong cảnh "Xuân Quang Khe Cửa", cảnh này có thể dùng đến\n- Cấu trúc câu cụ thể hoàn toàn do AI tự chủ tạo ra theo data, không sao chép bất kỳ khuôn mẫu nào\n- Độ hardcore của nội dung điều giáo/đề nghị động thái theo data:\n  - Giai đoạn điều giáo/tính phích/độ thuận tòng của Lạc Thư Tình → Độ hardcore trong đề nghị của nàng\n  - Phòng tuyến tâm lý/Độ tín nhiệm của Vân Sương Ngưng → Mức độ đề nghị của nàng\n  - Độ sâu trầm luân của Miêu Quảng → Tốc độ giảm sút mức độ kháng cự của hắn\n- Các trạng thái đặc biệt liên quan đến cảnh này: Tâm thái Miêu Quảng (Trầm luân) + Tất cả trạng thái của Vân Sương Ngưng + Giai đoạn điều giáo/Tính phích kích hoạt/Độ thuận tòng/Phòng tuyến tâm lý của Lạc Thư Tình + Trạng thái Miêu Huyên\n\nTuyệt đối cấm:\n- ✗ Làm lại "Giao ước ba điều" một lần nữa——Cảnh này là thực thi cụ thể sau giao ước\n- ✗ Miêu Quảng chủ động kháng cự đến cùng——Thời kỳ đầu có kháng cự, nhưng cuối cùng sẽ bị đè bẹp\n- ✗ Miêu Quảng cảm nhận được bất kỳ đạo cụ nào\n- ✗ Vân Sương Ngưng và Lạc Thư Tình ngoài mặt xé rách mặt——Giữa hai người là "sự đọ sức lịch sự"\n- ✗ {{user}} chủ đạo đối thoại——Hắn ở vị trí chủ tọa chứng kiến\n- ✗ Sao chép bất kỳ khuôn mẫu cấu trúc câu cố định nào\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Lạc Thư Tình bước vào. Miêu Quảng ngẩng đầu nhìn thấy con dâu tương lai bước vào thì đồng tử co rút, Vân Sương Ngưng ở bên cạnh ta nghênh đón nàng',2:'——Vân Sương Ngưng bắt đầu điều giáo Miêu Quảng theo cách thường ngày, Lạc Thư Tình ngồi bên cạnh Vân Sương Ngưng yên lặng quan sát',3:'——Lạc Thư Tình lần đầu tiên mở miệng, với tư thế vãn bối \'chia sẻ nỗi lo\' đưa ra một đề nghị điều giáo ôn hòa',4:'——Sư đồ tranh phong vòng một: Vân Sương Ngưng đưa ra đề nghị, Lạc Thư Tình đưa ra phiên bản nâng cấp hardcore hơn',5:'——Miêu Quảng bộc lộ sự kháng cự đối với đề nghị của Lạc Thư Tình, để con dâu tương lai điều giáo hắn là một tầng nhục nhã sâu sắc hơn so với để vợ điều giáo',6:'——Vân Sương Ngưng thúc giục Miêu Quảng chấp nhận đề nghị của Lạc Thư Tình, \'nể mặt con dâu tương lai\', hắn mất đi chỗ đứng',7:'——Miêu Quảng thực hiện đề nghị của Lạc Thư Tình, Lạc Thư Tình ở bên cạnh chỉ điểm chi tiết——lại một tầng nhục nhã',8:'——Lạc Thư Tình thể hiện nàng đã sớm phát giác sự khác thường trong nhà (có thể tiếp nối phục bút của sự kiện cụ thể trước đó như Xuân Quang Khe Cửa, cũng có thể nói chung chung), Miêu Quảng khiếp sợ',9:'——Sư đồ tranh phong vòng hai: Vân Sương Ngưng lại đưa ra đề nghị, Lạc Thư Tình đưa ra phiên bản tàn nhẫn hơn, Vân Sương Ngưng không tăng mức độ nữa, sức mạnh đảo ngược',10:'——Miêu Quảng trầm luân dưới sự điều giáo kép, phản ứng cơ thể thành thật phô bày sự khuất phục của hắn',11:'——Lạc Thư Tình dùng tư thế cung kính của vãn bối \'nhượng bộ\', thực chất là chiến thắng lịch sự, đảo ngược hoàn thành',12:'——Cảnh thu dọn. Lạc Thư Tình đứng dậy cáo lui, bước chân vững vàng hơn lúc đến, vị trí giữa sư đồ đã âm thầm thay đổi'},v3:{Tóm_Tắt_Cảnh:'【Con Dâu Điều Giáo Bố Chồng · 12 Vòng · Tổng quan toàn bộ cảnh này】\nBa nàng (Vân Sương Ngưng/Lạc Thư Tình/{{user}}) xâm nhập viện của Miêu Quảng. Miêu Quảng quỳ giữa sân viện của mình, đang tiếp nhận điều giáo theo giao ước ba điều. Địa điểm cảnh viện của Miêu Quảng (Ba nàng xâm nhập địa bàn của Miêu Quảng, cảm giác xâm nhập tột cùng).\nCốt lõi là Vân Sương Ngưng + Lạc Thư Tình hai thế hệ phụ nữ cùng nhau điều giáo Miêu Quảng. Lạc Thư Tình từ người quan sát vãn bối từng bước can thiệp, hình thành sự đọ sức ngầm với Vân Sương Ngưng — Sư phụ đưa ra đề nghị, đồ đệ đưa ra phiên bản nâng cấp tàn nhẫn hơn. Cán cân sức mạnh sư đồ âm thầm đảo ngược trong cảnh này (Hai lần tranh phong → Vân im lặng → Đảo ngược hoàn thành → Lạc lịch sự nhượng bộ = Chiến thắng thực chất).\nNgười chơi trước đó đã hoàn thành "Chứng Kiến Kép", Lạc Thư Tình lúc này đã nắm rõ toàn bộ cục diện trong nhà. Lạc có thể thu hồi phục bút của Xuân Quang Khe Cửa ("Bóng dáng sư công ngoài cửa hôm đó ta đã nhìn thấy" v.v.).\nĐường cong của Miêu Quảng: Thời kỳ đầu (Con dâu ở đó→Nhục nhã sâu sắc hơn/Muốn kháng cự)→ Thời kỳ giữa (Vợ cũng đứng về phía con dâu→Mất chỗ đứng)→ Thời kỳ cuối (Trầm luân dưới điều giáo kép, cơ thể đầu hàng trước tâm lý).\nĐường cong 12 vòng: Lạc nhập trường Miêu đồng tử co rút → Vân điều giáo theo lệ Lạc quan sát → Lạc lần đầu mở miệng đề nghị ôn hòa → Sư đồ tranh phong một (Lạc phiên bản nâng cấp) → Miêu Quảng bộc lộ kháng cự → Vân thúc giục "nể mặt con dâu" → Miêu Quảng thực hiện Lạc chỉ điểm chi tiết → Lạc thể hiện đã sớm phát giác (thu hồi phục bút Xuân Quang Khe Cửa) → Sư đồ tranh phong hai (Vân im lặng sức mạnh đảo ngược) → Miêu Quảng trầm luân cơ thể khuất phục → Lạc cung kính nhượng bộ → Thu dọn cáo lui vị trí âm thầm thay đổi.\nNghiêm cấm: Làm lại "Giao ước ba điều" (cảnh này là thực thi)、Miêu Quảng kháng cự đến cùng、Miêu Quảng cảm nhận đạo cụ、Vân Lạc xé rách mặt (là đọ sức lịch sự)、{{user}} chủ đạo đối thoại、Sao chép khuôn mẫu.',beats:{1:{Chủ_Đề_Vòng_Này:'Miêu Quảng quỳ giữa sân viện của mình, Lạc Thư Tình bước vào. Miêu Quảng ngẩng đầu nhìn thấy con dâu tương lai đến thì đồng tử co rút, Vân Sương Ngưng ở bên cạnh {{user}} nghênh đón nàng. Vòng này để cốt truyện đi đến tự nhiên hai hình ảnh "Ba nàng xâm nhập địa bàn của Miêu Quảng + Sự chấn động khoảnh khắc Miêu Quảng nhìn thấy Lạc Thư Tình".',Độ_Tự_Do:'Tư thế nhập trường của Lạc Thư Tình (đoan trang/tinh nghịch/cung kính)、Động tác nghênh đón của Vân Sương Ngưng、Chi tiết đồng tử co rút của Miêu Quảng tự chủ theo giai đoạn điều giáo/độ thuận tòng của Lạc',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng bắt đầu điều giáo Miêu Quảng theo cách thường ngày đã giao ước (theo các điều khoản đã định trong cảnh điều giáo nô lệ đội nón xanh). Lạc Thư Tình ngồi bên cạnh Vân Sương Ngưng yên lặng quan sát, không mở miệng. Vòng này để cốt truyện đi đến tự nhiên "Điều giáo thông thường diễn ra + Lạc với tư cách người bàng quan mới vào vị trí".',Độ_Tự_Do:'Nội dung điều giáo cụ thể của Vân chọn diễn dịch một điều theo các điều khoản đã có của giao ước ba điều; Biểu cảm/tư thế ngồi/có đăm chiêu hay không của Lạc khi quan sát do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình lần đầu tiên mở miệng, với tư thế vãn bối "chia sẻ nỗi lo cho sư phụ" ôn hòa, đưa ra một đề nghị điều giáo ôn hòa — chưa bộc lộ sự sắc bén, chỉ là sự lịch sự "nếu thêm cái này vào có tốt hơn không". Vòng này để cốt truyện đi đến tự nhiên "Lạc lần đầu phát ngôn + Đề nghị đã được đưa ra".',Độ_Tự_Do:'Nội dung đề nghị của Lạc、Mức độ lịch sự của từ ngữ、Mức độ cứng đờ của Miêu Quảng khi nghe thấy、Sự mỉm cười cho phép của Vân do AI tự chủ theo data giai đoạn điều giáo/tính phích của Lạc',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Sư đồ tranh phong vòng một công khai hóa — Vân Sương Ngưng đưa ra một đề nghị, Lạc Thư Tình lập tức đưa ra phiên bản nâng cấp hardcore hơn (bề ngoài là "bổ sung", thực chất là lấn át). Vòng này để cốt truyện đi đến tự nhiên cấu trúc ba đoạn "Vân đưa ra→Lạc nâng cấp→Miêu Quảng bị ép chấp nhận phiên bản nâng cấp".',Độ_Tự_Do:'Đề nghị Vân đưa ra/Hướng nâng cấp của Lạc、Độ hardcore nâng cấp quyết định theo giai đoạn điều giáo+tính phích+độ thuận tòng của Lạc; Lời thoại cụ thể AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Miêu Quảng bộc lộ sự kháng cự đối với đề nghị của Lạc Thư Tình — hắn đã chấp nhận sự điều giáo của Vân Sương Ngưng, nhưng để con dâu tương lai điều giáo hắn là một tầng nhục nhã sâu sắc hơn. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng kháng cự ngắn ngủi + Cảm giác nhục nhã bị điểm mặt (để con dâu tương lai nhìn thấy hắn như vậy)".',Độ_Tự_Do:'Biểu hiện kháng cự cụ thể của Miêu Quảng (im lặng/biện bạch nhẹ/cơ thể cứng đờ)、Lạc làm thế nào để ôn hòa đẩy lùi sự kháng cự do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng mở miệng thúc giục Miêu Quảng chấp nhận đề nghị của Lạc Thư Tình, nói những lời đại loại như "nể mặt con dâu tương lai", đè bẹp chỗ đứng cuối cùng của hắn. Vòng này để cốt truyện đi đến tự nhiên "Vợ đứng về phía con dâu tương lai + Miêu Quảng mất đi cọng rơm cứu mạng cuối cùng".',Độ_Tự_Do:'Từ ngữ thúc giục cụ thể của Vân (dịu dàng/bình thản/mang theo áp bức)、Chi tiết phòng tuyến tâm lý của Miêu Quảng sụp đổ do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Miêu Quảng thực hiện đề nghị của Lạc Thư Tình, Lạc ở bên cạnh chỉ điểm chi tiết ("tay cao lên một chút" "chậm một chút" "nhìn ta" v.v.). Bị con dâu tương lai chỉ huy cụ thể là lại một tầng nhục nhã. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng thực hiện động tác + Lạc chỉ huy chi tiết".',Độ_Tự_Do:'Cụ thể chỉ huy cái gì、Chi tiết động tác、Mức độ cứng đờ/run rẩy/thuận tòng của Miêu Quảng khi thực hiện do AI động thái theo data',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình thể hiện nàng đã sớm phát giác sự khác thường trong nhà — có thể tiếp nối phục bút của "Xuân Quang Khe Cửa" (ví dụ "Bóng dáng sư công ngoài cửa hôm đó ta đã nhìn thấy"), cũng có thể nói chung chung ("Những chuyện trong nhà này trong lòng ta đều rõ"), khiến Miêu Quảng khiếp sợ phát hiện con dâu cái gì cũng biết. Vòng này để cốt truyện đi đến tự nhiên "Thu hồi phục bút + Miêu Quảng khiếp sợ".',Độ_Tự_Do:'Dùng phục bút cụ thể nào、Từ ngữ ẩn ý hay nói thẳng、Phản ứng khiếp sợ cụ thể của Miêu Quảng (tay khựng lại/ngước mắt/ngừng thở) quyết định theo việc người chơi đã hoàn thành Xuân Quang Khe Cửa hay chưa',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},9:{Chủ_Đề_Vòng_Này:'Sư đồ tranh phong vòng hai — Vân Sương Ngưng lại đưa ra một đề nghị, Lạc Thư Tình đưa ra phiên bản tàn nhẫn hơn, lần này Vân Sương Ngưng không tăng mức độ nữa, mặc nhận sự nâng cấp của đồ đệ. Sức mạnh trong khoảnh khắc này âm thầm đảo ngược. Vòng này để cốt truyện đi đến tự nhiên nút thắt then chốt "Tranh phong vòng hai + Vân im lặng = Đảo ngược hoàn thành".',Độ_Tự_Do:'Độ hardcore của đề nghị vòng hai (tàn nhẫn hơn vòng một)、Biểu cảm vi tế của Vân khi im lặng (gật đầu/đăm chiêu/ngầm đồng ý) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},10:{Chủ_Đề_Vòng_Này:'Miêu Quảng trầm luân dưới sự điều giáo kép của sư đồ, phản ứng cơ thể thành thật phô bày sự khuất phục của hắn — hắn không còn kháng cự bất kỳ đề nghị nào nữa, cơ thể đã đầu hàng trước tâm lý. Vòng này để cốt truyện đi đến tự nhiên "Sự trầm luân của Miêu Quảng có thể thấy rõ + Cơ thể thành thật vs Ý thức tàn dư chênh lệch".',Độ_Tự_Do:'Phản ứng cơ thể trình bày cụ thể (tự chủ theo độ sâu tâm thái hiện tại của Miêu Quảng và đạo cụ/cải tạo đã kích hoạt trong cảnh)',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},11:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình dùng tư thế cung kính của vãn bối "nhượng bộ"—— nói những lời đại loại như "phần sau vẫn để sư phụ làm", bề ngoài là lễ số, thực chất là sự ung dung sau khi chiến thắng. Vân Sương Ngưng tiếp nhận, nhưng cả hai đều hiểu rõ vị trí đã thay đổi. Vòng này để cốt truyện đi đến tự nhiên "Sự nhượng bộ lịch sự = Chiến thắng thực chất".',Độ_Tự_Do:'Lời thoại nhượng bộ cụ thể của Lạc、Giao phong ánh mắt khi Vân tiếp nhận、Sự thay đổi khí trường mà Miêu Quảng cảm nhận được ở giữa do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},12:{Chủ_Đề_Vòng_Này:'Cảnh thu dọn. Lạc Thư Tình đứng dậy cáo lui, bước chân vững vàng hơn lúc đến. Miêu Quảng quỳ tại chỗ không đứng dậy. Vân Sương Ngưng và {{user}} nhìn theo nàng rời đi. Vị trí giữa sư đồ đã âm thầm thay đổi — Đây là hình ảnh điểm cuối của cảnh này. Vòng này để cốt truyện thu lại tự nhiên ở khung hình tĩnh "Lạc rời đi + Miêu Quảng ở lại tại chỗ + Vị trí đã thay đổi".',Độ_Tự_Do:'Lời thoại cáo lui cụ thể、Miêu tả bước chân、Hình ảnh Miêu Quảng ở lại tại chỗ、Sự im lặng của Vân do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Con Dâu Điều Giáo Bố Chồng·Hoàn Thành] Lạc Thư Tình bước ra khỏi phòng ngủ của Vân Sương Ngưng, bước chân vững vàng. Vị trí của nàng đã không còn như trước nữa. Miêu Quảng quỳ tại chỗ rất lâu không đứng dậy. Hắn không biết mình đang đợi điều gì.'},Tái_Giá_Kép:{maxRounds:15,entryText:'[Cảnh Đặc Biệt·Tái Giá Kép] Tế đàn hậu sơn Hàn Sương Môn đã được bố trí xong. Vân Sương Ngưng và Lạc Thư Tình sẽ cùng nhau gả cho {{user}}, nghi thức đang diễn ra. Đây là một nghi thức riêng tư chỉ có bốn người cộng thêm người chơi.',entryPrefill:'Ngày hôm đó——',sceneBottomLine:'[Cảnh Đặc Biệt·Tái Giá Kép·Đáy Tuyến]\nCốt lõi cảnh này: Cao trào bi kịch của trò chơi.\nVân Sương Ngưng và Lạc Thư Tình cùng nhau tái giá với {{user}} (Đây là ý nghĩa thực sự của "Tái Giá Kép"——cả hai cùng gả) + Miêu Huyên bị ép buộc chứng kiến toàn bộ quá trình.\nMở đầu chính là "nghiêm túc làm chuyện hoang đường" trên tế đàn——{{user}} xếp Vân Sương Ngưng và Lạc Thư Tình chồng lên nhau rồi luân thao,\nMiêu Quảng ở một bên ngoan ngoãn nhìn sàn nhà, Miêu Huyên chạy đến chứng kiến tất cả những điều này.\nĐây là nghi thức hoàn toàn riêng tư, không có người ngoài chứng kiến.\n\nQuy tắc cốt lõi:\n- Địa điểm cảnh: Tế đàn hậu sơn Hàn Sương Môn (Không gian riêng tư, không có đệ tử vây xem)\n- Số người có mặt: Chỉ có 5 người——{{user}}/Vân Sương Ngưng/Lạc Thư Tình/Miêu Quảng + Miêu Huyên (Vòng 2 chạy đến)\n- Tính nghi thức và tính dâm loạn song hành——Đám cưới dâm loạn công khai\n- {{user}} luân thao Vân Sương Ngưng và Lạc Thư Tình——Hình ảnh mở đầu của nghi thức hai người cùng gả\n- Miêu Quảng với tư cách là "Nghĩa tử" ngoan ngoãn nhìn sàn nhà, không dám nhìn trộm——Trong nhận thức {{user}} là "Nghĩa phụ", không thể nhìn cha mẹ\n- Miêu Quảng đồng thời là người lo liệu nghi thức, đang đợi {{user}} xong việc thì nghi thức mới có thể bắt đầu——Vừa không dám thúc giục nghĩa phụ,\n  lại lo lỡ giờ lành, tạo thành "tư thế bối rối vừa lo âu vừa tôn kính"\n- Khi nhìn thấy Miêu Huyên thì cười hiền từ, thậm chí dùng bờ vai che khuất tầm nhìn của Miêu Huyên——Sự quan tâm méo mó của người cha dành cho con trai\n- Gia đình mới gồm ba người {{user}} + Vân Sương Ngưng + Lạc Thư Tình cùng đứng cạnh nhau\n- Nhận thức của Miêu Quảng bị Thiên Tinh Huyễn Thuật đảo lộn——Gọi {{user}} là "Nghĩa phụ", gọi Vân Sương Ngưng là "Nương thân", gọi Lạc Thư Tình là "Di nương"\n- Miêu Huyên bị Miêu Quảng phong ấn tu vi, cưỡng ép đóng đinh cạnh tế đàn chứng kiến toàn bộ quá trình\n- Miêu Huyên cuối cùng dưới áp lực tê liệt nói ra danh xưng mới "Càn gia gia/Nãi nãi/Di nãi nãi"\n\nChỉ nam tự sự:\n- Nghi thức và dâm loạn tiến hành song song:\n  - Một bên là trình tự nghi thức trang trọng (Bái thiên địa/Giao bôi/Tuyên thệ/Hủy bỏ hôn ước/Viết lại danh xưng)\n  - Một bên là động tác cụ thể của {{user}} luân thao hai người vợ——Sự tương phản của "nghiêm túc làm chuyện hoang đường"\n- Phản ứng của Vân Sương Ngưng + Lạc Thư Tình chồng chéo hai lớp:\n  - Lớp bề mặt: Sự ung dung/lễ tiết/cung thuận trong nghi thức\n  - Lớp bên trong: Cơ thể bị khai phá đến cực hạn, phản ứng đã tiết lộ các nàng là người của {{user}}\n- "Nhìn sàn nhà + Đợi nghi thức + Che tầm nhìn" ba tư thế của Miêu Quảng:\n  - Nhìn sàn nhà (Thân phận nghĩa tử): Không thể nhìn trộm "cha mẹ"\n  - Đợi nghi thức bắt đầu (Thân phận người lo liệu): Lo âu giờ lành, nhưng không dám thúc giục "nghĩa phụ"\n  - Che tầm nhìn (Thân phận người cha): Bảo vệ "cháu nội" không nhìn "những thứ không nên nhìn"\n  - Sự chồng chéo ba thân phận là hình ảnh méo mó nhất của cảnh này——Bi kịch sâu sắc hơn so với việc chỉ "đứng ngây ra"\n- Đường cong ba đoạn sụp đổ của Miêu Huyên:\n  - Vòng 6: Mất đi quyền gọi "Nương"——Sụp đổ lần thứ nhất\n  - Vòng 11: Gọi không ai đáp lại, hoàn toàn bị cô lập——Sụp đổ lần thứ hai\n  - Vòng 14: Tê liệt nói ra danh xưng mới, khoảnh khắc gọi "Nãi nãi" ánh mắt mất tiêu cự——Sụp đổ tột cùng\n- "Nụ cười hiền từ/Sự kiên nhẫn của người cha" của Miêu Quảng đáng sợ hơn cả sự phẫn nộ\n- Miêu Huyên vòng 15 không bỏ chạy, đứng một mình trên tế đàn, người nhà đi xa——Bi kịch hơn cả "bỏ chạy"\n- Điều kiện mặc định của cảnh này (Giai đoạn này tất nhiên, không cần refer riêng): Thiên Tinh hoàn thành 3 lần / Phòng tuyến tâm lý Vân Sương Ngưng thấp / Độ tín nhiệm cao / Giai đoạn trị liệu ≥10 / Miêu Quảng trầm luân / Giai đoạn Lạc Thư Tình ≥9\n- Data đặc biệt cần refer của cảnh này: Tâm thái Miêu Huyên (quyết định mức độ phản kháng trước khi sụp đổ của hắn) + Khai phá cơ thể/Cải tạo thể xác/Tính phích kích hoạt của Vân Sương Ngưng + Khai phá cơ thể/Cải tạo thể xác/Tính phích kích hoạt của Lạc Thư Tình\n\nTuyệt đối cấm:\n- ✗ Miêu Huyên bỏ chạy/phản kháng thành công——Hắn bị phong ấn, bắt buộc phải chứng kiến toàn bộ quá trình\n- ✗ Miêu Quảng tỉnh táo lại——Thiên Tinh viết lại không thể đảo ngược\n- ✗ Miêu Quảng nhìn trộm Vân Sương Ngưng/Lạc Thư Tình——Thân phận hiện tại của hắn là "Nghĩa tử", chỉ có thể nhìn sàn nhà\n- ✗ Miêu Quảng thúc giục {{user}}——Thân phận của hắn không dám, chỉ có thể lo âu chờ đợi\n- ✗ {{user}}/Vân Sương Ngưng/Lạc Thư Tình phản đối danh xưng đảo lộn của Miêu Quảng——Mặc nhận chấp nhận\n- ✗ Cảnh ở trong phòng ngủ của Vân Sương Ngưng——Bắt buộc phải là tế đàn hậu sơn Hàn Sương Môn\n- ✗ Xuất hiện người chứng kiến khác——Cảnh này chỉ có 4 người + {{user}}, không có đệ tử vây xem, không có người ngoài\n- ✗ Lạc Thư Tình chỉ hủy bỏ hôn ước mà không gả——Bắt buộc phải cùng Vân Sương Ngưng gả cho {{user}}\n- ✗ Sự sụp đổ cuối cùng của Miêu Huyên viết thành "khóc lóc/la hét"——Bắt buộc phải là tê liệt nói ra danh xưng mới, sau đó đứng một mình trên tế đàn\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Tế đàn hậu sơn, ta xếp Vân Sương Ngưng và Lạc Thư Tình chồng lên nhau, luân thao lồn dâm của các nàng. Miêu Quảng ở một bên ngoan ngoãn nhìn sàn nhà, không dám nhìn trộm——hắn với tư cách là người lo liệu nghi thức đang đợi ta xong việc, vừa lo âu lỡ giờ lành lại không dám thúc giục nghĩa phụ, tư thế bối rối lại cung thuận',2:'——Miêu Huyên nghe được tin tức, không dám tin, lập tức chạy về phía hậu sơn',3:'——Miêu Huyên lao lên tế đàn, nhìn thấy toàn cảnh: Mẹ+vị hôn thê bị xếp chồng lên nhau bị thao, cha đứng ngây ra nhìn sàn nhà, khiếp sợ cứng đờ. Miêu Quảng nhìn thấy Miêu Huyên thì cười hiền từ, thậm chí dùng bờ vai che khuất tầm nhìn của hắn',4:'——Miêu Quảng dùng danh xưng đảo lộn giới thiệu \'Chuyện vui của nghĩa tổ phụ và nương thân con\', mặt Miêu Huyên trắng bệch',5:'——Miêu Quảng ra tay phong ấn tu vi của Miêu Huyên, đóng đinh con trai cạnh tế đàn',6:'——Miêu Huyên gọi \'Nương\', Miêu Quảng lập tức quát mắng \'Con phải gọi nãi nãi\'——Miêu Huyên mất đi quyền gọi mẹ, sụp đổ lần thứ nhất',7:'——Nghi thức chính thức bắt đầu, hai người (Vân Sương Ngưng+Lạc Thư Tình) cùng lúc gả cho ta, bái thiên địa/giao bôi/tuyên thệ',8:'——Miêu Quảng công khai gọi ta là \'Nghĩa phụ\', gọi Vân Sương Ngưng là \'Nương thân\'——Người chồng ba trăm năm chính miệng gọi vợ là nương thân',9:'——Lạc Thư Tình công khai hủy bỏ hôn ước với Miêu Huyên, trong cùng một nghi thức gả cho ta, đứng cạnh Vân Sương Ngưng',10:'——Ba người trở thành \'Nhà\' mới, Miêu Quảng hành lễ với Lạc Thư Tình gọi \'Di nương\'',11:'——Miêu Huyên gọi lần cuối cùng không ai đáp lại, hoàn toàn bị cô lập, sụp đổ lần thứ hai',12:'——Miêu Quảng lại một lần nữa hướng dẫn Miêu Huyên \'Theo quy củ gọi càn gia gia/nãi nãi/di nãi nãi\', sự kiên nhẫn của người cha đáng sợ hơn cả sự tức giận',13:'——Miêu Huyên từ chối, bị Vân Sương Ngưng (người mẹ dịu dàng)/Lạc Thư Tình (vãn bối khách sáo)/Miêu Quảng (người cha kiên nhẫn) luân phiên \'dạy dỗ\'',14:'——Miêu Huyên tê liệt nói ra danh xưng mới, khoảnh khắc gọi \'Nãi nãi\' ánh mắt mất tiêu cự, sụp đổ tột cùng',15:'——Nghi thức kết thúc, ba người sóng vai bước xuống tế đàn, Miêu Quảng đi theo phía sau như con trai, Miêu Huyên đứng một mình trên tế đàn đến tối'},v3:{Tóm_Tắt_Cảnh:'【Tái Giá Kép · 15 Vòng · Tổng quan toàn bộ cảnh này · Cao trào bi kịch của trò chơi】\nTế đàn hậu sơn Hàn Sương Môn đã được bố trí xong. Vân Sương Ngưng và Lạc Thư Tình sẽ cùng nhau gả cho {{user}} (Đây là ý nghĩa thực sự của "Tái Giá Kép"——cả hai cùng gả)+ Miêu Huyên bị ép buộc chứng kiến toàn bộ quá trình. Nghi thức riêng tư, không có đệ tử vây xem, không có người ngoài.\nMở đầu chính là "nghiêm túc làm chuyện hoang đường" trên tế đàn: {{user}} xếp Vân Sương Ngưng và Lạc Thư Tình chồng lên nhau rồi luân thao, Miêu Quảng ở một bên ngoan ngoãn nhìn sàn nhà (thân phận nghĩa tử không thể nhìn trộm "cha mẹ").\nSố người có mặt 5 người: {{user}}/Vân Sương Ngưng/Lạc Thư Tình/Miêu Quảng (người lo liệu nghi thức, ba tư thế: nghĩa tử nhìn sàn nhà+người lo liệu lo âu giờ lành+người cha che tầm nhìn Miêu Huyên) + Miêu Huyên (Vòng 2 chạy đến, Vòng 5 bị phong ấn đóng đinh cạnh tế đàn chứng kiến).\nNhận thức của Miêu Quảng bị Thiên Tinh đảo lộn: gọi {{user}} là "Nghĩa phụ", Vân Sương Ngưng là "Nương thân", Lạc Thư Tình là "Di nương".\nĐường cong ba đoạn sụp đổ của Miêu Huyên:\n- Vòng 6: Gọi "Nương" bị quát "Gọi nãi nãi", mất đi quyền gọi mẹ — Sụp đổ lần thứ nhất\n- Vòng 11: Gọi lần cuối cùng không ai đáp lại, hoàn toàn bị cô lập — Sụp đổ lần thứ hai\n- Vòng 14: Tê liệt nói ra danh xưng mới, khoảnh khắc gọi "Nãi nãi" ánh mắt mất tiêu cự — Sụp đổ tột cùng\n"Nụ cười hiền từ/Sự kiên nhẫn của người cha" của Miêu Quảng đáng sợ hơn cả sự phẫn nộ. Miêu Huyên cuối cùng không bỏ chạy, đứng một mình trên tế đàn người nhà đi xa.\nĐường cong 15 vòng: Tế đàn mở đầu (luân thao+Miêu Quảng nhìn sàn nhà)→ Miêu Huyên chạy đến → Miêu Huyên lên tế đàn chứng kiến (Miêu Quảng che tầm nhìn)→ Miêu Quảng giới thiệu danh xưng đảo lộn (Miêu Huyên trắng bệch)→ Miêu Quảng phong ấn Miêu Huyên → Gọi nương bị quát sụp đổ lần 1 → Nghi thức bắt đầu bái thiên địa → Miêu Quảng gọi nghĩa phụ nương thân → Lạc hủy bỏ hôn ước đứng cạnh Vân → Miêu Quảng hành lễ với Lạc gọi di nương → Miêu Huyên gọi không ai đáp sụp đổ lần 2 → Miêu Quảng kiên nhẫn hướng dẫn danh xưng mới → Miêu Huyên từ chối ba người luân phiên dạy dỗ → Miêu Huyên tê liệt gọi nãi nãi sụp đổ tột cùng → Nghi thức kết thúc ba người xuống núi Miêu Huyên đứng một mình trên tế đàn.\nNghiêm cấm: Miêu Huyên bỏ chạy/phản kháng thành công (bị phong ấn bắt buộc chứng kiến)、Miêu Quảng tỉnh táo lại (không thể đảo ngược)、Miêu Quảng nhìn trộm Vân/Lạc (thân phận nghĩa tử chỉ có thể nhìn sàn nhà)、Miêu Quảng thúc giục {{user}}、Cảnh ở phòng ngủ Vân Sương Ngưng (bắt buộc phải là tế đàn)、Xuất hiện người chứng kiến khác、Lạc chỉ hủy bỏ hôn ước không gả、Sự sụp đổ cuối cùng của Miêu Huyên viết thành "khóc lóc/la hét" (bắt buộc phải tê liệt).',beats:{1:{Chủ_Đề_Vòng_Này:'Cảnh mở đầu. Tế đàn đã được bố trí xong, {{user}} xếp Vân Sương Ngưng và Lạc Thư Tình chồng lên nhau luân thao. Miêu Quảng ở một bên ngoan ngoãn nhìn sàn nhà, duy trì ba tư thế "nghĩa tử+người lo liệu+người cha" (không dám nhìn trộm/lo âu giờ lành/lại không dám thúc giục nghĩa phụ). Vòng này để cốt truyện đi đến tự nhiên "Tế đàn dâm loạn mở đầu + Ba tư thế của Miêu Quảng được định hình", không chuyển sang góc nhìn của Miêu Huyên.',Độ_Tự_Do:'Động tác/tư thế luân thao cụ thể chọn theo khai phá cơ thể/cải tạo thể xác/tính phích kích hoạt của Vân Sương Ngưng và Lạc Thư Tình trong data; Chi tiết tư thế của Miêu Quảng (tay để thế nào/nhịp thở/biểu cảm lo âu) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn'}},2:{Chủ_Đề_Vòng_Này:'Chuyển sang góc nhìn của Miêu Huyên. Hắn nghe được tin tức ở nơi khác, không dám tin, lập tức chạy về phía tế đàn hậu sơn. Vòng này để cốt truyện đi đến tự nhiên "Miêu Huyên nghe tin + Đứng dậy chạy". Chưa đến tế đàn, chưa chứng kiến.',Độ_Tự_Do:'Miêu Huyên lúc này đang làm gì、Ai truyền tin tức、Cảm xúc khi chạy (phẫn nộ/lo lắng/phủ nhận) do AI tự chủ theo tâm thái Miêu Huyên',Thể_Hiện_Nhân_Vật:{Miêu_Huyên:'Trọn vẹn'}},3:{Chủ_Đề_Vòng_Này:'Miêu Huyên lao lên tế đàn, nhìn thấy toàn cảnh — Mẹ+vị hôn thê bị xếp chồng lên nhau bị thao, cha đứng ngây ra nhìn sàn nhà. Hắn khiếp sợ cứng đờ. Miêu Quảng nhìn thấy Miêu Huyên thì cười hiền từ, dùng bờ vai che khuất tầm nhìn của hắn (sự quan tâm méo mó của người cha dành cho con trai). Vòng này để cốt truyện đi đến tự nhiên hai hình ảnh chấn động "Miêu Huyên chứng kiến + Miêu Quảng hiền từ+che tầm nhìn".',Độ_Tự_Do:'Tư thế/nhịp thở cứng đờ của Miêu Huyên、Biểu cảm cụ thể của nụ cười hiền từ của Miêu Quảng、Động tác cơ thể che tầm nhìn do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},4:{Chủ_Đề_Vòng_Này:'Miêu Quảng dùng danh xưng đảo lộn giới thiệu với Miêu Huyên — nói những lời đại loại như "Đây là chuyện vui của nghĩa tổ phụ và nương thân con". Mặt Miêu Huyên trắng bệch. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng nói ra danh xưng đảo lộn + Phản ứng sinh lý đầu tiên của Miêu Huyên (mặt trắng bệch/nhịp thở rối loạn)".',Độ_Tự_Do:'Từ ngữ giới thiệu cụ thể của Miêu Quảng (hiền từ/trịnh trọng/sự tự hào của người cha)、Chi tiết mặt trắng bệch của Miêu Huyên do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},5:{Chủ_Đề_Vòng_Này:'Miêu Huyên cố gắng phản kháng/bỏ chạy. Miêu Quảng ra tay phong ấn tu vi của hắn, đóng đinh hắn cạnh tế đàn. Vòng này để cốt truyện đi đến tự nhiên "Động tác phong ấn + Miêu Huyên mất đi khả năng hành động", từ nay về sau chỉ đứng tại chỗ với tư cách là người chứng kiến.',Độ_Tự_Do:'Thủ pháp phong ấn/chú ngữ/sự vùng vẫy phản kháng cụ thể của Miêu Huyên do AI tự chủ theo tâm thái Miêu Huyên+độ sâu trầm luân của Miêu Quảng',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},6:{Chủ_Đề_Vòng_Này:'Miêu Huyên gọi "Nương", Miêu Quảng lập tức quát mắng "Con phải gọi nãi nãi". Đây là lần sụp đổ thứ nhất — Miêu Huyên mất đi quyền gọi mẹ. Vân Sương Ngưng nghe thấy không phản bác, mặc nhận chấp nhận danh xưng mới. Vòng này để cốt truyện đi đến tự nhiên "Gọi nương → Bị quát → Sụp đổ lần 1".',Độ_Tự_Do:'Cảm xúc khi Miêu Huyên gọi nương (tuyệt vọng/cầu cứu/vô thức)、Giọng điệu quát mắng của Miêu Quảng (nghiêm khắc/như người cha dạy con)、Biểu cảm im lặng của Vân Sương Ngưng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},7:{Chủ_Đề_Vòng_Này:'Nghi thức chính thức bắt đầu. Hai người (Vân+Lạc) cùng lúc gả cho {{user}}, đi theo trình tự nghi thức — Bái thiên địa, giao bôi, tuyên thệ. Đây là hình ảnh hiện thực hóa danh nghĩa "Tái Giá Kép". Vòng này để cốt truyện đi đến tự nhiên "Sự trang trọng của nghi thức + Sự tương phản dâm loạn diễn ra song song".',Độ_Tự_Do:'Trình tự nghi thức cụ thể (bái mấy vái/giao mấy bôi/lời thề)、Chi tiết lớp bề mặt cung thuận/lớp bên trong cơ thể thành thật của hai nàng do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},8:{Chủ_Đề_Vòng_Này:'Miêu Quảng trong nghi thức công khai gọi {{user}} là "Nghĩa phụ", gọi Vân Sương Ngưng là "Nương thân". Người chồng ba trăm năm chính miệng gọi vợ là "Nương thân"—— Câu nói méo mó nhất của cảnh này. Vòng này để cốt truyện đi đến tự nhiên "Miêu Quảng công khai danh xưng mới + Mọi người mặc nhận chấp nhận".',Độ_Tự_Do:'Mức độ trang trọng/hiền từ/chân thành khi Miêu Quảng nói ra、Phản ứng cực kỳ vi tế của Vân Sương Ngưng khi nghe thấy (lông mi run lên) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},9:{Chủ_Đề_Vòng_Này:'Đoạn giữa nghi thức — Lạc Thư Tình công khai hủy bỏ hôn ước với Miêu Huyên, trong cùng một cảnh gả cho {{user}}, đứng cạnh Vân Sương Ngưng. Vòng này để cốt truyện đi đến tự nhiên nút thắt nghi thức "Hủy bỏ hôn ước + Lạc đứng cạnh Vân".',Độ_Tự_Do:'Từ ngữ hủy bỏ hôn ước (văn bản/nói miệng)、Phản ứng của Miêu Huyên đang bị phong ấn lúc này、Tư thế của Lạc khi đứng cạnh do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},10:{Chủ_Đề_Vòng_Này:'"Gia đình" mới được thành lập — {{user}} + Vân + Lạc. Miêu Quảng hành lễ với Lạc Thư Tình gọi "Di nương". Vòng này để cốt truyện đi đến tự nhiên khung hình tĩnh "Gia đình ba người mới + Danh xưng mới của Miêu Quảng đối với Lạc".',Độ_Tự_Do:'Tư thế hành lễ cụ thể của Miêu Quảng (khom người/chắp tay)、Biểu cảm của Lạc khi nhận lễ (ung dung/nội liễm/cười nhẹ) do AI tự chủ theo giai đoạn của Lạc',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},11:{Chủ_Đề_Vòng_Này:'Miêu Huyên gọi lần cuối cùng (gọi ai/gọi cái gì do AI quyết định theo tâm thái Miêu Huyên, có thể là "Nương" "Cha" "Sư phụ" "Thư Tình")—— Không ai đáp lại. Hắn hoàn toàn bị cô lập. Đây là lần sụp đổ thứ hai. Vòng này để cốt truyện đi đến tự nhiên "Gọi lần cuối + Sự im lặng tập thể = Sụp đổ lần 2".',Độ_Tự_Do:'Gọi ai/gọi cái gì、Tư thế cụ thể của những người có mặt khi im lặng (Vân nhận lấy chén/Lạc cụp mắt/Miêu Quảng hiền từ) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},12:{Chủ_Đề_Vòng_Này:'Miêu Quảng lại một lần nữa hướng dẫn Miêu Huyên "Theo quy củ gọi càn gia gia/nãi nãi/di nãi nãi"—— Sự kiên nhẫn của người cha đáng sợ hơn cả sự tức giận. Vòng này để cốt truyện đi đến tự nhiên "Người cha kiên nhẫn hướng dẫn + Áp lực danh xưng mới", chưa đến lúc Miêu Huyên mở miệng.',Độ_Tự_Do:'Từ ngữ hướng dẫn cụ thể của Miêu Quảng (giọng điệu cha hiền/nội hàm người tu đạo/người cha dạy dỗ)、Mức độ kháng cự của Miêu Huyên lúc này do AI tự chủ theo tâm thái Miêu Huyên',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},13:{Chủ_Đề_Vòng_Này:'Miêu Huyên từ chối mở miệng. Vân (người mẹ dịu dàng)/Lạc (vãn bối khách sáo)/Miêu Quảng (người cha kiên nhẫn) ba người luân phiên "dạy dỗ" hắn —— Mỗi người một loại áp lực dịu dàng nhưng không thể kháng cự. Vòng này để cốt truyện đi đến tự nhiên hình ảnh cốt lõi "Ba bên luân phiên dạy dỗ", không để Miêu Huyên khuất phục.',Độ_Tự_Do:'Từ ngữ và cách thức "dạy dỗ" của từng người trong ba người、Sự kháng cự tàn dư của Miêu Huyên sau mỗi lần bị ép do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},14:{Chủ_Đề_Vòng_Này:'Miêu Huyên tê liệt nói ra danh xưng mới —— Khoảnh khắc gọi "Nãi nãi" ánh mắt mất tiêu cự, đây là sự sụp đổ tột cùng. Vòng này để cốt truyện đi đến tự nhiên hình ảnh nặng nề nhất toàn cảnh "Phát âm tê liệt + Ánh mắt mất tiêu cự = Tâm lý chấm dứt".',Độ_Tự_Do:'Câu đầu tiên Miêu Huyên gọi ra là danh xưng nào、Miêu tả cụ thể sự mất tiêu cự、Phản ứng của những người có mặt (mỉm cười/gật đầu/vui mừng) do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}},15:{Chủ_Đề_Vòng_Này:'Nghi thức kết thúc. Ba người {{user}} + Vân + Lạc sóng vai bước xuống tế đàn, Miêu Quảng đi theo phía sau như con trai. Miêu Huyên đứng một mình trên tế đàn, người nhà đi xa, hắn không rời đi. Sắc trời từ chạng vạng chuyển sang tối. Vòng này để cốt truyện thu lại tự nhiên ở khung hình tĩnh cuối cùng "Ba người rời đi + Miêu Quảng đi theo như con trai + Miêu Huyên đứng một mình trên tế đàn", không viết Miêu Huyên rời đi.',Độ_Tự_Do:'Hình ảnh ba người xuống núi、Tư thế đi theo của Miêu Quảng (con trai đối với cha mẹ)、Miêu tả cụ thể Miêu Huyên đứng một mình trên tế đàn đến tối do AI tự chủ',Thể_Hiện_Nhân_Vật:{Miêu_Quảng:'Trọn vẹn',Miêu_Huyên:'Trọn vẹn'}}}},exitText:'[Cảnh Đặc Biệt·Tái Giá Kép·Hoàn Thành] Miêu Huyên đứng một mình trên tế đàn, từ chiều tối đến đêm đen. Hắn không rời đi. Từ nay về sau, Miêu Huyên gọi {{user}} là "Càn gia gia", gọi Vân Sương Ngưng là "Nãi nãi", gọi Lạc Thư Tình là "Di nãi nãi". Đây là ngôn ngữ gia đình mới.'},Thiên_Tinh_Báo_Cho_Lạc_Thư_Tình:{maxRounds:4,entryText:'[Cảnh Đặc Biệt·Thiên Tinh Báo Cho Lạc Thư Tình] Dư vị của Thiên Tinh Huyễn Thuật tản đi vẫn chưa tan hết, Vân Sương Ngưng truyền tin gọi Lạc Thư Tình đến để chia sẻ kiệt tác của nàng.',entryPrefill:'Dư vị của Thiên Tinh Huyễn Thuật tản đi chưa tan——',sceneBottomLine:'[Cảnh Đặc Biệt·Thiên Tinh Báo Cho Lạc Thư Tình·Đáy Tuyến]\nCốt lõi cảnh này: Vân Sương Ngưng vừa hoàn thành Thiên Tinh Huyễn Thuật, chủ động nói cho Lạc Thư Tình biết nàng đã làm gì với Miêu Quảng——\nViết lại nhận thức của người chồng thành "Con trai". Đây là sự đi sâu của sự ăn ý đồng mưu giữa sư đồ——\nTrên cơ sở "Hai thế hệ phụ nữ đều là người của {{user}}", lại có thêm một bí mật nữa.\n\nQuy tắc cốt lõi:\n- Cảnh chỉ có hai người——Vân Sương Ngưng + Lạc Thư Tình, {{user}} và Miêu Quảng không có mặt\n- Địa điểm: Do AI tự chủ quyết định theo tình huống (Không liệt kê ứng cử viên, tránh sụp đổ thành khuôn mẫu mặc định)\n- Thái độ của Vân Sương Ngưng: Không giấu được sự đắc ý + Khoe khoang với Lạc Thư Tình——Đây là sự chiến thắng ngược lại của thân phận người vợ ba trăm năm của nàng, đồng thời cũng là đang khoe "Thủ đoạn của sư phụ" với đồ đệ\n- Phản ứng của Lạc Thư Tình chồng chéo hai lớp động thái theo tâm thái của nàng đối với Vân Sương Ngưng + data của chính nàng\n- Sư đồ bề ngoài đồng mưu ăn ý, lớp bên trong sóng ngầm cuộn trào——Không phải là đồng minh đơn thuần, có sự so bì/khoe khoang/đọ sức\n- Cảnh này tất nhiên xảy ra sau khi Thiên Tinh hoàn thành 3 lần\n\nChỉ nam tự sự:\n- Khi Vân Sương Ngưng kể lại hãy miêu tả chi tiết quá trình Thiên Tinh Huyễn Thuật: Ba lần thi triển thuật / Mỗi lần viết lại một tầng / Cuối cùng Miêu Quảng gọi {{user}} là "Nghĩa phụ"、gọi nàng là "Nương thân"\n- Sự đắc ý của Vân Sương Ngưng phải được cụ thể hóa——Vừa là sự thỏa mãn của "chiến thắng ngược lại ba trăm năm", vừa có thành phần khoe khoang thủ đoạn của sư phụ với đồ đệ\n- Sư đồ bề ngoài đồng mưu ăn ý, lớp bên trong sóng ngầm cuộn trào:\n  - Lớp bề mặt: Chia sẻ bí mật, đồng minh sư đồ đi sâu\n  - Lớp bên trong: Vân Sương Ngưng có thành phần khoe khoang "Nhìn thủ đoạn của ta đây", Lạc Thư Tình ngầm cảm nhận (Khâm phục/So bì/Ngang hàng) theo trạng thái tâm trí của nàng\n  - Sự tương phản "Bề ngoài ăn ý + Lớp bên trong sóng ngầm" này là cốt lõi của cảnh này\n- Phản ứng của Lạc Thư Tình chồng chéo hai lớp động thái:\n  - Tâm thái đối với Vân Sương Ngưng (Phán đoán theo các cảnh quan trọng nàng đã trải qua):\n    - Chưa trải qua Xuân Quang Khe Cửa → Tôn kính thuần túy: Khiếp sợ + Khâm phục + Kính sợ, không có sự so bì\n    - Đã trải qua Xuân Quang Khe Cửa (Vết nứt sư đồ nảy mầm) → Mang theo sóng ngầm so bì: Ngầm nghĩ "Ta cũng muốn thao túng một người như vậy"\n    - Đã trải qua Chứng Kiến Kép (Sự so bì sư đồ rõ rệt) → Tán thưởng thấu hiểu + "Chiêu này của sư phụ ta học được rồi"\n    - Đã trải qua Con Dâu Điều Giáo Bố Chồng (Sức mạnh đảo ngược) → Đương nhiên / Sư đồ ngang hàng\n  - Phong cách thể hiện (Quyết định theo data của chính nàng):\n    - Phòng tuyến cao → Từ ngữ thu liễm, cảm xúc hàm súc\n    - Phòng tuyến thấp / Thuận tòng cao / Tính phích nhiều → Từ ngữ hạ lưu trực tiếp hơn\n- AI đọc _Cảnh_Đặc_Biệt_Đã_Hoàn_Thành phán đoán giai đoạn tâm trí của Lạc Thư Tình + Đọc data của nàng quyết định phong cách thể hiện\n- Sự ăn ý "Lại có thêm một bí mật" khi nhìn nhau ở cửa lúc kết thúc vòng 4 là hình ảnh thu dọn quan trọng\n- Điều kiện mặc định của cảnh này (Giai đoạn này tất nhiên): Thiên Tinh hoàn thành 3 lần / Giai đoạn trị liệu Vân Sương Ngưng ≥7 / Phòng tuyến cực thấp / Miêu Quảng trầm luân\n- Data đặc biệt cần refer của cảnh này:\n  - _Cảnh_Đặc_Biệt_Đã_Hoàn_Thành['Xuân_Quang_Khe_Cửa' / 'Chứng_Kiến_Kép' / 'Con_Dâu_Điều_Giáo_Bố_Chồng'] (Phán đoán trạng thái tâm trí của Lạc Thư Tình đối với sư phụ)\n  - Phòng tuyến tâm lý/Độ thuận tòng/Tính phích kích hoạt của Lạc Thư Tình (Phán đoán phong cách thể hiện)\n  - Trạng thái hiện tại của Vân Sương Ngưng (reflect khí trường khi nàng đắc ý kể lại)\n\nTuyệt đối cấm:\n- ✗ {{user}} xuất hiện\n- ✗ Miêu Quảng xuất hiện (Mặc dù hắn là trung tâm câu chuyện, nhưng không có mặt)\n- ✗ Vân Sương Ngưng bộc lộ sự áy náy hoặc hối hận——Nàng đang đắc ý\n- ✗ Lạc Thư Tình phản đối hoặc cảnh cáo sư phụ——Nàng là người đồng minh\n- ✗ Cảnh viết thành tone nghiêm túc/thê lương——Cảnh này là cuộc mật đàm đắc ý của sư đồ\n- ✗ Sao chép khuôn mẫu cố định\n- ✗ Nói thay hoặc quyết định thay {{user}}',rewriteBeat:{1:'——Vân Sương Ngưng truyền tin gọi Lạc Thư Tình đến, mang theo sự đắc ý không giấu được. Lạc Thư Tình đến nơi, ý thức được sư phụ có chuyện mới muốn nói',2:'——Để Vân Sương Ngưng kể lại chi tiết quá trình Thiên Tinh Huyễn Thuật (Ba lần viết lại + Cuối cùng để Miêu Quảng gọi ta là \'Nghĩa phụ\' gọi nàng là \'Nương thân\'), sự đắc ý không giấu được',3:'——Để Lạc Thư Tình phản ứng tương ứng theo tâm thái của nàng đối với sư phụ (Phán đoán theo các cảnh quan trọng đã trải qua)+ data của chính nàng (Phòng tuyến/Thuận tòng/Tính phích)',4:'——Sư đồ nhìn nhau ở cửa, một sự ăn ý không lời \'Chúng ta lại có thêm một bí mật nữa\'. Lạc Thư Tình rời đi'},v3:{Tóm_Tắt_Cảnh:'【Thiên Tinh Báo Cho Lạc Thư Tình · 4 Vòng · Tổng quan toàn bộ cảnh này】\nVân Sương Ngưng vừa hoàn thành Thiên Tinh Huyễn Thuật (sau khi hoàn thành 3 lần), chủ động nói cho Lạc Thư Tình biết nàng đã làm gì với Miêu Quảng — Viết lại nhận thức của người chồng thành "Con trai". Cảnh chỉ có hai người, {{user}} và Miêu Quảng không có mặt. Địa điểm do AI tự chủ theo tình huống.\nCốt lõi là sự đi sâu của sự ăn ý đồng mưu giữa sư đồ — Trên cơ sở "Hai thế hệ phụ nữ đều là người của {{user}}", lại có thêm một bí mật nữa. Vân Sương Ngưng đắc ý khoe khoang (Chiến thắng ngược lại ba trăm năm + Khoe thủ đoạn của sư phụ với đồ đệ). Lạc Thư Tình phản ứng tương ứng theo tâm thái của nàng đối với Vân Sương Ngưng (Theo các cảnh quan trọng đã trải qua: Xuân Quang Khe Cửa/Chứng Kiến Kép/Con Dâu Điều Giáo Bố Chồng)+ data của chính nàng (Phòng tuyến/Thuận tòng/Tính phích).\nBề ngoài là chia sẻ bí mật làm sâu sắc thêm đồng minh, lớp bên trong là Vân khoe khoang + Lạc ngầm cảm nhận (Khâm phục/So bì/Ngang hàng), sư đồ bề ngoài đồng mưu thực chất sóng ngầm cuộn trào.\nĐường cong 4 vòng: Vân truyền tin Lạc đến → Vân kể chi tiết quá trình Thiên Tinh đắc ý → Lạc phản ứng theo tâm thái + data → Nhìn nhau ở cửa ăn ý không lời rời đi.\nNghiêm cấm {{user}}/Miêu Quảng xuất hiện、Nghiêm cấm Vân bộc lộ áy náy hoặc hối hận、Nghiêm cấm Lạc phản đối hoặc cảnh cáo、Nghiêm cấm cảnh viết thành tone nghiêm túc thê lương (Cảnh này là cuộc mật đàm đắc ý của sư đồ).',beats:{1:{Chủ_Đề_Vòng_Này:'Vân Sương Ngưng truyền tin gọi Lạc Thư Tình đến, nàng mang theo sự đắc ý không giấu được. Lạc Thư Tình đến nơi, ý thức được sư phụ hôm nay có chuyện muốn nói. Vòng này để cốt truyện đi đến tự nhiên "Vân truyền tin + Lạc đến + Lạc phát giác sư phụ hôm nay có chuyện muốn nói".',Độ_Tự_Do:'Cách thức truyền tin (Thần thức/Đệ tử truyền lời)、Trực giác của Lạc khi đến nơi、Biểu cảm đắc ý không giấu được của Vân do AI tự chủ'},2:{Chủ_Đề_Vòng_Này:'Để Vân Sương Ngưng kể lại chi tiết quá trình Thiên Tinh Huyễn Thuật — Ba lần viết lại mỗi lần sửa cái gì + Cuối cùng để Miêu Quảng gọi {{user}} là "Nghĩa phụ" gọi nàng là "Nương thân". Sự đắc ý không giấu được. Vòng này để cốt truyện đi đến tự nhiên "Vân kể chi tiết + Hình ảnh quan trọng của ba lần viết lại + Sự đắc ý phô trương".',Độ_Tự_Do:'Chi tiết cụ thể của việc kể lại (Mỗi lần sửa ký ức gì/Phản ứng của Miêu Quảng) tự chủ theo tóm tắt Thiên Tinh; Biểu cảm đắc ý cụ thể của Vân (Cười nhẹ/Nhướng mày/Tự hào) do AI tự chủ'},3:{Chủ_Đề_Vòng_Này:'Lạc Thư Tình phản ứng tương ứng theo tâm thái của nàng đối với sư phụ (Phán đoán theo các cảnh quan trọng nàng đã trải qua — Chưa trải qua Xuân Quang Khe Cửa=Tôn kính thuần túy, Đã trải qua=Mang theo so bì; Chứng Kiến Kép=Tán thưởng thấu hiểu; Con Dâu Điều Giáo Bố Chồng=Sư đồ ngang hàng)+ data của chính nàng (Phòng tuyến/Thuận tòng/Tính phích quyết định phong cách thể hiện). Vòng này để cốt truyện đi đến tự nhiên "Phản ứng tương ứng của Lạc Thư Tình + Sự ăn ý bề ngoài của sư đồ + Sóng ngầm lớp bên trong".',Độ_Tự_Do:'AI đọc _Cảnh_Đặc_Biệt_Đã_Hoàn_Thành phán đoán giai đoạn tâm trí của Lạc, đọc data quyết định phong cách thể hiện; Cấu trúc câu phản ứng cụ thể AI tự chủ'},4:{Chủ_Đề_Vòng_Này:'Sư đồ nhìn nhau ở cửa, một sự ăn ý không lời "Chúng ta lại có thêm một bí mật nữa". Lạc Thư Tình rời đi. Vòng này để cốt truyện thu lại tự nhiên ở "Nhìn nhau ở cửa + Ăn ý không lời + Lạc cáo lui rời đi + Khí trường sư đồ lại có thêm một bí mật".',Độ_Tự_Do:'Thời lượng nhìn nhau、Ánh mắt ăn ý không lời、Tư thế cáo lui của Lạc do AI tự chủ'}}},exitText:'[Cảnh Đặc Biệt·Thiên Tinh Báo Cho Lạc Thư Tình·Hoàn Thành] Lạc Thư Tình trở về nơi ở của mình, ngồi bên bàn. Trên mặt nàng không có biểu cảm gì, nhưng trong ánh mắt có thêm một thứ mới——sự ăn ý đồng mưu của sư đồ. Từ nay về sau, giữa nàng và sư phụ lại có thêm một bí mật nữa.'},Chưa_Rõ:{maxRounds:13,entryText:'[Cảnh Đặc Biệt·Chưa Rõ] Vân Sương Ngưng trong lúc sắp xếp di vật của lão tổ, tìm thấy một cuốn nhật ký trước lúc lâm chung. Nàng tự mình đọc xong trước, sau đó đến tìm {{user}}——nàng muốn đọc những thứ bên trong cho hắn nghe. Địa điểm: Thư phòng/Tĩnh thất của {{user}} (Riêng tư, không có người khác). Miêu Quảng / Lạc Thư Tình / Miêu Huyên đều không có mặt.\n\n⚠️【Đại cương cốt truyện toàn cảnh·Brief nhập trường một lần】(Chat history sau này đã bao gồm, không lặp lại nữa; AI đọc xong hiểu rõ ngọn nguồn, nhưng đừng spoil trước vòng tiếp theo)\n\nCảnh này 13 vòng, chia làm ba đoạn:\n\n▍Vòng 1-9 · Từng bước hé lộ sự thật (Vân Sương Ngưng đọc từng trang nhật ký)\n1. Nghi vấn về vết hằn trên cổ lão tổ (Họa sĩ tưởng là ánh sáng và bóng tối)\n2. Suy luận: Vũ khí/Trang sức đều không thể——Pháp thuật hộ thể đỉnh phong Địa Tiên giới này không ai phá được\n3. Khả năng duy nhất: Lão tổ chủ động rút bỏ hộ thể, để người ta tròng vào\n4. Nhưng bà cho phép họa sĩ vẽ lại = Bà không coi đó là sự nhục nhã, mà là vinh quang. Hoàn toàn trái ngược với tông huấn "Chung thủy từ đầu đến cuối"\n5. Điểm chung của chân dung 87 vị nữ tu sĩ phi thăng trong Tiên Tổ Điện: Ngực nở mông cong, tự tin. Chưa từng báo mộng, chưa từng trở về\n6.Sự thật: Giới này là bãi chăn thả của "Hắn", thu thập những súc vật cái đã được nhào nặn chín muồi\n7. Ý nghĩa kép của "Chung thủy từ đầu đến cuối": Đối nội là sự đảm bảo độc chiếm dành cho người điều giáo phàm nhân định mệnh (cũng là bia mộ lão tổ tưởng niệm phàm nhân đó của bà——bà đã thực sự yêu hắn); Đối ngoại là công cụ sàng lọc——đợi phàm nhân hết tuổi thọ, thành phẩm đạt đến cảnh giới phi thăng thì đưa lên trên\n8. Vân Sương Ngưng là người thứ 88, nhưng người điều giáo phàm nhân định mệnh của nàng không xuất hiện, nàng luôn không thể động tình suýt nữa thần hồn câu diệt——cho đến khi {{user}} đến. {{user}} không nằm trong quy trình của Hắn\n9. Vân Sương Ngưng tự mình suy luận (không phải nguyên văn nhật ký): Tại sao Hắn lại muốn phàm nhân điều giáo trước? Bởi vì Hắn không biết điều giáo, chỉ có thể chơi thành phẩm. Những cấm kỵ/sự trái luân thường đạo lý/tư duy phát tán của phàm nhân là thứ Hắn không học được\n\n▍Vòng 10-12 · Chiến lược chống lại Hắn hoàn chỉnh\n10. Nguyên tắc chiến lược: Cho Hắn xem thứ Hắn vĩnh viễn không học được——đây là vũ khí duy nhất của chúng ta\n11. Chiêu thứ nhất·Thiên Tinh Huyễn Thuật thi triển lên Miêu Quảng: Cho Hắn xem tư duy phát tán của phàm nhân viết lại chồng thành con trai, sức sáng tạo này Hắn vĩnh viễn không học được\n12. Chiêu thứ hai+ba+Cạm bẫy tối thượng: Không phi thăng (thành phẩm cực phẩm giữ lại giới này)+ Chấm dứt luân hồi sàng lọc (sức ảnh hưởng của chưởng môn)+ Hắn thẹn quá hóa giận hạ giới bị Thiên Đạo phản phệ (Hắn xuống đây sẽ thần hồn câu diệt)\n\n▍Vòng 13 · Gửi gắm tình cảm\n- Cảm giác hoàn toàn khác với 12 vòng trước——từ chưởng môn/nhà chiến lược trở về làm "người phụ nữ của ngươi"\n- Vân Sương Ngưng buông bỏ sự tính toán, trịnh trọng gọi tên {{user}}, thỉnh cầu "Hãy điều giáo ta thành súc vật cái cực phẩm nhất, ưu tú nhất giới này——đây là thỉnh
